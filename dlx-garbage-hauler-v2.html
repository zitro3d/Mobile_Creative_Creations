    ctx.fillRect(-5, -9, 10, 18);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    ctx.strokeRect(-5, -9, 10, 18);
    // Ember cracks
    ctx.strokeStyle = '#ff5a1a'; ctx.shadowBlur = 4; ctx.shadowColor = '#ff5a1a';
    ctx.beginPath();
    ctx.moveTo(-3, -6); ctx.lineTo(-1, 0); ctx.lineTo(3, 6);
    ctx.moveTo(2, -5);  ctx.lineTo(0, -1);
    ctx.stroke();
    ctx.shadowBlur = 0;
  };
  DEBRIS_DRAWERS.emberrock = function() {
    ctx.fillStyle = '#3a1408';
    ctx.beginPath();
    ctx.moveTo(-10, 2); ctx.lineTo(-6, -7); ctx.lineTo(2, -9);
    ctx.lineTo(9, -4);  ctx.lineTo(10, 4);  ctx.lineTo(3, 9); ctx.lineTo(-7, 7);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#0a0000'; ctx.lineWidth = 1; ctx.stroke();
    // Glowing cracks
    ctx.shadowBlur = 8; ctx.shadowColor = '#ff4a10';
    ctx.strokeStyle = '#ff6a20';
    ctx.beginPath();
    ctx.moveTo(-6, -3); ctx.lineTo(-2, 1); ctx.lineTo(4, 5);
    ctx.moveTo(-1, -5); ctx.lineTo(3, 0);
    ctx.stroke();
    ctx.shadowBlur = 0;
  };
  DEBRIS_DRAWERS.molten_tire = function() {
    ctx.fillStyle = '#2a1a18';
    ctx.beginPath(); ctx.arc(0, -1, 11, 0, Math.PI, true); ctx.fill();
    ctx.fillStyle = '#1a0a08';
    ctx.beginPath(); ctx.arc(0, -1, 11, Math.PI, 0, true); ctx.fill();
    // Melted puddle
    ctx.fillStyle = '#ff4a10';
    ctx.shadowBlur = 10; ctx.shadowColor = '#ff4a10';
    ctx.beginPath();
    ctx.moveTo(-10, 6); ctx.quadraticCurveTo(-8, 10, -4, 9);
    ctx.quadraticCurveTo(0, 11, 5, 9); ctx.quadraticCurveTo(9, 11, 10, 6);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    // Hub
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath(); ctx.arc(0, -2, 4, 0, Math.PI * 2); ctx.fill();
  };
  DEBRIS_DRAWERS.burntbook = function() {
    ctx.fillStyle = '#2a0f08';
    ctx.fillRect(-10, -7, 20, 14);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    ctx.strokeRect(-10, -7, 20, 14);
    // Pages
    ctx.fillStyle = '#d0b080';
    ctx.fillRect(-9, -6, 18, 12);
    // Scorch marks
    ctx.fillStyle = 'rgba(20, 5, 0, 0.75)';
    ctx.beginPath();
    ctx.moveTo(-9, 0); ctx.quadraticCurveTo(-3, -5, 2, 0); ctx.quadraticCurveTo(6, 4, 9, 0);
    ctx.lineTo(9, 6); ctx.lineTo(-9, 6);
    ctx.closePath(); ctx.fill();
    // Binding
    ctx.fillStyle = '#1a0a05';
    ctx.fillRect(-1, -7, 2, 14);
  };
  DEBRIS_DRAWERS.skullbone = function() {
    ctx.fillStyle = '#d8cfb6';
    ctx.beginPath();
    ctx.arc(0, -1, 9, Math.PI, 2 * Math.PI);
    ctx.lineTo(7, 5); ctx.lineTo(4, 8); ctx.lineTo(2, 5);
    ctx.lineTo(0, 8); ctx.lineTo(-2, 5); ctx.lineTo(-4, 8); ctx.lineTo(-7, 5);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#6a5a3a'; ctx.lineWidth = 1; ctx.stroke();
    // Eye sockets
    ctx.fillStyle = '#120a05';
    ctx.beginPath(); ctx.arc(-3, -1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, -1, 2, 0, Math.PI * 2); ctx.fill();
    // Nose
    ctx.beginPath();
    ctx.moveTo(0, 2); ctx.lineTo(1, 4); ctx.lineTo(-1, 4);
    ctx.closePath(); ctx.fill();
  };
  DEBRIS_DRAWERS.ashheap = function() {
    ctx.fillStyle = '#3a3030';
    ctx.beginPath();
    ctx.moveTo(-12, 8); ctx.quadraticCurveTo(-6, -5, 0, -4);
    ctx.quadraticCurveTo(6, -3, 12, 8);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#141010'; ctx.lineWidth = 1; ctx.stroke();
    // Embers inside
    ctx.fillStyle = '#ff5a20';
    ctx.shadowBlur = 6; ctx.shadowColor = '#ff5a20';
    ctx.beginPath(); ctx.arc(-3, 3, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, 1, 0.9, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(1, 6, 0.7, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  };
  DEBRIS_DRAWERS.lavashard = function() {
    // Hot obsidian shard — sharp polygon with molten cracks
    ctx.fillStyle = '#15050a';
    ctx.beginPath();
    ctx.moveTo(-10, 6); ctx.lineTo(-4, -9); ctx.lineTo(6, -8);
    ctx.lineTo(11, 2);  ctx.lineTo(3, 9);   ctx.lineTo(-6, 9);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
    // Lava core
    ctx.shadowBlur = 10; ctx.shadowColor = '#ff3a0a';
    ctx.fillStyle = '#ff5a10';
    ctx.beginPath();
    ctx.moveTo(-2, -4); ctx.lineTo(4, -1); ctx.lineTo(2, 4); ctx.lineTo(-3, 1);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
  };

  // Per-type fill colour used to extend a drifted obstacle's art to the
  // screen edge so a moving pipe never reveals a gap above its crown or
  // below its base.
  function pipeEdgeColor(type) {
    const T = theme();
    switch (type) {
      case 'cargo':      return T.cargo.grad[2];
      case 'junk':       return T.junk.grad[1];
      case 'reeds':      return '#121f0c';
      case 'swamptree':  return '#100a05';
      case 'skyscraper': return '#1a1828';
      case 'pillar':     return '#1a1620';
      case 'lavaspire':  return '#0a0302';
      case 'vent':       return '#1a0504';
      case 'mesa':       return '#1f1008';
      case 'boulder':    return '#241208';
      default:           return T.ridge;
    }
  }

  function drawPipe(p) {
    const dy = p.driftY || 0;
    const botH = PLAY_H - (p.top + p.gap);
    // If the pipe-pair has drifted, fill the empty band between the
    // screen edge and the obstacle so the art always reaches the edge.
    if (dy !== 0) {
      ctx.fillStyle = pipeEdgeColor(p.type);
      if (dy > 0) {
        // Top obstacle moved DOWN — fill band at the top of screen
        ctx.fillRect(p.x - 5, 0, PIPE_W + 10, dy);
      } else {
        // Bottom obstacle moved UP — fill band at the bottom of play area
        ctx.fillRect(p.x - 5, PLAY_H + dy, PIPE_W + 10, -dy);
      }
    }
    const drawer = OBSTACLE_DRAWERS[p.type] || OBSTACLE_DRAWERS.cargo;
    drawer(p.x, dy,                  PIPE_W, p.top, true,  p);
    drawer(p.x, p.top + p.gap + dy,  PIPE_W, botH,  false, p);
  }

  const OBSTACLE_DRAWERS = {
    cargo: function(x, y, w, h, isTop, p) { drawCargo(x, y, w, h, isTop, p.seed + (isTop ? 0 : 13)); },
    junk:  function(x, y, w, h, isTop, p) { drawJunk(x, y, w, h, isTop, isTop ? p.topShape : p.botShape, p.seed + (isTop ? 0 : 13), p.antennas); },
    reeds:     function(x, y, w, h, isTop, p) { drawReeds(x, y, w, h, isTop, p.seed + (isTop ? 0 : 13)); },
    swamptree: function(x, y, w, h, isTop, p) { drawSwampTree(x, y, w, h, isTop, p.seed + (isTop ? 0 : 13)); },
    skyscraper: function(x, y, w, h, isTop, p) { drawSkyscraper(x, y, w, h, isTop, p.seed + (isTop ? 0 : 13)); },
    pillar:     function(x, y, w, h, isTop, p) { drawPillar(x, y, w, h, isTop, p.seed + (isTop ? 0 : 13)); },
    lavaspire:  function(x, y, w, h, isTop, p) { drawLavaSpire(x, y, w, h, isTop, isTop ? p.topShape : p.botShape, p.seed + (isTop ? 0 : 13)); },
    vent:       function(x, y, w, h, isTop, p) { drawVent(x, y, w, h, isTop, p.seed + (isTop ? 0 : 13)); },
    mesa:       function(x, y, w, h, isTop, p) { drawMesa(x, y, w, h, isTop, p.seed + (isTop ? 0 : 13)); },
    boulder:    function(x, y, w, h, isTop, p) { drawBoulder(x, y, w, h, isTop, p.seed + (isTop ? 0 : 13)); },
  };

  // ---------- Thematic obstacle structures ----------

  // Swamp: giant fleshy mushroom with a bulbous cap facing the gap
  // Swamp: cluster of cattail reeds rising from a mossy mud mound
  function drawReeds(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    ctx.save();
    ctx.translate(x, y);
    const cx = w / 2;
    const tipY = isTop ? h : 0;
    const baseY = isTop ? 0 : h;
    const sign = isTop ? 1 : -1;

    // Dark muddy backfill so gaps between reeds read as solid
    ctx.fillStyle = 'rgba(6, 14, 6, 0.88)';
    ctx.fillRect(-3, Math.min(baseY, baseY + 18 * sign), w + 6, Math.abs(18));

    // Mossy mud mound across the base edge — solid fills, no per-pipe gradient
    ctx.fillStyle = '#121f0c';
    ctx.beginPath();
    ctx.ellipse(cx, baseY + 2 * sign, w * 0.72, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#36521c';
    ctx.beginPath();
    ctx.ellipse(cx, baseY + 1 * sign, w * 0.55, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(120, 180, 60, 0.65)';
    ctx.beginPath();
    ctx.ellipse(cx, baseY - 1 * sign, w * 0.55, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Reed stalks — fewer stalks, single stroke per stalk, simpler cattails.
    // Previous version was the worst hot path on the swamp level: 8 stalks
    // per pipe × 2 strokes each + 6-segment cattail fluff loop × 5 cattails
    // per pipe meant ~70 stroke ops per pipe segment, and with 6 reed
    // segments visible it was ~420 strokes per frame just for reeds.
    const stalkCount = 5;
    ctx.strokeStyle = '#2e5018';
    ctx.lineWidth = 1.8;
    const stalksData = [];
    for (let i = 0; i < stalkCount; i++) {
      const t = i / (stalkCount - 1);
      const sBaseX = cx + (t - 0.5) * (w * 0.85) + (srand(seed + i * 13) - 0.5) * 4;
      const sBaseY = baseY + 4 * sign;
      const lenFrac = 0.6 + srand(seed + i * 7) * 0.45;
      const reach = (h - 14) * lenFrac;
      const sTipY = baseY + reach * sign;
      const sway = Math.sin(frame * 0.05 + i * 0.7 + seed * 0.03) * 3.2;
      const sTipX = sBaseX + (srand(seed + i * 23) - 0.5) * 10 + sway;
      stalksData.push({ sBaseX, sBaseY, sTipX, sTipY });
      // Single stroke per stalk
      ctx.beginPath();
      ctx.moveTo(sBaseX, sBaseY);
      ctx.quadraticCurveTo(
        (sBaseX + sTipX) / 2 + sway,
        (sBaseY + sTipY) / 2,
        sTipX, sTipY
      );
      ctx.stroke();
    }

    // Cattail heads — drawn in a single pass with shared style; the heavy
    // 6-line fluff loop is gone in favour of one inner stripe.
    ctx.fillStyle = '#3a2010';
    for (let i = 0; i < stalkCount; i++) {
      if (srand(seed + i * 41) <= 0.4) continue;     // ~60% of stalks
      const sd = stalksData[i];
      const headY = sd.sTipY + 5 * sign;
      ctx.beginPath();
      ctx.ellipse(sd.sTipX, headY, 2.6, 7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // Single highlight stripe across all cattail heads
    ctx.fillStyle = '#5a3018';
    for (let i = 0; i < stalkCount; i++) {
      if (srand(seed + i * 41) <= 0.4) continue;
      const sd = stalksData[i];
      const headY = sd.sTipY + 5 * sign;
      ctx.beginPath();
      ctx.ellipse(sd.sTipX - 0.8, headY, 1, 6, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Slime drips — solid-colour fills, no per-drip gradient allocation
    ctx.save();
    ctx.fillStyle = 'rgba(140, 220, 60, 0.75)';
    for (let i = 0; i < 3; i++) {
      const dx = cx + (srand(seed + 300 + i * 5) - 0.5) * (w * 0.75);
      const dy = tipY + (2 + srand(seed + 310 + i) * 6) * sign;
      const dlen = 4 + srand(seed + 320 + i) * 4;
      ctx.beginPath();
      ctx.ellipse(dx, dy, 1.1, dlen, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(dx, dy + dlen * sign, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    ctx.restore();
  }

  // Swamp: gnarled dead tree trunk with side branches
  function drawSwampTree(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    ctx.save();
    ctx.translate(x, y);
    const cx = w / 2;
    const sign = isTop ? 1 : -1;
    const tipY = isTop ? h : 0;
    const baseY = isTop ? 0 : h;

    // Trunk — slightly irregular tapered polygon
    const trunkPts = [];
    const segs = 8;
    const wideBase = w + 6;
    const wideTip  = w + 2;
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      const py = baseY + (tipY - baseY) * t;
      const px = cx - wideBase / 2 + (wideBase - wideTip) * t * 0.5 + (srand(seed + i) - 0.5) * 3;
      trunkPts.push([px, py]);
    }
    for (let i = segs; i >= 0; i--) {
      const t = i / segs;
      const py = baseY + (tipY - baseY) * t;
      const px = cx + wideBase / 2 - (wideBase - wideTip) * t * 0.5 + (srand(seed + 100 + i) - 0.5) * 3;
      trunkPts.push([px, py]);
    }

    const trunkGrad = ctx.createLinearGradient(0, 0, w, 0);
    trunkGrad.addColorStop(0, '#3a2a18');
    trunkGrad.addColorStop(0.5, '#1f140a');
    trunkGrad.addColorStop(1, '#100a05');
    ctx.fillStyle = trunkGrad;
    ctx.beginPath();
    ctx.moveTo(trunkPts[0][0], trunkPts[0][1]);
    for (let i = 1; i < trunkPts.length; i++) ctx.lineTo(trunkPts[i][0], trunkPts[i][1]);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#0a0a05'; ctx.lineWidth = 1.3;
    ctx.stroke();

    // Bark lines
    ctx.strokeStyle = 'rgba(30, 20, 10, 0.7)';
    ctx.lineWidth = 0.9;
    for (let i = 0; i < 3; i++) {
      const bx = 4 + srand(seed + 200 + i * 7) * (w - 8);
      ctx.beginPath();
      ctx.moveTo(bx, baseY);
      ctx.lineTo(bx + (srand(seed + 210 + i) - 0.5) * 4, tipY);
      ctx.stroke();
    }

    // Branches — 2 sticking out sideways near tip
    const bYs = [tipY - 28 * sign, tipY - 14 * sign];
    for (let i = 0; i < bYs.length; i++) {
      const by = bYs[i];
      const side = i % 2 === 0 ? -1 : 1;
      ctx.strokeStyle = '#1f140a'; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx + side * (w * 0.25), by);
      ctx.lineTo(cx + side * (w * 0.85), by + (srand(seed + 300 + i) - 0.5) * 6);
      ctx.stroke();
      ctx.strokeStyle = '#3a2a18'; ctx.lineWidth = 1.2; ctx.stroke();
    }

    // Moss clumps
    ctx.fillStyle = 'rgba(100, 160, 50, 0.8)';
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.25, baseY + 12 * sign, 8, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + w * 0.15, tipY - 22 * sign, 6, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // City: broken skyscraper slab with a window grid and jagged crumbled top
  function drawSkyscraper(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    ctx.save();
    ctx.translate(x, y);
    const tipY = isTop ? h : 0;
    const baseY = isTop ? 0 : h;
    const sign = isTop ? 1 : -1;

    // Body gradient — lighter so the silhouette pops against the dark sky
    const grad = ctx.createLinearGradient(0, 0, w, 0);
    grad.addColorStop(0,   '#6a6276');
    grad.addColorStop(0.5, '#322e42');
    grad.addColorStop(1,   '#1a1828');
    ctx.fillStyle = grad;
    ctx.fillRect(-2, Math.min(baseY, tipY), w + 4, Math.abs(tipY - baseY));

    // Jagged crumbled edge at the gap-facing side
    ctx.fillStyle = '#050510';
    ctx.beginPath();
    const segs = 6;
    ctx.moveTo(-2, tipY);
    for (let i = 0; i <= segs; i++) {
      const sx = -2 + (w + 4) * (i / segs);
      const sy = tipY + sign * (6 + srand(seed + i * 5) * 14);
      ctx.lineTo(sx, sy);
    }
    ctx.lineTo(w + 2, tipY);
    ctx.closePath();
    ctx.fill();
    // Rebar sticking up (more, bent)
    ctx.strokeStyle = '#6a4a22'; ctx.lineWidth = 1.2;
    for (let i = 0; i < 5; i++) {
      const rx = 4 + srand(seed + 40 + i * 7) * (w - 8);
      const ry1 = tipY + sign * (6 + srand(seed + 50 + i) * 10);
      const ry2 = tipY + sign * (22 + srand(seed + 60 + i) * 14);
      ctx.beginPath();
      ctx.moveTo(rx, ry1);
      ctx.quadraticCurveTo(rx + (srand(seed + 65 + i) - 0.5) * 12, (ry1 + ry2) / 2,
                           rx + (srand(seed + 70 + i) - 0.5) * 18, ry2);
      ctx.stroke();
    }

    // Cracks across the facade — zig-zagging slashes
    ctx.strokeStyle = 'rgba(8, 5, 12, 0.85)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const cx0 = srand(seed + 100 + i * 11) * w;
      const cy0 = srand(seed + 110 + i * 13) * h;
      ctx.beginPath();
      ctx.moveTo(cx0, cy0);
      for (let j = 1; j < 4; j++) {
        const nx = cx0 + (srand(seed + 120 + i * 17 + j) - 0.5) * 16;
        const ny = cy0 + (srand(seed + 130 + i * 19 + j) - 0.5) * 12 + j * 4;
        ctx.lineTo(nx, ny);
      }
      ctx.stroke();
    }

    // Burning holes — darkened gaps in the wall with fire licking out
    for (let i = 0; i < 2; i++) {
      const hx = 6 + srand(seed + 200 + i * 13) * (w - 18);
      const hy = 8 + srand(seed + 210 + i * 17) * (h - 20);
      const hw = 9 + srand(seed + 220 + i) * 4;
      const hh = 6 + srand(seed + 230 + i) * 3;
      // Dark interior
      ctx.fillStyle = '#040208';
      ctx.fillRect(hx, hy, hw, hh);
      // Fire glow inside
      ctx.save();
      ctx.shadowBlur = 14; ctx.shadowColor = '#ff5010';
      const flick = 0.7 + Math.sin(frame * 0.4 + i * 3) * 0.3;
      const fg = ctx.createRadialGradient(hx + hw / 2, hy + hh / 2, 0, hx + hw / 2, hy + hh / 2, hw);
      fg.addColorStop(0, 'rgba(255, 210, 120, ' + (0.9 * flick) + ')');
      fg.addColorStop(0.5, 'rgba(255, 90, 20, ' + (0.75 * flick) + ')');
      fg.addColorStop(1, 'rgba(180, 30, 10, 0)');
      ctx.fillStyle = fg;
      ctx.fillRect(hx - 4, hy - 4, hw + 8, hh + 8);
      ctx.restore();
    }

    // Window grid — sparse amber lit windows (most broken)
    const winW = 5, winH = 6, gap = 3;
    const cols = Math.floor((w - 6) / (winW + gap));
    const yStart = isTop ? 6 : h - 6 - winH;
    const yEnd   = isTop ? h - 20 : 20;
    const yStep  = isTop ? (winH + gap) : -(winH + gap);
    const xStart = (w - (cols * winW + (cols - 1) * gap)) / 2;
    for (let yy = yStart; (isTop ? yy < yEnd : yy > yEnd); yy += yStep) {
      for (let c = 0; c < cols; c++) {
        const wx = xStart + c * (winW + gap);
        const roll = srand(seed + Math.abs(yy) * 3.3 + c * 1.7);
        if (roll < 0.12) {
          // Lit amber
          ctx.fillStyle = '#ff9a30';
          ctx.fillRect(wx, yy, winW, winH);
          ctx.save(); ctx.shadowBlur = 6; ctx.shadowColor = '#ff6020';
          ctx.fillRect(wx, yy, winW, winH); ctx.restore();
        } else if (roll < 0.55) {
          // Broken (dark void)
          ctx.fillStyle = '#020408';
          ctx.fillRect(wx, yy, winW, winH);
        } else {
          // Boarded / reflective
          ctx.fillStyle = '#1a1a26';
          ctx.fillRect(wx, yy, winW, winH);
        }
      }
    }

    // Bent antenna on top of the top-facing tip (only for top obstacle)
    if (isTop && h > 30) {
      const ax = w / 2 + (srand(seed + 400) - 0.5) * (w * 0.3);
      const ay = 0;
      ctx.strokeStyle = '#7a7080'; ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.quadraticCurveTo(ax + 4, -8, ax + 10, -16);
      ctx.stroke();
      // Red beacon
      if ((Math.floor(frame / 20) + Math.floor(seed)) & 1) {
        ctx.save(); ctx.shadowBlur = 6; ctx.shadowColor = '#ff4040';
        ctx.fillStyle = '#ff4040';
        ctx.beginPath(); ctx.arc(ax + 10, -16, 1.6, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }

    // Outer edge — lighter to read against the smoky sky
    ctx.strokeStyle = '#0f0b1a'; ctx.lineWidth = 1.2;
    ctx.strokeRect(-1.5, Math.min(baseY, tipY) + 0.5, w + 3, Math.abs(tipY - baseY) - 1);
    // Secondary highlight stroke for contrast
    ctx.strokeStyle = 'rgba(200, 130, 80, 0.35)';
    ctx.lineWidth = 0.8;
    ctx.strokeRect(-1.5, Math.min(baseY, tipY) + 0.5, w + 3, Math.abs(tipY - baseY) - 1);

    ctx.restore();
  }

  // City: broken concrete overpass pillar with exposed rebar and hazard tape
  function drawPillar(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    ctx.save();
    ctx.translate(x, y);
    const tipY = isTop ? h : 0;
    const baseY = isTop ? 0 : h;
    const sign = isTop ? 1 : -1;
    const padX = 3;
    const colX = -padX;
    const colW = w + padX * 2;

    // Concrete body
    const grad = ctx.createLinearGradient(colX, 0, colX + colW, 0);
    grad.addColorStop(0,   '#6a626e');
    grad.addColorStop(0.5, '#2e2a34');
    grad.addColorStop(1,   '#1a1620');
    ctx.fillStyle = grad;
    ctx.fillRect(colX, 0, colW, h);

    // Horizontal seam lines (concrete pour joints)
    ctx.strokeStyle = 'rgba(14, 10, 18, 0.7)';
    ctx.lineWidth = 0.8;
    const seamCount = 3;
    for (let i = 1; i <= seamCount; i++) {
      const sy = (h / (seamCount + 1)) * i;
      ctx.beginPath();
      ctx.moveTo(colX + 2, sy); ctx.lineTo(colX + colW - 2, sy);
      ctx.stroke();
    }

    // Zigzag cracks
    ctx.strokeStyle = 'rgba(8, 5, 10, 0.85)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const ox = srand(seed + i * 17) * colW + colX;
      const oy = srand(seed + i * 23) * h;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      for (let j = 1; j < 4; j++) {
        const nx = ox + (srand(seed + i * 29 + j) - 0.5) * 14;
        const ny = oy + (srand(seed + i * 31 + j) - 0.5) * 8 + j * 4;
        ctx.lineTo(nx, ny);
      }
      ctx.stroke();
    }

    // Chunks knocked out of the facade (negative gaps showing dark interior)
    for (let i = 0; i < 3; i++) {
      const cxH = colX + 4 + srand(seed + 50 + i * 11) * (colW - 12);
      const cyH = 12 + srand(seed + 60 + i * 13) * (h - 28);
      const cwH = 7 + srand(seed + 70 + i) * 7;
      const chH = 5 + srand(seed + 80 + i) * 6;
      ctx.fillStyle = '#06030a';
      ctx.beginPath();
      ctx.moveTo(cxH, cyH);
      ctx.lineTo(cxH + cwH, cyH);
      ctx.lineTo(cxH + cwH - 3, cyH + chH);
      ctx.lineTo(cxH - 2, cyH + chH);
      ctx.closePath();
      ctx.fill();
    }

    // Graffiti splash — faded neon tag
    ctx.save();
    ctx.globalAlpha = 0.75;
    ctx.shadowBlur = 5; ctx.shadowColor = '#ff4080';
    ctx.fillStyle = '#ff4080';
    ctx.font = 'bold 10px "Courier New", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const tagY = isTop ? h * 0.38 : h * 0.62;
    ctx.save();
    ctx.translate(colX + colW / 2, tagY);
    ctx.rotate(-0.18);
    ctx.fillText('RUN', 0, 0);
    ctx.restore();
    ctx.restore();

    // Yellow/black hazard band wrapped near the gap end
    const bandH = 14;
    const bandY = isTop ? h - bandH : 0;
    ctx.save();
    ctx.beginPath();
    ctx.rect(colX, bandY, colW, bandH);
    ctx.clip();
    const stripeW = 10;
    for (let sx = colX - bandH; sx < colX + colW + bandH; sx += stripeW) {
      ctx.fillStyle = (Math.floor((sx - colX) / stripeW) % 2 === 0) ? '#ffa020' : '#0a0606';
      ctx.beginPath();
      ctx.moveTo(sx, bandY);
      ctx.lineTo(sx + stripeW, bandY);
      ctx.lineTo(sx + stripeW - bandH, bandY + bandH);
      ctx.lineTo(sx - bandH, bandY + bandH);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    ctx.strokeStyle = '#0a0606'; ctx.lineWidth = 1.2;
    ctx.strokeRect(colX + 0.5, bandY + 0.5, colW - 1, bandH - 1);

    // Exposed rebar sticking out of the gap-facing end
    ctx.strokeStyle = '#3a2010'; ctx.lineWidth = 1.6;
    const rebarCount = 5;
    for (let i = 0; i < rebarCount; i++) {
      const rx = colX + 4 + (colW - 8) * (i / (rebarCount - 1));
      const bend = (srand(seed + 150 + i) - 0.5) * 0.7;
      const len = 14 + srand(seed + 160 + i) * 10;
      ctx.beginPath();
      ctx.moveTo(rx, tipY);
      ctx.quadraticCurveTo(rx + bend * 12, tipY + len * 0.5 * sign,
                           rx + bend * 22, tipY + len * sign);
      ctx.stroke();
      // highlight shine
      ctx.strokeStyle = 'rgba(160, 110, 60, 0.6)'; ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(rx - 0.4, tipY);
      ctx.quadraticCurveTo(rx + bend * 12 - 0.4, tipY + len * 0.5 * sign,
                           rx + bend * 22 - 0.4, tipY + len * sign);
      ctx.stroke();
      ctx.strokeStyle = '#3a2010'; ctx.lineWidth = 1.6;
    }

    // Outer edge (dark) + secondary warm highlight so the silhouette pops
    ctx.strokeStyle = '#05020a'; ctx.lineWidth = 1.4;
    ctx.strokeRect(colX + 0.5, 0.5, colW - 1, h - 1);
    ctx.strokeStyle = 'rgba(200, 110, 60, 0.3)';
    ctx.lineWidth = 0.8;
    ctx.strokeRect(colX + 0.5, 0.5, colW - 1, h - 1);

    ctx.restore();
  }

  // City: thin concrete post with a wide billboard near the gap
  function drawBillboard(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    ctx.save();
    ctx.translate(x, y);
    const cx = w / 2;
    const tipY = isTop ? h : 0;
    const baseY = isTop ? 0 : h;
    const sign = isTop ? 1 : -1;
    const postW = w * 0.32;
    const signH = 36;
    const signW = w + 14;

    // Post
    const postGrad = ctx.createLinearGradient(cx - postW / 2, 0, cx + postW / 2, 0);
    postGrad.addColorStop(0, '#6a6878');
    postGrad.addColorStop(1, '#2a2830');
    ctx.fillStyle = postGrad;
    ctx.fillRect(cx - postW / 2, Math.min(baseY, tipY - signH * sign), postW, Math.abs((tipY - signH * sign) - baseY));
    ctx.strokeStyle = '#12121c'; ctx.lineWidth = 1;
    ctx.strokeRect(cx - postW / 2 + 0.5, Math.min(baseY, tipY - signH * sign) + 0.5, postW - 1, Math.abs((tipY - signH * sign) - baseY) - 1);

    // Billboard panel at the gap end
    const signCx = cx;
    const signTop = isTop ? tipY - signH : tipY;
    ctx.fillStyle = '#1a1a22';
    ctx.fillRect(signCx - signW / 2, signTop, signW, signH);
    // Inner sign bg
    const bgGrad = ctx.createLinearGradient(0, signTop, 0, signTop + signH);
    bgGrad.addColorStop(0, '#e9418a');
    bgGrad.addColorStop(1, '#6a1850');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(signCx - signW / 2 + 3, signTop + 3, signW - 6, signH - 6);

    // Flicker label
    const onOff = Math.floor(frame * 0.08 + seed * 0.1) & 1 ? 1 : 0.35;
    ctx.save();
    ctx.globalAlpha = onOff;
    ctx.shadowBlur = 10; ctx.shadowColor = '#ffd7ff';
    ctx.font = 'bold 11px "Courier New", monospace';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('DLX', signCx, signTop + signH / 2);
    ctx.restore();

    // Support brackets
    ctx.strokeStyle = '#12121c'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(signCx - postW * 0.5, signTop + (isTop ? signH : 0));
    ctx.lineTo(signCx - postW * 0.5, signTop + (isTop ? signH + 6 : -6));
    ctx.moveTo(signCx + postW * 0.5, signTop + (isTop ? signH : 0));
    ctx.lineTo(signCx + postW * 0.5, signTop + (isTop ? signH + 6 : -6));
    ctx.stroke();

    // Frame outline
    ctx.strokeStyle = '#05050a'; ctx.lineWidth = 1.4;
    ctx.strokeRect(signCx - signW / 2 + 0.5, signTop + 0.5, signW - 1, signH - 1);

    ctx.restore();
  }

  // Volcano: jagged obsidian spire with glowing lava cracks
  function drawLavaSpire(x, y, w, h, isTop, pts, seed) {
    if (h <= 0 || !pts) return;
    ctx.save();
    ctx.translate(x, y);

    // Base fill — charred basalt; cached body gradient when on volcano theme
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.fillStyle = bgCache.lavaspireBody || '#0a0302';
    ctx.fill();
    ctx.strokeStyle = '#2a0804'; ctx.lineWidth = 1.3;
    ctx.stroke();

    // Lava cracks — glowing orange veins over the rock
    ctx.save();
    ctx.clip();
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff5a10';
    ctx.strokeStyle = '#ff7a1a';
    ctx.lineWidth = 1.4;
    for (let i = 0; i < 5; i++) {
      const startX = srand(seed + i * 13) * w;
      const startY = srand(seed + i * 17) * h;
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      let cx = startX, cy = startY;
      for (let j = 0; j < 3; j++) {
        cx += (srand(seed + i * 31 + j) - 0.5) * 16;
        cy += (srand(seed + i * 47 + j) - 0.5) * 22;
        ctx.lineTo(cx, cy);
      }
      ctx.stroke();
    }
    // Molten nodes
    ctx.shadowBlur = 12;
    for (let i = 0; i < 3; i++) {
      const nx = 6 + srand(seed + 200 + i) * (w - 12);
      const ny = 6 + srand(seed + 220 + i) * (h - 12);
      ctx.fillStyle = '#ffb046';
      ctx.beginPath(); ctx.arc(nx, ny, 1.4 + srand(seed + 240 + i) * 1.6, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

    ctx.restore();
  }

  // Volcano: tall volcanic vent cylinder belching ember smoke
  function drawVent(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    ctx.save();
    ctx.translate(x, y);
    const cx = w / 2;
    const tipY = isTop ? h : 0;
    const baseY = isTop ? 0 : h;
    const sign = isTop ? 1 : -1;
    const ventW = w;
    const flareW = w + 10;
    const flareH = 12;
    const bodyTop    = isTop ? 0 : h;
    const bodyBottom = isTop ? h - flareH : flareH;

    // Body — cached dark-lava-rock gradient
    ctx.fillStyle = bgCache.ventBody || '#1a0504';
    ctx.fillRect(0, Math.min(bodyTop, bodyBottom), ventW, Math.abs(bodyTop - bodyBottom));
    ctx.strokeStyle = '#0a0000'; ctx.lineWidth = 1.2;
    ctx.strokeRect(0.5, Math.min(bodyTop, bodyBottom) + 0.5, ventW - 1, Math.abs(bodyTop - bodyBottom) - 1);

    // Molten seams
    ctx.save();
    ctx.strokeStyle = '#ff7020'; ctx.lineWidth = 1.2;
    for (let i = 0; i < 3; i++) {
      const sx = 4 + srand(seed + i * 9) * (w - 8);
      ctx.beginPath();
      ctx.moveTo(sx, baseY);
      ctx.lineTo(sx + (srand(seed + 10 + i) - 0.5) * 4, tipY - flareH * sign);
      ctx.stroke();
    }
    ctx.restore();

    // Flared crater/lip at the gap-facing end — solid fill (gradient was tiny)
    ctx.fillStyle = '#3a1408';
    ctx.beginPath();
    ctx.moveTo(0, tipY - flareH * sign);
    ctx.lineTo(ventW, tipY - flareH * sign);
    ctx.lineTo(ventW + 5, tipY + 2 * sign);
    ctx.lineTo(ventW * 0.5, tipY + 6 * sign);
    ctx.lineTo(-5, tipY + 2 * sign);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#0a0000'; ctx.lineWidth = 1.2; ctx.stroke();

    // Inside crater — glowing magma pool, solid amber + bright core
    ctx.save();
    ctx.shadowBlur = 12; ctx.shadowColor = '#ff4a10';
    ctx.fillStyle = '#ff5a1a';
    ctx.beginPath();
    ctx.ellipse(cx, tipY - (flareH * 0.4) * sign, flareW * 0.4, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffd070';
    ctx.beginPath();
    ctx.ellipse(cx, tipY - (flareH * 0.4) * sign, flareW * 0.18, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Rising ember sparks near the mouth
    ctx.save();
    ctx.shadowBlur = 8; ctx.shadowColor = '#ff9040';
    ctx.fillStyle = '#ffb860';
    for (let i = 0; i < 4; i++) {
      const ex = cx + Math.sin(frame * 0.08 + seed + i) * (flareW * 0.3);
      const ey = tipY + (i * 3 + (frame * 0.5 + seed * i) % 20) * sign;
      ctx.beginPath(); ctx.arc(ex, ey, 0.9, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

    ctx.restore();
  }

  // Canyon: tall tapered rocky mesa — slab silhouette with horizontal bands
  function drawMesa(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    ctx.save();
    ctx.translate(x, y);
    const tipY  = isTop ? h : 0;
    const baseY = isTop ? 0 : h;
    const sign  = isTop ? 1 : -1;
    const basePad = 5;
    const tipPad  = -4; // slightly narrower at the gap end
    // Polygon: base wider than tip
    ctx.fillStyle = '#321a08';
    ctx.beginPath();
    ctx.moveTo(-basePad, baseY);
    ctx.lineTo(w + basePad, baseY);
    ctx.lineTo(w + tipPad,  tipY);
    ctx.lineTo(-tipPad,     tipY);
    ctx.closePath();
    ctx.fill();
    // Vertical gradient overlay
    const g = ctx.createLinearGradient(0, baseY, 0, tipY);
    g.addColorStop(0, 'rgba(100, 50, 20, 0.45)');
    g.addColorStop(1, 'rgba(10, 5, 2, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(-basePad, Math.min(baseY, tipY), w + basePad * 2, Math.abs(tipY - baseY));
    // Horizontal rock strata
    ctx.strokeStyle = 'rgba(10, 5, 2, 0.75)';
    ctx.lineWidth = 0.9;
    const strataCount = 4;
    for (let i = 1; i <= strataCount; i++) {
      const fy = baseY + (tipY - baseY) * (i / (strataCount + 1));
      ctx.beginPath();
      ctx.moveTo(-basePad + 2, fy + (srand(seed + i * 3) - 0.5) * 1.5);
      ctx.lineTo(w + basePad - 2, fy + (srand(seed + 10 + i) - 0.5) * 1.5);
      ctx.stroke();
    }
    // Cracks
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const cx = 4 + srand(seed + 30 + i * 7) * (w - 8);
      const y0 = baseY + (tipY - baseY) * (0.1 + srand(seed + 40 + i) * 0.7);
      const y1 = y0 + 18 * sign;
      ctx.beginPath();
      ctx.moveTo(cx, y0);
      ctx.lineTo(cx + (srand(seed + 50 + i) - 0.5) * 6, y1);
      ctx.stroke();
    }
    // Warm dust highlight on the sun-facing side
    ctx.fillStyle = 'rgba(210, 120, 60, 0.2)';
    ctx.fillRect(w + tipPad - 6, Math.min(baseY, tipY) + 1, 5, Math.abs(tipY - baseY) - 2);
    // Dark edge stroke
    ctx.strokeStyle = '#0a0402';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(-basePad, baseY);
    ctx.lineTo(w + basePad, baseY);
    ctx.lineTo(w + tipPad,  tipY);
    ctx.lineTo(-tipPad,     tipY);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // Canyon: stacked irregular boulder tower
  function drawBoulder(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    ctx.save();
    ctx.translate(x, y);
    const tipY  = isTop ? h : 0;
    const baseY = isTop ? 0 : h;
    const sign  = isTop ? 1 : -1;
    // Solid backfill so the tower reads as one silhouette even with gaps
    ctx.fillStyle = '#1a0c06';
    ctx.fillRect(-2, Math.min(baseY, tipY), w + 4, Math.abs(tipY - baseY));
    // 3-4 stacked boulder blobs
    const blobs = 3 + Math.floor(srand(seed) * 2);
    for (let i = 0; i < blobs; i++) {
      const t = (i + 0.5) / blobs;
      const cy = baseY + (tipY - baseY) * t;
      const r  = (w * 0.55 + srand(seed + i * 7) * 6) * (0.9 + srand(seed + i * 11) * 0.2);
      const cxOff = (srand(seed + i * 13) - 0.5) * 6;
      // Boulder fill
      ctx.fillStyle = i % 2 === 0 ? '#3a1d0a' : '#2e1608';
      ctx.beginPath();
      // Irregular rounded polygon
      const verts = 8;
      for (let v = 0; v < verts; v++) {
        const a = (v / verts) * Math.PI * 2;
        const rr = r * (0.85 + srand(seed + i * 31 + v) * 0.3);
        const px = w / 2 + cxOff + Math.cos(a) * rr;
        const py = cy + Math.sin(a) * rr * 0.75;
        if (v === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      // Dark rim
      ctx.strokeStyle = '#0a0402'; ctx.lineWidth = 1.2;
      ctx.stroke();
      // Sun-lit side highlight
      ctx.strokeStyle = 'rgba(210, 120, 50, 0.45)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(w / 2 + cxOff + r * 0.2, cy - r * 0.2, r * 0.6, Math.PI * 1.15, Math.PI * 1.6);
      ctx.stroke();
    }
    // Tip dust spray
    ctx.fillStyle = 'rgba(200, 120, 60, 0.25)';
    ctx.beginPath();
    ctx.ellipse(w / 2, tipY, w * 0.6, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Rectangular cargo container — theme-tinted hull + hazard band
  function drawCargo(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    const C = theme().cargo;
    ctx.save();
    ctx.translate(x, y);
    const pad = 4;
    const containerW = w + pad * 2;
    const containerX = -pad;

    // Body with themed metallic gradient
    const grad = ctx.createLinearGradient(containerX, 0, containerX + containerW, 0);
    grad.addColorStop(0,   C.grad[0]);
    grad.addColorStop(0.4, C.grad[1]);
    grad.addColorStop(0.7, C.grad[2]);
    grad.addColorStop(1,   C.grad[3]);
    ctx.fillStyle = grad;
    ctx.fillRect(containerX, 0, containerW, h);

    // Hazard stripe band at the gap-facing end
    const bandH = 18;
    const bandY = isTop ? h - bandH : 0;
    ctx.save();
    ctx.beginPath();
    ctx.rect(containerX, bandY, containerW, bandH);
    ctx.clip();
    const stripeW = 10;
    for (let sx = containerX - bandH; sx < containerX + containerW + bandH; sx += stripeW) {
      ctx.fillStyle = (Math.floor((sx - containerX) / stripeW) % 2 === 0) ? C.hazardA : C.hazardB;
      ctx.beginPath();
      ctx.moveTo(sx, bandY);
      ctx.lineTo(sx + stripeW, bandY);
      ctx.lineTo(sx + stripeW - bandH, bandY + bandH);
      ctx.lineTo(sx - bandH, bandY + bandH);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    ctx.strokeStyle = C.rivet;
    ctx.lineWidth = 1.2;
    ctx.strokeRect(containerX + 0.5, bandY + 0.5, containerW - 1, bandH - 1);

    // Rivets
    ctx.fillStyle = C.rivet;
    for (let ry = 4; ry < h - 4; ry += 10) {
      ctx.beginPath(); ctx.arc(containerX + 3, ry, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(containerX + containerW - 3, ry, 1.2, 0, Math.PI * 2); ctx.fill();
    }

    // Weathering streaks
    ctx.strokeStyle = C.weather;
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const wx = containerX + 6 + srand(seed + i * 9) * (containerW - 12);
      const wy0 = isTop ? 2 : h - 2;
      const wy1 = wy0 + (isTop ? 14 + srand(seed + i * 3) * 20 : -(14 + srand(seed + i * 3) * 20));
      ctx.beginPath();
      ctx.moveTo(wx, wy0);
      ctx.lineTo(wx + (srand(seed + i * 5) - 0.5) * 3, wy1);
      ctx.stroke();
    }
    // Rust/biome spots
    const rustBase = C.rust;
    for (let i = 0; i < 5; i++) {
      const rx = containerX + srand(seed + 100 + i) * containerW;
      const ry = srand(seed + 200 + i) * h;
      const rr = 1 + srand(seed + 300 + i) * 2;
      ctx.fillStyle = rustBase;
      ctx.beginPath();
      ctx.arc(rx, ry, rr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Outer edge shadow
    ctx.strokeStyle = C.edge;
    ctx.lineWidth = 1.4;
    ctx.strokeRect(containerX + 0.5, 0.5, containerW - 1, h - 1);
    ctx.restore();
  }

  // Irregular junk polygon — theme-tinted hull + antennas
  function drawJunk(x, y, w, h, isTop, pts, seed, antennas) {
    if (h <= 0 || !pts) return;
    const J = theme().junk;
    const tipY = isTop ? h : 0;

    ctx.save();
    ctx.translate(x, y);

    const g = ctx.createLinearGradient(0, 0, w, 0);
    g.addColorStop(0,   J.grad[0]);
    g.addColorStop(0.5, J.grad[1]);
    g.addColorStop(1,   J.grad[2]);
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();

    ctx.strokeStyle = J.outline;
    ctx.lineWidth = 1.3;
    ctx.stroke();

    ctx.strokeStyle = J.rim;
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Rust streaks and bolts inside the polygon
    ctx.save();
    ctx.clip();
    ctx.strokeStyle = J.rust;
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const rx = srand(seed + 50 + i) * w;
      const ry0 = srand(seed + 60 + i) * h;
      const ry1 = ry0 + (isTop ? 10 + srand(seed + 70 + i) * 18 : -(10 + srand(seed + 70 + i) * 18));
      ctx.beginPath();
      ctx.moveTo(rx, ry0);
      ctx.lineTo(rx + (srand(seed + 80 + i) - 0.5) * 3, ry1);
      ctx.stroke();
    }
    ctx.fillStyle = J.bolt;
    for (let i = 0; i < 4; i++) {
      const bx = 6 + srand(seed + 150 + i) * (w - 12);
      const by = 6 + srand(seed + 160 + i) * (h - 12);
      ctx.beginPath();
      ctx.arc(bx, by, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Antennas with themed LED colours
    if (antennas) {
      ctx.strokeStyle = J.antennaMetal;
      ctx.fillStyle = J.antennaLed;
      ctx.lineWidth = 1.2;
      for (const a of antennas) {
        const ax = w * (0.2 + a.yFrac * 0.6);
        const ay = tipY;
        const dir = isTop ? 1 : -1;
        const endX = ax + Math.sin(a.angle) * a.len;
        const endY = ay + Math.cos(a.angle) * a.len * dir;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(endX, endY, a.tipR, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // Deterministic pseudo-random from a seed
  function srand(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  function drawExhaust() {
    if (exhaust.length === 0) return;
    ctx.save();
    for (const p of exhaust) {
      ctx.globalAlpha = Math.max(0, p.a);
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      if (p.dirty) {
        // Greasy black smoke
        g.addColorStop(0, 'rgba(60, 45, 35, 0.85)');
        g.addColorStop(0.7, 'rgba(30, 25, 20, 0.4)');
        g.addColorStop(1, 'rgba(0, 0, 0, 0)');
      } else {
        // Dirty orange flame/smoke
        g.addColorStop(0, 'rgba(255, 140, 50, 0.9)');
        g.addColorStop(0.5, 'rgba(200, 90, 40, 0.55)');
        g.addColorStop(1, 'rgba(50, 30, 20, 0)');
      }
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSparks() {
    if (sparks.length === 0) return;
    for (const s of sparks) {
      ctx.save();
      ctx.shadowBlur = 12;
      ctx.shadowColor = s.glow;
      ctx.globalAlpha = Math.max(0, s.life);
      ctx.fillStyle = s.color;
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      const sz = s.size * (0.5 + s.life * 0.5);
      if (s.shape === 'tri') {
        ctx.beginPath();
        ctx.moveTo(0, -sz * 0.8);
        ctx.lineTo(sz * 0.7, sz * 0.6);
        ctx.lineTo(-sz * 0.7, sz * 0.6);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillRect(-sz / 2, -sz / 2, sz, sz);
      }
      ctx.restore();
    }
  }

  function drawBird() {
    // Asymmetrical boxy Garbage Hauler — rust, patches, and a struggling engine
    ctx.save();

    // Shield bubble rendered underneath the ship
    if (shieldCharges > 0) drawShieldBubble();
    // Magnet pulse ring
    if (magnetFrames > 0) drawMagnetRing();
    // Ghost + i-frame transparency
    if (ghostFrames > 0) ctx.globalAlpha = 0.55 + 0.25 * Math.sin(frame * 0.3);
    else if (invulnFrames > 0 && Math.floor(frame / 3) % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }

    // Constant engine-wobble vibration so the whole ship shakes slightly
    const wobbleX = (Math.random() - 0.5) * 1.4;
    const wobbleY = (Math.random() - 0.5) * 1.4;
    ctx.translate(bird.x + wobbleX, bird.y + wobbleY);

    // Base tilt from velocity, clamped to ±20°
    const tilt = Math.max(-0.349, Math.min(0.349, bird.vy * 0.1));

    // Front of the ship uses the base tilt
    ctx.save();
    ctx.rotate(tilt);
    drawHaulerFront();
    ctx.restore();

    // Back / engine pivots slightly further — mechanical hinge
    ctx.save();
    ctx.rotate(tilt * 1.45);
    drawHaulerBack();
    if (thrusterFrames > 0) drawDirtyFlame();
    ctx.restore();

    // Burst halo on score (kept as a sickly amber instead of cyan)
    if (burstFrames > 0) {
      const burstT = burstFrames / 14;
      ctx.save();
      ctx.rotate(tilt);
      ctx.globalAlpha = burstT * 0.55;
      ctx.shadowBlur = 16;
      ctx.shadowColor = '#ffb74d';
      ctx.strokeStyle = '#ffb74d';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, BIRD_R * (1.3 + (1 - burstT) * 0.4), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  function drawHaulerFront() {
    const s = SHIPS[selectedShip];
    const nose = BIRD_R * 1.15;
    const cabinH = BIRD_R * 1.1;

    ctx.save();
    ctx.shadowBlur = 6;
    ctx.shadowColor = 'rgba(0,0,0,0.55)';

    // Main body rectangle — per-ship vertical gradient
    const bodyGrad = ctx.createLinearGradient(0, -cabinH / 2, 0, cabinH / 2);
    bodyGrad.addColorStop(0,   s.bodyTop);
    bodyGrad.addColorStop(0.5, s.bodyMid);
    bodyGrad.addColorStop(1,   s.bodyBot);
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-BIRD_R * 0.1, -cabinH / 2, nose + BIRD_R * 0.1, cabinH);

    // Secondary top cargo block
    ctx.fillStyle = s.secondary;
    ctx.fillRect(BIRD_R * 0.2, -cabinH / 2 - BIRD_R * 0.45, BIRD_R * 0.7, BIRD_R * 0.5);
    ctx.restore();

    // Outlines
    ctx.strokeStyle = '#1a100a';
    ctx.lineWidth = 1.2;
    ctx.strokeRect(-BIRD_R * 0.1 + 0.5, -cabinH / 2 + 0.5, nose + BIRD_R * 0.1 - 1, cabinH - 1);
    ctx.strokeRect(BIRD_R * 0.2 + 0.5, -cabinH / 2 - BIRD_R * 0.45 + 0.5, BIRD_R * 0.7 - 1, BIRD_R * 0.5 - 1);

    // Diagonal hazard stripes on the cargo block
    ctx.save();
    ctx.beginPath();
    ctx.rect(BIRD_R * 0.2 + 1, -cabinH / 2 - BIRD_R * 0.45 + 1, BIRD_R * 0.7 - 2, BIRD_R * 0.5 - 2);
    ctx.clip();
    for (let sx = -BIRD_R; sx < BIRD_R * 2; sx += 6) {
      ctx.fillStyle = (Math.floor(sx / 6) % 2 === 0) ? '#ffd60a' : '#1a1a1a';
      ctx.beginPath();
      ctx.moveTo(sx, -cabinH / 2 - BIRD_R * 0.45);
      ctx.lineTo(sx + 3, -cabinH / 2 - BIRD_R * 0.45);
      ctx.lineTo(sx + 3 - BIRD_R * 0.5, -cabinH / 2 + BIRD_R * 0.05);
      ctx.lineTo(sx - BIRD_R * 0.5, -cabinH / 2 + BIRD_R * 0.05);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // Cockpit window — colour per ship
    ctx.save();
    ctx.shadowBlur = 6;
    ctx.shadowColor = s.cockpitGlow;
    ctx.fillStyle = s.cockpit;
    ctx.fillRect(nose - BIRD_R * 0.35, -BIRD_R * 0.18, BIRD_R * 0.3, BIRD_R * 0.28);
    ctx.strokeStyle = '#2a1a05';
    ctx.lineWidth = 1;
    ctx.strokeRect(nose - BIRD_R * 0.35 + 0.5, -BIRD_R * 0.18 + 0.5, BIRD_R * 0.3 - 1, BIRD_R * 0.28 - 1);
    ctx.beginPath();
    ctx.moveTo(nose - BIRD_R * 0.35, 0);
    ctx.lineTo(nose - BIRD_R * 0.05, 0);
    ctx.stroke();
    ctx.restore();

    // Rivets along the seams
    ctx.fillStyle = '#1a0a05';
    for (let rx = 0; rx < nose; rx += 5) {
      ctx.beginPath(); ctx.arc(rx, -cabinH / 2 + 2, 0.9, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(rx, cabinH / 2 - 2, 0.9, 0, Math.PI * 2); ctx.fill();
    }

    // Weathering streaks
    ctx.strokeStyle = 'rgba(58, 28, 14, 0.75)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(BIRD_R * 0.4, -cabinH / 2 + 3);
    ctx.lineTo(BIRD_R * 0.55, cabinH / 2 - 2);
    ctx.moveTo(BIRD_R * 0.85, -cabinH / 2 + 4);
    ctx.lineTo(BIRD_R * 0.95, cabinH / 2 - 3);
    ctx.stroke();

    // Warning light on the roof — colour per ship
    ctx.fillStyle = s.warning;
    ctx.beginPath();
    ctx.arc(BIRD_R * 0.55, -cabinH / 2 - BIRD_R * 0.5, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawHaulerBack() {
    const s = SHIPS[selectedShip];
    const tailX = -BIRD_R * 0.1;
    const blockW = BIRD_R * 0.55;
    const blockH = BIRD_R * 1.4;

    ctx.save();
    ctx.shadowBlur = 5;
    ctx.shadowColor = 'rgba(0,0,0,0.55)';

    // Engine block — per-ship colour
    ctx.fillStyle = s.engine;
    ctx.fillRect(tailX - blockW, -blockH / 2, blockW, blockH);
    ctx.strokeStyle = s.engineEdge;
    ctx.lineWidth = 1.2;
    ctx.strokeRect(tailX - blockW + 0.5, -blockH / 2 + 0.5, blockW - 1, blockH - 1);

    // Rust patches on the engine
    ctx.fillStyle = s.rust;
    ctx.beginPath(); ctx.arc(tailX - blockW * 0.3, -blockH * 0.2, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(tailX - blockW * 0.7, blockH * 0.15, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(tailX - blockW * 0.45, blockH * 0.3, 1.4, 0, Math.PI * 2); ctx.fill();

    // Two stacked exhaust pipes poking out the back
    ctx.fillStyle = '#1a1a1e';
    ctx.fillRect(tailX - blockW - BIRD_R * 0.25, -blockH * 0.3, BIRD_R * 0.28, BIRD_R * 0.22);
    ctx.fillRect(tailX - blockW - BIRD_R * 0.25,  blockH * 0.08, BIRD_R * 0.28, BIRD_R * 0.22);
    ctx.strokeRect(tailX - blockW - BIRD_R * 0.25 + 0.5, -blockH * 0.3 + 0.5, BIRD_R * 0.28 - 1, BIRD_R * 0.22 - 1);
    ctx.strokeRect(tailX - blockW - BIRD_R * 0.25 + 0.5,  blockH * 0.08 + 0.5, BIRD_R * 0.28 - 1, BIRD_R * 0.22 - 1);
    ctx.restore();
  }

  function drawMagnetRing() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff6b9d';
    const r = 120 + Math.sin(frame * 0.18) * 6;
    ctx.strokeStyle = 'rgba(255, 107, 157, 0.25)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = 'rgba(255, 107, 157, 0.45)';
    ctx.setLineDash([4, 8]);
    ctx.beginPath(); ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function drawShieldBubble() {
    ctx.save();
    const r = BIRD_R + 10 + Math.sin(frame * 0.15) * 1.5;
    ctx.translate(bird.x, bird.y);
    ctx.shadowBlur = 16;
    ctx.shadowColor = '#9bd2ff';
    // Glowing ring
    ctx.strokeStyle = 'rgba(155, 210, 255, 0.85)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();
    // Faint fill
    ctx.fillStyle = 'rgba(155, 210, 255, 0.1)';
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // Charge pips around the top
    for (let i = 0; i < shieldCharges; i++) {
      const a = -Math.PI / 2 + (i - (shieldCharges - 1) / 2) * 0.35;
      ctx.fillStyle = '#9bd2ff';
      ctx.beginPath();
      ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawDirtyFlame() {
    // Short flickering orange plume out the main exhaust
    const tailX = -BIRD_R * 0.65 - BIRD_R * 0.25;
    const flick = 0.7 + Math.random() * 0.3;
    const len = (BIRD_R * 0.9 + Math.random() * 5) * flick;

    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff7a00';

    const g = ctx.createLinearGradient(tailX, 0, tailX - len, 0);
    g.addColorStop(0,   'rgba(255, 230, 140, 0.9)');
    g.addColorStop(0.4, 'rgba(255, 110, 20, 0.7)');
    g.addColorStop(1,   'rgba(40, 20, 10, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(tailX, -BIRD_R * 0.28);
    ctx.lineTo(tailX - len, 0);
    ctx.lineTo(tailX, BIRD_R * 0.28);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawScore() {
    if (state === STATE_OVER) return;
    const text = String(score).padStart(3, '0');
    const size = Math.round(H * 0.055);
    const y = Math.max(80, H * 0.14);
    const pulseScale = 1 + scorePulse * 0.5;

    ctx.save();
    ctx.translate(W / 2, y);
    ctx.scale(pulseScale, pulseScale);
    ctx.font = 'bold ' + size + 'px "Courier New", "Lucida Console", monospace';
    ctx.textAlign = 'center';
    // No shadowBlur — the previous amber glow scaled with pulseScale and
    // bloomed across the whole upper screen each score increment.
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#3a1a05';
    ctx.fillStyle = '#ffd280';
    ctx.strokeText(text, 0, 0);
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  function drawComboHud() {
    if (state !== STATE_PLAY) return;
    const mul = comboMultiplier();
    if (combo < 2 && mul === 1) return;
    const text = 'x' + mul + ' · ' + combo;
    const size = Math.round(H * 0.035);
    ctx.save();
    ctx.font = 'bold ' + size + 'px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ffb347';
    ctx.fillStyle = mul >= 3 ? '#ffe066' : '#ffd280';
    const y = Math.max(80, H * 0.14) + size + 6;
    ctx.fillText(text, W / 2, y);
    ctx.restore();
  }

  function drawFlash() {
    if (flashAlpha > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha + ')';
      ctx.fillRect(0, 0, W, H);
    }
  }

  function render() {
    ctx.save();
    if (shakeFrames > 0) {
      // Offset by a random −5..+5 on each axis
      const ox = (Math.random() * 2 - 1) * 5;
      const oy = (Math.random() * 2 - 1) * 5;
      ctx.translate(ox, oy);
      shakeFrames--;
    }
    drawBackground();
    drawBoss();              // boss silhouette sits behind the debris field
    drawAllDebris();
    drawPipes();
    drawGround();
    drawBossTentacles();     // tentacles render above ground so tips are visible
    drawExhaust();
    drawSparks();
    drawPickupSparks();
    drawMissiles();
    drawLoot();
    drawPirate();
    drawProjectiles();
    drawBird();
    drawScore();
    drawComboHud();
    drawLevelBanner();
    drawFlash();
    ctx.restore();
  }

  // ---------- Boss rendering ----------
  function drawBoss() {
    if (!boss) return;
    const t = frame * 0.04;
    // Dark body silhouette, mostly submerged
    ctx.save();
    ctx.fillStyle = 'rgba(6, 20, 10, 0.95)';
    ctx.beginPath();
    ctx.ellipse(boss.cx, boss.baseY, 130, 58, 0, Math.PI, 2 * Math.PI);
    ctx.fill();
    // Spines on back
    ctx.fillStyle = 'rgba(12, 34, 16, 0.95)';
    for (let i = -3; i <= 3; i++) {
      const sx = boss.cx + i * 22;
      const sy = boss.baseY - 55 + Math.abs(i) * 6;
      ctx.beginPath();
      ctx.moveTo(sx - 4, sy + 12);
      ctx.lineTo(sx, sy - 8);
      ctx.lineTo(sx + 4, sy + 12);
      ctx.closePath();
      ctx.fill();
    }
    // Eyes
    const open = Math.sin(frame * 0.04) > -0.7;
    if (open) {
      ctx.shadowBlur = 16; ctx.shadowColor = '#ffef50';
      ctx.fillStyle = '#ffef50';
      ctx.beginPath(); ctx.arc(boss.cx - 30, boss.baseY - 30, 5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(boss.cx + 30, boss.baseY - 30, 5, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#000';
      const pupilShift = Math.sin(t * 0.5) * 1.5;
      ctx.beginPath(); ctx.arc(boss.cx - 30 + pupilShift, boss.baseY - 30, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(boss.cx + 30 + pupilShift, boss.baseY - 30, 2, 0, Math.PI * 2); ctx.fill();
    }
    // Mouth slit with teeth
    ctx.fillStyle = '#1a0208';
    ctx.beginPath();
    ctx.moveTo(boss.cx - 22, boss.baseY - 10);
    ctx.lineTo(boss.cx + 22, boss.baseY - 10);
    ctx.lineTo(boss.cx + 18, boss.baseY - 6);
    ctx.lineTo(boss.cx - 18, boss.baseY - 6);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#d8d0a0'; ctx.lineWidth = 1;
    for (let k = -3; k <= 3; k++) {
      const tx = boss.cx + k * 6;
      ctx.beginPath();
      ctx.moveTo(tx - 1, boss.baseY - 10);
      ctx.lineTo(tx, boss.baseY - 7);
      ctx.lineTo(tx + 1, boss.baseY - 10);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBossTentacles() {
    if (!boss) return;
    const t = frame * 0.04;
    for (const tc of boss.tentacles) {
      const segs = 12;
      const pts = [];
      for (let s = 0; s <= segs; s++) {
        const f = s / segs;
        const y = boss.baseY - tc.len * f;
        const horizSweep = Math.sin(t * tc.speed * 12 + tc.phaseX) * tc.ampX * f;
        const wiggle = Math.sin(t * 2.2 + f * 6 + tc.phaseY) * 8 * f;
        pts.push({ x: boss.cx + horizSweep + wiggle, y: y });
      }
      // Record tip for collision
      const tip = pts[segs];
      tc.tipX = tip.x; tc.tipY = tip.y;

      // Thick dark body — single stroke (lighter spine and per-segment
      // suckers were the heaviest part of swamp render budget).
      ctx.save();
      ctx.strokeStyle = 'rgba(20, 70, 30, 0.95)';
      ctx.lineWidth = 9;
      ctx.lineJoin = 'round'; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let s = 1; s < pts.length; s++) ctx.lineTo(pts[s].x, pts[s].y);
      ctx.stroke();
      // Suckers — 3 per tentacle, not every-other segment
      ctx.fillStyle = 'rgba(160, 220, 100, 0.55)';
      for (let s = 4; s < segs - 1; s += 4) {
        ctx.beginPath();
        ctx.arc(pts[s].x, pts[s].y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      // Claw tip (the killer)
      ctx.shadowBlur = 10; ctx.shadowColor = '#80ff40';
      ctx.fillStyle = '#b8ff60';
      ctx.beginPath();
      ctx.arc(tip.x, tip.y, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#081208';
      ctx.beginPath();
      ctx.arc(tip.x, tip.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawLevelBanner() {
    if (levelBanner.life <= 0 || !levelBanner.text) return;
    levelBanner.life--;
    const life = levelBanner.life;
    // Fade in/out
    let alpha = 1;
    if (life > 90) alpha = (120 - life) / 30;
    else if (life < 30) alpha = life / 30;
    alpha = Math.max(0, Math.min(1, alpha));
    const size = Math.round(H * 0.032);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = 'bold ' + size + 'px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const y = H * 0.3;
    const tw = ctx.measureText(levelBanner.text).width + 32;
    // Panel
    ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
    ctx.fillRect(W / 2 - tw / 2, y - size, tw, size * 2);
    ctx.strokeStyle = '#ffd280';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(W / 2 - tw / 2, y - size, tw, size * 2);
    // Text — modest glow that won't bleed past the panel edges
    ctx.shadowBlur = 4; ctx.shadowColor = '#ffb347';
    ctx.fillStyle = '#ffd280';
    ctx.fillText(levelBanner.text, W / 2, y);
    ctx.restore();
  }

  let last = 0;
  function loop(t) {
    // Fixed-ish step to smooth iOS variable rAF
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ---------- Overlay / DOM ----------
  const overlay = document.getElementById('overlay');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScore');
  const finalShipEl = document.getElementById('finalShip');
  const restartBtn = document.getElementById('restartBtn');
  const shipBtns = Array.from(document.querySelectorAll('.shipBtn'));
  const hudShield = document.getElementById('pwShield');
  const hudSlow   = document.getElementById('pwSlow');
  const hudDouble = document.getElementById('pwDouble');
  const hudMagnet = document.getElementById('pwMagnet');
  const hudGhost  = document.getElementById('pwGhost');

  // Miniature ship thumbnails inside the picker buttons — use the same
  // palette the in-game ship uses so selection matches flight.
  function drawShipThumbs() {
    for (const btn of shipBtns) {
      const key = btn.dataset.ship;
      const cvs = btn.querySelector('.shipThumb');
      const c = cvs.getContext('2d');
      c.clearRect(0, 0, cvs.width, cvs.height);
      c.save();
      c.translate(cvs.width / 2, cvs.height / 2 + 2);
      const s = SHIPS[key];
      const scl = 0.8 + (s.r - 15) * 0.03;
      c.scale(scl, scl);

      // Main body gradient (matches bodyTop/Mid/Bot)
      const g = c.createLinearGradient(0, -10, 0, 10);
      g.addColorStop(0,   s.bodyTop);
      g.addColorStop(0.5, s.bodyMid);
      g.addColorStop(1,   s.bodyBot);
      c.fillStyle = g;
      c.fillRect(-18, -10, 28, 20);

      // Engine block
      c.fillStyle = s.engine;
      c.fillRect(-30, -6, 12, 14);
      // Secondary roof cargo
      c.fillStyle = s.secondary;
      c.fillRect(-2, -16, 10, 6);

      // Cockpit
      c.shadowBlur = 4;
      c.shadowColor = s.cockpitGlow;
      c.fillStyle = s.cockpit;
      c.fillRect(5, -5, 5, 7);
      c.shadowBlur = 0;

      // Outlines
      c.strokeStyle = '#1a0a05';
      c.lineWidth = 1.2;
      c.strokeRect(-18, -10, 28, 20);
      c.strokeRect(-30, -6, 12, 14);
      c.strokeRect(-2, -16, 10, 6);

      // Roof warning light
      c.fillStyle = s.warning;
      c.beginPath();
      c.arc(4, -17, 1.2, 0, Math.PI * 2);
      c.fill();

      // Exhaust plume
      c.shadowBlur = 6; c.shadowColor = '#ff7a00';
      c.fillStyle = '#ffb347';
      c.fillRect(-36, -1, 5, 3);
      c.restore();
    }
  }
  drawShipThumbs();

  function setSelectedShip(key) {
    selectedShip = key;
    for (const btn of shipBtns) {
      btn.classList.toggle('selected', btn.dataset.ship === key);
    }
  }

  function launchWithSelected() {
    applyShipStats(selectedShip);
    buildBgCache();       // make sure the starting biome is cached before reset
    reset();
    state = STATE_PLAY;
    bird.x = Math.round(W * BIRD_X_FRAC);
    bird.vy = FLAP;
    thrusterFrames = 5;
    setLevelBanner('LEVEL ' + (levelIndex + 1) + ' — ' + THEMES[selectedTheme].label);
    hideOverlay();
    startThemeAmbient();
  }

  // IMPORTANT: hook on touchstart and stop propagation so the stage's
  // touchstart (which launches the game) never sees the tap. Otherwise the
  // stage handler fires first with selectedShip unchanged → you'd always
  // launch as the previously-selected ship (Hauler by default).
  for (const btn of shipBtns) {
    const handler = function(e) {
      e.stopPropagation();
      if (e.cancelable) e.preventDefault();
      const key = btn.dataset.ship;
      setSelectedShip(key);
      if (state === STATE_READY) launchWithSelected();
    };
    btn.addEventListener('touchstart', handler, { passive: false });
    btn.addEventListener('click', handler);
  }

  // Theme picker — only changes the world palette; does not launch the game.
  const themeBtns = Array.from(document.querySelectorAll('.themeBtn'));
  function setSelectedTheme(key) {
    if (!THEMES[key]) return;
    selectedTheme = key;
    for (const btn of themeBtns) {
      btn.classList.toggle('selected', btn.dataset.theme === key);
    }
    try { localStorage.setItem('dlx_theme_v2', key); } catch (e) {}
    // Rebuild cached gradients + static layouts for the new theme
    buildBgCache();
  }
  try {
    const saved = localStorage.getItem('dlx_theme_v2');
    if (saved && THEMES[saved]) setSelectedTheme(saved);
  } catch (e) {}
  for (const btn of themeBtns) {
    const h = function(e) {
      e.stopPropagation();
      if (e.cancelable) e.preventDefault();
      setSelectedTheme(btn.dataset.theme);
    };
    btn.addEventListener('touchstart', h, { passive: false });
    btn.addEventListener('click', h);
  }

  function showStart() {
    overlay.classList.add('show');
    startScreen.classList.remove('hidden');
    gameOverScreen.classList.add('hidden');
    refreshHud();
  }
  function hideOverlay() {
    overlay.classList.remove('show');
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
  }
  function showGameOver() {
    finalScoreEl.textContent = String(score);
    bestScoreEl.textContent = String(best);
    if (finalShipEl) finalShipEl.textContent = SHIPS[selectedShip].label;
    overlay.classList.add('show');
    startScreen.classList.add('hidden');
    gameOverScreen.classList.remove('hidden');
  }

  function refreshHud() {
    setHud(hudShield, shieldCharges > 0, shieldCharges / 3);
    setHud(hudSlow,   slowFrames > 0,    slowFrames   / 300);
    setHud(hudDouble, doubleFrames > 0,  doubleFrames / 360);
    setHud(hudMagnet, magnetFrames > 0,  magnetFrames / 360);
    setHud(hudGhost,  ghostFrames > 0,   ghostFrames  / 180);
  }
  function setHud(el, active, frac) {
    if (!el) return;
    el.classList.toggle('active', !!active);
    const fill = el.querySelector('.pwFill');
    if (fill) fill.style.transform = 'scaleX(' + Math.max(0, Math.min(1, frac)) + ')';
  }

  function restart() {
    reset();
    state = STATE_READY;
    showStart();
  }

  function handleTouchStart(e) {
    // Let ship buttons handle themselves (they stopPropagation on touchstart,
    // but check target defensively so the click fallback works too)
    if (e && e.target && e.target.closest &&
        (e.target.closest('.shipBtn') || e.target.closest('.themeBtn'))) return;
    if (e && e.cancelable) e.preventDefault();
    audio(); // unlock WebAudio on the first user gesture (iOS requirement)
    if (state === STATE_OVER) return;
    if (state === STATE_READY) {
      // Tapping anywhere outside the ship buttons launches with the
      // currently highlighted ship (default HAULER).
      launchWithSelected();
      return;
    }
    flap();
  }

  const stage = document.getElementById('stage');
  stage.addEventListener('touchstart', handleTouchStart, { passive: false });
  stage.addEventListener('touchmove', function(e){ if (e.cancelable) e.preventDefault(); }, { passive: false });
  stage.addEventListener('touchend', function(e){ if (e.cancelable) e.preventDefault(); }, { passive: false });
  // Click fallback for desktop Safari / testing
  stage.addEventListener('click', function(e) {
    if (e.target.closest('#restartBtn')) return;
    handleTouchStart(e);
  });

  restartBtn.addEventListener('touchend', function(e) {
    e.stopPropagation();
    e.preventDefault();
    restart();
  }, { passive: false });
  // Safari sometimes needs click fallback inside PWA
  restartBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    restart();
  });

  // Prevent iOS gestures that disrupt gameplay
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('dblclick', function(e){ e.preventDefault(); });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function() {
    setTimeout(resize, 150);
  });

  // Boot
  resize();
  reset();
  bestScoreEl.textContent = String(best);
  showStart();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
