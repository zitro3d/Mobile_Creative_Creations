<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="dlx-garbage-hauler">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>dlx-garbage-hauler</title>
<style>
  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    position: fixed;
    inset: 0;
    background: #000000;
  }
  /* iPhones get a centred phone-shaped column with letterbox bars on
     either side; iPad uses the full viewport so landscape gets a true
     widescreen play area. The `is-ipad` body class is set in the iOS
     gate. */
  #stage {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 540px;
  }
  body.is-ipad #stage {
    left: 0;
    transform: none;
    max-width: none;
    width: 100%;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: -webkit-optimize-contrast;
    background: #000000;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    pointer-events: none;
    text-align: center;
  }
  #overlay * { pointer-events: none; }
  #overlay .panel, #overlay #restartBtn,
  #overlay #shipPicker, #overlay .shipBtn, #overlay .shipBtn *,
  #overlay #themePicker, #overlay .themeBtn { pointer-events: auto; }

  #themeLabel {
    font-size: 12px;
    letter-spacing: 2px;
    color: #ffd280;
    margin-top: 8px;
    text-shadow: 1px 1px 0 #000;
  }
  #themePicker {
    display: flex;
    gap: 6px;
    margin: 6px 0 12px;
  }
  .themeBtn {
    flex: 1;
    padding: 7px 4px;
    font-family: inherit;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 1px;
    color: #fff;
    background: rgba(0,0,0,0.45);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    text-shadow: 1px 1px 0 #000;
    -webkit-appearance: none;
    cursor: pointer;
    transition: transform 0.08s, border-color 0.1s, background 0.1s;
  }
  .themeBtn.selected {
    border-color: #ffd280;
    background: rgba(255, 170, 80, 0.22);
    box-shadow: 0 0 12px rgba(255,180,80,0.35);
  }
  .themeBtn:active { transform: scale(0.96); }
  #title {
    font-size: clamp(36px, 9vmin, 72px);
    font-weight: 900;
    letter-spacing: 4px;
    line-height: 0.95;
    color: #ffffff;
    text-shadow: 0 0 18px #9f6cff, 0 0 32px #00d4ff, 2px 2px 0 #000;
    margin-bottom: 16px;
    font-family: "SF Pro Display", -apple-system, sans-serif;
  }
  #subtitle {
    font-size: clamp(14px, 3.2vmin, 22px);
    margin-bottom: 24px;
    color: #fff;
    font-weight: 600;
  }
  .tapHint {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 20px;
    background: rgba(0,0,0,0.35);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .panel {
    background: rgba(0,0,0,0.55);
    border: 4px solid #fff;
    border-radius: 16px;
    padding: 22px 32px;
    text-align: center;
    box-shadow: 0 0 0 4px #000, 0 10px 30px rgba(0,0,0,0.4);
    max-width: 86%;
  }
  #gameOverTitle {
    font-size: clamp(28px, 7vmin, 54px);
    color: #ff5252;
    margin-bottom: 12px;
    letter-spacing: 2px;
    font-weight: 900;
  }
  .row {
    font-size: clamp(16px, 4vmin, 26px);
    margin: 6px 0;
    font-weight: 700;
  }
  .label { color: #ffdd00; }
  #restartBtn {
    margin-top: 18px;
    padding: 14px 34px;
    font-size: clamp(16px, 4vmin, 22px);
    font-family: inherit;
    font-weight: 900;
    color: #000;
    background: #ffdd00;
    border: 4px solid #000;
    border-radius: 12px;
    cursor: pointer;
    text-shadow: none;
    box-shadow: 0 5px 0 #b8860b;
    transition: transform 0.05s, box-shadow 0.05s;
    letter-spacing: 1px;
    -webkit-appearance: none;
  }
  #restartBtn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #b8860b;
  }
  .hidden { display: none !important; }

  #shipPicker {
    display: flex;
    gap: 10px;
    margin: 20px 0;
    pointer-events: auto;
  }
  .shipBtn {
    flex: 1;
    min-width: 88px;
    background: rgba(0,0,0,0.45);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 12px;
    padding: 8px 6px;
    color: #fff;
    font-family: inherit;
    -webkit-appearance: none;
    cursor: pointer;
    text-shadow: 1px 1px 0 #000;
    transition: transform 0.08s, border-color 0.1s, background 0.1s;
  }
  .shipBtn.selected {
    border-color: #ffd280;
    background: rgba(255, 170, 80, 0.22);
    box-shadow: 0 0 18px rgba(255,180,80,0.35);
  }
  .shipBtn:active { transform: scale(0.96); }
  .shipThumb {
    width: 90px;
    height: 54px;
    display: block;
    margin: 0 auto 4px;
    image-rendering: pixelated;
  }
  .shipName {
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 1px;
    color: #ffd280;
  }
  .shipStats {
    font-size: 10px;
    color: #ddd;
    margin-top: 2px;
  }

  #hud {
    position: absolute;
    top: calc(var(--safe-top) + 8px);
    left: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    pointer-events: none;
    z-index: 3;
  }
  .pw {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 3px 6px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,180,80,0.4);
    border-radius: 999px;
    color: #fff;
    font-family: "Courier New", monospace;
    font-weight: 900;
    font-size: 11px;
  }
  .pw.active { display: inline-flex; }
  .pwLabel { min-width: 18px; text-align: center; }
  .pwBar {
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    overflow: hidden;
  }
  .pwFill {
    display: block;
    height: 100%;
    background: #ffd280;
    transform-origin: left center;
    transform: scaleX(1);
  }
  #pwShield     { border-color: #9bd2ff; } #pwShield     .pwFill { background: #9bd2ff; }
  #pwSlow       { border-color: #c49bff; } #pwSlow       .pwFill { background: #c49bff; }
  #pwDouble     { border-color: #ffd280; } #pwDouble     .pwFill { background: #ffd280; }
  #pwMagnet     { border-color: #ff6b9d; } #pwMagnet     .pwFill { background: #ff6b9d; }
  #pwGhost      { border-color: #b8ffe8; } #pwGhost      .pwFill { background: #b8ffe8; }

  #gate {
    position: fixed;
    inset: 0;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    z-index: 100;
  }
  #gate h1 {
    font-size: 28px;
    margin: 0 0 12px;
    color: #ffdd00;
  }
  #gate p {
    font-size: 16px;
    line-height: 1.5;
    max-width: 420px;
    color: #ddd;
  }
  #gate .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }

  @media (orientation: landscape) and (max-height: 500px) {
    #rotate {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      z-index: 50;
      padding: 24px;
    }
  }
  #rotate { display: none; }
</style>
</head>
<body>
<div id="gate" class="hidden">
  <div class="icon">📱</div>
  <h1>iPhone / iPad Only</h1>
  <p>This game is designed exclusively for iOS devices. Please open it on an iPhone or iPad using Safari.</p>
</div>

<div id="stage">
  <canvas id="game"></canvas>
  <div id="overlay" class="show">
    <div id="startScreen">
      <div id="title">DLX<br>GARBAGE<br>HAULER</div>
      <div id="subtitle">Pick your ship</div>
      <div id="shipPicker">
        <button class="shipBtn" data-ship="scout">
          <canvas class="shipThumb" width="90" height="54"></canvas>
          <div class="shipName">SCOUT</div>
          <div class="shipStats">Small · Agile</div>
        </button>
        <button class="shipBtn selected" data-ship="hauler">
          <canvas class="shipThumb" width="90" height="54"></canvas>
          <div class="shipName">HAULER</div>
          <div class="shipStats">Balanced</div>
        </button>
        <button class="shipBtn" data-ship="freighter">
          <canvas class="shipThumb" width="90" height="54"></canvas>
          <div class="shipName">FREIGHTER</div>
          <div class="shipStats">Big · Heavy</div>
        </button>
      </div>
      <div id="themeLabel">Theme</div>
      <div id="themePicker">
        <button class="themeBtn selected" data-theme="sunset">SUNSET</button>
        <button class="themeBtn" data-theme="city">CITY</button>
        <button class="themeBtn" data-theme="volcano">VOLCANO</button>
        <button class="themeBtn" data-theme="swamp">SWAMP</button>
        <button class="themeBtn" data-theme="canyon">CANYON</button>
      </div>
      <div class="tapHint">TAP SHIP TO LAUNCH</div>
    </div>
    <div id="gameOverScreen" class="hidden">
      <div class="panel">
        <div id="gameOverTitle">GAME OVER</div>
        <div class="row"><span class="label">SCORE</span> <span id="finalScore">0</span></div>
        <div class="row"><span class="label">BEST</span> <span id="bestScore">0</span></div>
        <div class="row"><span class="label">SHIP</span> <span id="finalShip">HAULER</span></div>
        <button id="restartBtn">RESTART</button>
      </div>
    </div>
  </div>
  <div id="hud">
    <div class="pw" id="pwShield"><span class="pwLabel">◎</span><span class="pwBar"><span class="pwFill"></span></span></div>
    <div class="pw" id="pwSlow"><span class="pwLabel">◐</span><span class="pwBar"><span class="pwFill"></span></span></div>
    <div class="pw" id="pwDouble"><span class="pwLabel">×2</span><span class="pwBar"><span class="pwFill"></span></span></div>
    <div class="pw" id="pwMagnet"><span class="pwLabel">✦</span><span class="pwBar"><span class="pwFill"></span></span></div>
    <div class="pw" id="pwGhost"><span class="pwLabel">◌</span><span class="pwBar"><span class="pwFill"></span></span></div>
  </div>
</div>

<div id="rotate">Please rotate to portrait mode to play.</div>

<script>
(function() {
  // ---------- iOS gate ----------
  const ua = navigator.userAgent || '';
  const platform = navigator.platform || '';
  const isIPhone = /iPhone|iPod/.test(ua);
  // iPadOS 13+ reports as Mac; detect via touch points
  const isIPad = /iPad/.test(ua) || (platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isIOS = isIPhone || isIPad;

  if (!isIOS) {
    document.getElementById('gate').classList.remove('hidden');
    document.getElementById('stage').style.display = 'none';
    return;
  }
  if (isIPad) document.body.classList.add('is-ipad');

  // ---------- Canvas sizing (DPR-aware) ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Logical game world dimensions (iPhone-ish portrait)
  const BASE_W = 360;
  let W = BASE_W;
  let H = 640;
  let scale = 1;

  // iPhone caps the play column at a phone-shaped width and letterboxes
  // anything wider; iPad uses the full viewport so landscape gets a
  // proper widescreen play area. iPad uses a smaller logical H so the
  // ship and obstacles render larger on screen.
  const STAGE_MAX_W = 540;
  const IPAD_TARGET_H = 480;     // logical world height when scaling for iPad

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    let cw, ch;
    if (isIPad) {
      // Fill the screen, fix logical height so vertical play room stays
      // consistent and the world becomes wider in landscape (more pipes
      // visible, longer travel time per pipe).
      cw = window.innerWidth;
      ch = window.innerHeight;
      scale = ch / IPAD_TARGET_H;
      H = IPAD_TARGET_H;
      W = Math.round(cw / scale);
    } else {
      // iPhone: fix logical width to BASE_W, letterbox anything > 540
      cw = Math.min(window.innerWidth, STAGE_MAX_W);
      ch = window.innerHeight;
      scale = cw / BASE_W;
      W = BASE_W;
      H = Math.round(ch / scale);
    }

    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';

    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;

    recalcLayout();
  }

  let GROUND_H, PLAY_H;
  function recalcLayout() {
    GROUND_H = Math.max(60, Math.round(H * 0.11));
    PLAY_H = H - GROUND_H;
    if (stars.length) { initStars(); initDust(); initNebula(); initJunkSats(); }
    buildBgCache();
  }

  // ---------- Background cache (regenerated on resize or theme switch) ----------
  // Holds precomputed CanvasGradient objects and static layout arrays so the
  // per-frame background loop does not allocate gradients, rebuild skyline
  // positions, or replay deterministic layout math 60 times a second.
  const bgCache = {
    theme: null, w: 0, h: 0,
    sky: null, sun: null, nebA: null, nebB: null, debrisHalo: null,
    horizon: null,
  };
  function buildBgCache() {
    const T = theme();
    bgCache.theme = selectedTheme;
    bgCache.w = W; bgCache.h = H;

    // Sky
    const sg = ctx.createLinearGradient(0, 0, 0, H);
    sg.addColorStop(0,    T.sky[0]);
    sg.addColorStop(0.28, T.sky[1]);
    sg.addColorStop(0.5,  T.sky[2]);
    sg.addColorStop(0.72, T.sky[3]);
    sg.addColorStop(0.9,  T.sky[4]);
    sg.addColorStop(1,    T.sky[5]);
    bgCache.sky = sg;

    // Sun
    const sunX = W * 0.78, sunY = PLAY_H * 0.72;
    const sunR = Math.min(W, PLAY_H) * 0.22;
    const sun = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR);
    sun.addColorStop(0,   T.sunInner);
    sun.addColorStop(0.4, T.sunMid);
    sun.addColorStop(1,   T.sunEdge);
    bgCache.sun = sun;

    // Nebula — primary and secondary wisp (if nebula is initialised)
    if (nebula) {
      const nebA = ctx.createRadialGradient(nebula.x, nebula.y, 0, nebula.x, nebula.y, nebula.r);
      nebA.addColorStop(0,    T.nebA);
      nebA.addColorStop(0.45, T.nebB);
      nebA.addColorStop(0.8,  T.nebC);
      nebA.addColorStop(1,    'rgba(0, 0, 0, 0)');
      bgCache.nebA = nebA;

      const nbx = nebula.x - nebula.r * 0.35;
      const nby = nebula.y + nebula.r * 0.2;
      const nebB = ctx.createRadialGradient(nbx, nby, 0, nbx, nby, nebula.r * 0.55);
      const wispAlphaZero = T.nebWisp.replace(/[0-9.]+\)$/, '0)');
      nebB.addColorStop(0, T.nebWisp);
      nebB.addColorStop(1, wispAlphaZero);
      bgCache.nebB = nebB;
    }

    // Shared debris halo (same every frame, used by every item)
    const halo = ctx.createRadialGradient(0, 0, 2, 0, 0, 18);
    halo.addColorStop(0, 'rgba(255, 230, 180, 0.22)');
    halo.addColorStop(1, 'rgba(0, 0, 0, 0)');
    bgCache.debrisHalo = halo;

    // Theme-specific extras
    bgCache.swampFog = null;
    bgCache.ventBody = null;
    bgCache.lavaspireBody = null;
    if (selectedTheme === 'swamp') {
      const fogY = PLAY_H * 0.62;
      const fg = ctx.createLinearGradient(0, fogY, 0, PLAY_H);
      fg.addColorStop(0, 'rgba(50, 80, 40, 0)');
      fg.addColorStop(0.5, 'rgba(40, 70, 30, 0.35)');
      fg.addColorStop(1, 'rgba(10, 25, 10, 0.55)');
      bgCache.swampFog = fg;
    }
    if (selectedTheme === 'volcano') {
      // Vent body gradient — same colour every frame, only ctx position changes
      const vb = ctx.createLinearGradient(0, 0, PIPE_W, 0);
      vb.addColorStop(0,   '#3a140a');
      vb.addColorStop(0.5, '#1a0504');
      vb.addColorStop(1,   '#0a0000');
      bgCache.ventBody = vb;
      // Lava spire body gradient
      const lb = ctx.createLinearGradient(0, 0, PIPE_W, 0);
      lb.addColorStop(0,   '#1a0808');
      lb.addColorStop(0.5, '#0a0302');
      lb.addColorStop(1,   '#050000');
      bgCache.lavaspireBody = lb;
    }
    bgCache.canyonHaze = null;
    if (selectedTheme === 'canyon') {
      const hz = ctx.createLinearGradient(0, PLAY_H * 0.6, 0, PLAY_H * 0.82);
      hz.addColorStop(0, 'rgba(255, 140, 60, 0)');
      hz.addColorStop(0.6, 'rgba(180, 80, 30, 0.25)');
      hz.addColorStop(1,   'rgba(80, 30, 10, 0)');
      bgCache.canyonHaze = hz;
    }

    // Per-theme static horizon layout
    bgCache.horizon = buildHorizonLayout();
  }

  function buildHorizonLayout() {
    const baseY = PLAY_H * 0.82;
    if (selectedTheme === 'swamp') {
      const trees = [];
      for (let i = 0; i < 8; i++) {
        const hx = (W / 8) * (i + 0.5) + ((i * 13) % 15) - 7;
        const s  = 0.85 + ((i * 41 + 7) % 100) / 140;
        const trunkH = 78 * s;
        const branches = [];
        const bn = 3 + (i % 2);
        for (let b = 0; b < bn; b++) {
          branches.push({
            yOff: trunkH * (0.45 + b * 0.15),
            side: (b % 2 === 0) ? -1 : 1,
            reach: (14 + b * 5) * s,
          });
        }
        trees.push({ x: hx, trunkH: trunkH, trunkW: 6 + (i % 3), s: s, branches: branches });
      }
      return { kind: 'swamp', baseY: baseY, trees: trees };
    }
    if (selectedTheme === 'city') {
      const far = [];
      for (let i = 0; i < 11; i++) {
        far.push({
          x: (W / 11) * i,
          w: W / 11 + 2,
          h: (i % 5 === 0) ? 22 + ((i * 17) % 18) : 34 + ((i * 17 + 7) % 34),
        });
      }
      const rubble = [];
      for (let i = 0; i < 12; i++) rubble.push({ x: (W / 12) * i + ((i * 9) % 10) });
      const near = [];
      for (let i = 0; i < 8; i++) {
        const bx = (W / 8) * i + ((i * 11) % 6);
        const bw = (W / 8) - 8;
        const bh = 46 + ((i * 31 + 17) % 70);
        const kind = (i * 7 + 3) % 4;
        near.push({ bx: bx, bw: bw, bh: bh, kind: kind, i: i });
      }
      return { kind: 'city', baseY: baseY, far: far, rubble: rubble, near: near, towerX: W * 0.72, towerY: baseY - 90 };
    }
    if (selectedTheme === 'volcano') {
      const peaks = [];
      for (let i = 0; i <= 10; i++) {
        peaks.push({ x: (W / 10) * i, h: 20 + ((i * 17 + 5) % 30) });
      }
      // Per-cone geometry + cached gradients (lava crater radial + smoke plume linear)
      const cones = [];
      const coneSpec = [{ cx: W * 0.30, scale: 1.0 }, { cx: W * 0.76, scale: 0.75 }];
      for (const c of coneSpec) {
        const topH = 90 * c.scale;
        const topW = 14 * c.scale;
        const lava = ctx.createRadialGradient(c.cx, baseY - topH + 3, 0, c.cx, baseY - topH + 3, topW * 1.2);
        lava.addColorStop(0, '#ffd870');
        lava.addColorStop(0.5, '#ff5a10');
        lava.addColorStop(1, 'rgba(200,40,10,0)');
        const plume = ctx.createLinearGradient(0, baseY - topH - 80 * c.scale, 0, baseY - topH);
        plume.addColorStop(0, 'rgba(40, 20, 15, 0)');
        plume.addColorStop(1, 'rgba(60, 30, 20, 0.75)');
        cones.push({ cx: c.cx, scale: c.scale, topH: topH, topW: topW, lava: lava, plume: plume });
      }
      return { kind: 'volcano', baseY: baseY, peaks: peaks, cones: cones };
    }
    if (selectedTheme === 'canyon') {
      // Two layers of jagged mountain spires (far + near) for canyon depth
      const farPeaks = [];
      for (let i = 0; i <= 12; i++) {
        farPeaks.push({ x: (W / 12) * i, h: 36 + ((i * 23 + 7) % 44) });
      }
      const nearPeaks = [];
      for (let i = 0; i <= 10; i++) {
        nearPeaks.push({ x: (W / 10) * i, h: 62 + ((i * 37 + 11) % 80) });
      }
      return { kind: 'canyon', baseY: baseY, farPeaks: farPeaks, nearPeaks: nearPeaks };
    }
    // sunset — simple peak profile
    const peaks = [];
    const count = 14;
    for (let i = 0; i <= count; i++) {
      const x = (W / count) * i;
      const h = 12 + Math.abs(Math.sin(i * 1.7) * 28) + (i % 3) * 4;
      peaks.push({ x: x, h: h });
      if (i < count) {
        peaks.push({ x: x + (W / count) * 0.5, h: 6 + Math.abs(Math.cos(i * 2.3) * 14) });
      }
    }
    return { kind: 'sunset', baseY: baseY, peaks: peaks };
  }

  // ---------- Audio (Web Audio, synthesised — no asset files) ----------
  let audioCtx = null;
  function audio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function tone(freq, dur, type, gain, slide) {
    const a = audio(); if (!a) return;
    const t = a.currentTime;
    const osc = a.createOscillator();
    const g = a.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    if (typeof slide === 'number') {
      osc.frequency.exponentialRampToValueAtTime(Math.max(40, slide), t + dur);
    }
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain || 0.2, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g).connect(a.destination);
    osc.start(t);
    osc.stop(t + dur + 0.02);
  }
  function noiseBurst(dur, gain) {
    const a = audio(); if (!a) return;
    const t = a.currentTime;
    const n = Math.floor(a.sampleRate * dur);
    const buf = a.createBuffer(1, n, a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = a.createBufferSource();
    src.buffer = buf;
    const g = a.createGain();
    g.gain.value = gain || 0.3;
    src.connect(g).connect(a.destination);
    src.start(t);
  }

  let ambientNodes = [];
  let ambientTheme = null;

  function startThemeAmbient() {
    const a = audio(); if (!a) return;
    if (ambientTheme === selectedTheme) return;   // already running this theme
    stopThemeAmbient(0.25);
    ambientTheme = selectedTheme;
    const cfg = THEME_AMBIENT[selectedTheme];
    if (!cfg) return;
    const t = a.currentTime;
    for (const layer of cfg.layers) {
      const osc = a.createOscillator();
      const gn  = a.createGain();
      osc.type = layer.type;
      osc.frequency.value = layer.freq;
      if (typeof layer.detune === 'number') osc.detune.value = layer.detune;
      // LFO for slow vibrato so the drone breathes
      if (layer.lfoFreq) {
        const lfo = a.createOscillator();
        const lfoGain = a.createGain();
        lfo.frequency.value = layer.lfoFreq;
        lfoGain.gain.value = layer.lfoDepth || 3;
        lfo.connect(lfoGain).connect(osc.frequency);
        lfo.start(t);
        ambientNodes.push({ osc: lfo });
      }
      gn.gain.setValueAtTime(0.0001, t);
      gn.gain.linearRampToValueAtTime(layer.gain, t + 0.6);
      osc.connect(gn).connect(a.destination);
      osc.start(t);
      ambientNodes.push({ osc: osc, gn: gn, target: layer.gain });
    }
  }

  function stopThemeAmbient(fade) {
    if (!audioCtx) { ambientNodes = []; ambientTheme = null; return; }
    const t = audioCtx.currentTime;
    const ft = (typeof fade === 'number') ? fade : 0.4;
    for (const n of ambientNodes) {
      if (n.gn) {
        try {
          n.gn.gain.cancelScheduledValues(t);
          n.gn.gain.setValueAtTime(n.gn.gain.value, t);
          n.gn.gain.linearRampToValueAtTime(0.0001, t + ft);
        } catch (e) {}
      }
      if (n.osc && n.osc.stop) {
        try { n.osc.stop(t + ft + 0.05); } catch (e) {}
      }
    }
    ambientNodes = [];
    ambientTheme = null;
  }

  function playSound(kind) {
    const sfx = THEME_SFX[selectedTheme] || THEME_SFX.sunset;
    let s;
    switch (kind) {
      case 'flap':
        s = sfx.flap;    tone(s[0], s[1], s[2], s[3], s[4]); break;
      case 'pickup':
        s = sfx.pickup;  tone(s[0], s[1], s[2], s[3], s[4]); break;
      case 'gold':
        s = sfx.goldA;   tone(s[0], s[1], s[2], s[3], s[4]);
        const sB = sfx.goldB;
        setTimeout(function(){ tone(sB[0], sB[1], sB[2], sB[3], sB[4]); }, 45);
        break;
      case 'powerup':
        s = sfx.pwA;     tone(s[0], s[1], s[2], s[3], s[4]);
        const pB = sfx.pwB;
        setTimeout(function(){ tone(pB[0], pB[1], pB[2], pB[3], pB[4]); }, 60);
        break;
      case 'missile':
        s = sfx.missile; tone(s[0], s[1], s[2], s[3], s[4]); break;
      case 'levelup':
        const arp = sfx.levelup;
        for (let i = 0; i < arp.length; i++) {
          const n = arp[i];
          setTimeout(function(){ tone(n[0], n[1], n[2], n[3], n[4]); }, i * 110);
        }
        break;
      case 'boom':
        noiseBurst(sfx.boomN[0], sfx.boomN[1]);
        s = sfx.boomT;   tone(s[0], s[1], s[2], s[3], s[4]); break;
      case 'crash':
        noiseBurst(sfx.crashN[0], sfx.crashN[1]);
        s = sfx.crashT;  tone(s[0], s[1], s[2], s[3], s[4]); break;
    }

  let selectedTheme = 'sunset';
  function theme() { return THEMES[selectedTheme]; }
  let GRAVITY, FLAP, MAX_FALL, BIRD_R, BIRD_W, BIRD_H;
  function applyShipStats(key) {

  }
  function currentPipeGap() {
    const d = (typeof LEVEL_DIFF !== 'undefined' && LEVEL_DIFF[levelIndex]) || { gapMul: 1 };

  const BIRD_X_FRAC = 0.28;

  const STATE_READY = 0;

  let stars = [];

  let doubleFrames  = 0;   // double-score timer (frames)
  let magnetFrames  = 0;   // magnet pulls pickups toward ship
  let ghostFrames   = 0;   // phase through obstacles
  let invulnFrames  = 0;   // brief i-frames after shield break / spawn

  // ---------- Campaign progression ----------
  const LEVEL_ORDER = ['sunset', 'city', 'volcano', 'swamp', 'canyon'];
  // Score gap required to leave each level (level i → level i+1).
  //   sunset → city    : 50

  //   volcano→ swamp   : 70

  const LEVEL_DIFF = [
    { speedMul: 1.00, gapMul: 1.00 },   // sunset
    { speedMul: 1.18, gapMul: 0.92 },   // city
    { speedMul: 1.34, gapMul: 0.86 },   // volcano
    { speedMul: 1.50, gapMul: 0.80 },   // swamp (retreat mode)
    { speedMul: 1.70, gapMul: 0.76 },   // canyon — final, pirate ambush
  ];
  let levelIndex      = 0;
  let levelScoreStart = 0;   // score at the moment current level began
  let levelBanner     = { text: '', life: 0 };
  let boss            = null;
  let pirate          = null;   // canyon: pirate cargo ship chasing from behind
  let projectiles     = [];     // lasers fired by the pirate

  function themeToLevelIndex(key) {
    const i = LEVEL_ORDER.indexOf(key);

  }
  function maybeAdvanceLevel() {
    if (levelIndex >= LEVEL_ORDER.length - 1) return;
    const need = LEVEL_GAPS[levelIndex];
    if (score - levelScoreStart >= need) advanceLevel(levelIndex + 1);
  }
  function advanceLevel(idx) {

    buildBgCache();
    setLevelBanner('LEVEL ' + (levelIndex + 1) + ' — ' + THEMES[selectedTheme].label);
    if (levelIndex === 3) spawnBoss();
    // Leaving swamp → canyon: boss retreats, pirate ship swoops in from behind

  }
  function setLevelBanner(text) {

  }

  // ---------- Boss state (swamp) ----------
  function spawnBoss() {
    boss = {
      cx: W / 2,
      baseY: PLAY_H + 18,
      tentacles: [
        { phaseX: 0,          phaseY: 0,          len: PLAY_H * 0.65, ampX: W * 0.38, speed: 0.04,  tipX: 0, tipY: 0 },
        { phaseX: Math.PI,    phaseY: Math.PI / 2, len: PLAY_H * 0.55, ampX: W * 0.32, speed: 0.055, tipX: 0, tipY: 0 },
      ],

  function bossTipHits() {
    if (!boss) return false;
    const r = BIRD_R - 2;
    const reach = r + 7;
    for (const t of boss.tentacles) {
      const dx = bird.x - t.tipX;
      const dy = bird.y - t.tipY;

  // ---------- Pirate cargo ship (canyon level 5) ----------
  function spawnPirate() {
    pirate = {
      x: -80,            // starts off-screen left, slides in
      targetX: 40,       // final hover x
      y: PLAY_H / 2,
      targetY: PLAY_H / 2,
      fireCooldown: 120, // frames until first shot
    };
    projectiles = [];
  }
  function updatePirate() {
    if (!pirate) return;
    // Slide to target x from off-screen
    pirate.x += (pirate.targetX - pirate.x) * 0.04;
    // Follow player's y with lag
    pirate.targetY = bird.y + (Math.sin(frame * 0.015) * 40);
    pirate.y += (pirate.targetY - pirate.y) * 0.025;
    pirate.y = Math.max(BIRD_R + 10, Math.min(PLAY_H - BIRD_R - 10, pirate.y));
    // Fire projectiles toward the player
    pirate.fireCooldown--;
    if (pirate.fireCooldown <= 0) {
      pirate.fireCooldown = 70 + Math.floor(Math.random() * 40);
      firePirateLaser();
    }
  }
  function firePirateLaser() {
    if (!pirate) return;
    const sx = pirate.x + 30;
    const sy = pirate.y;
    const dx = bird.x - sx;
    const dy = bird.y - sy;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    const sp = 6.2;
    projectiles.push({
      x: sx, y: sy,
      vx: (dx / d) * sp,
      vy: (dy / d) * sp,
      life: 120,
      trail: [],
    });

  }
  function updateProjectiles() {
    const reach = BIRD_R + 4;
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      p.x += p.vx; p.y += p.vy;
      p.life--;
      p.trail.push({ x: p.x, y: p.y });
      if (p.trail.length > 6) p.trail.shift();
      if (p.life <= 0 || p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > PLAY_H + 20) {
        projectiles.splice(i, 1);
        continue;
      }
      // Collision with ship
      const dx = bird.x - p.x;
      const dy = bird.y - p.y;
      if (dx * dx + dy * dy < reach * reach) p.hitBird = true;
    }
  }
  function projectileHit() {

  }
  function drawPirate() {
    if (!pirate) return;
    ctx.save();
    ctx.translate(pirate.x, pirate.y);
    // Body — boxy rusty cargo ship (mirror of the player hauler)
    ctx.shadowBlur = 6; ctx.shadowColor = 'rgba(0,0,0,0.55)';
    const bodyW = 40, bodyH = 22;
    // Hull
    const bg = ctx.createLinearGradient(0, -bodyH / 2, 0, bodyH / 2);
    bg.addColorStop(0, '#5a3820');
    bg.addColorStop(0.5, '#3a2010');
    bg.addColorStop(1, '#180a04');

    ctx.fillStyle = '#ff7020';
    ctx.fillRect(bodyW / 2 - 8, -3, 5, 6);
    ctx.shadowBlur = 0;
    // Skull & crossbones
    ctx.fillStyle = '#f4e6c0';
    ctx.beginPath(); ctx.arc(-bodyW * 0.15, -1, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0a0402';
    ctx.beginPath(); ctx.arc(-bodyW * 0.18, -1.5, 0.7, 0, Math.PI * 2); ctx.fill();

  function drawProjectiles() {

  // 3-layer parallax starfield — 80 stars with speedFactor 0.1 / 0.5 / 1.0
  const SPEED_FACTORS = [0.1, 0.5, 1.0];
  function initStars() {
    stars = [];

  function makeStar(x, sf) {
    const big = sf === 1.0;
    const mid = sf === 0.5;
    return {
      x: x,
      y: Math.random() * PLAY_H,
      speedFactor: sf,
      size: big ? 1.6 + Math.random() * 1.4 : mid ? 1 + Math.random() * 0.6 : 1,
      a: big ? 0.7 + Math.random() * 0.3 : mid ? 0.35 + Math.random() * 0.3 : 0.1 + Math.random() * 0.2,

  function updateStars() {
    for (const s of stars) {
      s.x -= PIPE_SPEED_BASE * s.speedFactor;
      if (s.x < -2) {
        // Reset to right edge at random height
        s.x = W + Math.random() * 8;
        s.y = Math.random() * PLAY_H;
      }
      if (frame >= s.next) {
        s.flicker = 1 + (Math.random() - 0.5) * 0.2;

  // Fast speed-dust specks that streak right-to-left constantly

  // Distant derelict satellite silhouettes drifting slowly through the nebula

      junkSats.push({
        x: (W / n) * i + Math.random() * 40,
