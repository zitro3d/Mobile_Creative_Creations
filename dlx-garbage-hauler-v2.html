  function addPipe(x) {
    const gap = currentPipeGap();
    const top = PIPE_MIN_TOP + Math.random() * (PLAY_H - gap - PIPE_MIN_TOP * 2);
    const pool = theme().obstacleTypes || ['cargo', 'junk'];
    const type = pool[Math.floor(Math.random() * pool.length)];
    // Every ~5th pipe swaps its debris for a glowing power-up capsule
    const spawnPowerUp = pipeSpawnCount > 2 && Math.random() < 0.3;
    pipeSpawnCount++;

    // Motion: after a few pipes, some obstacles drift vertically or pulse
    // their gap. Chance ramps with score for a rising difficulty feel.
    // Motion: after a few pipes, some obstacles drift vertically. Chance
    // ramps with score. Two flavours — slow large drift or fast tight drift.
    let motion = 'static';
    const motionRoll = Math.random();
    const motionChance = Math.min(0.45, 0.08 + score * 0.004);
    if (pipeSpawnCount > 4 && motionRoll < motionChance) {
      motion = motionRoll < motionChance * 0.55 ? 'drift' : 'fast';
    }

    const pipe = {
      x: x,
      top: top,
      gap: gap,
      driftY: 0,
      passed: false,
      destroyed: false,
      seed: Math.random() * 1000,
      pulse: Math.random() * Math.PI * 2,
      type: type,
      motion: motion,
      topShape: buildShardShape(PIPE_W, top, true),
      botShape: buildShardShape(PIPE_W, PLAY_H - (top + gap), false),
      antennas: buildAntennas(),
      debris:  spawnPowerUp ? null : makeDebris(gap),
      powerUp: spawnPowerUp ? makePowerUp(gap) : null,
    };
    if (motion === 'drift' || motion === 'fast') {
      pipe.driftSpeed = motion === 'fast' ? 0.09 : 0.04;
      pipe.driftAmp   = motion === 'fast' ? 22 : 38;
      pipe.driftPhase = Math.random() * Math.PI * 2;
    }
    pipes.push(pipe);
  }

  function clampDrift(p) {
    // Clamp so the top segment never dips into negative and bottom stays on-screen
    const effTop = p.top + p.driftY;
    const effBot = PLAY_H - (p.top + p.gap + p.driftY);
    const maxDown = (PLAY_H - PIPE_MIN_TOP) - (p.top + p.gap);
    const maxUp = -(p.top - PIPE_MIN_TOP);
    if (p.driftY > maxDown) p.driftY = maxDown;
    if (p.driftY < maxUp) p.driftY = maxUp;
  }

  function makeDebris(gap) {
    const set = theme().debrisSet;
    const gold = Math.random() < 0.16;
    return {
      kind: set[Math.floor(Math.random() * set.length)],
      offY: (Math.random() - 0.5) * (gap * 0.32),
      scale: 0.85 + Math.random() * 0.35,
      spin: (Math.random() - 0.5) * 0.025,
      phase: Math.random() * Math.PI * 2,
      gold: gold,
      collected: false,
    };
  }

  // Missile is duplicated to roughly triple its draw weight relative to the
  // other power-ups, since players want it to show up more often.
  const POWER_KINDS = ['shield', 'slow', 'double', 'magnet', 'ghost',
                       'missile', 'missile', 'missile'];
  function makePowerUp(gap) {
    return {
      kind: POWER_KINDS[Math.floor(Math.random() * POWER_KINDS.length)],
      offY: (Math.random() - 0.5) * (gap * 0.25),
      phase: Math.random() * Math.PI * 2,
      collected: false,
    };
  }

  // Random antenna sticks for junk pipes, deterministic per-pipe
  function buildAntennas() {
    const arr = [];
    const n = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < n; i++) {
      arr.push({
        side: Math.random() < 0.5 ? -1 : 1,
        yFrac: 0.2 + Math.random() * 0.6,
        len: 8 + Math.random() * 12,
        angle: (Math.random() - 0.5) * 0.6,
        tipR: 1 + Math.random() * 1.5,
      });
    }
    return arr;
  }

  // Build a static jagged obsidian-shard polygon. Generated once per pipe so
  // the shape does not wobble as the crystal moves across the screen.
  function buildShardShape(w, h, isTop) {
    const tipSign = isTop ? 1 : -1;
    const baseY   = isTop ? 0 : h;
    const tipY    = isTop ? h : 0;

    const basePad = 4;                 // base extends slightly outward
    const tipInsetL = w * 0.28;        // tip-narrow inset (left side)
    const tipInsetR = w * 0.72;        // tip-narrow inset (right side)

    const pts = [];

    // Base corners (wide)
    pts.push([-basePad, baseY]);
    pts.push([w + basePad, baseY]);

    const nNodes = 3 + Math.floor(Math.random() * 2); // 3 or 4

    // Right side — taper inward toward tip with per-node jitter
    for (let i = 1; i <= nNodes; i++) {
      const t = i / (nNodes + 1);
      const y = baseY + (tipY - baseY) * t;
      const sideX = (w + basePad) * (1 - t) + tipInsetR * t;
      const jitter = (Math.random() * 2 - 1) * 7;   // ±7 px
      pts.push([sideX + jitter, y]);
    }
    // Right tip corner
    pts.push([tipInsetR, tipY]);

    // Tip: 3 jagged triangular spear-peaks of varying depth
    const tipSegs = 3;
    const tipSpan = tipInsetR - tipInsetL;
    for (let i = 0; i < tipSegs; i++) {
      const peakX = tipInsetR - ((i + 0.5) / tipSegs) * tipSpan;
      const depth = 7 + Math.random() * 11;        // varies 7–18 px
      pts.push([peakX, tipY + depth * tipSign]);
      const troughX = tipInsetR - ((i + 1) / tipSegs) * tipSpan;
      pts.push([troughX, tipY]);
    }

    // Left side — taper back out to base
    for (let i = nNodes; i >= 1; i--) {
      const t = i / (nNodes + 1);
      const y = baseY + (tipY - baseY) * t;
      const sideX = (-basePad) * (1 - t) + tipInsetL * t;
      const jitter = (Math.random() * 2 - 1) * 7;
      pts.push([sideX + jitter, y]);
    }

    return pts;
  }

  function flap() {
    if (state === STATE_READY) {
      state = STATE_PLAY;
      bird.x = Math.round(W * BIRD_X_FRAC);
    }
    if (state === STATE_PLAY) {
      bird.vy = FLAP;
      thrusterFrames = 5;
      flapCount++;
      // Every 5th or 6th tap the engine backfires: extra smoke puff
      const isBackfire = flapCount > 0 && (flapCount % 5 === 0 || flapCount % 6 === 0);
      emitExhaustBurst(isBackfire ? 12 : 5, isBackfire);
      haptic();
      playSound('flap');
    }
  }

  function emitExhaustBurst(n, big) {
    for (let i = 0; i < n; i++) {
      const angle = Math.PI + (Math.random() - 0.5) * 0.9;
      const speed = 0.4 + Math.random() * (big ? 1.8 : 0.8);
      exhaust.push({
        x: bird.x - BIRD_R * 0.9,
        y: bird.y + (Math.random() - 0.5) * (big ? 10 : 5),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed + (Math.random() - 0.5) * 0.4,
        r: (big ? 4 : 2.5) + Math.random() * 2,
        a: big ? 0.75 : 0.55,
        dirty: big || Math.random() < 0.35,   // darker greasy puffs
      });
    }
  }

  function haptic() {
    // Best-effort tactile feedback (Safari gates most; no-op if blocked)
    if (navigator.vibrate) { try { navigator.vibrate(8); } catch (e) {} }
  }

  function update() {
    frame++;

    updateStars();
    updateDust();
    updateJunkSats();

    if (thrusterFrames > 0) thrusterFrames--;
    if (burstFrames > 0) burstFrames--;
    if (scorePulse > 0) scorePulse = Math.max(0, scorePulse - 0.1);

    // Idle sputter — constant trickle of dirty smoke from the back
    if (state !== STATE_OVER && frame % 3 === 0) {
      exhaust.push({
        x: bird.x - BIRD_R * 0.85,
        y: bird.y + (Math.random() - 0.5) * 5,
        vx: -0.3 - Math.random() * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: 2 + Math.random() * 1.5,
        a: 0.45,
        dirty: Math.random() < 0.4,
      });
      if (exhaust.length > 80) exhaust.shift();
    }
    for (let i = exhaust.length - 1; i >= 0; i--) {
      const p = exhaust[i];
      p.r *= 1.05;                             // expand
      p.a -= 0.018;                            // fade slowly
      p.x += (p.vx || 0) - PIPE_SPEED_BASE * 0.4;
      p.y += (p.vy || 0);
      if (p.a <= 0) exhaust.splice(i, 1);
    }

    if (state === STATE_READY) {
      // Float centered above the title text during the start screen
      bird.x = W / 2;
      // Keep the ship fully on-screen during the start splash: its roof
      // cargo + warning light extend ~BIRD_R*1.5 above center, so clamp
      // to at least (BIRD_R * 2 + 12) from the top.
      const idleY = Math.max(BIRD_R * 2 + 12, PLAY_H * 0.22);
      bird.y = idleY + Math.sin(frame * 0.06) * 8;
      updateSparks();
      return;
    }
    if (state === STATE_PLAY) {
      // Power-up timers
      if (slowFrames > 0)    slowFrames--;
      if (doubleFrames > 0)  doubleFrames--;
      if (magnetFrames > 0)  magnetFrames--;
      if (ghostFrames > 0)   ghostFrames--;
      if (invulnFrames > 0)  invulnFrames--;

      bird.vy = Math.min(bird.vy + GRAVITY, MAX_FALL);
      bird.y += bird.vy;
      bird.rot = Math.max(-0.5, Math.min(1.2, bird.vy * 0.09));

      const speed = currentPipeSpeed() * (slowFrames > 0 ? 0.5 : 1);
      for (const p of pipes) {
        p.x -= speed;
        if (p.motion === 'drift' || p.motion === 'fast') {
          p.driftY = Math.sin(frame * p.driftSpeed + p.driftPhase) * p.driftAmp;
          clampDrift(p);
        }
      }
      while (pipes.length && pipes[0].x + PIPE_W < -10) pipes.shift();
      const last = pipes[pipes.length - 1];
      const sp = pipeSpacing();
      if (!last || last.x < W - sp) {
        addPipe((last ? last.x : W) + sp);
      }

      // Collectibles and power-ups
      for (const p of pipes) {
        checkGapPickups(p);
      }

      for (const p of pipes) {
        if (!p.passed && p.x + PIPE_W < bird.x) {
          p.passed = true;
          if (p.debris && !p.debris.collected) breakCombo(); // missed pickup resets chain
          grantScore(1);
          burstFrames = 14;
          scorePulse = 1;
          emitScoreBurst(p.x + PIPE_W / 2, p.top + p.gap / 2);
          if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
        }
      }

      updateMissiles();
      updateLoot();
      updatePirate();
      updateProjectiles();
      updateSparks();
      updatePickupSparks();
      if (frame % 6 === 0) refreshHud();

      if (collide()) {
        if (shieldCharges > 0) {
          shieldCharges--;
          invulnFrames = 45;
          shakeFrames = 6;
          // No white flash on shield save — only on actual death
          emitShieldBreak(bird.x, bird.y);
          if (navigator.vibrate) { try { navigator.vibrate([10, 20, 10]); } catch (e) {} }
        } else {
          state = STATE_OVER;
          flashAlpha = 0.85;
          shakeFrames = 12;
          breakCombo();
          emitDeathShards(bird.x, bird.y);
          if (score > best) {
            best = score;
            localStorage.setItem('flappy_best_ios_v2', String(best));
          }
          if (navigator.vibrate) { try { navigator.vibrate([30, 40, 30]); } catch (e) {} }
          playSound('crash');
          stopThemeAmbient(0.5);
          setTimeout(showGameOver, 200);
        }
      }
    } else if (state === STATE_OVER) {
      if (bird.y + BIRD_R < PLAY_H) {
        bird.vy = Math.min(bird.vy + GRAVITY, MAX_FALL);
        bird.y += bird.vy;
        bird.rot = Math.min(1.6, bird.rot + 0.05);
      } else {
        bird.y = PLAY_H - BIRD_R;
      }
      updateSparks();
      if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - 0.08);
    }
  }

  function updateSparks() {
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.life -= s.decay;
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= s.drag;
      s.vy = s.vy * s.drag + s.gravity;
      s.rot += s.vr;
      if (s.life <= 0 || s.y > H + 50) sparks.splice(i, 1);
    }
  }

  function emitScoreBurst(cx, cy) {
    const n = 12 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + Math.random() * 0.3;
      const sp = 1.8 + Math.random() * 2.4;
      sparks.push({
        x: cx,
        y: cy,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        size: 3 + Math.random() * 2,
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 0.3,
        life: 1,
        decay: 0.025 + Math.random() * 0.02,
        shape: 'square',
        color: '#ffd75a',
        glow: '#ffd066',
        drag: 0.93,
        gravity: 0.05,
      });
    }
  }

  function emitDeathShards(cx, cy) {
    for (let i = 0; i < 15; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 2.2 + Math.random() * 3;
      sparks.push({
        x: cx,
        y: cy,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1.5,
        size: 7 + Math.random() * 5,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.35,
        life: 1,
        decay: 0.012,
        shape: 'tri',
        color: '#cf9bff',
        glow: '#bc13fe',
        drag: 0.99,
        gravity: 0.28,
      });
    }
  }

  function collide() {
    if (invulnFrames > 0) return false;
    const r = BIRD_R - 3;

    if (bird.y + r >= PLAY_H) return true;
    if (bird.y - r <= 0) { bird.y = r; bird.vy = 0; }

    // Ghost mode — phase through obstacles but still die if you hit ground
    if (ghostFrames > 0) return false;

    for (const p of pipes) {
      if (p.destroyed) continue;
      const dy = p.driftY || 0;
      if (bird.x + r > p.x && bird.x - r < p.x + PIPE_W) {
        if (bird.y - r < p.top + dy || bird.y + r > p.top + p.gap + dy) return true;
      }
    }
    if (boss && bossTipHits()) return true;
    if (projectiles.length && projectileHit()) return true;
    return false;
  }

  // Pickup overlap: collectibles give score, power-ups activate effects.
  // Magnet bends uncollected debris/powerups toward the ship.
  function checkGapPickups(p) {
    const dyOff = p.driftY || 0;
    // Magnet pull: shift effective offY toward the bird
    if (magnetFrames > 0) {
      const pullRadius = 140;
      for (const item of [p.debris, p.powerUp]) {
        if (!item || item.collected) continue;
        const ix = p.x + PIPE_W / 2;
        const iy = p.top + p.gap / 2 + item.offY + dyOff;
        const dx = bird.x - ix;
        const dy = bird.y - iy;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < pullRadius) {
          const targetOff = bird.y - (p.top + p.gap / 2 + dyOff);
          item.offY += (targetOff - item.offY) * 0.18;
        }
      }
    }
    if (p.debris && !p.debris.collected) {
      const cx = p.x + PIPE_W / 2;
      const cy = p.top + p.gap / 2 + p.debris.offY + dyOff;
      const reach = BIRD_R + 12;
      const dx = bird.x - cx, dy = bird.y - cy;
      if (dx * dx + dy * dy < reach * reach) {
        p.debris.collected = true;
        const points = p.debris.gold ? 5 : 1;
        addCombo();
        grantScore(points);
        scorePulse = 1;
        burstFrames = 10;
        emitPickupSparks(cx, cy, p.debris.gold ? '#ffe066' : '#fff3a8', points);
        if (navigator.vibrate) { try { navigator.vibrate(8); } catch (e) {} }
        playSound(p.debris.gold ? 'gold' : 'pickup');
      }
    }
    if (p.powerUp && !p.powerUp.collected) {
      const cx = p.x + PIPE_W / 2;
      const cy = p.top + p.gap / 2 + p.powerUp.offY + dyOff;
      const reach = BIRD_R + 14;
      const dx = bird.x - cx, dy = bird.y - cy;
      if (dx * dx + dy * dy < reach * reach) {
        p.powerUp.collected = true;
        activatePowerUp(p.powerUp.kind);
        emitPickupSparks(cx, cy, powerUpColor(p.powerUp.kind), 14);
        if (navigator.vibrate) { try { navigator.vibrate([15, 20, 15]); } catch (e) {} }
      }
    }
  }

  function powerUpColor(kind) {
    if (kind === 'shield')  return '#9bd2ff';
    if (kind === 'slow')    return '#c49bff';
    if (kind === 'magnet')  return '#ff6b9d';
    if (kind === 'missile') return '#ff5a2a';
    if (kind === 'ghost')   return '#b8ffe8';
    return '#ffd280';
  }

  function activatePowerUp(kind) {
    if (kind === 'shield')       shieldCharges = Math.min(3, shieldCharges + 1);
    else if (kind === 'slow')    slowFrames    = Math.max(slowFrames, 300);    // ~5s
    else if (kind === 'double')  doubleFrames  = Math.max(doubleFrames, 360);  // ~6s
    else if (kind === 'magnet')  magnetFrames  = Math.max(magnetFrames, 360);  // ~6s
    else if (kind === 'ghost')   ghostFrames   = Math.max(ghostFrames, 180);   // ~3s
    else if (kind === 'missile') fireMissile();
    refreshHud();
    playSound('powerup');
  }

  // Auto-fire a homing missile at the next obstacle that is ENTIRELY ahead
  // of the ship — so a missile picked up while overlapping a pipe blasts
  // the *next* one, not the one we're tucked inside.
  function fireMissile() {
    let target = null;
    for (const p of pipes) {
      if (p.destroyed) continue;
      if (p.x > bird.x + BIRD_R) { target = p; break; }
    }
    missiles.push({
      x: bird.x - BIRD_R * 0.6,
      y: bird.y,
      vx: 0,
      vy: 0,
      target: target,
      life: 90,
      trail: [],
    });
    playSound('missile');
  }

  function updateMissiles() {
    for (let i = missiles.length - 1; i >= 0; i--) {
      const m = missiles[i];
      m.life--;
      // Seek — pull velocity toward target center
      if (m.target && !m.target.destroyed) {
        const tx = m.target.x + PIPE_W / 2;
        const ty = m.target.top + m.target.gap / 2;
        const dx = tx - m.x, dy = ty - m.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        const accel = 0.6;
        m.vx += (dx / d) * accel;
        m.vy += (dy / d) * accel;
        // Cap speed
        const sp = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
        const MAX = 8;
        if (sp > MAX) { m.vx = m.vx / sp * MAX; m.vy = m.vy / sp * MAX; }
      } else {
        m.vx = Math.min(m.vx + 0.5, 9);
      }
      m.x += m.vx;
      m.y += m.vy;
      m.trail.push({ x: m.x, y: m.y });
      if (m.trail.length > 8) m.trail.shift();

      // Hit test against target
      if (m.target && !m.target.destroyed) {
        if (m.x > m.target.x - 4 && m.x < m.target.x + PIPE_W + 4) {
          destroyPipe(m.target);
          missiles.splice(i, 1);
          continue;
        }
      }
      if (m.life <= 0 || m.x > W + 40 || m.x < -40 || m.y < -40 || m.y > H + 40) {
        missiles.splice(i, 1);
      }
    }
  }

  function destroyPipe(p) {
    p.destroyed = true;
    p.passed = true; // count as cleared
    // Make sure the floating gap garbage / power-up vanishes with the pipe
    p.debris = null;
    p.powerUp = null;
    // Reveal 3 loot items at top / middle / bottom of the destroyed column
    spawnLootFromPipe(p);
    // Shower of debris sparks at each pipe segment
    const cx = p.x + PIPE_W / 2;
    const cy1 = p.top / 2;
    const cy2 = p.top + p.gap + (PLAY_H - p.top - p.gap) / 2;
    for (const cy of [cy1, cy2]) {
      for (let i = 0; i < 14; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 2 + Math.random() * 3;
        sparks.push({
          x: cx + (Math.random() - 0.5) * PIPE_W,
          y: cy + (Math.random() - 0.5) * 40,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp,
          size: 4 + Math.random() * 3,
          rot: Math.random() * Math.PI * 2,
          vr: (Math.random() - 0.5) * 0.4,
          life: 1,
          decay: 0.018,
          shape: 'tri',
          color: '#ff8a3a',
          glow: '#ff5a2a',
          drag: 0.97,
          gravity: 0.18,
        });
      }
    }
    shakeFrames = Math.max(shakeFrames, 6);
    grantScore(1);
    playSound('boom');
  }

  // Spawn 3 themed loot items at top, middle, bottom of the destroyed column.
  // They drift left with the world and are collectible like normal debris.
  function spawnLootFromPipe(p) {
    const set = theme().debrisSet;
    const cx = p.x + PIPE_W / 2;
    const ys = [PLAY_H * 0.20, PLAY_H * 0.50, PLAY_H * 0.78];
    for (const yBase of ys) {
      loot.push({
        x: cx + (Math.random() - 0.5) * 14,
        y: yBase + (Math.random() - 0.5) * 18,
        kind: set[Math.floor(Math.random() * set.length)],
        gold: Math.random() < 0.3,
        scale: 0.95 + Math.random() * 0.3,
        spin: (Math.random() - 0.5) * 0.025,
        phase: Math.random() * Math.PI * 2,
        collected: false,
      });
    }
  }

  function updateLoot() {
    if (loot.length === 0) return;
    const speed = currentPipeSpeed() * (slowFrames > 0 ? 0.5 : 1);
    const reachSq = (BIRD_R + 12) * (BIRD_R + 12);
    for (let i = loot.length - 1; i >= 0; i--) {
      const l = loot[i];
      l.x -= speed;
      // Magnet pull toward ship
      if (magnetFrames > 0) {
        const dx = bird.x - l.x;
        const dy = bird.y - l.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 140) {
          l.x += dx * 0.08;
          l.y += dy * 0.08;
        }
      }
      // Pickup
      if (!l.collected) {
        const dx = bird.x - l.x;
        const dy = bird.y - l.y;
        if (dx * dx + dy * dy < reachSq) {
          l.collected = true;
          const points = l.gold ? 5 : 1;
          addCombo();
          grantScore(points);
          scorePulse = 1;
          burstFrames = 10;
          emitPickupSparks(l.x, l.y, l.gold ? '#ffe066' : '#fff3a8', points);
          if (navigator.vibrate) { try { navigator.vibrate(8); } catch (e) {} }
          playSound(l.gold ? 'gold' : 'pickup');
        }
      }
      // Cull collected or off-screen
      if (l.collected || l.x < -30) loot.splice(i, 1);
    }
  }

  function drawLoot() {
    if (loot.length === 0) return;
    for (const l of loot) {
      const rot = frame * l.spin + l.phase;
      const bob = Math.sin(frame * 0.04 + l.phase) * 3;
      ctx.save();
      if (l.gold) { ctx.shadowBlur = 14; ctx.shadowColor = '#ffd85c'; }
      ctx.translate(l.x, l.y + bob);
      ctx.rotate(rot);
      ctx.scale(l.scale, l.scale);
      drawDebrisItem(l.kind);
      ctx.restore();
    }
  }

  function drawMissiles() {
    if (missiles.length === 0) return;
    ctx.save();
    for (const m of missiles) {
      // Trail
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#ff8a3a';
      for (let i = 0; i < m.trail.length; i++) {
        const t = m.trail[i];
        const k = (i + 1) / m.trail.length;
        ctx.globalAlpha = k * 0.7;
        ctx.fillStyle = '#ffc04a';
        ctx.beginPath();
        ctx.arc(t.x, t.y, 3 * k, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body
      ctx.globalAlpha = 1;
      const ang = Math.atan2(m.vy, m.vx);
      ctx.save();
      ctx.translate(m.x, m.y);
      ctx.rotate(ang);
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#ff5a2a';
      ctx.fillStyle = '#d0d0d0';
      ctx.fillRect(-6, -2, 10, 4);
      ctx.fillStyle = '#ff5a2a';
      ctx.beginPath();
      ctx.moveTo(4, -2); ctx.lineTo(9, 0); ctx.lineTo(4, 2);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#4a2a10';
      ctx.fillRect(-6, -3, 2, 6);
      ctx.restore();
    }
    ctx.restore();
  }

  function grantScore(n) {
    const mul = (doubleFrames > 0 ? 2 : 1) * comboMultiplier();
    score += n * mul;
    maybeAdvanceLevel();
  }

  // Combo chain: pickups raise combo; a pipe passing with an uncollected
  // item or a collision resets it.
  function comboMultiplier() {
    if (combo >= 13) return 4;
    if (combo >= 7)  return 3;
    if (combo >= 3)  return 2;
    return 1;
  }
  function addCombo() {
    combo++;
    if (combo > comboMax) comboMax = combo;
  }
  function breakCombo() {
    if (combo > 0) combo = 0;
  }

  // Pickup sparks use a dedicated array so they don't get cleared with sparks on death
  let pickupSparks = [];
  function emitPickupSparks(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1.2 + Math.random() * 2.2;
      pickupSparks.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        life: 1,
        decay: 0.03 + Math.random() * 0.02,
        size: 2 + Math.random() * 2,
        color: color,
      });
    }
  }
  function updatePickupSparks() {
    for (let i = pickupSparks.length - 1; i >= 0; i--) {
      const s = pickupSparks[i];
      s.x += s.vx; s.y += s.vy;
      s.vx *= 0.93; s.vy = s.vy * 0.93 + 0.04;
      s.life -= s.decay;
      if (s.life <= 0) pickupSparks.splice(i, 1);
    }
  }
  function drawPickupSparks() {
    if (pickupSparks.length === 0) return;
    ctx.save();
    ctx.shadowBlur = 10;
    for (const s of pickupSparks) {
      ctx.shadowColor = s.color;
      ctx.globalAlpha = Math.max(0, s.life);
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (0.4 + s.life * 0.6), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function emitShieldBreak(x, y) {
    for (let i = 0; i < 18; i++) {
      const a = (i / 18) * Math.PI * 2;
      const sp = 3 + Math.random() * 2;
      pickupSparks.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        life: 1,
        decay: 0.035,
        size: 2.5 + Math.random() * 2,
        color: '#9bd2ff',
      });
    }
  }

  // ---------- Rendering ----------
  function drawBackground() {
    const T = theme();
    // Rebuild cache if dimensions or theme drifted (e.g., resize between frames)
    if (bgCache.theme !== selectedTheme || bgCache.w !== W || bgCache.h !== H || !bgCache.sky) {
      buildBgCache();
    }

    // Sky + sun + nebula — cached gradients, zero per-frame allocation
    ctx.fillStyle = bgCache.sky; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = bgCache.sun; ctx.fillRect(0, 0, W, H);
    if (bgCache.nebA) {
      ctx.fillStyle = bgCache.nebA; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = bgCache.nebB; ctx.fillRect(0, 0, W, H);
    }

    // Ruined horizon silhouette
    drawDesertRidge();

    // Star layers retinted to theme
    for (const s of stars) {
      if (s.speedFactor === 0.1) {
        ctx.fillStyle = 'rgba(' + T.starBack + ',' + (s.a * s.flicker) + ')';
        ctx.fillRect(s.x, s.y, 1, 1);
      } else if (s.speedFactor === 0.5) {
        ctx.fillStyle = 'rgba(' + T.starMid + ',' + (s.a * s.flicker * 0.8) + ')';
        ctx.fillRect(s.x, s.y, s.size, s.size);
      } else {
        const tw = 0.5 + 0.5 * Math.abs(Math.sin(frame * 0.08 + s.tw));
        const alpha = s.a * tw * s.flicker;
        ctx.save();
        ctx.shadowBlur = 5;
        ctx.shadowColor = T.starGlow;
        ctx.fillStyle = 'rgba(' + T.starFront + ',' + alpha + ')';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Distant derelict satellite silhouettes
    drawJunkSats();

    // Dust streaks — tinted
    ctx.strokeStyle = 'rgba(' + T.dust + ', 1)';
    ctx.lineCap = 'round';
    for (const d of dust) {
      ctx.globalAlpha = d.a * 0.8;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + d.len, d.y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Theme-specific atmospherics over the back layers
    drawThemeAtmosphere();
  }

  let lightningAt = -999;   // frame when last lightning bolt fired
  function drawThemeAtmosphere() {
    if (selectedTheme === 'volcano') {
      // Falling ash flakes, slow
      ctx.save();
      ctx.fillStyle = 'rgba(220, 210, 200, 0.5)';
      for (let i = 0; i < 34; i++) {
        const seed = i * 9.73;
        const x = ((seed * 47 + frame * 0.6 + Math.sin(frame * 0.02 + i) * 8) % (W + 20) - 10 + W) % W;
        const y = ((seed * 23 + frame * 0.4) % PLAY_H + PLAY_H) % PLAY_H;
        ctx.fillRect(x, y, 1.5, 1.5);
      }
      // Subtle ember-flicker glow on the horizon. since must be guarded for
      // [0, 8) — without the >= 0 check, a restart (frame back to 0) leaves
      // lightningAt pointing at a future frame and the alpha balloons past 1
      // (clamped opaque), producing a solid orange wall over half the screen.
      if (Math.random() < 0.004 && frame - lightningAt > 90) lightningAt = frame;
      const since = frame - lightningAt;
      if (since >= 0 && since < 8) {
        const a = (8 - since) / 8 * 0.12;
        ctx.fillStyle = 'rgba(255, 160, 80, ' + a + ')';
        ctx.fillRect(0, PLAY_H * 0.5, W, PLAY_H * 0.5);
      }
      ctx.restore();
    } else if (selectedTheme === 'city') {
      // Warm-tinted smog haze — orange of smoldering fires
      ctx.save();
      const g = ctx.createLinearGradient(0, PLAY_H * 0.3, 0, PLAY_H * 0.82);
      g.addColorStop(0, 'rgba(120, 40, 20, 0)');
      g.addColorStop(0.5, 'rgba(90, 30, 15, 0.25)');
      g.addColorStop(1, 'rgba(50, 15, 8, 0.1)');
      ctx.fillStyle = g;
      ctx.fillRect(0, PLAY_H * 0.3, W, PLAY_H * 0.55);
      // Falling ash + ember sparks
      for (let i = 0; i < 40; i++) {
        const seed = i * 8.17;
        const x = ((seed * 41 + frame * 0.5 + Math.sin(frame * 0.02 + i) * 6) % (W + 20) - 10 + W) % W;
        const y = ((seed * 17 + frame * 0.6) % PLAY_H + PLAY_H) % PLAY_H;
        const ember = (i % 6 === 0);
        if (ember) {
          ctx.shadowBlur = 6; ctx.shadowColor = '#ff7030';
          ctx.fillStyle = 'rgba(255, 120, 40, 0.8)';
        } else {
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'rgba(180, 160, 140, 0.45)';
        }
        ctx.fillRect(x, y, 1.4, 1.4);
      }
      ctx.restore();
    } else if (selectedTheme === 'swamp') {
      // Thin drifting fog band only (the slime drip overlay was duplicating
      // the reed drips and allocating a gradient per drip per frame, causing
      // the choppy tap feel)
      ctx.save();
      ctx.fillStyle = 'rgba(80, 130, 50, 0.16)';
      for (let i = 0; i < 4; i++) {
        const y = PLAY_H * (0.35 + i * 0.12);
        const x = ((frame * 0.15 + i * 200) % (W + 200)) - 100;
        ctx.beginPath();
        ctx.ellipse(x, y, 130, 14, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // Jagged distant mountain/ruin silhouette along the horizon
  // ---------- Theme-specific horizons ----------
  function drawDesertRidge() {
    // Dispatches to the right horizon based on selected theme
    if (selectedTheme === 'swamp')   return drawSwampHorizon();
    if (selectedTheme === 'city')    return drawCitySkyline();
    if (selectedTheme === 'volcano') return drawVolcanoHorizon();
    if (selectedTheme === 'canyon')  return drawCanyonHorizon();
    return drawSunsetMountains();
  }

  function drawCanyonHorizon() {
    const layout = bgCache.horizon;
    if (!layout || layout.kind !== 'canyon') return;
    ctx.save();
    const baseY = layout.baseY;
    // Distant far ridge line
    ctx.fillStyle = 'rgba(35, 15, 8, 0.85)';
    ctx.beginPath();
    ctx.moveTo(0, baseY);
    for (const p of layout.farPeaks) ctx.lineTo(p.x, baseY - p.h);
    ctx.lineTo(W, baseY);
    ctx.closePath();
    ctx.fill();
    // Near ridge — darker sharper canyon walls
    ctx.fillStyle = theme().ridge;
    ctx.fillRect(0, baseY, W, PLAY_H - baseY);
    ctx.beginPath();
    ctx.moveTo(0, baseY);
    for (const p of layout.nearPeaks) ctx.lineTo(p.x, baseY - p.h);
    ctx.lineTo(W, baseY);
    ctx.closePath();
    ctx.fill();
    // Dusty haze band above the ridges
    const haze = bgCache.canyonHaze;
    if (haze) {
      ctx.fillStyle = haze;
      ctx.fillRect(0, baseY - 80, W, 80);
    }
    ctx.restore();
  }

  function drawSunsetMountains() {
    const layout = bgCache.horizon;
    if (!layout || layout.kind !== 'sunset') return;
    ctx.save();
    ctx.fillStyle = theme().ridge;
    ctx.beginPath();
    ctx.moveTo(0, PLAY_H);
    ctx.lineTo(0, layout.baseY);
    for (const p of layout.peaks) ctx.lineTo(p.x, layout.baseY - p.h);
    ctx.lineTo(W, layout.baseY);
    ctx.lineTo(W, PLAY_H);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawSwampHorizon() {
    const layout = bgCache.horizon;
    if (!layout || layout.kind !== 'swamp') return;
    const baseY = layout.baseY;

    // Cached fog gradient (was being rebuilt every frame)
    if (bgCache.swampFog) {
      ctx.save();
      ctx.fillStyle = bgCache.swampFog;
      ctx.fillRect(0, PLAY_H * 0.62, W, PLAY_H - PLAY_H * 0.62);
      ctx.restore();
    }

    // Forest silhouettes from cached layout
    ctx.save();
    ctx.fillStyle = theme().ridge;
    ctx.fillRect(0, baseY, W, PLAY_H - baseY);
    ctx.strokeStyle = theme().ridge;
    ctx.lineWidth = 3;
    for (const t of layout.trees) {
      ctx.fillRect(t.x - t.trunkW / 2, baseY - t.trunkH, t.trunkW, t.trunkH);
      for (const br of t.branches) {
        const yt = baseY - br.yOff;
        const midY = yt - 6 * t.s;
        const endX = t.x + br.side * br.reach;
        const endY = yt - 12 * t.s;
        ctx.beginPath();
        ctx.moveTo(t.x, yt);
        ctx.quadraticCurveTo(t.x + br.side * br.reach * 0.5, midY, endX, endY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(endX, endY);
        ctx.lineTo(endX + br.side * 6, endY - 8);
        ctx.moveTo(endX, endY);
        ctx.lineTo(endX + br.side * 4, endY - 2);
        ctx.stroke();
      }
    }
    ctx.restore();

    // Blinking eye pairs — reference cached tree array
    ctx.save();
    ctx.shadowBlur = 8;
    for (let i = 0; i < 5; i++) {
      const t = layout.trees[(i * 3) % layout.trees.length];
      const ex = t.x + ((i * 19) % 40) - 20;
      const ey = baseY - t.trunkH * (0.28 + (i % 3) * 0.1);
      const blink = Math.sin(frame * 0.08 + i * 2.3);
      if (blink < -0.75) continue;
      const hue = i % 2 === 0 ? '#ffd400' : '#ff3040';
      ctx.shadowColor = hue;
      ctx.fillStyle = hue;
      ctx.beginPath(); ctx.arc(ex - 2, ey, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex + 2, ey, 1.2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

    // Hanging vines — fewer (6), single stroke, no per-vine leaf ellipse
    ctx.save();
    ctx.strokeStyle = 'rgba(18, 40, 14, 0.85)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {
      const vx = ((i * 121 + frame * 0.05) % W + W) % W;
      const len = 30 + ((i * 17) % 40);
      const swayMid = Math.sin(frame * 0.01 + i) * 4;
      const swayEnd = Math.sin(frame * 0.02 + i) * 7;
      ctx.beginPath();
      ctx.moveTo(vx, 0);
      ctx.quadraticCurveTo(vx + swayMid, len * 0.5, vx + swayEnd, len);
      ctx.stroke();
    }
    ctx.restore();

    // Sickly glowing fireflies — fewer, slower, more ominous
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#80a030';
    for (let i = 0; i < 8; i++) {
      const seed = i * 11.7;
      const x = (seed * 53 % W + Math.sin(frame * 0.008 + i) * 22 + W) % W;
      const y = PLAY_H * 0.3 + (seed * 23 % (PLAY_H * 0.35)) + Math.cos(frame * 0.015 + i) * 8;
      const tw = Math.max(0, Math.sin(frame * 0.03 + i * 0.9));
      ctx.globalAlpha = tw * 0.9;
      ctx.fillStyle = '#c4e070';
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawCitySkyline() {
    ctx.save();
    const baseY = PLAY_H * 0.82;
    // Scorched earth ground
    ctx.fillStyle = theme().ridge;
    ctx.fillRect(0, baseY, W, PLAY_H - baseY);

    // Far buildings from cached layout
    ctx.fillStyle = 'rgba(12, 6, 4, 0.78)';
    for (const b of bgCache.horizon.far) {
      ctx.fillRect(b.x, baseY - b.h, b.w, b.h);
    }

    // Rubble piles at ground line
    ctx.fillStyle = theme().ridge;
    for (const r of bgCache.horizon.rubble) {
      ctx.beginPath();
      ctx.moveTo(r.x, baseY);
      ctx.lineTo(r.x + 8, baseY - 6);
      ctx.lineTo(r.x + 14, baseY - 3);
      ctx.lineTo(r.x + 20, baseY);
      ctx.closePath();
      ctx.fill();
    }

    // Near ruined skyline from cached layout
    ctx.fillStyle = theme().ridge;
    for (const b of bgCache.horizon.near) {
      const { bx, bw, bh, kind, i } = b;
      ctx.save();
      if (kind === 1) {
        // Lean — rotate slightly
        const lx = bx + bw / 2;
        ctx.translate(lx, baseY);
        ctx.rotate(((i % 2 === 0) ? -1 : 1) * 0.09);
        ctx.translate(-lx, -baseY);
      }
      if (kind === 0 || kind === 3) {
        // Jagged broken top
        ctx.beginPath();
        ctx.moveTo(bx, baseY);
        ctx.lineTo(bx, baseY - bh);
        const jags = 5;
        for (let j = 0; j <= jags; j++) {
          const jx = bx + (bw / jags) * j;
          const jy = baseY - bh + ((j * 17) % 16) - 6;
          ctx.lineTo(jx, jy);
        }
        ctx.lineTo(bx + bw, baseY);
        ctx.closePath();
        ctx.fill();
      } else if (kind === 2) {
        // Stump — short, ragged
        const stumpH = bh * 0.45;
        ctx.beginPath();
        ctx.moveTo(bx, baseY);
        ctx.lineTo(bx, baseY - stumpH);
        ctx.lineTo(bx + bw * 0.35, baseY - stumpH - 6);
        ctx.lineTo(bx + bw * 0.55, baseY - stumpH + 2);
        ctx.lineTo(bx + bw, baseY - stumpH - 3);
        ctx.lineTo(bx + bw, baseY);
        ctx.closePath();
        ctx.fill();
      } else {
        // leaning — standard rectangle, will be rotated
        ctx.fillRect(bx, baseY - bh, bw, bh);
      }

      // Gutted interiors — punched-out holes showing fire
      if (kind === 3) {
        ctx.fillStyle = 'rgba(255, 80, 20, 0.55)';
        for (let hy = 12; hy < bh - 6; hy += 16) {
          const hx = bx + 4 + ((hy * 13) % (bw - 14));
          ctx.fillRect(hx, baseY - hy, 10, 8);
        }
        ctx.fillStyle = theme().ridge;
      }

      // Very sparse surviving lit windows (amber only, rare)
      ctx.fillStyle = 'rgba(255, 140, 40, 0.7)';
      for (let wy = 6; wy < bh - 6; wy += 8) {
        for (let wx = 3; wx < bw - 3; wx += 6) {
          if (((wx * 13 + wy * 7 + i * 3) % 23) < 1) {
            ctx.fillRect(bx + wx, baseY - bh + wy, 2, 2);
          }
        }
      }
      ctx.fillStyle = theme().ridge;
      ctx.restore();

      // Smoke plume rising from some building tops
      if (i % 3 === 1) {
        const sx = bx + bw / 2;
        const sy = baseY - bh + 2;
        const plumeGrad = ctx.createLinearGradient(0, sy - 90, 0, sy);
        plumeGrad.addColorStop(0, 'rgba(20, 15, 15, 0)');
        plumeGrad.addColorStop(1, 'rgba(40, 30, 30, 0.7)');
        ctx.fillStyle = plumeGrad;
        ctx.beginPath();
        ctx.moveTo(sx - 8, sy);
        ctx.quadraticCurveTo(sx - 14, sy - 50, sx - 6, sy - 90);
        ctx.lineTo(sx + 6, sy - 90);
        ctx.quadraticCurveTo(sx + 14, sy - 50, sx + 8, sy);
        ctx.closePath();
        ctx.fill();
        // Fire lick at base of plume
        ctx.save();
        ctx.shadowBlur = 12; ctx.shadowColor = '#ff5a10';
        const fireFlick = 0.75 + Math.sin(frame * 0.3 + i) * 0.25;
        ctx.fillStyle = '#ff6a1a';
        ctx.beginPath();
        ctx.moveTo(sx - 5, sy);
        ctx.quadraticCurveTo(sx, sy - 10 * fireFlick, sx + 5, sy);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#ffd060';
        ctx.beginPath();
        ctx.moveTo(sx - 2, sy);
        ctx.quadraticCurveTo(sx, sy - 5 * fireFlick, sx + 2, sy);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }

    // Collapsed radio tower with blinking red warning
    const towerX = bgCache.horizon.towerX;
    const towerY = bgCache.horizon.towerY;
    ctx.save();
    ctx.strokeStyle = theme().ridge;
    ctx.lineWidth = 2;
    // Tilted broken frame
    ctx.beginPath();
    ctx.moveTo(towerX, baseY);
    ctx.lineTo(towerX + 18, towerY + 8);
    ctx.moveTo(towerX + 18, towerY + 8);
    ctx.lineTo(towerX + 26, towerY + 25);
    ctx.moveTo(towerX + 6, baseY - 30);
    ctx.lineTo(towerX + 20, baseY - 18);
    ctx.stroke();
    ctx.restore();
    if (Math.floor(frame / 30) & 1) {
      ctx.save();
      ctx.shadowBlur = 10; ctx.shadowColor = '#ff4040';
      ctx.fillStyle = '#ff4040';
      ctx.beginPath(); ctx.arc(towerX + 26, towerY + 25, 2, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // Heavy smog/ash band above the skyline, tinted with fire
    const smogGrad = ctx.createLinearGradient(0, baseY - 80, 0, baseY);
    smogGrad.addColorStop(0, 'rgba(30, 10, 5, 0)');
    smogGrad.addColorStop(0.6, 'rgba(80, 30, 10, 0.4)');
    smogGrad.addColorStop(1, 'rgba(40, 10, 5, 0.55)');
    ctx.fillStyle = smogGrad;
    ctx.fillRect(0, baseY - 80, W, 80);

    ctx.restore();
  }

  function drawVolcanoHorizon() {
    const layout = bgCache.horizon;
    if (!layout || layout.kind !== 'volcano') return;
    ctx.save();
    const baseY = layout.baseY;
    ctx.fillStyle = theme().ridge;
    ctx.fillRect(0, baseY, W, PLAY_H - baseY);

    // Cached distant ranges
    ctx.fillStyle = 'rgba(30, 8, 4, 0.8)';
    ctx.beginPath();
    ctx.moveTo(0, baseY);
    for (const p of layout.peaks) ctx.lineTo(p.x, baseY - p.h);
    ctx.lineTo(W, baseY);
    ctx.closePath();
    ctx.fill();

    // Cones from cached layout — gradients precomputed once per theme
    const ridge = theme().ridge;
    for (const c of layout.cones) {
      const cx = c.cx, scale = c.scale, topH = c.topH, topW = c.topW;
      // Cone silhouette
      ctx.fillStyle = ridge;
      ctx.beginPath();
      ctx.moveTo(cx - 70 * scale, baseY);
      ctx.lineTo(cx - topW, baseY - topH);
      ctx.lineTo(cx + topW, baseY - topH);
      ctx.lineTo(cx + 70 * scale, baseY);
      ctx.closePath();
      ctx.fill();
      // Glowing crater (cached)
      ctx.fillStyle = c.lava;
      ctx.beginPath();
      ctx.ellipse(cx, baseY - topH + 2, topW * 1.3, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Smoke plume (cached)
      ctx.fillStyle = c.plume;
      const plumeWT = 10 * scale, plumeWB = 20 * scale;
      ctx.beginPath();
      ctx.moveTo(cx - plumeWB, baseY - topH);
      ctx.quadraticCurveTo(cx - plumeWT * 1.8, baseY - topH - 40 * scale, cx - plumeWT, baseY - topH - 80 * scale);
      ctx.lineTo(cx + plumeWT, baseY - topH - 80 * scale);
      ctx.quadraticCurveTo(cx + plumeWT * 1.8, baseY - topH - 40 * scale, cx + plumeWB, baseY - topH);
      ctx.closePath();
      ctx.fill();
      // Lava dribble (kept as a single stroke, no gradient)
      ctx.strokeStyle = '#ff7a1a';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(cx + topW * 0.4, baseY - topH + 2);
      ctx.lineTo(cx + topW * 2, baseY - topH * 0.4);
      ctx.lineTo(cx + topW * 3, baseY - 6);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawJunkSats() {
    ctx.save();
    for (const s of junkSats) {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      ctx.scale(s.scale, s.scale);
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = '#1a1d22';
      ctx.strokeStyle = 'rgba(40, 40, 45, 0.8)';
      ctx.lineWidth = 1;
      if (s.type === 0) {
        // Solar-panel satellite
        ctx.fillRect(-4, -3, 8, 6);                     // body
        ctx.fillRect(-18, -2, 12, 4);                   // left panel
        ctx.fillRect(6, -2, 12, 4);                     // right panel
        ctx.strokeRect(-4, -3, 8, 6);
        ctx.strokeRect(-18, -2, 12, 4);
        ctx.strokeRect(6, -2, 12, 4);
      } else if (s.type === 1) {
        // Dish satellite
        ctx.fillRect(-3, -2, 6, 4);
        ctx.beginPath();
        ctx.arc(0, -6, 5, Math.PI, 2 * Math.PI);
        ctx.fill();
        ctx.stroke();
        ctx.fillRect(-10, -1, 6, 2);
        ctx.fillRect(4, -1, 6, 2);
      } else {
        // Tumbling debris box
        ctx.fillRect(-6, -4, 12, 8);
        ctx.strokeRect(-6, -4, 12, 8);
        ctx.strokeStyle = 'rgba(60, 60, 70, 0.6)';
        ctx.beginPath();
        ctx.moveTo(-6, 0); ctx.lineTo(6, 0);
        ctx.moveTo(0, -4); ctx.lineTo(0, 4);
        ctx.stroke();
      }
      ctx.restore();
    }
    ctx.restore();
  }

  function drawGround() {
    const T = theme();
    const gr = ctx.createLinearGradient(0, PLAY_H, 0, H);
    gr.addColorStop(0,   T.groundA);
    gr.addColorStop(0.5, T.groundB);
    gr.addColorStop(1,   '#000000');
    ctx.fillStyle = gr;
    ctx.fillRect(0, PLAY_H, W, GROUND_H);

    // Horizon seam
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = T.horizonGlow;
    ctx.strokeStyle = T.horizon;
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(0, PLAY_H + 0.5);
    ctx.lineTo(W, PLAY_H + 0.5);
    ctx.stroke();
    ctx.restore();

    // Jagged crack pattern
    ctx.strokeStyle = T.crackColor;
    ctx.lineWidth = 1;
    for (let cx = 0; cx < W; cx += 18) {
      const off = Math.sin(cx * 0.7) * 3;
      ctx.beginPath();
      ctx.moveTo(cx + off, PLAY_H + 4);
      ctx.lineTo(cx + off + 4, PLAY_H + GROUND_H * 0.55);
      ctx.stroke();
    }
  }

  function drawPipes() {
    for (const p of pipes) if (!p.destroyed) drawPipe(p);
  }

  // Floating garbage items in each gap — theme-specific debris set.
  function drawAllDebris() {
    for (const p of pipes) {
      if (p.destroyed) continue;
      const dy = p.driftY || 0;
      if (p.debris && !p.debris.collected) {
        const cx = p.x + PIPE_W / 2;
        const cy = p.top + p.gap / 2 + p.debris.offY + dy;
        const rot = frame * p.debris.spin + p.debris.phase;
        const bob = Math.sin(frame * 0.04 + p.debris.phase) * 3;
        ctx.save();
        if (p.debris.gold) {
          ctx.shadowBlur = 14;
          ctx.shadowColor = '#ffd85c';
        }
        ctx.translate(cx, cy + bob);
        ctx.rotate(rot);
        ctx.scale(p.debris.scale, p.debris.scale);
        drawDebrisItem(p.debris.kind);
        ctx.restore();
      }
      if (p.powerUp && !p.powerUp.collected) {
        const cx = p.x + PIPE_W / 2;
        const cy = p.top + p.gap / 2 + p.powerUp.offY + dy;
        const bob = Math.sin(frame * 0.05 + p.powerUp.phase) * 3;
        drawPowerUpCapsule(cx, cy + bob, p.powerUp.kind);
      }
    }
  }

  function drawPowerUpCapsule(cx, cy, kind) {
    const color = powerUpColor(kind);
    const pulse = 1 + Math.sin(frame * 0.12) * 0.08;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.shadowBlur = 12;
    ctx.shadowColor = color;
    // Outer ring
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 14 * pulse, 0, Math.PI * 2);
    ctx.stroke();
    // Inner disc
    ctx.fillStyle = 'rgba(20, 20, 30, 0.8)';
    ctx.beginPath();
    ctx.arc(0, 0, 11, 0, Math.PI * 2);
    ctx.fill();
    // Icon
    ctx.shadowBlur = 6;
    ctx.fillStyle = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    if (kind === 'shield') {
      ctx.beginPath();
      ctx.moveTo(0, -7);
      ctx.lineTo(6, -4); ctx.lineTo(6, 2); ctx.lineTo(0, 8);
      ctx.lineTo(-6, 2); ctx.lineTo(-6, -4);
      ctx.closePath(); ctx.stroke();
    } else if (kind === 'slow') {
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, -5); ctx.lineTo(0, 0); ctx.lineTo(4, 2); ctx.stroke();
    } else if (kind === 'magnet') {
      // Horseshoe magnet
      ctx.beginPath();
      ctx.arc(0, 2, 6, Math.PI, 0);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-6, 2); ctx.lineTo(-6, 6); ctx.moveTo(6, 2); ctx.lineTo(6, 6);
      ctx.stroke();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-7, 5, 3, 3);
      ctx.fillRect(4, 5, 3, 3);
    } else if (kind === 'missile') {
      ctx.beginPath();
      ctx.moveTo(-5, -3); ctx.lineTo(4, -3); ctx.lineTo(7, 0);
      ctx.lineTo(4, 3);   ctx.lineTo(-5, 3);
      ctx.closePath(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-5, -3); ctx.lineTo(-7, -5);
      ctx.moveTo(-5, 3);  ctx.lineTo(-7, 5);
      ctx.stroke();
    } else if (kind === 'ghost') {
      ctx.beginPath();
      ctx.arc(0, -1, 5, Math.PI, 0);
      ctx.lineTo(5, 6);
      ctx.lineTo(3, 4); ctx.lineTo(1, 6); ctx.lineTo(-1, 4); ctx.lineTo(-3, 6);
      ctx.lineTo(-5, 4); ctx.closePath();
      ctx.stroke();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-2, -1, 0.9, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 2, -1, 0.9, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.font = '900 10px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('×2', 0, 0);
    }
    ctx.restore();
  }

  const DEBRIS_DRAWERS = {};
  function drawDebrisItem(kind) {
    // Warm backing halo — cached gradient, single fillStyle assign per item
    if (bgCache.debrisHalo) {
      ctx.fillStyle = bgCache.debrisHalo;
      ctx.beginPath();
      ctx.arc(0, 0, 18, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 8;
    ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
    const fn = DEBRIS_DRAWERS[kind];
    if (fn) fn();
  }

  function drawBurger() {
    // Top bun
    ctx.fillStyle = '#e8a44a';
    ctx.beginPath();
    ctx.arc(0, -6, 11, Math.PI, 2 * Math.PI);
    ctx.fill();
    ctx.fillRect(-11, -6, 22, 2);
    // Sesame seeds
    ctx.fillStyle = '#fff4d0';
    ctx.beginPath(); ctx.arc(-5, -10, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 2, -12, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 7, -9,  1, 0, Math.PI * 2); ctx.fill();
    // Lettuce (green frill)
    ctx.fillStyle = '#7bc24e';
    ctx.beginPath();
    ctx.moveTo(-12, -4);
    for (let x = -11; x <= 11; x += 4) ctx.lineTo(x, -2 + (x % 8 === 0 ? -2 : 0));
    ctx.lineTo(12, -4); ctx.lineTo(12, -2); ctx.lineTo(-12, -2);
    ctx.closePath(); ctx.fill();
    // Patty
    ctx.fillStyle = '#6a3a1a';
    ctx.fillRect(-11, -2, 22, 5);
    // Bottom bun
    ctx.fillStyle = '#c08030';
    ctx.beginPath();
    ctx.moveTo(-11, 3);
    ctx.lineTo(11, 3);
    ctx.arc(0, 3, 11, 0, Math.PI);
    ctx.closePath();
    ctx.fill();
  }

  function drawFries() {
    // Red container
    ctx.fillStyle = '#c92a2a';
    ctx.beginPath();
    ctx.moveTo(-9, 4); ctx.lineTo(-11, 11); ctx.lineTo(11, 11); ctx.lineTo(9, 4);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#7a1414';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Golden M-style band
    ctx.fillStyle = '#ffd43b';
    ctx.fillRect(-9, 5, 18, 2);
    // Fries sticking out
    ctx.fillStyle = '#ffd86b';
    ctx.strokeStyle = '#a8761a';
    ctx.lineWidth = 0.5;
    for (let i = -4; i <= 4; i += 2) {
      const h = 9 + Math.abs(i);
      ctx.fillRect(i - 0.7, 3 - h, 1.4, h);
      ctx.strokeRect(i - 0.7, 3 - h, 1.4, h);
    }
  }

  function drawHeadphones() {
    // Headband arc
    ctx.strokeStyle = '#202020';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 2, 11, Math.PI + 0.25, 2 * Math.PI - 0.25);
    ctx.stroke();
    // Earcups
    ctx.fillStyle = '#282828';
    ctx.fillRect(-13, 0, 6, 10);
    ctx.fillRect(7, 0, 6, 10);
    // Cup foam
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(-12, 2, 4, 6);
    ctx.fillRect(8, 2, 4, 6);
    // Logo dots
    ctx.fillStyle = '#e04040';
    ctx.beginPath(); ctx.arc(-10, 5, 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(10, 5, 0.8, 0, Math.PI * 2); ctx.fill();
  }

  function drawToilet() {
    // Tank
    ctx.fillStyle = '#e6ecef';
    ctx.fillRect(-7, -10, 14, 8);
    ctx.strokeStyle = '#6a7278';
    ctx.lineWidth = 1;
    ctx.strokeRect(-7, -10, 14, 8);

    ctx.moveTo(-10, -2);
    ctx.lineTo(10, -2);
    ctx.lineTo(7, 10);
    ctx.lineTo(-7, 10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7a828a';
    ctx.stroke();
    // Water (grimy post-apocalypse green)
    ctx.fillStyle = '#4a6a3a';
    ctx.beginPath();
    ctx.ellipse(0, 2, 7, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawDuck() {
    // Body
    ctx.fillStyle = '#ffd633';
    ctx.beginPath();
    ctx.ellipse(0, 3, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.beginPath();
    ctx.arc(6, -3, 5, 0, Math.PI * 2);
    ctx.fill();
    // Beak
    ctx.fillStyle = '#ff8a1c';
    ctx.beginPath();
    ctx.moveTo(9, -2); ctx.lineTo(14, -1); ctx.lineTo(9, 0);
    ctx.closePath(); ctx.fill();
    // Eye
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(7, -4, 0.9, 0, Math.PI * 2); ctx.fill();
    // Wing line
    ctx.strokeStyle = '#c39a14';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-3, 3); ctx.quadraticCurveTo(0, 6, 4, 3);
    ctx.stroke();

  function drawTV() {
    // Cabinet
    ctx.fillStyle = '#6a5a3e';
    ctx.fillRect(-12, -7, 24, 14);
    ctx.strokeStyle = '#2a1f0f';
    ctx.lineWidth = 1;
    ctx.strokeRect(-12, -7, 24, 14);
    // Screen (dead static)
    ctx.fillStyle = '#1a1d22';
    ctx.fillRect(-9, -5, 17, 10);
    // Static noise lines
    ctx.strokeStyle = 'rgba(200, 200, 200, 0.3)';
    for (let ly = -4; ly < 5; ly += 2) {
      ctx.beginPath();
      ctx.moveTo(-9, ly); ctx.lineTo(8, ly);
      ctx.stroke();
    }
    // Knobs
    ctx.fillStyle = '#d0a04a';
    ctx.beginPath(); ctx.arc(10, -3, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(10, 2, 1.2, 0, Math.PI * 2); ctx.fill();
    // Bent antenna
    ctx.strokeStyle = '#9a9a9a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-4, -7); ctx.lineTo(-8, -14);
    ctx.moveTo(4, -7); ctx.lineTo(9, -12);
    ctx.stroke();
  }

  function drawPizza() {
    // Slice crust
    ctx.fillStyle = '#d9a058';
    ctx.beginPath();
    ctx.moveTo(-11, 8); ctx.lineTo(11, 8); ctx.lineTo(0, -10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7a4a1a';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Cheese (inner)
    ctx.fillStyle = '#ffd56b';
    ctx.beginPath();
    ctx.moveTo(-9, 7); ctx.lineTo(9, 7); ctx.lineTo(0, -7);
    ctx.closePath(); ctx.fill();
    // Pepperoni
    ctx.fillStyle = '#c03020';
    ctx.beginPath(); ctx.arc(-3, 3, 1.6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, 1, 1.6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(-1, -3, 1.4, 0, Math.PI * 2); ctx.fill();
  }

  function drawBottle() {
    // Body
    ctx.fillStyle = 'rgba(60, 140, 90, 0.85)';
    ctx.fillRect(-5, -4, 10, 14);
    // Neck
    ctx.fillRect(-2, -10, 4, 6);
    // Cap
    ctx.fillStyle = '#8a1a1a';
    ctx.fillRect(-2.5, -12, 5, 2.5);
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(-4, -3, 1.5, 11);
    // Label
    ctx.fillStyle = '#f0e6b0';
    ctx.fillRect(-5, 1, 10, 4);
    ctx.strokeStyle = '#4a2a0a';
    ctx.lineWidth = 0.6;
    ctx.strokeRect(-5, 1, 10, 4);
  }

  function drawShoe() {
    // Sole
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.moveTo(-12, 6); ctx.lineTo(10, 6); ctx.lineTo(12, 3); ctx.lineTo(-12, 3);
    ctx.closePath(); ctx.fill();
    // Upper
    ctx.fillStyle = '#a02a2a';
    ctx.beginPath();
    ctx.moveTo(-12, 3); ctx.lineTo(2, 3); ctx.lineTo(4, -3); ctx.lineTo(10, -3); ctx.lineTo(12, 3);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#2a0a0a';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // Laces
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 0.8;
    for (let lx = -8; lx < 2; lx += 3) {
      ctx.beginPath();
      ctx.moveTo(lx, 3); ctx.lineTo(lx + 1, -1);
      ctx.stroke();
    }
  }

  // Register sunset drawers
  DEBRIS_DRAWERS.burger = drawBurger;
  DEBRIS_DRAWERS.fries = drawFries;
  DEBRIS_DRAWERS.headphones = drawHeadphones;

  DEBRIS_DRAWERS.tv = drawTV;
  DEBRIS_DRAWERS.pizza = drawPizza;
  DEBRIS_DRAWERS.bottle = drawBottle;
  DEBRIS_DRAWERS.shoe = drawShoe;

  // ---- SWAMP debris ----
  DEBRIS_DRAWERS.lilypad = function() {
    ctx.fillStyle = '#3e8a35';

    ctx.arc(0, 2, 11, 0, Math.PI * 2);

    // Notch
    ctx.fillStyle = '#1a0512';
    ctx.beginPath();
    ctx.moveTo(0, 2); ctx.lineTo(9, -5); ctx.lineTo(11, 2);
    ctx.closePath(); ctx.fill();

    ctx.beginPath(); ctx.arc(0, 2, 11, 0, Math.PI * 2);
    ctx.lineWidth = 1; ctx.strokeStyle = '#14301a'; ctx.stroke();
    // Flower
    ctx.fillStyle = '#ffe0f0';
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.ellipse(-3 + Math.cos(a) * 2, -2 + Math.sin(a) * 2, 2.2, 1.4, a, 0, Math.PI * 2);

  DEBRIS_DRAWERS.charredcan = function() {
