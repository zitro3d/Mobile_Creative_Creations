<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="dlx-garbage-hauler">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>dlx-garbage-hauler</title>
<style>
  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    position: fixed;
    inset: 0;
    background: #000000;
  }
  #stage {
    position: absolute;
    inset: 0;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: -webkit-optimize-contrast;
    background: #000000;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    pointer-events: none;
    text-align: center;
  }
  #overlay * { pointer-events: none; }
  #overlay .panel, #overlay #restartBtn,
  #overlay #shipPicker, #overlay .shipBtn, #overlay .shipBtn *,
  #overlay #themePicker, #overlay .themeBtn { pointer-events: auto; }

  #themeLabel {
    font-size: 12px;
    letter-spacing: 2px;
    color: #ffd280;
    margin-top: 8px;
    text-shadow: 1px 1px 0 #000;
  }
  #themePicker {
    display: flex;
    gap: 6px;
    margin: 6px 0 12px;
  }
  .themeBtn {
    flex: 1;
    padding: 7px 4px;
    font-family: inherit;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 1px;
    color: #fff;
    background: rgba(0,0,0,0.45);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    text-shadow: 1px 1px 0 #000;
    -webkit-appearance: none;
    cursor: pointer;
    transition: transform 0.08s, border-color 0.1s, background 0.1s;
  }
  .themeBtn.selected {
    border-color: #ffd280;
    background: rgba(255, 170, 80, 0.22);
    box-shadow: 0 0 12px rgba(255,180,80,0.35);
  }
  .themeBtn:active { transform: scale(0.96); }
  #title {
    font-size: clamp(36px, 9vmin, 72px);
    font-weight: 900;
    letter-spacing: 4px;
    line-height: 0.95;
    color: #ffffff;
    text-shadow: 0 0 18px #9f6cff, 0 0 32px #00d4ff, 2px 2px 0 #000;
    margin-bottom: 16px;
    font-family: "SF Pro Display", -apple-system, sans-serif;
  }
  #subtitle {
    font-size: clamp(14px, 3.2vmin, 22px);
    margin-bottom: 24px;
    color: #fff;
    font-weight: 600;
  }
  .tapHint {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 20px;
    background: rgba(0,0,0,0.35);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .panel {
    background: rgba(0,0,0,0.55);
    border: 4px solid #fff;
    border-radius: 16px;
    padding: 22px 32px;
    text-align: center;
    box-shadow: 0 0 0 4px #000, 0 10px 30px rgba(0,0,0,0.4);
    max-width: 86%;
  }
  #gameOverTitle {
    font-size: clamp(28px, 7vmin, 54px);
    color: #ff5252;
    margin-bottom: 12px;
    letter-spacing: 2px;
    font-weight: 900;
  }
  .row {
    font-size: clamp(16px, 4vmin, 26px);
    margin: 6px 0;
    font-weight: 700;
  }
  .label { color: #ffdd00; }
  #restartBtn {
    margin-top: 18px;
    padding: 14px 34px;
    font-size: clamp(16px, 4vmin, 22px);
    font-family: inherit;
    font-weight: 900;
    color: #000;
    background: #ffdd00;
    border: 4px solid #000;
    border-radius: 12px;
    cursor: pointer;
    text-shadow: none;
    box-shadow: 0 5px 0 #b8860b;
    transition: transform 0.05s, box-shadow 0.05s;
    letter-spacing: 1px;
    -webkit-appearance: none;
  }
  #restartBtn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #b8860b;
  }
  .hidden { display: none !important; }

  #shipPicker {
    display: flex;
    gap: 10px;
    margin: 20px 0;
    pointer-events: auto;
  }
  .shipBtn {
    flex: 1;
    min-width: 88px;
    background: rgba(0,0,0,0.45);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 12px;
    padding: 8px 6px;
    color: #fff;
    font-family: inherit;
    -webkit-appearance: none;
    cursor: pointer;
    text-shadow: 1px 1px 0 #000;
    transition: transform 0.08s, border-color 0.1s, background 0.1s;
  }
  .shipBtn.selected {
    border-color: #ffd280;
    background: rgba(255, 170, 80, 0.22);
    box-shadow: 0 0 18px rgba(255,180,80,0.35);
  }
  .shipBtn:active { transform: scale(0.96); }
  .shipThumb {
    width: 90px;
    height: 54px;
    display: block;
    margin: 0 auto 4px;
    image-rendering: pixelated;
  }
  .shipName {
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 1px;
    color: #ffd280;
  }
  .shipStats {
    font-size: 10px;
    color: #ddd;
    margin-top: 2px;
  }

  #hud {
    position: absolute;
    top: calc(var(--safe-top) + 8px);
    left: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    pointer-events: none;
    z-index: 3;
  }
  .pw {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 3px 6px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,180,80,0.4);
    border-radius: 999px;
    color: #fff;
    font-family: "Courier New", monospace;
    font-weight: 900;
    font-size: 11px;
  }
  .pw.active { display: inline-flex; }
  .pwLabel { min-width: 18px; text-align: center; }
  .pwBar {
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    overflow: hidden;
  }
  .pwFill {
    display: block;
    height: 100%;
    background: #ffd280;
    transform-origin: left center;
    transform: scaleX(1);
  }
  #pwShield     { border-color: #9bd2ff; } #pwShield     .pwFill { background: #9bd2ff; }
  #pwSlow       { border-color: #c49bff; } #pwSlow       .pwFill { background: #c49bff; }
  #pwDouble     { border-color: #ffd280; } #pwDouble     .pwFill { background: #ffd280; }
  #pwMagnet     { border-color: #ff6b9d; } #pwMagnet     .pwFill { background: #ff6b9d; }
  #pwGhost      { border-color: #b8ffe8; } #pwGhost      .pwFill { background: #b8ffe8; }

  #gate {
    position: fixed;
    inset: 0;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    z-index: 100;
  }
  #gate h1 {
    font-size: 28px;
    margin: 0 0 12px;
    color: #ffdd00;
  }
  #gate p {
    font-size: 16px;
    line-height: 1.5;
    max-width: 420px;
    color: #ddd;
  }
  #gate .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }

  @media (orientation: landscape) and (max-height: 500px) {
    #rotate {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      z-index: 50;
      padding: 24px;
    }
  }
  #rotate { display: none; }
</style>
</head>
<body>
<div id="gate" class="hidden">
  <div class="icon">📱</div>
  <h1>iPhone / iPad Only</h1>
  <p>This game is designed exclusively for iOS devices. Please open it on an iPhone or iPad using Safari.</p>
</div>

<div id="stage">
  <canvas id="game"></canvas>
  <div id="overlay" class="show">
    <div id="startScreen">
      <div id="title">DLX<br>GARBAGE<br>HAULER</div>
      <div id="subtitle">Pick your ship</div>
      <div id="shipPicker">
        <button class="shipBtn" data-ship="scout">
          <canvas class="shipThumb" width="90" height="54"></canvas>
          <div class="shipName">SCOUT</div>
          <div class="shipStats">Small · Agile</div>
        </button>
        <button class="shipBtn selected" data-ship="hauler">
          <canvas class="shipThumb" width="90" height="54"></canvas>
          <div class="shipName">HAULER</div>
          <div class="shipStats">Balanced</div>
        </button>
        <button class="shipBtn" data-ship="freighter">
          <canvas class="shipThumb" width="90" height="54"></canvas>
          <div class="shipName">FREIGHTER</div>
          <div class="shipStats">Big · Heavy</div>
        </button>
      </div>
      <div id="themeLabel">Theme</div>
      <div id="themePicker">
        <button class="themeBtn selected" data-theme="sunset">SUNSET</button>
        <button class="themeBtn" data-theme="swamp">SWAMP</button>
        <button class="themeBtn" data-theme="city">CITY</button>
        <button class="themeBtn" data-theme="volcano">VOLCANO</button>
      </div>
      <div class="tapHint">TAP SHIP TO LAUNCH</div>
    </div>
    <div id="gameOverScreen" class="hidden">
      <div class="panel">
        <div id="gameOverTitle">GAME OVER</div>
        <div class="row"><span class="label">SCORE</span> <span id="finalScore">0</span></div>
        <div class="row"><span class="label">BEST</span> <span id="bestScore">0</span></div>
        <div class="row"><span class="label">SHIP</span> <span id="finalShip">HAULER</span></div>
        <button id="restartBtn">RESTART</button>
      </div>
    </div>
  </div>
  <div id="hud">
    <div class="pw" id="pwShield"><span class="pwLabel">◎</span><span class="pwBar"><span class="pwFill"></span></span></div>
    <div class="pw" id="pwSlow"><span class="pwLabel">◐</span><span class="pwBar"><span class="pwFill"></span></span></div>
    <div class="pw" id="pwDouble"><span class="pwLabel">×2</span><span class="pwBar"><span class="pwFill"></span></span></div>
    <div class="pw" id="pwMagnet"><span class="pwLabel">✦</span><span class="pwBar"><span class="pwFill"></span></span></div>
    <div class="pw" id="pwGhost"><span class="pwLabel">◌</span><span class="pwBar"><span class="pwFill"></span></span></div>
  </div>
</div>

<div id="rotate">Please rotate to portrait mode to play.</div>

<script>
(function() {
  // ---------- iOS gate ----------
  const ua = navigator.userAgent || '';
  const platform = navigator.platform || '';
  const isIPhone = /iPhone|iPod/.test(ua);
  // iPadOS 13+ reports as Mac; detect via touch points
  const isIPad = /iPad/.test(ua) || (platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isIOS = isIPhone || isIPad;

  if (!isIOS) {
    document.getElementById('gate').classList.remove('hidden');
    document.getElementById('stage').style.display = 'none';
    return;
  }

  // ---------- Canvas sizing (DPR-aware) ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Logical game world dimensions (iPhone-ish portrait)
  const BASE_W = 360;
  let W = BASE_W;
  let H = 640;
  let scale = 1;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cw = window.innerWidth;
    const ch = window.innerHeight;

    // Fit logical width to physical width
    scale = cw / BASE_W;
    W = BASE_W;
    H = Math.round(ch / scale);

    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';

    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;

    recalcLayout();
  }

  let GROUND_H, PLAY_H;
  function recalcLayout() {
    GROUND_H = Math.max(60, Math.round(H * 0.11));
    PLAY_H = H - GROUND_H;
    // Reposition stars to fit new dimensions
    if (stars.length) { initStars(); initDust(); initNebula(); initJunkSats(); }
  }

  // ---------- Audio (Web Audio, synthesised — no asset files) ----------
  let audioCtx = null;
  function audio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function tone(freq, dur, type, gain, slide) {
    const a = audio(); if (!a) return;
    const t = a.currentTime;
    const osc = a.createOscillator();
    const g = a.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    if (typeof slide === 'number') {
      osc.frequency.exponentialRampToValueAtTime(Math.max(40, slide), t + dur);
    }
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain || 0.2, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g).connect(a.destination);
    osc.start(t);
    osc.stop(t + dur + 0.02);
  }
  function noiseBurst(dur, gain) {
    const a = audio(); if (!a) return;
    const t = a.currentTime;
    const n = Math.floor(a.sampleRate * dur);
    const buf = a.createBuffer(1, n, a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = a.createBufferSource();
    src.buffer = buf;
    const g = a.createGain();
    g.gain.value = gain || 0.3;
    src.connect(g).connect(a.destination);
    src.start(t);
  }
  function playSound(kind) {
    switch (kind) {
      case 'flap':    tone(180, 0.08, 'square',   0.08, 90);  break;
      case 'pickup':  tone(880, 0.08, 'triangle', 0.12, 1320); break;
      case 'gold':    tone(660, 0.06, 'triangle', 0.14, 1200);
                      setTimeout(function(){ tone(990, 0.1, 'triangle', 0.14, 1800); }, 40); break;
      case 'powerup': tone(440, 0.12, 'sawtooth', 0.1, 880);
                      setTimeout(function(){ tone(660, 0.14, 'sine',   0.12, 1320); }, 60); break;
      case 'missile': tone(320, 0.18, 'sawtooth', 0.15, 80); break;
      case 'boom':    noiseBurst(0.3, 0.4);
                      tone(90, 0.2, 'square', 0.2, 40); break;
      case 'crash':   noiseBurst(0.5, 0.45);
                      tone(110, 0.35, 'sawtooth', 0.25, 40); break;
    }
  }

  // ---------- Physics / constants ----------
  // Three ship types — chosen on start screen. Stats stay fixed per run.
  const SHIPS = {
    scout: {
      r: 15, gravity: 0.26, flap: -5.8, maxFall: 9, label: 'SCOUT',
      bodyTop: '#ffe07a', bodyMid: '#ffb82a', bodyBot: '#a36b14',
      secondary: '#8a1a12',   // dark red roof cargo
      engine:    '#2a1a10',

      rust:      'rgba(120, 60, 20, 0.7)',
      cockpit:   '#7cf4ff',
      cockpitGlow:'#49d8e6',
      warning:   '#ff4040',
      accentA: '#ffc64d', accentB: '#8a1a12',
    },
    hauler: {
      r: 20, gravity: 0.30, flap: -6.7, maxFall: 10.5, label: 'HAULER',
      bodyTop: '#c0462e', bodyMid: '#a52a2a', bodyBot: '#6a1e1a',
      secondary: '#3a3a40',
      engine:    '#2a2a30',
      engineEdge:'#0a0a0e',
      rust:      'rgba(120, 50, 20, 0.7)',
      cockpit:   '#e0a020',
      cockpitGlow:'#f2c94c',
      warning:   '#d04840',
      accentA: '#a52a2a', accentB: '#3a3a40',
    },
    freighter: {
      r: 25, gravity: 0.34, flap: -7.6, maxFall: 12, label: 'FREIGHTER',
      bodyTop: '#7a632e', bodyMid: '#4e3a1a', bodyBot: '#2a1f10',
      secondary: '#1e2026',
      engine:    '#14161c',
      engineEdge:'#000000',
      rust:      'rgba(90, 40, 10, 0.75)',
      cockpit:   '#5be0b0',
      cockpitGlow:'#30a880',
      warning:   '#ffaa30',
      accentA: '#5e4a2a', accentB: '#1e2026',
    },
  };
  let selectedShip = 'hauler';

  // Theme palettes. Each theme also carries a CSS filter string applied via
  // ctx.filter when drawing obstacles and debris so those assets are
  // re-tinted to match the sky.
  const THEMES = {
    sunset: {
      label: 'SUNSET',
      sky: ['#1a0512', '#4a1020', '#923523', '#d97028', '#e9a347', '#2a150a'],

      },
      junk: {

        outline: '#3a1e0f', rim: 'rgba(15,10,8,0.75)',
        rust: 'rgba(90, 40, 15, 0.7)', bolt: '#2a2018',
        antennaMetal: '#88807a', antennaLed: '#d04840',
      },
      debrisSet: ['burger','fries','headphones','toilet','duck','tv','pizza','bottle','shoe'],
    },
    swamp: {
      label: 'SWAMP',
      sky: ['#061407', '#0e2a10', '#1f4e20', '#4a7820', '#a5b83a', '#0a1408'],
      sunInner: 'rgba(220, 255, 140, 0.9)',

      nebA: 'rgba(80, 140, 40, 0.3)',

      },

      },

    },
    city: {
      label: 'CITY',
      sky: ['#06060f', '#0f0e22', '#1e1b3a', '#332a52', '#6a5985', '#0a0812'],
      sunInner: 'rgba(200, 190, 255, 0.85)',

    volcano: {

      sunInner: 'rgba(255, 240, 180, 0.95)',
      sunMid:   'rgba(255, 80, 20, 0.9)',

      ridge: 'rgba(10, 0, 0, 0.92)',

      cargo: {

      },
      debrisSet: ['charredcan','emberrock','molten_tire','burntbook','skullbone','ashheap','lavashard'],
    },
  };
  let selectedTheme = 'sunset';
  function theme() { return THEMES[selectedTheme]; }
  let GRAVITY, FLAP, MAX_FALL, BIRD_R, BIRD_W, BIRD_H;
  function applyShipStats(key) {
    const s = SHIPS[key];
    GRAVITY = s.gravity;
    FLAP = s.flap;
    MAX_FALL = s.maxFall;
    BIRD_R = s.r;
    BIRD_W = BIRD_R * 2;
    BIRD_H = BIRD_R * 2;
  }
  applyShipStats(selectedShip);

  const PIPE_W = 56;
  const PIPE_GAP_BASE    = 170;         // baseline gap
  const PIPE_GAP_MIN     = 130;         // tightest after ramp
  const PIPE_SPEED_BASE  = 2.0;
  const PIPE_SPEED_MAX   = 3.6;
  const PIPE_SPACING     = 200;
  const PIPE_MIN_TOP     = 60;

  // Difficulty scales with score
  function currentPipeSpeed() {
    return Math.min(PIPE_SPEED_MAX, PIPE_SPEED_BASE + score * 0.03);
  }
  function currentPipeGap() {
    return Math.max(PIPE_GAP_MIN, PIPE_GAP_BASE - score * 0.5);
  }

  const BIRD_X_FRAC = 0.28;

  const STATE_READY = 0;
  const STATE_PLAY = 1;
  const STATE_OVER = 2;
  let state = STATE_READY;

  let bird, pipes, sparks, exhaust, score, best, frame, flashAlpha, burstFrames, shakeFrames, scorePulse, thrusterFrames, flapCount, pipeSpawnCount;
  let stars = [];
  let dust  = [];
  let nebula;
  let junkSats = [];
  // Power-up state
  let shieldCharges = 0;   // absorbs one hit each
  let slowFrames    = 0;   // slow-motion timer (frames)
  let doubleFrames  = 0;   // double-score timer (frames)
  let magnetFrames  = 0;   // magnet pulls pickups toward ship
  let ghostFrames   = 0;   // phase through obstacles
  let invulnFrames  = 0;   // brief i-frames after shield break / spawn
  let combo         = 0;   // consecutive pickups without miss
  let comboMax      = 0;
  let missiles      = [];  // active missile shots
  best = parseInt(localStorage.getItem('flappy_best_ios_v2') || '0', 10);

  function reset() {
    applyShipStats(selectedShip);
    bird = {
      x: Math.round(W * BIRD_X_FRAC),
      y: PLAY_H / 2,
      vy: 0,
    };
    pipes = [];
    sparks = [];
    pickupSparks = [];
    exhaust = [];
    score = 0;
    frame = 0;
    flashAlpha = 0;
    burstFrames = 0;
    shakeFrames = 0;
    scorePulse = 0;
    thrusterFrames = 0;
    flapCount = 0;
    pipeSpawnCount = 0;
    shieldCharges = 0;
    slowFrames = 0;
    doubleFrames = 0;
    magnetFrames = 0;
    ghostFrames = 0;
    invulnFrames = 0;
    combo = 0;
    comboMax = 0;
    missiles = [];
    initStars();
    initDust();
    initNebula();
    initJunkSats();
    for (let i = 0; i < 4; i++) addPipe(W + 120 + i * PIPE_SPACING);
    refreshHud();
  }

  // 3-layer parallax starfield — 80 stars with speedFactor 0.1 / 0.5 / 1.0
  const SPEED_FACTORS = [0.1, 0.5, 1.0];
  function initStars() {
    stars = [];
    for (let i = 0; i < 80; i++) {
      const sf = SPEED_FACTORS[Math.floor(Math.random() * 3)];
      stars.push(makeStar(Math.random() * W, sf));
    }
  }

  function makeStar(x, sf) {
    const big = sf === 1.0;
    const mid = sf === 0.5;
    return {
      x: x,
      y: Math.random() * PLAY_H,
      speedFactor: sf,
      size: big ? 1.6 + Math.random() * 1.4 : mid ? 1 + Math.random() * 0.6 : 1,
      a: big ? 0.7 + Math.random() * 0.3 : mid ? 0.35 + Math.random() * 0.3 : 0.1 + Math.random() * 0.2,
      tw: Math.random() * Math.PI * 2,
      flicker: 1,
      next: Math.floor(Math.random() * 8),
    };
  }

  function updateStars() {
    for (const s of stars) {
      s.x -= PIPE_SPEED_BASE * s.speedFactor;
      if (s.x < -2) {
        // Reset to right edge at random height
        s.x = W + Math.random() * 8;
        s.y = Math.random() * PLAY_H;
      }
      if (frame >= s.next) {
        s.flicker = 1 + (Math.random() - 0.5) * 0.2;
        s.next = frame + 3 + Math.floor(Math.random() * 5);
      }
    }
  }

  // Fast speed-dust specks that streak right-to-left constantly
  function initDust() {
    dust = [];
    for (let i = 0; i < 40; i++) {
      dust.push({
        x: Math.random() * W,
        y: Math.random() * PLAY_H,
        speed: 4 + Math.random() * 4,   // much faster than parallax stars
        len:   3 + Math.random() * 5,   // streak length
        a: 0.5 + Math.random() * 0.5,
      });
    }
  }

  function updateDust() {
    for (const d of dust) {
      d.x -= d.speed;
      if (d.x < -d.len - 2) {
        d.x = W + Math.random() * 8;
        d.y = Math.random() * PLAY_H;
      }
    }
  }

  // Static nebula cloud in the far background
  function initNebula() {
    nebula = {
      x: W * (0.55 + Math.random() * 0.2),
      y: PLAY_H * (0.35 + Math.random() * 0.2),
      r: Math.max(W, PLAY_H) * 0.6,
    };
  }

  // Distant derelict satellite silhouettes drifting slowly through the nebula
  function initJunkSats() {
    junkSats = [];
    const n = 5;
    for (let i = 0; i < n; i++) {
      junkSats.push({
        x: (W / n) * i + Math.random() * 40,
        y: 40 + Math.random() * (PLAY_H * 0.55),
        scale: 0.55 + Math.random() * 0.55,
        speed: 0.15 + Math.random() * 0.2,
        type: Math.floor(Math.random() * 3),
        rot: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.003,
      });
    }
  }

  function updateJunkSats() {
    for (const s of junkSats) {
      s.x -= s.speed;
      s.rot += s.spin;
      if (s.x < -60) {
        s.x = W + 40;
        s.y = 40 + Math.random() * (PLAY_H * 0.55);
      }
    }
  }

  function addPipe(x) {
    const gap = currentPipeGap();
    const top = PIPE_MIN_TOP + Math.random() * (PLAY_H - gap - PIPE_MIN_TOP * 2);
    const type = Math.random() < 0.5 ? 'cargo' : 'junk';
    // Every ~5th pipe swaps its debris for a glowing power-up capsule
    const spawnPowerUp = pipeSpawnCount > 2 && Math.random() < 0.22;
    pipeSpawnCount++;

    // Motion: after a few pipes, some obstacles drift vertically or pulse
    // their gap. Chance ramps with score for a rising difficulty feel.
    // Motion: after a few pipes, some obstacles drift vertically. Chance
    // ramps with score. Two flavours — slow large drift or fast tight drift.
    let motion = 'static';
    const motionRoll = Math.random();
    const motionChance = Math.min(0.45, 0.08 + score * 0.004);
    if (pipeSpawnCount > 4 && motionRoll < motionChance) {
      motion = motionRoll < motionChance * 0.55 ? 'drift' : 'fast';
    }

    const pipe = {
      x: x,
      top: top,
      gap: gap,
      driftY: 0,
      passed: false,
      destroyed: false,
      seed: Math.random() * 1000,
      pulse: Math.random() * Math.PI * 2,
      type: type,
      motion: motion,
      topShape: buildShardShape(PIPE_W, top, true),
      botShape: buildShardShape(PIPE_W, PLAY_H - (top + gap), false),
      antennas: buildAntennas(),
      debris:  spawnPowerUp ? null : makeDebris(gap),
      powerUp: spawnPowerUp ? makePowerUp(gap) : null,
    };
    if (motion === 'drift' || motion === 'fast') {
      pipe.driftSpeed = motion === 'fast' ? 0.09 : 0.04;
      pipe.driftAmp   = motion === 'fast' ? 22 : 38;
      pipe.driftPhase = Math.random() * Math.PI * 2;
    }
    pipes.push(pipe);
  }

  function clampDrift(p) {
    // Clamp so the top segment never dips into negative and bottom stays on-screen
    const effTop = p.top + p.driftY;
    const effBot = PLAY_H - (p.top + p.gap + p.driftY);
    const maxDown = (PLAY_H - PIPE_MIN_TOP) - (p.top + p.gap);
    const maxUp = -(p.top - PIPE_MIN_TOP);
    if (p.driftY > maxDown) p.driftY = maxDown;
    if (p.driftY < maxUp) p.driftY = maxUp;
  }

  function makeDebris(gap) {
    const set = theme().debrisSet;
    const gold = Math.random() < 0.16;
    return {
      kind: set[Math.floor(Math.random() * set.length)],
      offY: (Math.random() - 0.5) * (gap * 0.32),
      scale: 0.85 + Math.random() * 0.35,
      spin: (Math.random() - 0.5) * 0.025,
      phase: Math.random() * Math.PI * 2,
      gold: gold,
      collected: false,
    };
  }

  const POWER_KINDS = ['shield', 'slow', 'double', 'magnet', 'missile', 'ghost'];
  function makePowerUp(gap) {
    return {
      kind: POWER_KINDS[Math.floor(Math.random() * POWER_KINDS.length)],
      offY: (Math.random() - 0.5) * (gap * 0.25),
      phase: Math.random() * Math.PI * 2,
      collected: false,
    };
  }

  // Random antenna sticks for junk pipes, deterministic per-pipe
  function buildAntennas() {
    const arr = [];
    const n = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < n; i++) {
      arr.push({
        side: Math.random() < 0.5 ? -1 : 1,
        yFrac: 0.2 + Math.random() * 0.6,
        len: 8 + Math.random() * 12,
        angle: (Math.random() - 0.5) * 0.6,
        tipR: 1 + Math.random() * 1.5,
      });
    }
    return arr;
  }

  // Build a static jagged obsidian-shard polygon. Generated once per pipe so
  // the shape does not wobble as the crystal moves across the screen.
  function buildShardShape(w, h, isTop) {
    const tipSign = isTop ? 1 : -1;
    const baseY   = isTop ? 0 : h;
    const tipY    = isTop ? h : 0;

    const basePad = 4;                 // base extends slightly outward
    const tipInsetL = w * 0.28;        // tip-narrow inset (left side)
    const tipInsetR = w * 0.72;        // tip-narrow inset (right side)

    const pts = [];

    // Base corners (wide)
    pts.push([-basePad, baseY]);
    pts.push([w + basePad, baseY]);

    const nNodes = 3 + Math.floor(Math.random() * 2); // 3 or 4

    // Right side — taper inward toward tip with per-node jitter
    for (let i = 1; i <= nNodes; i++) {
      const t = i / (nNodes + 1);
      const y = baseY + (tipY - baseY) * t;
      const sideX = (w + basePad) * (1 - t) + tipInsetR * t;
      const jitter = (Math.random() * 2 - 1) * 7;   // ±7 px
      pts.push([sideX + jitter, y]);
    }
    // Right tip corner
    pts.push([tipInsetR, tipY]);

    // Tip: 3 jagged triangular spear-peaks of varying depth
    const tipSegs = 3;
    const tipSpan = tipInsetR - tipInsetL;
    for (let i = 0; i < tipSegs; i++) {
      const peakX = tipInsetR - ((i + 0.5) / tipSegs) * tipSpan;
      const depth = 7 + Math.random() * 11;        // varies 7–18 px
      pts.push([peakX, tipY + depth * tipSign]);
      const troughX = tipInsetR - ((i + 1) / tipSegs) * tipSpan;
      pts.push([troughX, tipY]);
    }

    // Left side — taper back out to base
    for (let i = nNodes; i >= 1; i--) {
      const t = i / (nNodes + 1);
      const y = baseY + (tipY - baseY) * t;
      const sideX = (-basePad) * (1 - t) + tipInsetL * t;
      const jitter = (Math.random() * 2 - 1) * 7;
      pts.push([sideX + jitter, y]);
    }

    return pts;
  }

  function flap() {
    if (state === STATE_READY) {
      state = STATE_PLAY;
      bird.x = Math.round(W * BIRD_X_FRAC);
    }
    if (state === STATE_PLAY) {
      bird.vy = FLAP;
      thrusterFrames = 5;
      flapCount++;
      // Every 5th or 6th tap the engine backfires: extra smoke puff
      const isBackfire = flapCount > 0 && (flapCount % 5 === 0 || flapCount % 6 === 0);
      emitExhaustBurst(isBackfire ? 12 : 5, isBackfire);
      haptic();
      playSound('flap');
    }
  }

  function emitExhaustBurst(n, big) {
    for (let i = 0; i < n; i++) {
      const angle = Math.PI + (Math.random() - 0.5) * 0.9;
      const speed = 0.4 + Math.random() * (big ? 1.8 : 0.8);
      exhaust.push({
        x: bird.x - BIRD_R * 0.9,
        y: bird.y + (Math.random() - 0.5) * (big ? 10 : 5),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed + (Math.random() - 0.5) * 0.4,
        r: (big ? 4 : 2.5) + Math.random() * 2,
        a: big ? 0.75 : 0.55,
        dirty: big || Math.random() < 0.35,   // darker greasy puffs
      });
    }
  }

  function haptic() {
    // Best-effort tactile feedback (Safari gates most; no-op if blocked)
    if (navigator.vibrate) { try { navigator.vibrate(8); } catch (e) {} }
  }

  function update() {
    frame++;

    updateStars();
    updateDust();
    updateJunkSats();

    if (thrusterFrames > 0) thrusterFrames--;
    if (burstFrames > 0) burstFrames--;
    if (scorePulse > 0) scorePulse = Math.max(0, scorePulse - 0.1);

    // Idle sputter — constant trickle of dirty smoke from the back
    if (state !== STATE_OVER && frame % 3 === 0) {
      exhaust.push({
        x: bird.x - BIRD_R * 0.85,
        y: bird.y + (Math.random() - 0.5) * 5,
        vx: -0.3 - Math.random() * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: 2 + Math.random() * 1.5,
        a: 0.45,
        dirty: Math.random() < 0.4,
      });
      if (exhaust.length > 80) exhaust.shift();
    }
    for (let i = exhaust.length - 1; i >= 0; i--) {
      const p = exhaust[i];
      p.r *= 1.05;                             // expand
      p.a -= 0.018;                            // fade slowly
      p.x += (p.vx || 0) - PIPE_SPEED_BASE * 0.4;
      p.y += (p.vy || 0);
      if (p.a <= 0) exhaust.splice(i, 1);
    }

    if (state === STATE_READY) {
      // Float centered above the title text during the start screen
      bird.x = W / 2;
      // Keep the ship fully on-screen during the start splash: its roof
      // cargo + warning light extend ~BIRD_R*1.5 above center, so clamp
      // to at least (BIRD_R * 2 + 12) from the top.
      const idleY = Math.max(BIRD_R * 2 + 12, PLAY_H * 0.22);
      bird.y = idleY + Math.sin(frame * 0.06) * 8;
      updateSparks();
      return;
    }
    if (state === STATE_PLAY) {
      // Power-up timers
      if (slowFrames > 0)    slowFrames--;
      if (doubleFrames > 0)  doubleFrames--;
      if (magnetFrames > 0)  magnetFrames--;
      if (ghostFrames > 0)   ghostFrames--;
      if (invulnFrames > 0)  invulnFrames--;

      bird.vy = Math.min(bird.vy + GRAVITY, MAX_FALL);
      bird.y += bird.vy;
      bird.rot = Math.max(-0.5, Math.min(1.2, bird.vy * 0.09));

      const speed = currentPipeSpeed() * (slowFrames > 0 ? 0.5 : 1);
      for (const p of pipes) {
        p.x -= speed;
        if (p.motion === 'drift' || p.motion === 'fast') {
          p.driftY = Math.sin(frame * p.driftSpeed + p.driftPhase) * p.driftAmp;
          clampDrift(p);
        }
      }
      while (pipes.length && pipes[0].x + PIPE_W < -10) pipes.shift();
      const last = pipes[pipes.length - 1];
      if (!last || last.x < W - PIPE_SPACING) {
        addPipe((last ? last.x : W) + PIPE_SPACING);
      }

      // Collectibles and power-ups
      for (const p of pipes) {
        checkGapPickups(p);
      }

      for (const p of pipes) {
        if (!p.passed && p.x + PIPE_W < bird.x) {
          p.passed = true;
          if (p.debris && !p.debris.collected) breakCombo(); // missed pickup resets chain
          grantScore(1);
          burstFrames = 14;
          scorePulse = 1;
          emitScoreBurst(p.x + PIPE_W / 2, p.top + p.gap / 2);
          if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
        }
      }

      updateMissiles();
      updateSparks();
      updatePickupSparks();
      if (frame % 6 === 0) refreshHud();

      if (collide()) {
        if (shieldCharges > 0) {
          shieldCharges--;
          invulnFrames = 45;
          shakeFrames = 6;
          flashAlpha = 0.35;
          emitShieldBreak(bird.x, bird.y);
          if (navigator.vibrate) { try { navigator.vibrate([10, 20, 10]); } catch (e) {} }
        } else {
          state = STATE_OVER;
          flashAlpha = 0.85;
          shakeFrames = 12;
          breakCombo();
          emitDeathShards(bird.x, bird.y);
          if (score > best) {
            best = score;
            localStorage.setItem('flappy_best_ios_v2', String(best));
          }
          if (navigator.vibrate) { try { navigator.vibrate([30, 40, 30]); } catch (e) {} }
          playSound('crash');
          setTimeout(showGameOver, 200);
        }
      }
    } else if (state === STATE_OVER) {
      if (bird.y + BIRD_R < PLAY_H) {
        bird.vy = Math.min(bird.vy + GRAVITY, MAX_FALL);
        bird.y += bird.vy;
        bird.rot = Math.min(1.6, bird.rot + 0.05);
      } else {
        bird.y = PLAY_H - BIRD_R;
      }
      updateSparks();
      if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - 0.08);
    }
  }

  function updateSparks() {
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.life -= s.decay;
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= s.drag;
      s.vy = s.vy * s.drag + s.gravity;
      s.rot += s.vr;
      if (s.life <= 0 || s.y > H + 50) sparks.splice(i, 1);
    }
  }

  function emitScoreBurst(cx, cy) {
    const n = 12 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + Math.random() * 0.3;
      const sp = 1.8 + Math.random() * 2.4;
      sparks.push({
        x: cx,
        y: cy,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        size: 3 + Math.random() * 2,
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 0.3,
        life: 1,
        decay: 0.025 + Math.random() * 0.02,
        shape: 'square',
        color: '#ffd75a',
        glow: '#ffd066',
        drag: 0.93,
        gravity: 0.05,
      });
    }
  }

  function emitDeathShards(cx, cy) {
    for (let i = 0; i < 15; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 2.2 + Math.random() * 3;
      sparks.push({
        x: cx,
        y: cy,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1.5,
        size: 7 + Math.random() * 5,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.35,
        life: 1,
        decay: 0.012,
        shape: 'tri',
        color: '#cf9bff',
        glow: '#bc13fe',
        drag: 0.99,
        gravity: 0.28,
      });
    }
  }

  function collide() {
    if (invulnFrames > 0) return false;
    const r = BIRD_R - 3;

    if (bird.y + r >= PLAY_H) return true;
    if (bird.y - r <= 0) { bird.y = r; bird.vy = 0; }

    // Ghost mode — phase through obstacles but still die if you hit ground
    if (ghostFrames > 0) return false;

    for (const p of pipes) {
      if (p.destroyed) continue;
      const dy = p.driftY || 0;
      if (bird.x + r > p.x && bird.x - r < p.x + PIPE_W) {
        if (bird.y - r < p.top + dy || bird.y + r > p.top + p.gap + dy) return true;
      }
    }
    return false;
  }

  // Pickup overlap: collectibles give score, power-ups activate effects.
  // Magnet bends uncollected debris/powerups toward the ship.
  function checkGapPickups(p) {
    const dyOff = p.driftY || 0;
    // Magnet pull: shift effective offY toward the bird
    if (magnetFrames > 0) {
      const pullRadius = 140;
      for (const item of [p.debris, p.powerUp]) {
        if (!item || item.collected) continue;
        const ix = p.x + PIPE_W / 2;
        const iy = p.top + p.gap / 2 + item.offY + dyOff;
        const dx = bird.x - ix;
        const dy = bird.y - iy;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < pullRadius) {
          const targetOff = bird.y - (p.top + p.gap / 2 + dyOff);
          item.offY += (targetOff - item.offY) * 0.18;
        }
      }
    }
    if (p.debris && !p.debris.collected) {
      const cx = p.x + PIPE_W / 2;
      const cy = p.top + p.gap / 2 + p.debris.offY + dyOff;
      const reach = BIRD_R + 12;
      const dx = bird.x - cx, dy = bird.y - cy;
      if (dx * dx + dy * dy < reach * reach) {
        p.debris.collected = true;
        const points = p.debris.gold ? 5 : 1;
        addCombo();
        grantScore(points);
        scorePulse = 1;
        burstFrames = 10;
        emitPickupSparks(cx, cy, p.debris.gold ? '#ffe066' : '#fff3a8', points);
        if (navigator.vibrate) { try { navigator.vibrate(8); } catch (e) {} }
        playSound(p.debris.gold ? 'gold' : 'pickup');
      }
    }
    if (p.powerUp && !p.powerUp.collected) {
      const cx = p.x + PIPE_W / 2;
      const cy = p.top + p.gap / 2 + p.powerUp.offY + dyOff;
      const reach = BIRD_R + 14;
      const dx = bird.x - cx, dy = bird.y - cy;
      if (dx * dx + dy * dy < reach * reach) {
        p.powerUp.collected = true;
        activatePowerUp(p.powerUp.kind);
        emitPickupSparks(cx, cy, powerUpColor(p.powerUp.kind), 14);
        if (navigator.vibrate) { try { navigator.vibrate([15, 20, 15]); } catch (e) {} }
      }
    }
  }

  function powerUpColor(kind) {
    if (kind === 'shield')  return '#9bd2ff';
    if (kind === 'slow')    return '#c49bff';
    if (kind === 'magnet')  return '#ff6b9d';
    if (kind === 'missile') return '#ff5a2a';
    if (kind === 'ghost')   return '#b8ffe8';
    return '#ffd280';
  }

  function activatePowerUp(kind) {
    if (kind === 'shield')       shieldCharges = Math.min(3, shieldCharges + 1);
    else if (kind === 'slow')    slowFrames    = Math.max(slowFrames, 300);    // ~5s
    else if (kind === 'double')  doubleFrames  = Math.max(doubleFrames, 360);  // ~6s
    else if (kind === 'magnet')  magnetFrames  = Math.max(magnetFrames, 360);  // ~6s
    else if (kind === 'ghost')   ghostFrames   = Math.max(ghostFrames, 120);   // ~2s
    else if (kind === 'missile') fireMissile();
    refreshHud();
    playSound('powerup');
  }

  // Auto-fire a homing missile at the next obstacle ahead of the ship
  function fireMissile() {
    let target = null;
    for (const p of pipes) {
      if (p.destroyed) continue;
      if (p.x + PIPE_W > bird.x) { target = p; break; }
    }
    missiles.push({
      x: bird.x - BIRD_R * 0.6,
      y: bird.y,
      vx: 0,
      vy: 0,
      target: target,
      life: 90,
      trail: [],
    });
    playSound('missile');
  }

  function updateMissiles() {
    for (let i = missiles.length - 1; i >= 0; i--) {
      const m = missiles[i];
      m.life--;
      // Seek — pull velocity toward target center
      if (m.target && !m.target.destroyed) {
        const tx = m.target.x + PIPE_W / 2;
        const ty = m.target.top + m.target.gap / 2;
        const dx = tx - m.x, dy = ty - m.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        const accel = 0.6;
        m.vx += (dx / d) * accel;
        m.vy += (dy / d) * accel;
        // Cap speed
        const sp = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
        const MAX = 8;
        if (sp > MAX) { m.vx = m.vx / sp * MAX; m.vy = m.vy / sp * MAX; }
      } else {
        m.vx = Math.min(m.vx + 0.5, 9);
      }
      m.x += m.vx;
      m.y += m.vy;
      m.trail.push({ x: m.x, y: m.y });
      if (m.trail.length > 8) m.trail.shift();

      // Hit test against target
      if (m.target && !m.target.destroyed) {
        if (m.x > m.target.x - 4 && m.x < m.target.x + PIPE_W + 4) {
          destroyPipe(m.target);
          missiles.splice(i, 1);
          continue;
        }
      }
      if (m.life <= 0 || m.x > W + 40 || m.x < -40 || m.y < -40 || m.y > H + 40) {
        missiles.splice(i, 1);
      }
    }
  }

  function destroyPipe(p) {
    p.destroyed = true;
    p.passed = true; // count as cleared
    // Shower of debris sparks at each pipe segment
    const cx = p.x + PIPE_W / 2;
    const cy1 = p.top / 2;
    const cy2 = p.top + p.gap + (PLAY_H - p.top - p.gap) / 2;
    for (const cy of [cy1, cy2]) {
      for (let i = 0; i < 14; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 2 + Math.random() * 3;
        sparks.push({
          x: cx + (Math.random() - 0.5) * PIPE_W,
          y: cy + (Math.random() - 0.5) * 40,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp,
          size: 4 + Math.random() * 3,
          rot: Math.random() * Math.PI * 2,
          vr: (Math.random() - 0.5) * 0.4,
          life: 1,
          decay: 0.018,
          shape: 'tri',
          color: '#ff8a3a',
          glow: '#ff5a2a',
          drag: 0.97,
          gravity: 0.18,
        });
      }
    }
    shakeFrames = Math.max(shakeFrames, 8);
    flashAlpha = Math.max(flashAlpha, 0.35);
    grantScore(1);
    playSound('boom');
  }

  function drawMissiles() {
    if (missiles.length === 0) return;
    ctx.save();
    for (const m of missiles) {
      // Trail
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#ff8a3a';
      for (let i = 0; i < m.trail.length; i++) {
        const t = m.trail[i];
        const k = (i + 1) / m.trail.length;
        ctx.globalAlpha = k * 0.7;
        ctx.fillStyle = '#ffc04a';
        ctx.beginPath();
        ctx.arc(t.x, t.y, 3 * k, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body
      ctx.globalAlpha = 1;
      const ang = Math.atan2(m.vy, m.vx);
      ctx.save();
      ctx.translate(m.x, m.y);
      ctx.rotate(ang);
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#ff5a2a';
      ctx.fillStyle = '#d0d0d0';
      ctx.fillRect(-6, -2, 10, 4);
      ctx.fillStyle = '#ff5a2a';
      ctx.beginPath();
      ctx.moveTo(4, -2); ctx.lineTo(9, 0); ctx.lineTo(4, 2);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#4a2a10';
      ctx.fillRect(-6, -3, 2, 6);
      ctx.restore();
    }
    ctx.restore();
  }

  function grantScore(n) {
    const mul = (doubleFrames > 0 ? 2 : 1) * comboMultiplier();
    score += n * mul;
  }

  // Combo chain: pickups raise combo; a pipe passing with an uncollected
  // item or a collision resets it.
  function comboMultiplier() {
    if (combo >= 13) return 4;
    if (combo >= 7)  return 3;
    if (combo >= 3)  return 2;
    return 1;
  }
  function addCombo() {
    combo++;
    if (combo > comboMax) comboMax = combo;
  }
  function breakCombo() {
    if (combo > 0) combo = 0;
  }

  // Pickup sparks use a dedicated array so they don't get cleared with sparks on death
  let pickupSparks = [];
  function emitPickupSparks(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1.2 + Math.random() * 2.2;
      pickupSparks.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        life: 1,
        decay: 0.03 + Math.random() * 0.02,
        size: 2 + Math.random() * 2,
        color: color,
      });
    }
  }
  function updatePickupSparks() {
    for (let i = pickupSparks.length - 1; i >= 0; i--) {
      const s = pickupSparks[i];
      s.x += s.vx; s.y += s.vy;
      s.vx *= 0.93; s.vy = s.vy * 0.93 + 0.04;
      s.life -= s.decay;
      if (s.life <= 0) pickupSparks.splice(i, 1);
    }
  }
  function drawPickupSparks() {
    if (pickupSparks.length === 0) return;
    ctx.save();
    ctx.shadowBlur = 10;
    for (const s of pickupSparks) {
      ctx.shadowColor = s.color;
      ctx.globalAlpha = Math.max(0, s.life);
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (0.4 + s.life * 0.6), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function emitShieldBreak(x, y) {
    for (let i = 0; i < 18; i++) {
      const a = (i / 18) * Math.PI * 2;
      const sp = 3 + Math.random() * 2;
      pickupSparks.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        life: 1,
        decay: 0.035,
        size: 2.5 + Math.random() * 2,
        color: '#9bd2ff',
      });
    }
  }

  // ---------- Rendering ----------
  function drawBackground() {
    const T = theme();
    // Sky gradient (6 stops)
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0,    T.sky[0]);
    g.addColorStop(0.28, T.sky[1]);
    g.addColorStop(0.5,  T.sky[2]);
    g.addColorStop(0.72, T.sky[3]);
    g.addColorStop(0.9,  T.sky[4]);
    g.addColorStop(1,    T.sky[5]);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Sun/focal glow
    const sunX = W * 0.78;
    const sunY = PLAY_H * 0.72;
    const sunR = Math.min(W, PLAY_H) * 0.22;
    const sg = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR);
    sg.addColorStop(0,   T.sunInner);
    sg.addColorStop(0.4, T.sunMid);
    sg.addColorStop(1,   T.sunEdge);
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, W, H);

    // Far-background haze/nebula
    if (nebula) {
      ctx.save();
      const ng = ctx.createRadialGradient(nebula.x, nebula.y, 0, nebula.x, nebula.y, nebula.r);
      ng.addColorStop(0,    T.nebA);
      ng.addColorStop(0.45, T.nebB);
      ng.addColorStop(0.8,  T.nebC);
      ng.addColorStop(1,    'rgba(0, 0, 0, 0)');
      ctx.fillStyle = ng;
      ctx.fillRect(0, 0, W, H);

      const ng2 = ctx.createRadialGradient(
        nebula.x - nebula.r * 0.35, nebula.y + nebula.r * 0.2, 0,
        nebula.x - nebula.r * 0.35, nebula.y + nebula.r * 0.2, nebula.r * 0.55
      );
      ng2.addColorStop(0, T.nebWisp);
      ng2.addColorStop(1, T.nebWisp.replace(/[0-9.]+\)$/, '0)'));
      ctx.fillStyle = ng2;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    // Ruined horizon silhouette
    drawDesertRidge();

    // Star layers retinted to theme
    for (const s of stars) {
      if (s.speedFactor === 0.1) {
        ctx.fillStyle = 'rgba(' + T.starBack + ',' + (s.a * s.flicker) + ')';
        ctx.fillRect(s.x, s.y, 1, 1);
      } else if (s.speedFactor === 0.5) {
        ctx.fillStyle = 'rgba(' + T.starMid + ',' + (s.a * s.flicker * 0.8) + ')';
        ctx.fillRect(s.x, s.y, s.size, s.size);
      } else {
        const tw = 0.5 + 0.5 * Math.abs(Math.sin(frame * 0.08 + s.tw));
        const alpha = s.a * tw * s.flicker;
        ctx.save();
        ctx.shadowBlur = 5;
        ctx.shadowColor = T.starGlow;
        ctx.fillStyle = 'rgba(' + T.starFront + ',' + alpha + ')';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Distant derelict satellite silhouettes
    drawJunkSats();

    // Dust streaks — tinted
    ctx.strokeStyle = 'rgba(' + T.dust + ', 1)';
    ctx.lineCap = 'round';
    for (const d of dust) {
      ctx.globalAlpha = d.a * 0.8;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + d.len, d.y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Jagged distant mountain/ruin silhouette along the horizon
  function drawDesertRidge() {
    ctx.save();
    ctx.fillStyle = theme().ridge;
    ctx.beginPath();
    const baseY = PLAY_H * 0.82;
    ctx.moveTo(0, PLAY_H);
    ctx.lineTo(0, baseY);
    const peaks = 14;
    for (let i = 0; i <= peaks; i++) {
      const x = (W / peaks) * i;
      // Deterministic jagged profile via sine hash
      const h = 12 + Math.abs(Math.sin(i * 1.7) * 28) + (i % 3) * 4;
      ctx.lineTo(x, baseY - h);
      if (i < peaks) {
        const xm = x + (W / peaks) * 0.5;
        const hm = 6 + Math.abs(Math.cos(i * 2.3) * 14);
        ctx.lineTo(xm, baseY - hm);
      }
    }
    ctx.lineTo(W, baseY);
    ctx.lineTo(W, PLAY_H);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawJunkSats() {
    ctx.save();
    for (const s of junkSats) {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      ctx.scale(s.scale, s.scale);
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = '#1a1d22';
      ctx.strokeStyle = 'rgba(40, 40, 45, 0.8)';
      ctx.lineWidth = 1;
      if (s.type === 0) {
        // Solar-panel satellite
        ctx.fillRect(-4, -3, 8, 6);                     // body
        ctx.fillRect(-18, -2, 12, 4);                   // left panel
        ctx.fillRect(6, -2, 12, 4);                     // right panel
        ctx.strokeRect(-4, -3, 8, 6);
        ctx.strokeRect(-18, -2, 12, 4);
        ctx.strokeRect(6, -2, 12, 4);
      } else if (s.type === 1) {
        // Dish satellite
        ctx.fillRect(-3, -2, 6, 4);
        ctx.beginPath();
        ctx.arc(0, -6, 5, Math.PI, 2 * Math.PI);
        ctx.fill();
        ctx.stroke();
        ctx.fillRect(-10, -1, 6, 2);
        ctx.fillRect(4, -1, 6, 2);
      } else {
        // Tumbling debris box
        ctx.fillRect(-6, -4, 12, 8);
        ctx.strokeRect(-6, -4, 12, 8);
        ctx.strokeStyle = 'rgba(60, 60, 70, 0.6)';
        ctx.beginPath();
        ctx.moveTo(-6, 0); ctx.lineTo(6, 0);
        ctx.moveTo(0, -4); ctx.lineTo(0, 4);
        ctx.stroke();
      }
      ctx.restore();
    }
    ctx.restore();
  }

  function drawGround() {
    const T = theme();
    const gr = ctx.createLinearGradient(0, PLAY_H, 0, H);
    gr.addColorStop(0,   T.groundA);
    gr.addColorStop(0.5, T.groundB);
    gr.addColorStop(1,   '#000000');
    ctx.fillStyle = gr;
    ctx.fillRect(0, PLAY_H, W, GROUND_H);

    // Horizon seam
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = T.horizonGlow;
    ctx.strokeStyle = T.horizon;
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(0, PLAY_H + 0.5);
    ctx.lineTo(W, PLAY_H + 0.5);
    ctx.stroke();
    ctx.restore();

    // Jagged crack pattern
    ctx.strokeStyle = T.crackColor;
    ctx.lineWidth = 1;
    for (let cx = 0; cx < W; cx += 18) {
      const off = Math.sin(cx * 0.7) * 3;
      ctx.beginPath();
      ctx.moveTo(cx + off, PLAY_H + 4);
      ctx.lineTo(cx + off + 4, PLAY_H + GROUND_H * 0.55);
      ctx.stroke();
    }
  }

  function drawPipes() {
    for (const p of pipes) if (!p.destroyed) drawPipe(p);
  }

  // Floating garbage items in each gap — theme-specific debris set.
  function drawAllDebris() {
    for (const p of pipes) {
      if (p.destroyed) continue;
      const dy = p.driftY || 0;
      if (p.debris && !p.debris.collected) {
        const cx = p.x + PIPE_W / 2;
        const cy = p.top + p.gap / 2 + p.debris.offY + dy;
        const rot = frame * p.debris.spin + p.debris.phase;
        const bob = Math.sin(frame * 0.04 + p.debris.phase) * 3;
        ctx.save();
        if (p.debris.gold) {
          ctx.shadowBlur = 14;
          ctx.shadowColor = '#ffd85c';
        }
        ctx.translate(cx, cy + bob);
        ctx.rotate(rot);
        ctx.scale(p.debris.scale, p.debris.scale);
        drawDebrisItem(p.debris.kind);
        ctx.restore();
      }
      if (p.powerUp && !p.powerUp.collected) {
        const cx = p.x + PIPE_W / 2;
        const cy = p.top + p.gap / 2 + p.powerUp.offY + dy;
        const bob = Math.sin(frame * 0.05 + p.powerUp.phase) * 3;
        drawPowerUpCapsule(cx, cy + bob, p.powerUp.kind);
      }
    }
  }

  function drawPowerUpCapsule(cx, cy, kind) {
    const color = powerUpColor(kind);
    const pulse = 1 + Math.sin(frame * 0.12) * 0.08;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;
    // Outer ring
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 14 * pulse, 0, Math.PI * 2);
    ctx.stroke();
    // Inner disc
    ctx.fillStyle = 'rgba(20, 20, 30, 0.8)';
    ctx.beginPath();
    ctx.arc(0, 0, 11, 0, Math.PI * 2);
    ctx.fill();
    // Icon
    ctx.shadowBlur = 6;
    ctx.fillStyle = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    if (kind === 'shield') {
      ctx.beginPath();
      ctx.moveTo(0, -7);
      ctx.lineTo(6, -4); ctx.lineTo(6, 2); ctx.lineTo(0, 8);
      ctx.lineTo(-6, 2); ctx.lineTo(-6, -4);
      ctx.closePath(); ctx.stroke();
    } else if (kind === 'slow') {
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, -5); ctx.lineTo(0, 0); ctx.lineTo(4, 2); ctx.stroke();
    } else if (kind === 'magnet') {
      // Horseshoe magnet
      ctx.beginPath();
      ctx.arc(0, 2, 6, Math.PI, 0);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-6, 2); ctx.lineTo(-6, 6); ctx.moveTo(6, 2); ctx.lineTo(6, 6);
      ctx.stroke();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-7, 5, 3, 3);
      ctx.fillRect(4, 5, 3, 3);
    } else if (kind === 'missile') {
      ctx.beginPath();
      ctx.moveTo(-5, -3); ctx.lineTo(4, -3); ctx.lineTo(7, 0);
      ctx.lineTo(4, 3);   ctx.lineTo(-5, 3);
      ctx.closePath(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-5, -3); ctx.lineTo(-7, -5);
      ctx.moveTo(-5, 3);  ctx.lineTo(-7, 5);
      ctx.stroke();
    } else if (kind === 'ghost') {
      ctx.beginPath();
      ctx.arc(0, -1, 5, Math.PI, 0);
      ctx.lineTo(5, 6);
      ctx.lineTo(3, 4); ctx.lineTo(1, 6); ctx.lineTo(-1, 4); ctx.lineTo(-3, 6);
      ctx.lineTo(-5, 4); ctx.closePath();
      ctx.stroke();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-2, -1, 0.9, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 2, -1, 0.9, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.font = '900 10px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('×2', 0, 0);
    }
    ctx.restore();
  }

  const DEBRIS_DRAWERS = {};
  function drawDebrisItem(kind) {
    ctx.shadowBlur = 6;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    const fn = DEBRIS_DRAWERS[kind];
    if (fn) fn();
  }

  function drawBurger() {
    // Top bun
    ctx.fillStyle = '#e8a44a';
    ctx.beginPath();
    ctx.arc(0, -6, 11, Math.PI, 2 * Math.PI);
    ctx.fill();
    ctx.fillRect(-11, -6, 22, 2);
    // Sesame seeds
    ctx.fillStyle = '#fff4d0';
    ctx.beginPath(); ctx.arc(-5, -10, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 2, -12, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 7, -9,  1, 0, Math.PI * 2); ctx.fill();
    // Lettuce (green frill)
    ctx.fillStyle = '#7bc24e';
    ctx.beginPath();
    ctx.moveTo(-12, -4);
    for (let x = -11; x <= 11; x += 4) ctx.lineTo(x, -2 + (x % 8 === 0 ? -2 : 0));
    ctx.lineTo(12, -4); ctx.lineTo(12, -2); ctx.lineTo(-12, -2);
    ctx.closePath(); ctx.fill();
    // Patty
    ctx.fillStyle = '#6a3a1a';
    ctx.fillRect(-11, -2, 22, 5);
    // Bottom bun
    ctx.fillStyle = '#c08030';
    ctx.beginPath();
    ctx.moveTo(-11, 3);
    ctx.lineTo(11, 3);
    ctx.arc(0, 3, 11, 0, Math.PI);
    ctx.closePath();
    ctx.fill();
  }

  function drawFries() {
    // Red container
    ctx.fillStyle = '#c92a2a';
    ctx.beginPath();
    ctx.moveTo(-9, 4); ctx.lineTo(-11, 11); ctx.lineTo(11, 11); ctx.lineTo(9, 4);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#7a1414';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Golden M-style band
    ctx.fillStyle = '#ffd43b';
    ctx.fillRect(-9, 5, 18, 2);
    // Fries sticking out
    ctx.fillStyle = '#ffd86b';
    ctx.strokeStyle = '#a8761a';
    ctx.lineWidth = 0.5;
    for (let i = -4; i <= 4; i += 2) {
      const h = 9 + Math.abs(i);
      ctx.fillRect(i - 0.7, 3 - h, 1.4, h);
      ctx.strokeRect(i - 0.7, 3 - h, 1.4, h);
    }
  }

  function drawHeadphones() {
    // Headband arc
    ctx.strokeStyle = '#202020';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 2, 11, Math.PI + 0.25, 2 * Math.PI - 0.25);
    ctx.stroke();
    // Earcups
    ctx.fillStyle = '#282828';
    ctx.fillRect(-13, 0, 6, 10);
    ctx.fillRect(7, 0, 6, 10);
    // Cup foam
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(-12, 2, 4, 6);
    ctx.fillRect(8, 2, 4, 6);
    // Logo dots
    ctx.fillStyle = '#e04040';
    ctx.beginPath(); ctx.arc(-10, 5, 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(10, 5, 0.8, 0, Math.PI * 2); ctx.fill();

  function drawToilet() {
    // Tank
    ctx.fillStyle = '#e6ecef';
    ctx.fillRect(-7, -10, 14, 8);
    ctx.strokeStyle = '#6a7278';
    ctx.lineWidth = 1;
    ctx.strokeRect(-7, -10, 14, 8);

    ctx.fillRect(-2, -9, 4, 2);
    // Bowl
    ctx.fillStyle = '#f0f4f6';
    ctx.beginPath();
    ctx.moveTo(-10, -2);
    ctx.lineTo(10, -2);
    ctx.lineTo(7, 10);
    ctx.lineTo(-7, 10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7a828a';
    ctx.stroke();
    // Water (grimy post-apocalypse green)
    ctx.fillStyle = '#4a6a3a';
    ctx.beginPath();
    ctx.ellipse(0, 2, 7, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawDuck() {
    // Body
    ctx.fillStyle = '#ffd633';
    ctx.beginPath();
    ctx.ellipse(0, 3, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.beginPath();
    ctx.arc(6, -3, 5, 0, Math.PI * 2);
    ctx.fill();
    // Beak
    ctx.fillStyle = '#ff8a1c';
    ctx.beginPath();
    ctx.moveTo(9, -2); ctx.lineTo(14, -1); ctx.lineTo(9, 0);
    ctx.closePath(); ctx.fill();
    // Eye
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(7, -4, 0.9, 0, Math.PI * 2); ctx.fill();
    // Wing line
    ctx.strokeStyle = '#c39a14';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-3, 3); ctx.quadraticCurveTo(0, 6, 4, 3);
    ctx.stroke();
  }

  function drawTV() {
    // Cabinet
    ctx.fillStyle = '#6a5a3e';
    ctx.fillRect(-12, -7, 24, 14);
    ctx.strokeStyle = '#2a1f0f';
    ctx.lineWidth = 1;
    ctx.strokeRect(-12, -7, 24, 14);
    // Screen (dead static)
    ctx.fillStyle = '#1a1d22';
    ctx.fillRect(-9, -5, 17, 10);
    // Static noise lines
    ctx.strokeStyle = 'rgba(200, 200, 200, 0.3)';
    for (let ly = -4; ly < 5; ly += 2) {
      ctx.beginPath();
      ctx.moveTo(-9, ly); ctx.lineTo(8, ly);
      ctx.stroke();
    }
    // Knobs
    ctx.fillStyle = '#d0a04a';
    ctx.beginPath(); ctx.arc(10, -3, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(10, 2, 1.2, 0, Math.PI * 2); ctx.fill();
    // Bent antenna
    ctx.strokeStyle = '#9a9a9a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-4, -7); ctx.lineTo(-8, -14);
    ctx.moveTo(4, -7); ctx.lineTo(9, -12);
    ctx.stroke();
  }

  function drawPizza() {
    // Slice crust
    ctx.fillStyle = '#d9a058';
    ctx.beginPath();
    ctx.moveTo(-11, 8); ctx.lineTo(11, 8); ctx.lineTo(0, -10);

    ctx.beginPath();
    ctx.moveTo(-9, 7); ctx.lineTo(9, 7); ctx.lineTo(0, -7);

    ctx.beginPath(); ctx.arc(-3, 3, 1.6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, 1, 1.6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(-1, -3, 1.4, 0, Math.PI * 2); ctx.fill();

    // Body

  function drawShoe() {
    // Sole
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.moveTo(-12, 6); ctx.lineTo(10, 6); ctx.lineTo(12, 3); ctx.lineTo(-12, 3);
    ctx.closePath(); ctx.fill();
    // Upper
    ctx.fillStyle = '#a02a2a';
    ctx.beginPath();
    ctx.moveTo(-12, 3); ctx.lineTo(2, 3); ctx.lineTo(4, -3); ctx.lineTo(10, -3); ctx.lineTo(12, 3);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#2a0a0a';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // Laces
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 0.8;
    for (let lx = -8; lx < 2; lx += 3) {

      ctx.moveTo(lx, 3); ctx.lineTo(lx + 1, -1);
