  };
  DEBRIS_DRAWERS.skullbone = function() {
    ctx.fillStyle = '#d8cfb6';
    ctx.beginPath();
    ctx.arc(0, -1, 9, Math.PI, 2 * Math.PI);
    ctx.lineTo(7, 5); ctx.lineTo(4, 8); ctx.lineTo(2, 5);
    ctx.lineTo(0, 8); ctx.lineTo(-2, 5); ctx.lineTo(-4, 8); ctx.lineTo(-7, 5);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#6a5a3a'; ctx.lineWidth = 1; ctx.stroke();
    // Eye sockets
    ctx.fillStyle = '#120a05';
    ctx.beginPath(); ctx.arc(-3, -1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, -1, 2, 0, Math.PI * 2); ctx.fill();
    // Nose
    ctx.beginPath();
    ctx.moveTo(0, 2); ctx.lineTo(1, 4); ctx.lineTo(-1, 4);
    ctx.closePath(); ctx.fill();
  };
  DEBRIS_DRAWERS.ashheap = function() {
    ctx.fillStyle = '#3a3030';
    ctx.beginPath();
    ctx.moveTo(-12, 8); ctx.quadraticCurveTo(-6, -5, 0, -4);
    ctx.quadraticCurveTo(6, -3, 12, 8);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#141010'; ctx.lineWidth = 1; ctx.stroke();
    // Embers inside
    ctx.fillStyle = '#ff5a20';
    ctx.shadowBlur = 6; ctx.shadowColor = '#ff5a20';
    ctx.beginPath(); ctx.arc(-3, 3, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, 1, 0.9, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(1, 6, 0.7, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  };
  DEBRIS_DRAWERS.lavashard = function() {
    // Hot obsidian shard — sharp polygon with molten cracks
    ctx.fillStyle = '#15050a';
    ctx.beginPath();
    ctx.moveTo(-10, 6); ctx.lineTo(-4, -9); ctx.lineTo(6, -8);
    ctx.lineTo(11, 2);  ctx.lineTo(3, 9);   ctx.lineTo(-6, 9);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
    // Lava core
    ctx.shadowBlur = 10; ctx.shadowColor = '#ff3a0a';
    ctx.fillStyle = '#ff5a10';
    ctx.beginPath();
    ctx.moveTo(-2, -4); ctx.lineTo(4, -1); ctx.lineTo(2, 4); ctx.lineTo(-3, 1);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
  };

  function drawPipe(p) {
    const dy = p.driftY || 0;
    const botH = PLAY_H - (p.top + p.gap);
    if (p.type === 'cargo') {
      drawCargo(p.x, dy,                   PIPE_W, p.top, true,  p.seed);
      drawCargo(p.x, p.top + p.gap + dy,   PIPE_W, botH,  false, p.seed + 13);
    } else {
      drawJunk(p.x, dy,                    PIPE_W, p.top, true,  p.topShape, p.seed, p.antennas);
      drawJunk(p.x, p.top + p.gap + dy,    PIPE_W, botH,  false, p.botShape, p.seed + 13, p.antennas);
    }
  }

  // Rectangular cargo container — theme-tinted hull + hazard band
  function drawCargo(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    const C = theme().cargo;
    ctx.save();
    ctx.translate(x, y);
    const pad = 4;
    const containerW = w + pad * 2;
    const containerX = -pad;

    // Body with themed metallic gradient
    const grad = ctx.createLinearGradient(containerX, 0, containerX + containerW, 0);
    grad.addColorStop(0,   C.grad[0]);
    grad.addColorStop(0.4, C.grad[1]);
    grad.addColorStop(0.7, C.grad[2]);
    grad.addColorStop(1,   C.grad[3]);
    ctx.fillStyle = grad;
    ctx.fillRect(containerX, 0, containerW, h);

    // Hazard stripe band at the gap-facing end
    const bandH = 18;
    const bandY = isTop ? h - bandH : 0;
    ctx.save();
    ctx.beginPath();
    ctx.rect(containerX, bandY, containerW, bandH);
    ctx.clip();
    const stripeW = 10;
    for (let sx = containerX - bandH; sx < containerX + containerW + bandH; sx += stripeW) {
      ctx.fillStyle = (Math.floor((sx - containerX) / stripeW) % 2 === 0) ? C.hazardA : C.hazardB;
      ctx.beginPath();
      ctx.moveTo(sx, bandY);
      ctx.lineTo(sx + stripeW, bandY);
      ctx.lineTo(sx + stripeW - bandH, bandY + bandH);
      ctx.lineTo(sx - bandH, bandY + bandH);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    ctx.strokeStyle = C.rivet;
    ctx.lineWidth = 1.2;
    ctx.strokeRect(containerX + 0.5, bandY + 0.5, containerW - 1, bandH - 1);

    // Rivets
    ctx.fillStyle = C.rivet;
    for (let ry = 4; ry < h - 4; ry += 10) {
      ctx.beginPath(); ctx.arc(containerX + 3, ry, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(containerX + containerW - 3, ry, 1.2, 0, Math.PI * 2); ctx.fill();
    }

    // Weathering streaks
    ctx.strokeStyle = C.weather;
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const wx = containerX + 6 + srand(seed + i * 9) * (containerW - 12);
      const wy0 = isTop ? 2 : h - 2;
      const wy1 = wy0 + (isTop ? 14 + srand(seed + i * 3) * 20 : -(14 + srand(seed + i * 3) * 20));
      ctx.beginPath();
      ctx.moveTo(wx, wy0);
      ctx.lineTo(wx + (srand(seed + i * 5) - 0.5) * 3, wy1);
      ctx.stroke();
    }
    // Rust/biome spots
    const rustBase = C.rust;
    for (let i = 0; i < 5; i++) {
      const rx = containerX + srand(seed + 100 + i) * containerW;
      const ry = srand(seed + 200 + i) * h;
      const rr = 1 + srand(seed + 300 + i) * 2;
      ctx.fillStyle = rustBase;
      ctx.beginPath();
      ctx.arc(rx, ry, rr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Outer edge shadow
    ctx.strokeStyle = C.edge;
    ctx.lineWidth = 1.4;
    ctx.strokeRect(containerX + 0.5, 0.5, containerW - 1, h - 1);
    ctx.restore();
  }

  // Irregular junk polygon — theme-tinted hull + antennas
  function drawJunk(x, y, w, h, isTop, pts, seed, antennas) {
    if (h <= 0 || !pts) return;
    const J = theme().junk;
    const tipY = isTop ? h : 0;

    ctx.save();
    ctx.translate(x, y);

    const g = ctx.createLinearGradient(0, 0, w, 0);
    g.addColorStop(0,   J.grad[0]);
    g.addColorStop(0.5, J.grad[1]);
    g.addColorStop(1,   J.grad[2]);
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();

    ctx.strokeStyle = J.outline;
    ctx.lineWidth = 1.3;
    ctx.stroke();

    ctx.strokeStyle = J.rim;
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Rust streaks and bolts inside the polygon
    ctx.save();
    ctx.clip();
    ctx.strokeStyle = J.rust;
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const rx = srand(seed + 50 + i) * w;
      const ry0 = srand(seed + 60 + i) * h;
      const ry1 = ry0 + (isTop ? 10 + srand(seed + 70 + i) * 18 : -(10 + srand(seed + 70 + i) * 18));
      ctx.beginPath();
      ctx.moveTo(rx, ry0);
      ctx.lineTo(rx + (srand(seed + 80 + i) - 0.5) * 3, ry1);
      ctx.stroke();
    }
    ctx.fillStyle = J.bolt;
    for (let i = 0; i < 4; i++) {
      const bx = 6 + srand(seed + 150 + i) * (w - 12);
      const by = 6 + srand(seed + 160 + i) * (h - 12);
      ctx.beginPath();
      ctx.arc(bx, by, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Antennas with themed LED colours
    if (antennas) {
      ctx.strokeStyle = J.antennaMetal;
      ctx.fillStyle = J.antennaLed;
      ctx.lineWidth = 1.2;
      for (const a of antennas) {
        const ax = w * (0.2 + a.yFrac * 0.6);
        const ay = tipY;
        const dir = isTop ? 1 : -1;
        const endX = ax + Math.sin(a.angle) * a.len;
        const endY = ay + Math.cos(a.angle) * a.len * dir;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(endX, endY, a.tipR, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // Deterministic pseudo-random from a seed
  function srand(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  function drawExhaust() {
    if (exhaust.length === 0) return;
    ctx.save();
    for (const p of exhaust) {
      ctx.globalAlpha = Math.max(0, p.a);
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      if (p.dirty) {
        // Greasy black smoke
        g.addColorStop(0, 'rgba(60, 45, 35, 0.85)');
        g.addColorStop(0.7, 'rgba(30, 25, 20, 0.4)');
        g.addColorStop(1, 'rgba(0, 0, 0, 0)');
      } else {
        // Dirty orange flame/smoke
        g.addColorStop(0, 'rgba(255, 140, 50, 0.9)');
        g.addColorStop(0.5, 'rgba(200, 90, 40, 0.55)');
        g.addColorStop(1, 'rgba(50, 30, 20, 0)');
      }
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSparks() {
    if (sparks.length === 0) return;
    for (const s of sparks) {
      ctx.save();
      ctx.shadowBlur = 12;
      ctx.shadowColor = s.glow;
      ctx.globalAlpha = Math.max(0, s.life);
      ctx.fillStyle = s.color;
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      const sz = s.size * (0.5 + s.life * 0.5);
      if (s.shape === 'tri') {
        ctx.beginPath();
        ctx.moveTo(0, -sz * 0.8);
        ctx.lineTo(sz * 0.7, sz * 0.6);
        ctx.lineTo(-sz * 0.7, sz * 0.6);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillRect(-sz / 2, -sz / 2, sz, sz);
      }
      ctx.restore();
    }
  }

  function drawBird() {
    // Asymmetrical boxy Garbage Hauler — rust, patches, and a struggling engine
    ctx.save();

    // Shield bubble rendered underneath the ship
    if (shieldCharges > 0) drawShieldBubble();
    // Magnet pulse ring
    if (magnetFrames > 0) drawMagnetRing();
    // Ghost + i-frame transparency
    if (ghostFrames > 0) ctx.globalAlpha = 0.55 + 0.25 * Math.sin(frame * 0.3);
    else if (invulnFrames > 0 && Math.floor(frame / 3) % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }

    // Constant engine-wobble vibration so the whole ship shakes slightly
    const wobbleX = (Math.random() - 0.5) * 1.4;
    const wobbleY = (Math.random() - 0.5) * 1.4;
    ctx.translate(bird.x + wobbleX, bird.y + wobbleY);

    // Base tilt from velocity, clamped to ±20°
    const tilt = Math.max(-0.349, Math.min(0.349, bird.vy * 0.1));

    // Front of the ship uses the base tilt
    ctx.save();
    ctx.rotate(tilt);
    drawHaulerFront();
    ctx.restore();

    // Back / engine pivots slightly further — mechanical hinge
    ctx.save();
    ctx.rotate(tilt * 1.45);
    drawHaulerBack();
    if (thrusterFrames > 0) drawDirtyFlame();
    ctx.restore();

    // Burst halo on score (kept as a sickly amber instead of cyan)
    if (burstFrames > 0) {
      const burstT = burstFrames / 14;
      ctx.save();
      ctx.rotate(tilt);
      ctx.globalAlpha = burstT * 0.55;
      ctx.shadowBlur = 16;
      ctx.shadowColor = '#ffb74d';
      ctx.strokeStyle = '#ffb74d';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, BIRD_R * (1.3 + (1 - burstT) * 0.4), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  function drawHaulerFront() {
    const s = SHIPS[selectedShip];
    const nose = BIRD_R * 1.15;
    const cabinH = BIRD_R * 1.1;

    ctx.save();
    ctx.shadowBlur = 6;
    ctx.shadowColor = 'rgba(0,0,0,0.55)';

    // Main body rectangle — per-ship vertical gradient
    const bodyGrad = ctx.createLinearGradient(0, -cabinH / 2, 0, cabinH / 2);
    bodyGrad.addColorStop(0,   s.bodyTop);
    bodyGrad.addColorStop(0.5, s.bodyMid);
    bodyGrad.addColorStop(1,   s.bodyBot);
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-BIRD_R * 0.1, -cabinH / 2, nose + BIRD_R * 0.1, cabinH);

    // Secondary top cargo block
    ctx.fillStyle = s.secondary;
    ctx.fillRect(BIRD_R * 0.2, -cabinH / 2 - BIRD_R * 0.45, BIRD_R * 0.7, BIRD_R * 0.5);
    ctx.restore();

    // Outlines
    ctx.strokeStyle = '#1a100a';
    ctx.lineWidth = 1.2;
    ctx.strokeRect(-BIRD_R * 0.1 + 0.5, -cabinH / 2 + 0.5, nose + BIRD_R * 0.1 - 1, cabinH - 1);
    ctx.strokeRect(BIRD_R * 0.2 + 0.5, -cabinH / 2 - BIRD_R * 0.45 + 0.5, BIRD_R * 0.7 - 1, BIRD_R * 0.5 - 1);

    // Diagonal hazard stripes on the cargo block
    ctx.save();
    ctx.beginPath();
    ctx.rect(BIRD_R * 0.2 + 1, -cabinH / 2 - BIRD_R * 0.45 + 1, BIRD_R * 0.7 - 2, BIRD_R * 0.5 - 2);
    ctx.clip();
    for (let sx = -BIRD_R; sx < BIRD_R * 2; sx += 6) {
      ctx.fillStyle = (Math.floor(sx / 6) % 2 === 0) ? '#ffd60a' : '#1a1a1a';
      ctx.beginPath();
      ctx.moveTo(sx, -cabinH / 2 - BIRD_R * 0.45);
      ctx.lineTo(sx + 3, -cabinH / 2 - BIRD_R * 0.45);
      ctx.lineTo(sx + 3 - BIRD_R * 0.5, -cabinH / 2 + BIRD_R * 0.05);
      ctx.lineTo(sx - BIRD_R * 0.5, -cabinH / 2 + BIRD_R * 0.05);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // Cockpit window — colour per ship
    ctx.save();
    ctx.shadowBlur = 6;
    ctx.shadowColor = s.cockpitGlow;
    ctx.fillStyle = s.cockpit;
    ctx.fillRect(nose - BIRD_R * 0.35, -BIRD_R * 0.18, BIRD_R * 0.3, BIRD_R * 0.28);
    ctx.strokeStyle = '#2a1a05';
    ctx.lineWidth = 1;
    ctx.strokeRect(nose - BIRD_R * 0.35 + 0.5, -BIRD_R * 0.18 + 0.5, BIRD_R * 0.3 - 1, BIRD_R * 0.28 - 1);
    ctx.beginPath();
    ctx.moveTo(nose - BIRD_R * 0.35, 0);
    ctx.lineTo(nose - BIRD_R * 0.05, 0);
    ctx.stroke();
    ctx.restore();

    // Rivets along the seams
    ctx.fillStyle = '#1a0a05';
    for (let rx = 0; rx < nose; rx += 5) {
      ctx.beginPath(); ctx.arc(rx, -cabinH / 2 + 2, 0.9, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(rx, cabinH / 2 - 2, 0.9, 0, Math.PI * 2); ctx.fill();
    }

    // Weathering streaks
    ctx.strokeStyle = 'rgba(58, 28, 14, 0.75)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(BIRD_R * 0.4, -cabinH / 2 + 3);
    ctx.lineTo(BIRD_R * 0.55, cabinH / 2 - 2);
    ctx.moveTo(BIRD_R * 0.85, -cabinH / 2 + 4);
    ctx.lineTo(BIRD_R * 0.95, cabinH / 2 - 3);
    ctx.stroke();

    // Warning light on the roof — colour per ship
    ctx.fillStyle = s.warning;
    ctx.beginPath();
    ctx.arc(BIRD_R * 0.55, -cabinH / 2 - BIRD_R * 0.5, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawHaulerBack() {
    const s = SHIPS[selectedShip];
    const tailX = -BIRD_R * 0.1;
    const blockW = BIRD_R * 0.55;
    const blockH = BIRD_R * 1.4;

    ctx.save();
    ctx.shadowBlur = 5;
    ctx.shadowColor = 'rgba(0,0,0,0.55)';

    // Engine block — per-ship colour
    ctx.fillStyle = s.engine;
    ctx.fillRect(tailX - blockW, -blockH / 2, blockW, blockH);
    ctx.strokeStyle = s.engineEdge;
    ctx.lineWidth = 1.2;
    ctx.strokeRect(tailX - blockW + 0.5, -blockH / 2 + 0.5, blockW - 1, blockH - 1);

    // Rust patches on the engine
    ctx.fillStyle = s.rust;
    ctx.beginPath(); ctx.arc(tailX - blockW * 0.3, -blockH * 0.2, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(tailX - blockW * 0.7, blockH * 0.15, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(tailX - blockW * 0.45, blockH * 0.3, 1.4, 0, Math.PI * 2); ctx.fill();

    // Two stacked exhaust pipes poking out the back
    ctx.fillStyle = '#1a1a1e';
    ctx.fillRect(tailX - blockW - BIRD_R * 0.25, -blockH * 0.3, BIRD_R * 0.28, BIRD_R * 0.22);
    ctx.fillRect(tailX - blockW - BIRD_R * 0.25,  blockH * 0.08, BIRD_R * 0.28, BIRD_R * 0.22);
    ctx.strokeRect(tailX - blockW - BIRD_R * 0.25 + 0.5, -blockH * 0.3 + 0.5, BIRD_R * 0.28 - 1, BIRD_R * 0.22 - 1);
    ctx.strokeRect(tailX - blockW - BIRD_R * 0.25 + 0.5,  blockH * 0.08 + 0.5, BIRD_R * 0.28 - 1, BIRD_R * 0.22 - 1);
    ctx.restore();
  }

  function drawMagnetRing() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff6b9d';
    const r = 120 + Math.sin(frame * 0.18) * 6;
    ctx.strokeStyle = 'rgba(255, 107, 157, 0.25)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = 'rgba(255, 107, 157, 0.45)';
    ctx.setLineDash([4, 8]);
    ctx.beginPath(); ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function drawShieldBubble() {
    ctx.save();
    const r = BIRD_R + 10 + Math.sin(frame * 0.15) * 1.5;
    ctx.translate(bird.x, bird.y);
    ctx.shadowBlur = 16;
    ctx.shadowColor = '#9bd2ff';
    // Glowing ring
    ctx.strokeStyle = 'rgba(155, 210, 255, 0.85)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();
    // Faint fill
    ctx.fillStyle = 'rgba(155, 210, 255, 0.1)';
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // Charge pips around the top
    for (let i = 0; i < shieldCharges; i++) {
      const a = -Math.PI / 2 + (i - (shieldCharges - 1) / 2) * 0.35;
      ctx.fillStyle = '#9bd2ff';
      ctx.beginPath();
      ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawDirtyFlame() {
    // Short flickering orange plume out the main exhaust
    const tailX = -BIRD_R * 0.65 - BIRD_R * 0.25;
    const flick = 0.7 + Math.random() * 0.3;
    const len = (BIRD_R * 0.9 + Math.random() * 5) * flick;

    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff7a00';

    const g = ctx.createLinearGradient(tailX, 0, tailX - len, 0);
    g.addColorStop(0,   'rgba(255, 230, 140, 0.9)');
    g.addColorStop(0.4, 'rgba(255, 110, 20, 0.7)');
    g.addColorStop(1,   'rgba(40, 20, 10, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(tailX, -BIRD_R * 0.28);
    ctx.lineTo(tailX - len, 0);
    ctx.lineTo(tailX, BIRD_R * 0.28);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawScore() {
    if (state === STATE_OVER) return;
    const text = String(score).padStart(3, '0');
    const size = Math.round(H * 0.075);
    const y = Math.max(80, H * 0.14);
    const pulseScale = 1 + scorePulse * 0.5;

    ctx.save();
    ctx.translate(W / 2, y);
    ctx.scale(pulseScale, pulseScale);
    ctx.font = 'bold ' + size + 'px "Courier New", "Lucida Console", monospace';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ffb347';
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#3a1a05';
    ctx.fillStyle = '#ffd280';
    ctx.strokeText(text, 0, 0);
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  function drawComboHud() {
    if (state !== STATE_PLAY) return;
    const mul = comboMultiplier();
    if (combo < 2 && mul === 1) return;
    const text = 'x' + mul + ' · ' + combo;
    const size = Math.round(H * 0.035);
    ctx.save();
    ctx.font = 'bold ' + size + 'px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ffb347';
    ctx.fillStyle = mul >= 3 ? '#ffe066' : '#ffd280';
    const y = Math.max(80, H * 0.14) + size + 6;
    ctx.fillText(text, W / 2, y);
    ctx.restore();
  }

  function drawFlash() {
    if (flashAlpha > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha + ')';
      ctx.fillRect(0, 0, W, H);
    }
  }

  function render() {
    ctx.save();
    if (shakeFrames > 0) {
      // Offset by a random −5..+5 on each axis
      const ox = (Math.random() * 2 - 1) * 5;
      const oy = (Math.random() * 2 - 1) * 5;
      ctx.translate(ox, oy);
      shakeFrames--;
    }
    drawBackground();
    drawAllDebris();
    drawPipes();
    drawGround();
    drawExhaust();
    drawSparks();
    drawPickupSparks();
    drawMissiles();
    drawBird();
    drawScore();
    drawComboHud();
    drawFlash();
    ctx.restore();
  }

  let last = 0;
  function loop(t) {
    // Fixed-ish step to smooth iOS variable rAF
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ---------- Overlay / DOM ----------
  const overlay = document.getElementById('overlay');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScore');
  const finalShipEl = document.getElementById('finalShip');
  const restartBtn = document.getElementById('restartBtn');
  const shipBtns = Array.from(document.querySelectorAll('.shipBtn'));
  const hudShield = document.getElementById('pwShield');
  const hudSlow   = document.getElementById('pwSlow');
  const hudDouble = document.getElementById('pwDouble');
  const hudMagnet = document.getElementById('pwMagnet');
  const hudGhost  = document.getElementById('pwGhost');

  // Miniature ship thumbnails inside the picker buttons — use the same
  // palette the in-game ship uses so selection matches flight.
  function drawShipThumbs() {
    for (const btn of shipBtns) {
      const key = btn.dataset.ship;
      const cvs = btn.querySelector('.shipThumb');
      const c = cvs.getContext('2d');
      c.clearRect(0, 0, cvs.width, cvs.height);
      c.save();
      c.translate(cvs.width / 2, cvs.height / 2 + 2);
      const s = SHIPS[key];
      const scl = 0.8 + (s.r - 15) * 0.03;
      c.scale(scl, scl);

      // Main body gradient (matches bodyTop/Mid/Bot)
      const g = c.createLinearGradient(0, -10, 0, 10);
      g.addColorStop(0,   s.bodyTop);
      g.addColorStop(0.5, s.bodyMid);
      g.addColorStop(1,   s.bodyBot);
      c.fillStyle = g;
      c.fillRect(-18, -10, 28, 20);

      // Engine block
      c.fillStyle = s.engine;
      c.fillRect(-30, -6, 12, 14);
      // Secondary roof cargo
      c.fillStyle = s.secondary;
      c.fillRect(-2, -16, 10, 6);

      // Cockpit
      c.shadowBlur = 4;
      c.shadowColor = s.cockpitGlow;
      c.fillStyle = s.cockpit;
      c.fillRect(5, -5, 5, 7);
      c.shadowBlur = 0;

      // Outlines
      c.strokeStyle = '#1a0a05';
      c.lineWidth = 1.2;
      c.strokeRect(-18, -10, 28, 20);
      c.strokeRect(-30, -6, 12, 14);
      c.strokeRect(-2, -16, 10, 6);

      // Roof warning light
      c.fillStyle = s.warning;
      c.beginPath();
      c.arc(4, -17, 1.2, 0, Math.PI * 2);
      c.fill();

      // Exhaust plume
      c.shadowBlur = 6; c.shadowColor = '#ff7a00';
      c.fillStyle = '#ffb347';
      c.fillRect(-36, -1, 5, 3);
      c.restore();
    }
  }
  drawShipThumbs();

  function setSelectedShip(key) {
    selectedShip = key;
    for (const btn of shipBtns) {
      btn.classList.toggle('selected', btn.dataset.ship === key);
    }
  }

  function launchWithSelected() {
    applyShipStats(selectedShip);
    reset();
    state = STATE_PLAY;
    bird.x = Math.round(W * BIRD_X_FRAC);
    bird.vy = FLAP;
    thrusterFrames = 5;
    hideOverlay();
  }

  // IMPORTANT: hook on touchstart and stop propagation so the stage's
  // touchstart (which launches the game) never sees the tap. Otherwise the
  // stage handler fires first with selectedShip unchanged → you'd always
  // launch as the previously-selected ship (Hauler by default).
  for (const btn of shipBtns) {
    const handler = function(e) {
      e.stopPropagation();
      if (e.cancelable) e.preventDefault();
      const key = btn.dataset.ship;
      setSelectedShip(key);
      if (state === STATE_READY) launchWithSelected();
    };
    btn.addEventListener('touchstart', handler, { passive: false });
    btn.addEventListener('click', handler);
  }

  // Theme picker — only changes the world palette; does not launch the game.
  const themeBtns = Array.from(document.querySelectorAll('.themeBtn'));
  function setSelectedTheme(key) {
    if (!THEMES[key]) return;
    selectedTheme = key;
    for (const btn of themeBtns) {
      btn.classList.toggle('selected', btn.dataset.theme === key);
    }
    try { localStorage.setItem('dlx_theme_v2', key); } catch (e) {}
  }
  try {
    const saved = localStorage.getItem('dlx_theme_v2');
    if (saved && THEMES[saved]) setSelectedTheme(saved);
  } catch (e) {}
  for (const btn of themeBtns) {
    const h = function(e) {
      e.stopPropagation();
      if (e.cancelable) e.preventDefault();
      setSelectedTheme(btn.dataset.theme);
    };
    btn.addEventListener('touchstart', h, { passive: false });
    btn.addEventListener('click', h);
  }

  function showStart() {
    overlay.classList.add('show');
    startScreen.classList.remove('hidden');
    gameOverScreen.classList.add('hidden');
    refreshHud();
  }
  function hideOverlay() {
    overlay.classList.remove('show');
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
  }
  function showGameOver() {
    finalScoreEl.textContent = String(score);
    bestScoreEl.textContent = String(best);
    if (finalShipEl) finalShipEl.textContent = SHIPS[selectedShip].label;
    overlay.classList.add('show');
    startScreen.classList.add('hidden');
    gameOverScreen.classList.remove('hidden');
  }

  function refreshHud() {
    setHud(hudShield, shieldCharges > 0, shieldCharges / 3);
    setHud(hudSlow,   slowFrames > 0,    slowFrames   / 300);
    setHud(hudDouble, doubleFrames > 0,  doubleFrames / 360);
    setHud(hudMagnet, magnetFrames > 0,  magnetFrames / 360);
    setHud(hudGhost,  ghostFrames > 0,   ghostFrames  / 120);
  }
  function setHud(el, active, frac) {
    if (!el) return;
    el.classList.toggle('active', !!active);
    const fill = el.querySelector('.pwFill');
    if (fill) fill.style.transform = 'scaleX(' + Math.max(0, Math.min(1, frac)) + ')';
  }

  function restart() {
    reset();
    state = STATE_READY;
    showStart();
  }

  function handleTouchStart(e) {
    // Let ship buttons handle themselves (they stopPropagation on touchstart,
    // but check target defensively so the click fallback works too)
    if (e && e.target && e.target.closest &&
        (e.target.closest('.shipBtn') || e.target.closest('.themeBtn'))) return;
    if (e && e.cancelable) e.preventDefault();
    audio(); // unlock WebAudio on the first user gesture (iOS requirement)
    if (state === STATE_OVER) return;
    if (state === STATE_READY) {
      // Tapping anywhere outside the ship buttons launches with the
      // currently highlighted ship (default HAULER).
      launchWithSelected();
      return;
    }
    flap();
  }

  const stage = document.getElementById('stage');
  stage.addEventListener('touchstart', handleTouchStart, { passive: false });
  stage.addEventListener('touchmove', function(e){ if (e.cancelable) e.preventDefault(); }, { passive: false });
  stage.addEventListener('touchend', function(e){ if (e.cancelable) e.preventDefault(); }, { passive: false });
  // Click fallback for desktop Safari / testing
  stage.addEventListener('click', function(e) {
    if (e.target.closest('#restartBtn')) return;
    handleTouchStart(e);
  });

  restartBtn.addEventListener('touchend', function(e) {
    e.stopPropagation();
    e.preventDefault();
    restart();
  }, { passive: false });
  // Safari sometimes needs click fallback inside PWA
  restartBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    restart();
  });

  // Prevent iOS gestures that disrupt gameplay
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('dblclick', function(e){ e.preventDefault(); });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function() {
    setTimeout(resize, 150);
  });

  // Boot
  resize();
  reset();
  bestScoreEl.textContent = String(best);
  showStart();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
