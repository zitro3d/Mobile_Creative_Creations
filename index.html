// ── Canvas & resize ───────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const video=document.getElementById('v');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// ── Palette ───────────────────────────────────────────────────────
const C={

  ora:'#FF8833', pnk:'#FF55BB',pur:'#AA44FF',sky:'#44DDFF',
  red:'#FF5544', lim:'#88FF44',wht:'#EEEEFF', blu:'#5599FF'

const BEAM_COLS=[C.cyan,C.yel,C.ora,C.red,C.grn,C.pnk,C.sky,C.pur];
const FINGER_COLS=[C.pnk,C.cyan,C.yel,C.grn,C.ora];

const TIP_DIP=[3,7,11,15,19];
const HAND_CONNECTIONS=[

  [5,9],[9,13],[13,17],[0,17]

for(let i=0;i<5;i++) for(let j=i+1;j<5;j++) BAND_PAIRS.push([i,j]);
const HAND_LM=[
  [0.50,0.90],[0.35,0.80],[0.22,0.68],[0.14,0.55],[0.08,0.42],
  [0.43,0.63],[0.39,0.43],[0.37,0.28],[0.35,0.14],

];
// Z-depth per landmark: 0=farthest back (wrist), 0.65=closest (fingertips)
const HAND_Z=[
  0.00,                          // 0: wrist
  0.15,0.25,0.38,0.55,          // 1-4: thumb
  0.20,0.32,0.46,0.65,          // 5-8: index
  0.18,0.30,0.44,0.62,          // 9-12: middle
  0.16,0.28,0.42,0.60,          // 13-16: ring
  0.14,0.25,0.38,0.55,          // 17-20: pinky
];


// ── Game constants ────────────────────────────────────────────────
const SNAP_ARM=110;   // px: stretch beyond this to arm slingshot
const SNAP_FIRE=62;   // px: snap below this to fire
const PINCH_TH=45;    // px: thumb+index pinch for blast

// ── Rocket type definitions ───────────────────────────────────────
const ROCKET_TYPES={
  scout:      {hp:1,sz:26,points:100,speedBase:55},
  cruiser:    {hp:2,sz:38,points:250,speedBase:36},
  dreadnought:{hp:3,sz:50,points:500,speedBase:20},
};

// ── Wave definitions ──────────────────────────────────────────────
const WAVE_DEFS=[
  {scouts:2,cruisers:0,dreads:0,sm:1.0},
  {scouts:3,cruisers:0,dreads:0,sm:1.1},
  {scouts:2,cruisers:1,dreads:0,sm:1.1},
  {scouts:4,cruisers:0,dreads:0,sm:1.2},
  {scouts:2,cruisers:1,dreads:1,sm:1.2},
  {scouts:3,cruisers:2,dreads:0,sm:1.3},
];
function getWaveDef(w){
  if(w<=WAVE_DEFS.length) return WAVE_DEFS[w-1];
  const ex=w-WAVE_DEFS.length;
  return{scouts:3+Math.floor(ex*0.7),cruisers:1+Math.floor(ex*0.4),dreads:Math.floor(ex*0.25),sm:1.3+ex*0.09};
}


// ── Procedural background ─────────────────────────────────────────
let bgCanvas=null;
function buildBg(){
  const W=430,H=932;
  const off=document.createElement('canvas');
  off.width=W;off.height=H;
  const oc=off.getContext('2d');
  oc.fillStyle='#040408';oc.fillRect(0,0,W,H);
  const id=oc.getImageData(0,0,W,H);const d=id.data;
  for(let i=0;i<d.length;i+=4){const n=(Math.random()*18)|0;d[i]=n;d[i+1]=n;d[i+2]=n+3;d[i+3]=255;}
  oc.putImageData(id,0,0);
  for(let i=0;i<220;i++){
    oc.beginPath();oc.arc(Math.random()*W,Math.random()*H,Math.random()*1.2+0.2,0,Math.PI*2);
    oc.fillStyle=`rgba(255,255,255,${0.2+Math.random()*0.7})`;oc.fill();
  }
  const rv=oc.createRadialGradient(W/2,H/2,H*0.28,W/2,H/2,H*0.75);
  rv.addColorStop(0,'rgba(0,0,0,0)');rv.addColorStop(1,'rgba(0,0,0,0.82)');
  oc.fillStyle=rv;oc.fillRect(0,0,W,H);
  const lg=oc.createLinearGradient(0,0,W*0.28,0);
  lg.addColorStop(0,'rgba(0,0,0,0.78)');lg.addColorStop(1,'rgba(0,0,0,0)');
  oc.fillStyle=lg;oc.fillRect(0,0,W,H);
  const rg=oc.createLinearGradient(W,0,W*0.72,0);
  rg.addColorStop(0,'rgba(0,0,0,0.78)');rg.addColorStop(1,'rgba(0,0,0,0)');
  oc.fillStyle=rg;oc.fillRect(0,0,W,H);
  const tg=oc.createLinearGradient(0,0,0,H*0.12);
  tg.addColorStop(0,'rgba(0,0,0,0.65)');tg.addColorStop(1,'rgba(0,0,0,0)');
  oc.fillStyle=tg;oc.fillRect(0,0,W,H);
  const bg2=oc.createLinearGradient(0,H,0,H*0.85);
  bg2.addColorStop(0,'rgba(0,0,0,0.7)');bg2.addColorStop(1,'rgba(0,0,0,0)');
  oc.fillStyle=bg2;oc.fillRect(0,0,W,H);
  bgCanvas=off;
}
buildBg();
function drawBg(){ctx.drawImage(bgCanvas,0,0,canvas.width,canvas.height);}

// ── Audio ─────────────────────────────────────────────────────────
let aCtx=null;
function ensureAudio(){
  if(!aCtx) aCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(aCtx.state==='suspended') aCtx.resume();
}
function mkDistortion(amount=80){
  const ws=aCtx.createWaveShaper();
  const n=256,curve=new Float32Array(n),k=amount;
  for(let i=0;i<n;i++){const x=i*2/n-1;curve[i]=(3+k)*x*20*Math.PI/180/(Math.PI+k*Math.abs(x));}
  ws.curve=curve;ws.oversample='4x';return ws;
}
function playSnap(){
  if(!aCtx)return;const t=aCtx.currentTime;
  const o=aCtx.createOscillator(),g=aCtx.createGain();
  o.connect(g);g.connect(aCtx.destination);
  o.type='square';o.frequency.setValueAtTime(320,t);o.frequency.exponentialRampToValueAtTime(80,t+0.08);
  g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
  o.start(t);o.stop(t+0.1);
}
function playTwang(idx){
  if(!aCtx)return;const t=aCtx.currentTime;
  const notes=[220,247,277,311,349,392,440,494,523,587];
  const f=notes[idx%notes.length];
  const o=aCtx.createOscillator(),dist=mkDistortion(60),g=aCtx.createGain();
  o.connect(dist);dist.connect(g);g.connect(aCtx.destination);
  o.type='sawtooth';o.frequency.setValueAtTime(f,t);
  o.frequency.setValueAtTime(f*1.05,t+0.02);o.frequency.exponentialRampToValueAtTime(f*0.96,t+0.4);
  g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
  o.start(t);o.stop(t+0.5);
}
function playSlingShot(stretch){
  if(!aCtx)return;const t=aCtx.currentTime;
  const f=380+Math.min(stretch,250)*1.4;
  const o=aCtx.createOscillator(),dist=mkDistortion(90),g=aCtx.createGain();
  o.connect(dist);dist.connect(g);g.connect(aCtx.destination);
  o.type='sawtooth';o.frequency.setValueAtTime(f*1.3,t);o.frequency.exponentialRampToValueAtTime(f*0.45,t+0.2);
  g.gain.setValueAtTime(0.13,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
  o.start(t);o.stop(t+0.28);
}
function playBlast(){
  if(!aCtx)return;const t=aCtx.currentTime;
  const o1=aCtx.createOscillator(),o2=aCtx.createOscillator();
  const dist=mkDistortion(120),g=aCtx.createGain();
  o1.connect(dist);o2.connect(dist);dist.connect(g);g.connect(aCtx.destination);
  o1.type='sawtooth';o1.frequency.setValueAtTime(220,t);o1.frequency.exponentialRampToValueAtTime(110,t+0.2);
  o2.type='square';o2.frequency.setValueAtTime(330,t);o2.frequency.exponentialRampToValueAtTime(165,t+0.2);
  g.gain.setValueAtTime(0.10,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
  o1.start(t);o1.stop(t+0.25);o2.start(t);o2.stop(t+0.25);
}
function playHit(){
  if(!aCtx)return;const t=aCtx.currentTime;
  const bufSz=aCtx.sampleRate*0.35;
  const buf=aCtx.createBuffer(1,bufSz,aCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSz;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/bufSz,1.5);
  const src=aCtx.createBufferSource(),filt=aCtx.createBiquadFilter(),g=aCtx.createGain();
  filt.type='bandpass';filt.frequency.value=600;filt.Q.value=0.8;
  src.buffer=buf;src.connect(filt);filt.connect(g);g.connect(aCtx.destination);
  g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.35);
  src.start(t);src.stop(t+0.35);
  const o=aCtx.createOscillator(),g2=aCtx.createGain();
  o.connect(g2);g2.connect(aCtx.destination);
  o.type='square';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(60,t+0.2);
  g2.gain.setValueAtTime(0.09,t);g2.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
  o.start(t);o.stop(t+0.25);
}
function playDamage(){
  if(!aCtx)return;const t=aCtx.currentTime;
  const o=aCtx.createOscillator(),g=aCtx.createGain();
  o.connect(g);g.connect(aCtx.destination);
  o.type='square';o.frequency.setValueAtTime(550,t);o.frequency.exponentialRampToValueAtTime(280,t+0.1);
  g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.13);
  o.start(t);o.stop(t+0.13);
}
function playLifeLost(){
  if(!aCtx)return;const t=aCtx.currentTime;
  const o=aCtx.createOscillator(),g=aCtx.createGain();
  o.connect(g);g.connect(aCtx.destination);
  o.type='sawtooth';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(55,t+0.65);
  g.gain.setValueAtTime(0.13,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.7);
  o.start(t);o.stop(t+0.7);
}
function playWaveClear(){
  if(!aCtx)return;const t=aCtx.currentTime;
  [330,440,550,660].forEach((f,i)=>{
    const o=aCtx.createOscillator(),dist=mkDistortion(60),g=aCtx.createGain();
    o.connect(dist);dist.connect(g);g.connect(aCtx.destination);
    o.type='sawtooth';o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*0.08);g.gain.linearRampToValueAtTime(0.07,t+i*0.08+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
    o.start(t+i*0.08);o.stop(t+0.6);
  });
}
function playStartChord(){
  if(!aCtx)return;const t=aCtx.currentTime;
  [220,277,330].forEach((f,i)=>{
    const o=aCtx.createOscillator(),dist=mkDistortion(100),g=aCtx.createGain();
    o.connect(dist);dist.connect(g);g.connect(aCtx.destination);
    o.type='sawtooth';o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*0.02);g.gain.linearRampToValueAtTime(0.04,t+i*0.02+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
    o.start(t+i*0.02);o.stop(t+0.6);
  });
}

// ── Screen shake ──────────────────────────────────────────────────
let shakeAmt=0;
function triggerShake(a){shakeAmt=Math.max(shakeAmt,a);}

// ── Haptic ────────────────────────────────────────────────────────
function haptic(p){if(navigator.vibrate)navigator.vibrate(p);}

// ── Hi score ──────────────────────────────────────────────────────
let hiScore=parseInt(localStorage.getItem('vr_hi')||'0');
function saveHiScore(){if(score>hiScore){hiScore=score;localStorage.setItem('vr_hi',String(score));}}


// ── Rocket class ──────────────────────────────────────────────────
class Rocket{
  constructor(type='scout',speedMult=1){
    this.type=type;this.speedMult=speedMult;
    const cfg=ROCKET_TYPES[type];
    this.hp=cfg.hp;this.maxHP=cfg.hp;
    this.sz=cfg.sz;this.points=cfg.points;
    this.alive=true;this.explodeTimer=0;this.particles=[];
    this.killed=false;this._escaped=false;this.flashTimer=0;
    this.zOffset=Math.random()*Math.PI*2;
    this.z=0.3+0.7*Math.random();
    this._drawSz=this.sz;this._drawAlpha=1;
    this.wake=[];  // trail of {x,y,z} world positions
    this.reset(true);
  }
  updateZ(time){
    const period=8+(this.zOffset%4);
    // Subtle depth: rockets only vary 80–100% size so they stay readable
    this.z=0.60+0.40*(0.5+0.5*Math.sin(time*(Math.PI*2/period)+this.zOffset));
    this._drawSz=this.sz*(0.78+0.22*this.z);
    this._drawAlpha=0.80+0.20*this.z;
    if(this.alive){
      this.wake.unshift({x:this.x,y:this.y,z:this.z});
      if(this.wake.length>14) this.wake.pop();
    }
  }
  reset(init=false){
    const cw=canvas.width,ch=canvas.height,pad=this.sz*2;
    this.x=pad+Math.random()*(cw-pad*2);
    this.y=init?(-this.sz*2-Math.random()*ch*0.3):-this.sz*2;
    const speed=(ROCKET_TYPES[this.type].speedBase+Math.random()*18)*this.speedMult;
    const hAngle=(Math.random()-0.5)*Math.PI*0.5;
    this.vx=Math.sin(hAngle)*speed*(Math.random()<0.5?1:-1);
    this.vy=Math.abs(Math.cos(hAngle))*speed*(0.55+Math.random()*0.45);
    this.sz=ROCKET_TYPES[this.type].sz;
    this.alive=true;this._escaped=false;
  }
  getBodyColor(){
    const{hp,type}=this;
    if(type==='scout') return'#CC0000';
    if(type==='cruiser') return hp>=2?'#00CCFF':'#FF8800';
    return hp>=3?'#9900FF':hp>=2?'#FF4400':'#FFFF00';
  }
  getFinColor(){
    const{type}=this;
    if(type==='scout') return'#00CC66';
    if(type==='cruiser') return'#00FF99';
    return'#CC00FF';
  }
  get radius(){return this.sz*0.75;}
  update(dt,handCenter){
    if(!this.alive){
      this.explodeTimer-=dt;
      for(const p of this.particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;}
      this.particles=this.particles.filter(p=>p.life>0);
      return;
    }
    if(this.flashTimer>0) this.flashTimer-=dt;
    // Gentle homing toward hand
    if(handCenter){
      const dx=handCenter.x-this.x,dy=handCenter.y-this.y,len=Math.hypot(dx,dy)||1;
      this.vx+=(dx/len)*7*dt;this.vy+=(dy/len)*7*dt;
    }
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    const pad=this.sz*2,cw=canvas.width;
    if(this.x<pad){this.vx=Math.abs(this.vx);}
    if(this.x>cw-pad){this.vx=-Math.abs(this.vx);}
    if(this.y<-this.sz*3){this.vy=Math.abs(this.vy);}
    if(this.y>canvas.height+25&&!this._escaped) this._escaped=true;
  }
  damage(){
    this.hp--;this.flashTimer=0.18;
    if(this.hp<=0){this.explode();return true;}
    playDamage();haptic(20);return false;
  }
  explode(){
    this.alive=false;this.killed=true;this.explodeTimer=1.4;
    const startZ=this.z;
    for(let i=0;i<16;i++){
      const a=(i/16)*Math.PI*2,spd=60+Math.random()*120;
      const col=BEAM_COLS[i%BEAM_COLS.length];
      const vz=(Math.random()-0.5)*1.4; // z-velocity: some fly toward camera, some away
      this.particles.push({x:this.x,y:this.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,vz,pz:startZ,life:0.8+Math.random()*0.5,col,type:'ray',len:30+Math.random()*50});
    }
    for(let i=0;i<8;i++){
      const a=Math.random()*Math.PI*2,spd=40+Math.random()*80;
      const col=BEAM_COLS[Math.floor(Math.random()*BEAM_COLS.length)];
      const vz=(Math.random()-0.5)*1.2;
      this.particles.push({x:this.x,y:this.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,vz,pz:startZ,life:0.6+Math.random()*0.7,col,type:'debris',rot:Math.random()*Math.PI,sz:4+Math.random()*10});
    }
  }
  drawRocket(x,y,angle,sz,alpha=1){
    ctx.save();
    ctx.translate(x,y);ctx.rotate(angle);
    ctx.globalAlpha=alpha;ctx.lineCap='round';ctx.lineJoin='round';
    // Subtle depth foreshortening
    const zCompress=0.82+0.18*this.z;
    ctx.scale(1,zCompress);
    const s=sz;
    const bcol=this.flashTimer>0?'#FFFFFF':this.getBodyColor();
    const fcol=this.getFinColor();
    const glowSz=4+this.z*16;
    // Body
    ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(-s*0.4,s*0.5);ctx.lineTo(s*0.4,s*0.5);ctx.closePath();
    ctx.strokeStyle=bcol;ctx.lineWidth=1.5;ctx.shadowBlur=glowSz;ctx.shadowColor=bcol;ctx.stroke();
    // Fins
    ctx.beginPath();ctx.moveTo(-s*0.4,s*0.1);ctx.lineTo(-s*0.85,s*0.75);ctx.lineTo(-s*0.4,s*0.5);ctx.closePath();
    ctx.strokeStyle=fcol;ctx.shadowColor=fcol;ctx.stroke();
    ctx.beginPath();ctx.moveTo(s*0.4,s*0.1);ctx.lineTo(s*0.85,s*0.75);ctx.lineTo(s*0.4,s*0.5);ctx.closePath();
    ctx.strokeStyle=fcol;ctx.shadowColor=fcol;ctx.stroke();
    // Window
    ctx.beginPath();ctx.moveTo(0,-s*0.25);ctx.lineTo(-s*0.18,0);ctx.lineTo(0,s*0.22);ctx.lineTo(s*0.18,0);ctx.closePath();
    ctx.strokeStyle='#00CCFF';ctx.shadowColor='#00CCFF';ctx.stroke();
    // HP pips for multi-hp rockets
    if(this.maxHP>1){
      for(let i=0;i<this.maxHP;i++){
        ctx.beginPath();ctx.arc((i-(this.maxHP-1)/2)*s*0.32,-s*0.62,s*0.1,0,Math.PI*2);
        ctx.strokeStyle=i<this.hp?bcol:'#1a1a2e';ctx.lineWidth=1.2;ctx.shadowBlur=3;ctx.stroke();
      }
    }
    // Cross detail lines
    ctx.beginPath();ctx.moveTo(-s*0.3,s*0.3);ctx.lineTo(s*0.3,s*0.3);
    ctx.strokeStyle=bcol;ctx.lineWidth=1;ctx.shadowBlur=3;ctx.shadowColor=bcol;ctx.stroke();
    ctx.beginPath();ctx.moveTo(-s*0.2,-s*0.1);ctx.lineTo(s*0.2,-s*0.1);ctx.stroke();
    // Thruster
    const flicker=0.6+0.4*Math.sin(Date.now()*0.015);
    ctx.globalAlpha=alpha*flicker;
    ctx.beginPath();ctx.moveTo(-s*0.25,s*0.5);ctx.lineTo(0,s*0.5+s*0.5*flicker);ctx.lineTo(s*0.25,s*0.5);
    ctx.strokeStyle='#FF8800';ctx.lineWidth=2;ctx.shadowColor=C.ora;ctx.shadowBlur=8;ctx.stroke();
    // Trail
    ctx.globalAlpha=alpha*0.4;
    const vl=Math.hypot(this.vx||1,this.vy||0);
    for(let i=1;i<=3;i++){
      const tx=-(this.vx||0)/vl*i*8,ty=-(this.vy||0)/vl*i*8;
      ctx.beginPath();ctx.moveTo(-s*0.12+tx,s*0.6+ty);ctx.lineTo(s*0.12+tx,s*0.6+ty);
      ctx.strokeStyle=C.sky;ctx.lineWidth=1.5-i*0.3;ctx.shadowBlur=4;ctx.shadowColor=C.sky;ctx.stroke();
    }
    ctx.restore();ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
  draw(){
    if(!this.alive){
      for(const p of this.particles){
        // Advance z-depth each frame
        if(p.pz!==undefined) p.pz=Math.max(0.05,Math.min(1,p.pz+(p.vz||0)*0.016));
        const depthScale=p.pz!==undefined?(0.35+0.65*p.pz):1;
        const a=Math.min(1,p.life/0.6)*depthScale;
        ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=p.col;ctx.shadowBlur=8*depthScale;ctx.shadowColor=p.col;
        if(p.type==='ray'){
          const nx=p.vx/Math.hypot(p.vx,p.vy),ny=p.vy/Math.hypot(p.vx,p.vy);
          ctx.lineWidth=1.5*depthScale;ctx.beginPath();
          ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+nx*p.len*a,p.y+ny*p.len*a);ctx.stroke();
          ctx.globalAlpha=a*0.4;
          ctx.beginPath();ctx.moveTo(p.x+ny*3,p.y-nx*3);ctx.lineTo(p.x+nx*p.len*a*0.8+ny*3,p.y+ny*p.len*a*0.8-nx*3);ctx.stroke();
        } else {
          ctx.translate(p.x,p.y);ctx.rotate(p.rot+p.life);
          const sz=p.sz*(0.5+a*0.5)*depthScale;
          ctx.lineWidth=1.2*depthScale;
          ctx.beginPath();ctx.moveTo(-sz,-sz*0.5);ctx.lineTo(sz,-sz*0.5);ctx.lineTo(sz*0.5,sz);ctx.closePath();ctx.stroke();
        }
        ctx.restore();
      }
      if(this.explodeTimer>0.8){
        const a=(this.explodeTimer-0.8)/0.6;
        const grd=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,80*a);
        grd.addColorStop(0,`rgba(255,200,50,${a*0.7})`);grd.addColorStop(1,'rgba(255,100,0,0)');
        ctx.fillStyle=grd;ctx.fillRect(this.x-100,this.y-100,200,200);
      }
      return;
    }
    // Glowing depth-scaled wake trail
    const wCol=this.getBodyColor();
    for(let i=0;i<this.wake.length;i++){
      const w=this.wake[i];
      const t=1-(i/this.wake.length);   // 1=fresh, 0=oldest
      const wAlpha=(this._drawAlpha??1)*t*t*0.55;
      const wR=(this._drawSz??this.sz)*0.18*t*w.z;
      if(wR<0.5||wAlpha<0.02) continue;
      ctx.save();
      ctx.beginPath();ctx.arc(w.x,w.y,wR,0,Math.PI*2);
      ctx.fillStyle=wCol;ctx.globalAlpha=wAlpha;
      ctx.shadowBlur=wR*3;ctx.shadowColor=wCol;ctx.fill();
      ctx.restore();
    }
    this.drawRocket(this.x,this.y,Math.atan2(this.vy,this.vx)-Math.PI/2,this._drawSz??this.sz,this._drawAlpha??1);
  }
}


// ── Shot class (slingshot projectile) ─────────────────────────────
class Shot{
  constructor(x,y,dx,dy,col,speed){
    this.x=x;this.y=y;
    this.vx=dx*speed;this.vy=dy*speed;
    this.col=col;this.life=1.3;this.maxLife=1.3;
    this.trail=[];
  }
  update(dt){
    this.trail.unshift({x:this.x,y:this.y});
    if(this.trail.length>6) this.trail.pop();
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    if(this.x<4||this.x>canvas.width-4) this.vx*=-1;
    this.life-=dt;
  }
  get alive(){return this.life>0&&this.y>-50&&this.y<canvas.height+50;}
  draw(){
    const a=this.life/this.maxLife;
    ctx.save();
    if(this.trail.length>1){
      ctx.strokeStyle=this.col;ctx.lineWidth=2.5;ctx.lineCap='round';
      ctx.shadowBlur=8;ctx.shadowColor=this.col;ctx.globalAlpha=a*0.5;
      ctx.beginPath();ctx.moveTo(this.trail[0].x,this.trail[0].y);
      for(const p of this.trail) ctx.lineTo(p.x,p.y);
      ctx.stroke();
    }
    ctx.globalAlpha=a;
    const r=5+a*4;
    ctx.fillStyle=this.col;ctx.shadowBlur=16;ctx.shadowColor=this.col;
    ctx.beginPath();
    for(let i=0;i<8;i++){
      const ang=i*Math.PI/4,ri=i%2===0?r:r*0.32;
      i===0?ctx.moveTo(this.x+Math.cos(ang)*ri,this.y+Math.sin(ang)*ri)
           :ctx.lineTo(this.x+Math.cos(ang)*ri,this.y+Math.sin(ang)*ri);
    }
    ctx.closePath();ctx.fill();
    ctx.restore();
  }
}

// ── Beam class (pinch blast) ──────────────────────────────────────
class Beam{
  constructor(ox,oy,angle,color){
    this.ox=ox;this.oy=oy;this.x=ox;this.y=oy;
    this.vx=Math.cos(angle)*700;this.vy=Math.sin(angle)*700;
    this.color=color;this.life=0.9;this.maxLife=0.9;
  }
  update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;this.life-=dt;}
  get alive(){return this.life>0&&this.x>-50&&this.x<canvas.width+50&&this.y>-50&&this.y<canvas.height+50;}
  draw(offset=0){
    const a=this.life/this.maxLife;
    const nx=-this.vy/700,ny=this.vx/700;
    ctx.save();
    ctx.globalAlpha=a*0.9;ctx.strokeStyle=this.color;
    ctx.lineWidth=1.8;ctx.lineCap='round';ctx.shadowBlur=8;ctx.shadowColor=this.color;
    ctx.beginPath();
    ctx.moveTo(this.ox+nx*offset,this.oy+ny*offset);
    ctx.lineTo(this.x+nx*offset,this.y+ny*offset);
    ctx.stroke();ctx.restore();
  }
}

// ── ElasticBand class ─────────────────────────────────────────────
class Band{
  constructor(a,b,ci){
    this.a=a;this.b=b;this.ci=ci;this.color=BEAM_COLS[ci%BEAM_COLS.length];
    this.cx=0;this.cy=0;this.cvx=0;this.cvy=0;
    this.vAmp=0;this.vFreq=5+Math.random()*7;this.vTime=0;
    this.prevDist=999;this.lastSnapMs=0;this.lastPluckMs=0;
    this.snapArmed=false;this.peakDist=0;this.lastShotMs=0;
    this._pendingShot=null;
  }
  update(tips,dt){
    this.cvx+=-0.16*this.cx;this.cvy+=-0.16*this.cy;
    this.cvx*=0.86;this.cvy*=0.86;
    this.cx+=this.cvx;this.cy+=this.cvy;
    this.vAmp*=0.935;this.vTime+=dt;
    const a=tips[this.a],b=tips[this.b];if(!a||!b)return;
    const dist=Math.hypot(b.x-a.x,b.y-a.y),now=performance.now();
    // Finger-touch snap
    if(this.prevDist>=55&&dist<55&&now-this.lastSnapMs>180){
      const mag=30+Math.random()*40,ang=(Math.random()-0.5)*Math.PI*1.5;
      this.cvx+=Math.cos(ang)*mag;this.cvy+=Math.sin(ang)*mag;
      this.vAmp=Math.max(this.vAmp,25+Math.random()*20);
      this.lastSnapMs=now;
    }
    // Slingshot arm
    if(dist>SNAP_ARM){
      this.snapArmed=true;
      this.peakDist=Math.max(this.peakDist,dist);
    }
    // Slingshot fire
    if(this.snapArmed&&dist<SNAP_FIRE&&now-this.lastShotMs>450){
      this.snapArmed=false;this.lastShotMs=now;
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      this._pendingShot={x:mx,y:my,peakDist:this.peakDist,col:this.color,bandIdx:this.ci};
      this.peakDist=0;
      const mag=55+Math.random()*35,ang=(Math.random()-0.5)*Math.PI;
      this.cvx+=Math.cos(ang)*mag;this.cvy+=Math.sin(ang)*mag;
      this.vAmp=Math.max(this.vAmp,50+Math.random()*30);
    }
    if(!this.snapArmed) this.peakDist=0;
    this.prevDist=dist;
  }
  pluck(){
    const now=performance.now();if(now-this.lastPluckMs<140)return;
    this.lastPluckMs=now;
    const mag=18+Math.random()*25,ang=(Math.random()-0.5)*Math.PI*2;
    this.cvx+=Math.cos(ang)*mag;this.cvy+=Math.sin(ang)*mag;
    this.vAmp=Math.max(this.vAmp,35+Math.random()*28);
  }
  draw(tips){
    const a=tips[this.a],b=tips[this.b];if(!a||!b)return;
    const dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy);if(dist<6)return;
    const px=-dy/dist,py=dx/dist;
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    const vib=this.vAmp*Math.sin(this.vTime*this.vFreq*Math.PI*2);
    const cpx=mx+this.cx+px*vib,cpy=my+this.cy+py*vib;
    const tension=Math.min(1,Math.max(0,(dist-40)/260));
    const charge=Math.min(1,Math.max(0,(dist-SNAP_ARM*0.7)/(SNAP_ARM*0.85)));
    const alpha=0.3+tension*0.7;
    const wm=1+charge*0.55;
    ctx.lineCap='round';
    for(const[w,al]of[[20,0.03],[12,0.07],[7,0.14],[4,0.22]]){
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(cpx,cpy,b.x,b.y);
      ctx.strokeStyle=this.color;ctx.globalAlpha=al*alpha*(1+charge*0.6);ctx.lineWidth=w*wm;ctx.shadowBlur=0;ctx.stroke();
    }
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(cpx,cpy,b.x,b.y);
    ctx.strokeStyle=this.color;ctx.globalAlpha=0.85*alpha;
    ctx.lineWidth=(2+tension*1.5)*wm;ctx.shadowBlur=8+charge*22;ctx.shadowColor=this.color;ctx.stroke();
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(cpx,cpy,b.x,b.y);
    ctx.strokeStyle=C.wht;ctx.globalAlpha=(0.5+charge*0.5)*alpha;ctx.lineWidth=0.8;ctx.shadowBlur=0;ctx.stroke();
    if(charge>0.65){
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(cpx,cpy,b.x,b.y);
      ctx.strokeStyle='#FFFFFF';ctx.globalAlpha=0.3*(charge-0.65)/0.35;ctx.lineWidth=5;
      ctx.shadowBlur=22;ctx.shadowColor='#FFFFFF';ctx.stroke();
    }
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
}


// ── Pluck detection ───────────────────────────────────────────────
const pluckState=new Map();
function ptSegDist(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,lenSq=dx*dx+dy*dy;
  if(lenSq===0) return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/lenSq));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}
function checkPlucks(tips,bands){
  for(let ti=0;ti<tips.length;ti++){
    const tip=tips[ti];if(!tip)continue;
    for(let bi=0;bi<bands.length;bi++){
      const band=bands[bi];
      if(band.a===ti||band.b===ti)continue;
      const a=tips[band.a],b=tips[band.b];if(!a||!b)continue;
      const d=ptSegDist(tip.x,tip.y,a.x,a.y,b.x,b.y);
      const key=(ti<<4)|bi,was=pluckState.get(key)||false,is=d<28;
      if(is&&!was) band.pluck();
      pluckState.set(key,is);
    }
  }
}

// ── Hand overlay — fingertip triangles ────────────────────────────
function fingerOf(i){if(i<=4)return 0;if(i<=8)return 1;if(i<=12)return 2;if(i<=16)return 3;return 4;}
function drawHandOverlay(lms){
  for(let i=0;i<5;i++){
    const tip=lms[TIP_IDX[i]],dip=lms[TIP_DIP[i]];
    const col=FINGER_COLS[i];
    const dx=tip.x-dip.x,dy=tip.y-dip.y,len=Math.hypot(dx,dy)||1;
    const nx=dx/len,ny=dy/len,px=-ny,py=nx,sz=11;
    const ax=tip.x+nx*sz,ay=tip.y+ny*sz;
    const bx=tip.x+px*sz*0.6,by=tip.y+py*sz*0.6;
    const cx2=tip.x-px*sz*0.6,cy2=tip.y-py*sz*0.6;
    ctx.save();
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.lineTo(cx2,cy2);ctx.closePath();
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.shadowBlur=6;ctx.shadowColor=col;ctx.globalAlpha=0.92;ctx.stroke();
    ctx.beginPath();ctx.arc(tip.x,tip.y,3,0,Math.PI*2);
    ctx.fillStyle=col;ctx.globalAlpha=0.9;ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

// ── Static hand (start screen) ────────────────────────────────────
function drawStaticHand(cx,cy,handW,handH){
  const pts=HAND_LM.map(lm=>({x:cx-handW*0.5+lm[0]*handW,y:cy-handH*0.5+lm[1]*handH}));
  for(const[a,b]of HAND_CONNECTIONS){
    const pa=pts[a],pb=pts[b];
    const fi=fingerOf(Math.max(a,b)),col=FINGER_COLS[fi<5?fi:4];
    const dx=pb.x-pa.x,dy=pb.y-pa.y,len=Math.hypot(dx,dy);if(len<2)continue;
    const px=-dy/len*3,py=dx/len*3;
    ctx.save();
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.shadowBlur=4;ctx.shadowColor=col;ctx.globalAlpha=0.85;
    ctx.beginPath();
    ctx.moveTo(pa.x+px,pa.y+py);ctx.lineTo(pb.x+px,pb.y+py);
    ctx.moveTo(pa.x-px,pa.y-py);ctx.lineTo(pb.x-px,pb.y-py);
    ctx.moveTo(pa.x+px,pa.y+py);ctx.lineTo(pa.x-px,pa.y-py);
    ctx.moveTo(pb.x+px,pb.y+py);ctx.lineTo(pb.x-px,pb.y-py);
    ctx.moveTo(pa.x+px,pa.y+py);ctx.lineTo(pb.x-px,pb.y-py);
    ctx.stroke();ctx.restore();
  }
  for(let i=0;i<21;i++){
    const p=pts[i],isTip=TIP_IDX.includes(i);
    const fi=fingerOf(i),col=FINGER_COLS[fi<5?fi:4];
    ctx.save();
    ctx.beginPath();ctx.arc(p.x,p.y,isTip?3.5:2,0,Math.PI*2);
    ctx.strokeStyle=col;ctx.lineWidth=1.2;ctx.shadowBlur=4;ctx.shadowColor=col;
    ctx.globalAlpha=0.9;ctx.stroke();ctx.restore();
  }
  for(let i=0;i<5;i++){
    const tip=pts[TIP_IDX[i]],dip=pts[TIP_DIP[i]];
    const col=FINGER_COLS[i];
    const dx=tip.x-dip.x,dy=tip.y-dip.y,len=Math.hypot(dx,dy)||1;
    ctx.save();
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.shadowBlur=6;ctx.shadowColor=col;ctx.globalAlpha=0.45;
    ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.lineTo(tip.x+dx/len*40,tip.y+dy/len*40);ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

// ── 3D Open hand illustration (start screen) ──────────────────────
function drawPolyHand(cx,cy,w,h,time=0){
  // Slow Y-axis rotation sway: ±13° over ~12s
  const yAngle=Math.sin(time*0.52)*0.22;
  const cosA=Math.cos(yAngle),sinA=Math.sin(yAngle);
  const focal=2.8; // perspective strength — higher = flatter

  // Project each landmark through Y-rotation + perspective divide
  const pts=HAND_LM.map((lm,i)=>{
    const lx=lm[0]-0.5;           // center x
    const lz=HAND_Z[i]-0.3;       // center z
    const rx=lx*cosA-lz*sinA;     // Y-axis rotation
    const rz=lx*sinA+lz*cosA;
    const scale=focal/(focal+rz); // perspective
    return{
      x:cx+rx*w*scale,
      y:(cy-h*0.5)+lm[1]*h*scale,
      z:rz,scale
    };
  });

  // Bone half-width (pre-perspective; scaled per point during draw)
  function boneHW(a,b){
    const hi=Math.max(a,b);
    if(hi<=4) return hi<=2?5.5:hi<=3?4.2:3.2;
    if(hi<=8) return hi<=6?5.2:hi<=7?4:2.9;
    if(hi<=12) return hi<=10?5.4:hi<=11?4.2:3.1;
    if(hi<=16) return hi<=14?5:hi<=15?3.8:2.7;
    return hi<=18?4.2:hi<=19?3.1:2.3;
  }

  // Depth-sort bones (far first so near renders on top)
  const sortedBones=[...HAND_CONNECTIONS].sort((ba,bb)=>{
    return((pts[ba[0]].z+pts[ba[1]].z)*0.5)-((pts[bb[0]].z+pts[bb[1]].z)*0.5);
  });

  for(const[a,b]of sortedBones){
    const pa=pts[a],pb=pts[b];
    const avgScale=(pa.scale+pb.scale)*0.5;
    const dx=pb.x-pa.x,dy=pb.y-pa.y,len=Math.hypot(dx,dy);if(len<2)continue;
    const nx=-dy/len,ny=dx/len;
    // Each end uses its own perspective scale for natural taper
    const hwA=boneHW(a,b)*pa.scale, hwB=boneHW(a,b)*pb.scale;
    const fi=fingerOf(Math.max(a,b)),col=FINGER_COLS[Math.min(fi,4)];
    // Closer bones are brighter
    const depthAlpha=0.50+0.45*Math.max(0,Math.min(1,(avgScale-0.85)*6));
    const tl={x:pa.x+nx*hwA,y:pa.y+ny*hwA};
    const tr={x:pa.x-nx*hwA,y:pa.y-ny*hwA};
    const bl={x:pb.x+nx*hwB,y:pb.y+ny*hwB};
    const br={x:pb.x-nx*hwB,y:pb.y-ny*hwB};
    ctx.save();
    ctx.strokeStyle=col;ctx.shadowBlur=3*avgScale;ctx.shadowColor=col;ctx.globalAlpha=depthAlpha*0.80;
    ctx.lineWidth=0.85*avgScale;
    ctx.beginPath();
    ctx.moveTo(tl.x,tl.y);ctx.lineTo(bl.x,bl.y);
    ctx.moveTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);
    ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);
    ctx.moveTo(bl.x,bl.y);ctx.lineTo(br.x,br.y);
    ctx.stroke();
    // Inner diagonal facet
    ctx.lineWidth=0.5;ctx.globalAlpha=depthAlpha*0.22;ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(br.x,br.y);ctx.stroke();
    ctx.restore();
  }

  // Depth-sorted joint rings
  const sortedLM=[...Array(21).keys()].sort((a,b)=>pts[a].z-pts[b].z);
  for(const i of sortedLM){
    const pt=pts[i],fi=fingerOf(i),col=FINGER_COLS[Math.min(fi,4)];
    const isTip=TIP_IDX.includes(i),isMCP=[1,5,9,13,17].includes(i);
    const r=(isTip?5:isMCP?4:2.8)*pt.scale;
    const depthAlpha=0.55+0.40*Math.max(0,Math.min(1,(pt.scale-0.85)*6));
    ctx.save();
    ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);
    ctx.strokeStyle=col;ctx.lineWidth=1.0*pt.scale;
    ctx.shadowBlur=(isTip?7:4)*pt.scale;ctx.shadowColor=col;ctx.globalAlpha=depthAlpha*0.80;ctx.stroke();
    if(isTip){
      ctx.beginPath();ctx.arc(pt.x,pt.y,r*0.38,0,Math.PI*2);
      ctx.fillStyle=col;ctx.globalAlpha=depthAlpha*0.55;ctx.fill();
    }
    ctx.restore();
  }

  // Energy rays from fingertips
  for(let i=0;i<5;i++){
    const tip=pts[TIP_IDX[i]],dip=pts[TIP_DIP[i]],col=FINGER_COLS[i];
    const dx=tip.x-dip.x,dy=tip.y-dip.y,len=Math.hypot(dx,dy)||1;
    ctx.save();
    ctx.strokeStyle=col;ctx.lineWidth=0.7;ctx.shadowBlur=3;ctx.shadowColor=col;ctx.globalAlpha=0.32;
    ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.lineTo(tip.x+dx/len*26,tip.y+dy/len*26);ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

// ── Banner title ──────────────────────────────────────────────────
function drawBannerTitle(cx,cy){
  ctx.save();
  const cw=canvas.width;
  const boxW=cw*0.4,boxH=cw*0.115,gap=cw*0.018;
  const totalW=boxW*2+gap;
  const lx=cx-totalW/2,rx=cx+gap/2;
  const fs=Math.min(boxW*0.38,boxH*0.6);
  ctx.font=`bold ${Math.floor(fs)}px 'Courier New',monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';

  // Draws a scroll-tab hex shape: top corners chamfered
  function scrollPath(x,y,w,h,ins){
    const cut=(h-ins*2)*0.32;
    ctx.beginPath();
    ctx.moveTo(x+ins+cut, y+ins);
    ctx.lineTo(x+w-ins-cut, y+ins);
    ctx.lineTo(x+w-ins, y+ins+cut);
    ctx.lineTo(x+w-ins, y+h-ins);
    ctx.lineTo(x+ins, y+h-ins);
    ctx.lineTo(x+ins, y+ins+cut);
    ctx.closePath();
  }

  function drawTab(x,y,w,h,c1,c2,label,yOff){
    const grad=ctx.createLinearGradient(x,y,x+w,y+h);
    grad.addColorStop(0,c1);grad.addColorStop(1,c2);
    // Outer glow stroke
    ctx.shadowBlur=20;ctx.shadowColor=c1;ctx.strokeStyle=grad;ctx.lineWidth=2.8;
    scrollPath(x,y+yOff,w,h,0);ctx.stroke();
    // Inner inset stroke
    ctx.shadowBlur=8;ctx.lineWidth=1.2;
    scrollPath(x,y+yOff,w,h,4);ctx.stroke();
    // Text
    const tg=ctx.createLinearGradient(x,y+yOff,x+w,y+yOff+h);
    tg.addColorStop(0,c1);tg.addColorStop(1,c2);
    ctx.fillStyle=tg;ctx.shadowBlur=14;ctx.shadowColor=c1;
    ctx.fillText(label,x+w/2,y+yOff+h/2);
  }

  drawTab(lx,cy,boxW,boxH,'#FF2200','#AAFF00','VECTOR',6);
  drawTab(rx,cy,boxW,boxH,'#00FFFF','#0044FF','ROCKET',0);
  ctx.restore();
}

// ── Utility drawing ───────────────────────────────────────────────
function drawLightning(x1,y1,x2,y2,col,segs=5){
  ctx.save();
  const pts=[[x1,y1]];
  for(let i=1;i<segs;i++){
    const t=i/segs;
    pts.push([x1+(x2-x1)*t+(Math.random()-0.5)*20,y1+(y2-y1)*t+(Math.random()-0.5)*20]);
  }
  pts.push([x2,y2]);
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.shadowBlur=10;ctx.shadowColor=col;
  ctx.globalAlpha=0.85;ctx.stroke();ctx.restore();
}
function draw4Star(x,y,r,col){
  ctx.save();
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4-Math.PI/4,radius=i%2===0?r:r*0.2;
    i===0?ctx.moveTo(x+Math.cos(a)*radius,y+Math.sin(a)*radius):ctx.lineTo(x+Math.cos(a)*radius,y+Math.sin(a)*radius);
  }
  ctx.closePath();
  ctx.fillStyle=col;ctx.shadowBlur=8;ctx.shadowColor=col;ctx.globalAlpha=0.7;ctx.fill();
  ctx.restore();
}

// ── Pinch blast detection ─────────────────────────────────────────
let wasPinched=false,pinchCooldown=0,blastCharges=3;
function checkPinchBlast(tips,beams){
  if(!tips[0]||!tips[1])return;
  const dist=Math.hypot(tips[1].x-tips[0].x,tips[1].y-tips[0].y);
  const isPinched=dist<PINCH_TH;
  if(isPinched&&!wasPinched&&pinchCooldown<=0&&blastCharges>0){
    const center={x:(tips[0].x+tips[1].x)/2,y:(tips[0].y+tips[1].y)/2};
    fireBlast(center,tips,beams);pinchCooldown=1.0;blastCharges--;
  }
  wasPinched=isPinched;
}
function fireBlast(center,tips,beams){
  playBlast();haptic(25);
  for(let i=0;i<tips.length;i++){
    const t=tips[i];if(!t)continue;
    const dx=t.x-center.x,dy=t.y-center.y,len=Math.hypot(dx,dy)||1;
    const angle=Math.atan2(dy,dx);
    beams.push(new Beam(center.x,center.y,angle,BEAM_COLS[i*2%BEAM_COLS.length]));
    beams.push(new Beam(center.x,center.y,angle,BEAM_COLS[(i*2+1)%BEAM_COLS.length]));
  }
  for(let i=0;i<4;i++){
    beams.push(new Beam(center.x,center.y,(i/4)*Math.PI*2+Math.PI/8,BEAM_COLS[(i+4)%BEAM_COLS.length]));
  }
}

// ── Game state ────────────────────────────────────────────────────
let state='start';
let fingertips=Array(5).fill(null);
let allLandmarks=null,handVisible=false;

let score=0,lives=3,combo=1,waveNum=1;
let waveKillsNeeded=0,waveState='active',waveTimer=0;
let lastTs=0,running=false,trackingStarted=false;
const WAVE_BONUS=500;

function spawnWave(wave){
  const def=getWaveDef(wave);
  rockets=[];
  waveKillsNeeded=def.scouts+def.cruisers+def.dreads;
  for(let i=0;i<def.scouts;i++)    rockets.push(new Rocket('scout',def.sm));
  for(let i=0;i<def.cruisers;i++)  rockets.push(new Rocket('cruiser',def.sm));
  for(let i=0;i<def.dreads;i++)    rockets.push(new Rocket('dreadnought',def.sm));
  rockets.forEach((r,i)=>{r.y=-50-i*80;r.x=50+Math.random()*(canvas.width-100);});
}

function initGame(){
  bands=BAND_PAIRS.map(([a,b],i)=>new Band(a,b,i));
  beams=[];shots=[];comboPops.length=0;
  score=0;lives=3;combo=1;waveNum=1;
  wasPinched=false;pinchCooldown=0;blastCharges=3;
  shakeAmt=0;waveState='active';waveTimer=0;
  waveAnncText='';waveAnncSub='';waveAnncTimer=0;
  spawnWave(1);
  playStartChord();

// ── MediaPipe ─────────────────────────────────────────────────────
function initTracking(){
  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:0.65,minTrackingConfidence:0.55});
  hands.onResults(res=>{
    fingertips=Array(5).fill(null);allLandmarks=null;handVisible=false;
    if(res.multiHandLandmarks&&res.multiHandLandmarks.length>0){
      handVisible=true;
      const lm=res.multiHandLandmarks[0];
      allLandmarks=lm.map(p=>({x:(1-p.x)*canvas.width,y:p.y*canvas.height}));
      for(let i=0;i<5;i++){
        const p=lm[TIP_IDX[i]];
        fingertips[i]={x:(1-p.x)*canvas.width,y:p.y*canvas.height};
      }
    }
  });
  const cam=new Camera(video,{
    onFrame:async()=>{await hands.send({image:video});},
    width:640,height:480,facingMode:'user'
  });
  cam.start().catch(e=>console.error(e));
}

// ── Render loop ───────────────────────────────────────────────────
function loop(ts){
  if(!running) return;
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;
  const time=ts/1000;

  if(state==='start'){drawStartScreen(time);return;}
  if(state==='gameover'){drawGameOver(time);return;}

  // ── Playing ──────────────────────────────────────────────────
  ctx.save();
  if(shakeAmt>0.5){
    ctx.translate((Math.random()-0.5)*shakeAmt,(Math.random()-0.5)*shakeAmt);
    shakeAmt*=0.80;
  } else shakeAmt=0;

  drawBg();
  pinchCooldown-=dt;

  // Hand center for rocket homing
  let handCenter=null;
  const vt=fingertips.filter(t=>t);
  if(vt.length>=2){
    handCenter={x:vt.reduce((s,t)=>s+t.x,0)/vt.length,y:vt.reduce((s,t)=>s+t.y,0)/vt.length};
  }

  // Bands — update, slingshot, draw
  if(handVisible){
    // Hand overlay removed — bands and slingshot handle all gameplay feedback
    for(const b of bands){
      b.update(fingertips,dt);
      if(b._pendingShot){
        const{x,y,peakDist,col}=b._pendingShot;
        b._pendingShot=null;
        if(handCenter){
          const dx=x-handCenter.x,dy=y-handCenter.y,len=Math.hypot(dx,dy)||1;
          const speed=480+Math.min(peakDist,280)*1.7;
          shots.push(new Shot(x,y,dx/len,dy/len,col,speed));
          playSlingShot(peakDist);haptic(30);
        }
      }
    }
    checkPlucks(fingertips,bands);
    checkPinchBlast(fingertips,beams);
    for(const b of bands) b.draw(fingertips);
  }

  // Threat indicators (behind rockets)
  drawThreatIndicators(rockets);

  // Shots
  for(const s of shots) s.update(dt);
  shots.filter(s=>s.alive).forEach(s=>s.draw());
  shots=shots.filter(s=>s.alive);

  // Beams
  for(const b of beams) b.update(dt);
  const lb=beams.filter(b=>b.alive);
  for(let i=0;i<lb.length;i++) lb[i].draw((i%3-1)*3);
  beams=lb;

  // Rockets — update z-depth, depth-sort (far first), then draw
  for(const r of rockets) r.updateZ(time);
  rockets.sort((a,b)=>a.z-b.z);
  for(const r of rockets){r.update(dt,handCenter);r.draw();}

  // Shot → rocket collisions
  for(const shot of shots){
    if(!shot.alive) continue;
    for(const rocket of rockets){
      if(!rocket.alive) continue;
      if(Math.hypot(shot.x-rocket.x,shot.y-rocket.y)<rocket.radius+8){
        shot.life=0;
        if(rocket.damage()){
          score+=rocket.points*Math.min(combo,8);
          comboPops.push({x:rocket.x,y:rocket.y,text:`x${Math.min(combo,8)}`,life:1.1,maxLife:1.1});
          combo++;triggerShake(8);haptic(40);playHit();waveKillsNeeded--;
        }
        break;
      }
    }
  }

  // Beam → rocket collisions
  for(const beam of beams){
    if(!beam.alive) continue;
    for(const rocket of rockets){
      if(!rocket.alive) continue;
      if(Math.hypot(beam.x-rocket.x,beam.y-rocket.y)<rocket.radius+6){
        beam.life=0;
        if(rocket.damage()){
          score+=rocket.points*Math.min(combo,8);
          comboPops.push({x:rocket.x,y:rocket.y,text:`x${Math.min(combo,8)}`,life:1.1,maxLife:1.1});
          combo++;triggerShake(8);haptic(40);playHit();waveKillsNeeded--;
        }
        break;
      }
    }
  }

  // Escaped rockets → life lost
  for(const r of rockets){
    if(r._escaped){
      r._escaped=false;
      lives--;combo=1;
      triggerShake(16);haptic([80,40,80]);playLifeLost();
      r.hp=r.maxHP;r.flashTimer=0;r.reset(false);
      if(lives<=0){saveHiScore();state='gameover';ctx.restore();return;}
    }
  }

  // Wave management
  if(waveState==='active'&&waveKillsNeeded<=0){
    waveState='clearing';waveTimer=2.3;
    const bonus=WAVE_BONUS*waveNum;score+=bonus;
    waveAnncText=`WAVE ${waveNum}`;waveAnncSub=`CLEARED! +${bonus} PTS`;waveAnncTimer=2.3;
    playWaveClear();triggerShake(5);haptic(60);
    blastCharges=Math.min(3,blastCharges+1);
  }
  if(waveState==='clearing'){
    waveTimer-=dt;
    if(waveTimer<=0){
      waveNum++;waveState='active';
      spawnWave(waveNum);
      waveAnncText=`WAVE ${waveNum}`;waveAnncSub='';waveAnncTimer=1.8;
    }
  }
  if(waveAnncTimer>0) waveAnncTimer-=dt;

  drawComboPops(dt);
  drawWaveAnnouncer();
  drawHUD();

  ctx.restore();
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

// ── Boot ──────────────────────────────────────────────────────────
function startGame(){
  ensureAudio();
  if(state==='gameover'){
    state='playing';initGame();
    if(!trackingStarted){initTracking();trackingStarted=true;}
    return;
  }
  if(state!=='start') return;
  state='playing';initGame();
  if(!trackingStarted){initTracking();trackingStarted=true;}
}
canvas.addEventListener('click',startGame);
canvas.addEventListener('touchstart',e=>{e.preventDefault();startGame();},{passive:false});

running=true;lastTs=performance.now();
requestAnimationFrame(loop);
</script>
</body>
