<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>SPACE COMBAT — V2.0</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
    #gl{position:fixed;inset:0;width:100%;height:100%;display:block}
    #cam{display:none}
    #boot{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      background:#000;color:#8fd8ff;font:600 11px/1.6 ui-monospace,Menlo,monospace;
      letter-spacing:.28em;text-transform:uppercase;z-index:10;transition:opacity .6s ease;
    }
    #boot.hide{opacity:0;pointer-events:none}
  </style>
</head>
<body>
<canvas id="gl"></canvas>
<video id="cam" playsinline autoplay muted></video>
<div id="boot">Calibrating Optics…</div>

<!-- MediaPipe Hands (classic scripts, before importmap) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass }      from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';

// ── Renderer: film-grade ─────────────────────────────────────────────
const canvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// ── Scene & camera ───────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x02030a);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 4000);
camera.position.set(0, 0, 0);

// Cockpit rig — parented to the camera so the frame moves with the pilot's head,
// while camera.rotation.z handles g-force tilt without rotating the whole rig.
const cockpitRig = new THREE.Group();
camera.add(cockpitRig);
scene.add(camera);

// ── Lighting: PBR ────────────────────────────────────────────────────
// Harsh directional sun, positioned up/right/behind so it rakes across
// the cockpit's pilot-facing surfaces instead of back-lighting them.
const sun = new THREE.DirectionalLight(0xfff2d8, 4);
sun.position.set(40, 90, 70);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 400;
sun.shadow.bias = -0.0005;
scene.add(sun);
scene.add(sun.target);

// Space bounce: deep blue sky, near-black ground
const hemi = new THREE.HemisphereLight(0x6aa0ff, 0x080a12, 0.9);
scene.add(hemi);

// Warm cockpit fill — lets the pilot-side of the frame catch highlights
const cockpitFill = new THREE.PointLight(0xff9a55, 1.6, 4.0, 1.6);
cockpitFill.position.set(0, -0.15, 0.10);
cockpitRig.add(cockpitFill);

// Cool rim from above the canopy — separates frame from deep space
const canopyRim = new THREE.PointLight(0x4cc3ff, 0.9, 3.0, 1.5);
canopyRim.position.set(0, 0.55, -0.30);
cockpitRig.add(canopyRim);

// ── Starfield ────────────────────────────────────────────────────────
function buildStarfield(count = 9000, radius = 1600) {
  const positions = new Float32Array(count * 3);
  const colors    = new Float32Array(count * 3);
  const sizes     = new Float32Array(count);
  const tint = new THREE.Color();
  for (let i = 0; i < count; i++) {
    // Uniform sphere point
    const u = Math.random(), v = Math.random();
    const theta = 2 * Math.PI * u;
    const phi = Math.acos(2 * v - 1);
    const r = radius * (0.55 + 0.45 * Math.random());
    positions[i*3+0] = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    // Color: mostly white, sprinkle of blue/amber giants
    const t = Math.random();
    if      (t < 0.72) tint.setRGB(1, 1, 1);
    else if (t < 0.88) tint.setRGB(0.72, 0.84, 1.0);
    else if (t < 0.96) tint.setRGB(1.0, 0.86, 0.64);
    else               tint.setRGB(1.0, 0.55, 0.45);
    const b = 0.55 + Math.random() * 0.45;
    colors[i*3+0] = tint.r * b;
    colors[i*3+1] = tint.g * b;
    colors[i*3+2] = tint.b * b;
    sizes[i] = 0.5 + Math.pow(Math.random(), 6) * 3.2;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));
  const mat = new THREE.PointsMaterial({
    size: 2.0,
    vertexColors: true,
    sizeAttenuation: false,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  return new THREE.Points(geo, mat);
}
scene.add(buildStarfield());

// Distant nebula glow — a huge additive sphere for atmosphere
{
  const neb = new THREE.Mesh(
    new THREE.SphereGeometry(1200, 32, 16),
    new THREE.MeshBasicMaterial({
      color: 0x142844, side: THREE.BackSide, transparent: true,
      opacity: 0.35, depthWrite: false, blending: THREE.AdditiveBlending,
    })
  );
  scene.add(neb);
}

// ── Industrial Cockpit Frame (3D, gunmetal gray, PBR) ────────────────
const gunmetal = new THREE.MeshStandardMaterial({
  color: 0x2b2f35, metalness: 0.8, roughness: 0.2,
});
const gunmetalDark = new THREE.MeshStandardMaterial({
  color: 0x16181c, metalness: 0.8, roughness: 0.2,
});
const rubberSeal = new THREE.MeshStandardMaterial({
  color: 0x0a0a0c, metalness: 0.2, roughness: 0.85,
});
const panelEmissive = new THREE.MeshStandardMaterial({
  color: 0x0a1a22, metalness: 0.6, roughness: 0.35,
  emissive: 0x0af0ff, emissiveIntensity: 0.35,
});

function buildCockpit() {
  const g = new THREE.Group();

  // Canopy frame — a rectangular tube surrounding the viewport
  const frameBox = (w, h, d, x, y, z) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), gunmetal);
    m.position.set(x, y, z);
    m.castShadow = true; m.receiveShadow = true;
    return m;
  };

  // Viewport opening is roughly 1.6w x 0.9h centered ahead at z = -0.6
  // Top brow
  g.add(frameBox(1.80, 0.10, 0.10,  0.00,  0.52, -0.62));
  // Bottom sill (thicker — instrument lip)
  g.add(frameBox(1.80, 0.14, 0.14,  0.00, -0.40, -0.60));
  // Left pillar (A-pillar)
  g.add(frameBox(0.10, 1.00, 0.12, -0.90,  0.05, -0.62));
  // Right pillar
  g.add(frameBox(0.10, 1.00, 0.12,  0.90,  0.05, -0.62));

  // Inner rubber seal hugging the glass — thin dark gasket
  const seal = frameBox(1.74, 0.88, 0.02, 0.0, 0.05, -0.595);
  seal.material = rubberSeal;
  g.add(seal);

  // Side consoles — angled panels flanking the pilot
  const sideGeo = new THREE.BoxGeometry(0.35, 0.22, 0.70);
  const leftConsole = new THREE.Mesh(sideGeo, gunmetalDark);
  leftConsole.position.set(-0.65, -0.55, -0.35);
  leftConsole.rotation.z = 0.35;
  leftConsole.castShadow = true; leftConsole.receiveShadow = true;
  g.add(leftConsole);
  const rightConsole = leftConsole.clone();
  rightConsole.position.x = 0.65;
  rightConsole.rotation.z = -0.35;
  g.add(rightConsole);

  // Lower dash with emissive instrument cluster
  const dash = new THREE.Mesh(new THREE.BoxGeometry(1.20, 0.18, 0.22), gunmetalDark);
  dash.position.set(0, -0.48, -0.45);
  dash.rotation.x = -0.35;
  dash.castShadow = true; dash.receiveShadow = true;
  g.add(dash);

  // Emissive instrument strip on the dash (read-outs)
  const strip = new THREE.Mesh(new THREE.BoxGeometry(0.90, 0.03, 0.01), panelEmissive);
  strip.position.set(0, -0.44, -0.355);
  strip.rotation.x = -0.35;
  g.add(strip);

  // Bolt details on the A-pillars
  const boltGeo = new THREE.CylinderGeometry(0.018, 0.018, 0.025, 10);
  const boltMat = new THREE.MeshStandardMaterial({ color: 0x6a6e74, metalness: 1.0, roughness: 0.25 });
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < 4; i++) {
      const b = new THREE.Mesh(boltGeo, boltMat);
      b.rotation.x = Math.PI / 2;
      b.position.set(0.90 * side, 0.42 - i * 0.28, -0.555);
      g.add(b);
    }
  }

  // Overhead rib — sense of an enclosed canopy above the pilot's head
  const rib = new THREE.Mesh(new THREE.TorusGeometry(0.95, 0.035, 8, 32, Math.PI), gunmetal);
  rib.rotation.x = Math.PI / 2;
  rib.position.set(0, 0.55, -0.30);
  g.add(rib);

  // HUD reticle — a thin emissive ring projected ahead of the pilot
  const reticleMat = new THREE.MeshBasicMaterial({
    color: 0x00f2ff, transparent: true, opacity: 0.85,
    depthTest: false, blending: THREE.AdditiveBlending,
  });
  const reticle = new THREE.Group();
  const ring = new THREE.Mesh(new THREE.RingGeometry(0.018, 0.022, 48), reticleMat);
  const tick = (ang) => {
    const t = new THREE.Mesh(new THREE.PlaneGeometry(0.012, 0.003), reticleMat);
    t.position.set(Math.cos(ang) * 0.034, Math.sin(ang) * 0.034, 0);
    t.rotation.z = ang;
    return t;
  };
  reticle.add(ring);
  [0, Math.PI/2, Math.PI, -Math.PI/2].forEach(a => reticle.add(tick(a)));
  reticle.position.set(0, 0.02, -0.55);
  reticle.renderOrder = 999;
  g.add(reticle);
  g.userData.reticle = reticle;

  return g;
}
const cockpit = buildCockpit();
cockpitRig.add(cockpit);

// ── Post-processing ──────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.8,  // strength
  0.5,  // radius
  0.9   // threshold
);
composer.addPass(bloom);

// ── Resize ───────────────────────────────────────────────────────────
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ── MediaPipe Hands: zero-latency aim ───────────────────────────────
// Aim is a normalized 2D vector in [-1, 1] derived from index fingertip position.
const aim = { x: 0, y: 0, active: false };
// Smoothed aim for camera orientation
const aimSmooth = { x: 0, y: 0 };

const videoEl = document.getElementById('cam');
async function startHands() {
  if (!window.Hands || !window.Camera) return; // CDN not ready — skip gracefully
  const hands = new window.Hands({
    locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`,
  });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
    selfieMode: true,
  });
  hands.onResults((res) => {
    const lm = res.multiHandLandmarks && res.multiHandLandmarks[0];
    if (!lm) { aim.active = false; return; }
    const tip = lm[8]; // index fingertip (normalized 0..1, origin top-left)
    aim.x = (tip.x - 0.5) *  2;   // selfieMode already mirrors — right is +x
    aim.y = (tip.y - 0.5) * -2;   // invert y so up is +
    aim.active = true;
  });
  const mpCam = new window.Camera(videoEl, {
    onFrame: async () => { await hands.send({ image: videoEl }); },
    width: 320, height: 240,
  });
  try { await mpCam.start(); } catch (e) { /* camera denied — keyboard/mouse fallback below */ }
}
startHands();

// ── Fallback input: mouse / touch ────────────────────────────────────
window.addEventListener('pointermove', (e) => {
  if (aim.active) return;
  aim.x = (e.clientX / window.innerWidth  - 0.5) *  2;
  aim.y = (e.clientY / window.innerHeight - 0.5) * -2;
}, { passive: true });

// ── Boot screen dismiss ──────────────────────────────────────────────
const boot = document.getElementById('boot');
setTimeout(() => boot.classList.add('hide'), 800);

// ── Main loop ────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const MAX_YAW   = 0.45;   // radians
const MAX_PITCH = 0.30;
const MAX_TILT  = 0.18;   // camera.rotation.z g-force tilt

function tick() {
  const dt = Math.min(clock.getDelta(), 1/30);

  // Exponential smoothing — crisp but stable at 60fps+
  const k = 1 - Math.pow(0.001, dt);
  aimSmooth.x += (aim.x - aimSmooth.x) * k;
  aimSmooth.y += (aim.y - aimSmooth.y) * k;

  // Camera orientation from aim
  camera.rotation.order = 'YXZ';
  camera.rotation.y = -aimSmooth.x * MAX_YAW;
  camera.rotation.x =  aimSmooth.y * MAX_PITCH;
  // G-force tilt: bank into the turn proportional to horizontal aim
  camera.rotation.z = -aimSmooth.x * MAX_TILT;

  composer.render(dt);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
