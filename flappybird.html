<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flappy">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>Flappy Bird — iOS</title>
<style>
  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    position: fixed;
    inset: 0;
    background: #000000;
  }
  #stage {
    position: absolute;
    inset: 0;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: -webkit-optimize-contrast;
    background: #000000;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    pointer-events: none;
    text-align: center;
  }
  #overlay * { pointer-events: none; }
  #overlay .panel, #overlay #restartBtn { pointer-events: auto; }
  #title {
    font-size: clamp(36px, 9vmin, 72px);
    font-weight: 900;
    letter-spacing: 4px;
    color: #ffffff;
    text-shadow: 0 0 18px #9f6cff, 0 0 32px #00d4ff, 2px 2px 0 #000;
    margin-bottom: 8px;
    font-family: "SF Pro Display", -apple-system, sans-serif;
  }
  #subtitle {
    font-size: clamp(14px, 3.2vmin, 22px);
    margin-bottom: 24px;
    color: #fff;
    font-weight: 600;
  }
  .tapHint {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 20px;
    background: rgba(0,0,0,0.35);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .panel {
    background: rgba(0,0,0,0.55);
    border: 4px solid #fff;
    border-radius: 16px;
    padding: 22px 32px;
    text-align: center;
    box-shadow: 0 0 0 4px #000, 0 10px 30px rgba(0,0,0,0.4);
    max-width: 86%;
  }
  #gameOverTitle {
    font-size: clamp(28px, 7vmin, 54px);
    color: #ff5252;
    margin-bottom: 12px;
    letter-spacing: 2px;
    font-weight: 900;
  }
  .row {
    font-size: clamp(16px, 4vmin, 26px);
    margin: 6px 0;
    font-weight: 700;
  }
  .label { color: #ffdd00; }
  #restartBtn {
    margin-top: 18px;
    padding: 14px 34px;
    font-size: clamp(16px, 4vmin, 22px);
    font-family: inherit;
    font-weight: 900;
    color: #000;
    background: #ffdd00;
    border: 4px solid #000;
    border-radius: 12px;
    cursor: pointer;
    text-shadow: none;
    box-shadow: 0 5px 0 #b8860b;
    transition: transform 0.05s, box-shadow 0.05s;
    letter-spacing: 1px;
    -webkit-appearance: none;
  }
  #restartBtn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #b8860b;
  }
  .hidden { display: none !important; }

  #gate {
    position: fixed;
    inset: 0;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    z-index: 100;
  }
  #gate h1 {
    font-size: 28px;
    margin: 0 0 12px;
    color: #ffdd00;
  }
  #gate p {
    font-size: 16px;
    line-height: 1.5;
    max-width: 420px;
    color: #ddd;
  }
  #gate .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }

  @media (orientation: landscape) and (max-height: 500px) {
    #rotate {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      z-index: 50;
      padding: 24px;
    }
  }
  #rotate { display: none; }
</style>
</head>
<body>
<div id="gate" class="hidden">
  <div class="icon">📱</div>
  <h1>iPhone / iPad Only</h1>
  <p>This game is designed exclusively for iOS devices. Please open it on an iPhone or iPad using Safari.</p>
</div>

<div id="stage">
  <canvas id="game"></canvas>
  <div id="overlay" class="show">
    <div id="startScreen">
      <div id="title">ETHEREAL EYE</div>
      <div id="subtitle">Drift through the Void Fractures</div>
      <div class="tapHint">TAP TO BEGIN</div>
    </div>
    <div id="gameOverScreen" class="hidden">
      <div class="panel">
        <div id="gameOverTitle">GAME OVER</div>
        <div class="row"><span class="label">SCORE</span> <span id="finalScore">0</span></div>
        <div class="row"><span class="label">BEST</span> <span id="bestScore">0</span></div>
        <button id="restartBtn">RESTART</button>
      </div>
    </div>
  </div>
</div>

<div id="rotate">Please rotate to portrait mode to play.</div>

<script>
(function() {
  // ---------- iOS gate ----------
  const ua = navigator.userAgent || '';
  const platform = navigator.platform || '';
  const isIPhone = /iPhone|iPod/.test(ua);
  // iPadOS 13+ reports as Mac; detect via touch points
  const isIPad = /iPad/.test(ua) || (platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isIOS = isIPhone || isIPad;

  if (!isIOS) {
    document.getElementById('gate').classList.remove('hidden');
    document.getElementById('stage').style.display = 'none';
    return;
  }

  // ---------- Canvas sizing (DPR-aware) ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Logical game world dimensions (iPhone-ish portrait)
  const BASE_W = 360;
  let W = BASE_W;
  let H = 640;
  let scale = 1;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cw = window.innerWidth;
    const ch = window.innerHeight;

    // Fit logical width to physical width
    scale = cw / BASE_W;
    W = BASE_W;
    H = Math.round(ch / scale);

    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';

    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;

    recalcLayout();
  }

  let GROUND_H, PLAY_H;
  function recalcLayout() {
    GROUND_H = Math.max(60, Math.round(H * 0.11));
    PLAY_H = H - GROUND_H;
  }

  // ---------- Physics / constants ----------
  const GRAVITY = 0.272; // 20% lower than original 0.34 — floating ether feel
  const FLAP = -5.6;
  const MAX_FALL = 9;

  const PIPE_W = 56;
  const PIPE_GAP = 160;
  const PIPE_SPACING = 200;
  const PIPE_SPEED = 2.0;
  const PIPE_MIN_TOP = 60;

  const BIRD_X_FRAC = 0.28;
  const BIRD_R = 14;          // Ethereal Eye radius
  const BIRD_W = BIRD_R * 2;
  const BIRD_H = BIRD_R * 2;

  const STATE_READY = 0;
  const STATE_PLAY = 1;
  const STATE_OVER = 2;
  let state = STATE_READY;

  let bird, pipes, particles, score, best, frame, flashAlpha, burstFrames, wingImpulse;
  best = parseInt(localStorage.getItem('flappy_best_ios') || '0', 10);

  function reset() {
    bird = { x: Math.round(W * BIRD_X_FRAC), y: PLAY_H / 2, vy: 0, rot: 0 };
    pipes = [];
    particles = [];
    score = 0;
    frame = 0;
    flashAlpha = 0;
    burstFrames = 0;
    wingImpulse = 0;
    // Seed crystal shape data for each fracture on spawn
    for (let i = 0; i < 4; i++) addPipe(W + 120 + i * PIPE_SPACING);
  }

  function addPipe(x) {
    const top = PIPE_MIN_TOP + Math.random() * (PLAY_H - PIPE_GAP - PIPE_MIN_TOP * 2);
    pipes.push({
      x: x,
      top: top,
      passed: false,
      seed: Math.random() * 1000,
      pulse: Math.random() * Math.PI * 2,
    });
  }

  function flap() {
    if (state === STATE_READY) state = STATE_PLAY;
    if (state === STATE_PLAY) {
      bird.vy = FLAP;
      bird.rot = -0.5;
      wingImpulse = 1;
      haptic();
    }
  }

  function haptic() {
    // Best-effort tactile feedback (Safari gates most; no-op if blocked)
    if (navigator.vibrate) { try { navigator.vibrate(8); } catch (e) {} }
  }

  function update() {
    frame++;

    // Wing impulse decays toward rest
    if (wingImpulse > 0) wingImpulse = Math.max(0, wingImpulse - 0.05);
    if (burstFrames > 0) burstFrames--;

    if (state === STATE_READY) {
      // Float above the title text during the start screen
      bird.y = PLAY_H * 0.28 + Math.sin(frame * 0.06) * 10;
      emitTrail();
      updateParticles();
      return;
    }
    if (state === STATE_PLAY) {
      bird.vy = Math.min(bird.vy + GRAVITY, MAX_FALL);
      bird.y += bird.vy;
      bird.rot = Math.max(-0.5, Math.min(1.2, bird.vy * 0.09));

      for (const p of pipes) p.x -= PIPE_SPEED;
      while (pipes.length && pipes[0].x + PIPE_W < -10) pipes.shift();
      const last = pipes[pipes.length - 1];
      if (!last || last.x < W - PIPE_SPACING) {
        addPipe((last ? last.x : W) + PIPE_SPACING);
      }

      for (const p of pipes) {
        if (!p.passed && p.x + PIPE_W < bird.x) {
          p.passed = true;
          score++;
          burstFrames = 10; // Ethereal spell burst
          if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
        }
      }

      emitTrail();
      updateParticles();

      if (collide()) {
        state = STATE_OVER;
        flashAlpha = 0.85;
        if (score > best) {
          best = score;
          localStorage.setItem('flappy_best_ios', String(best));
        }
        if (navigator.vibrate) { try { navigator.vibrate([30, 40, 30]); } catch (e) {} }
        showGameOver();
      }
    } else if (state === STATE_OVER) {
      if (bird.y + BIRD_R < PLAY_H) {
        bird.vy = Math.min(bird.vy + GRAVITY, MAX_FALL);
        bird.y += bird.vy;
        bird.rot = Math.min(1.6, bird.rot + 0.05);
      } else {
        bird.y = PLAY_H - BIRD_R;
      }
      updateParticles();
      if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - 0.08);
    }
  }

  // ---------- Particle trail ----------
  function emitTrail() {
    if (frame % 2 !== 0) return;
    particles.push({
      x: bird.x - BIRD_R * 0.6,
      y: bird.y + (Math.random() - 0.5) * 4,
      r: 3 + Math.random() * 2,
      life: 1,
      decay: 0.035 + Math.random() * 0.025,
    });
    if (particles.length > 40) particles.splice(0, particles.length - 40);
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= p.decay;
      p.r *= 0.96;
      p.x -= PIPE_SPEED * 0.3;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function collide() {
    const r = BIRD_R - 3;

    if (bird.y + r >= PLAY_H) return true;
    if (bird.y - r <= 0) { bird.y = r; bird.vy = 0; }

    for (const p of pipes) {
      if (bird.x + r > p.x && bird.x - r < p.x + PIPE_W) {
        if (bird.y - r < p.top || bird.y + r > p.top + PIPE_GAP) return true;
      }
    }
    return false;
  }

  // ---------- Rendering ----------
  function drawBackground() {
    // Deep radial violet → black ether
    const cx = W / 2;
    const cy = H / 2;
    const rad = Math.max(W, H) * 0.75;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
    g.addColorStop(0, '#0a001a');
    g.addColorStop(1, '#000000');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Distant drifting star dust
    const starCount = 40;
    for (let i = 0; i < starCount; i++) {
      const seed = i * 97.13;
      const sx = ((seed * 53 + frame * 0.15) % (W + 20)) - 10;
      const sy = (seed * 29) % PLAY_H;
      const tw = 0.4 + 0.6 * Math.abs(Math.sin(frame * 0.04 + i));
      ctx.fillStyle = 'rgba(200,180,255,' + (0.15 + tw * 0.35) + ')';
      ctx.fillRect(sx, sy, 1.5, 1.5);
    }
  }

  function drawGround() {
    // Spectral void floor — subtle horizon with glowing crack
    const gr = ctx.createLinearGradient(0, PLAY_H, 0, H);
    gr.addColorStop(0, 'rgba(40, 10, 60, 0.85)');
    gr.addColorStop(1, '#000000');
    ctx.fillStyle = gr;
    ctx.fillRect(0, PLAY_H, W, GROUND_H);

    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#9f6cff';
    ctx.strokeStyle = 'rgba(190,140,255,0.6)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, PLAY_H + 0.5);
    ctx.lineTo(W, PLAY_H + 0.5);
    ctx.stroke();
    ctx.restore();
  }

  function drawPipes() {
    ctx.save();
    ctx.globalAlpha = 0.8; // spectral
    for (const p of pipes) drawPipe(p);
    ctx.restore();
    // Magic circles rendered at full alpha on top
    for (const p of pipes) drawMagicCircle(p);
  }

  function drawPipe(p) {
    drawShard(p.x, 0, PIPE_W, p.top, true, p.seed);
    drawShard(p.x, p.top + PIPE_GAP, PIPE_W, PLAY_H - (p.top + PIPE_GAP), false, p.seed + 13);
  }

  // Deterministic pseudo-random from a seed
  function srand(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  function drawShard(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    const tipY = isTop ? y + h : y;             // Pointed end faces the gap
    const baseY = isTop ? y : y + h;            // Flat end at screen edge

    // Gradient runs from void base to glowing edge (tip)
    const g = ctx.createLinearGradient(0, baseY, 0, tipY);
    g.addColorStop(0, '#05000a');
    g.addColorStop(0.55, '#1a0730');
    g.addColorStop(1, '#6a2aff');

    // Build jagged zigzag along the gap-facing tip
    const pts = [];
    const segs = 5;
    const tipOvershoot = 14;
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      const sx = x + t * w;
      const jitter = (srand(seed + i) - 0.5) * tipOvershoot;
      const sy = tipY + (isTop ? jitter : -jitter);
      pts.push([sx, sy]);
    }

    ctx.save();
    ctx.shadowBlur = 14;
    ctx.shadowColor = '#7a3aff';

    ctx.beginPath();
    ctx.moveTo(x, baseY);
    for (const pt of pts) ctx.lineTo(pt[0], pt[1]);
    ctx.lineTo(x + w, baseY);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();

    // Glowing edge stroke along the jagged tip only
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.strokeStyle = 'rgba(180,120,255,0.9)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Secondary internal fracture lines
    ctx.strokeStyle = 'rgba(140,80,220,0.35)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const t1 = 0.2 + i * 0.3;
      const ax = x + t1 * w;
      const ay = baseY;
      const bx = x + (t1 + 0.05) * w + (srand(seed + i * 7) - 0.5) * 8;
      const by = tipY + (isTop ? -4 : 4);
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawMagicCircle(p) {
    const cx = p.x + PIPE_W / 2;
    const cy = p.top + PIPE_GAP / 2;
    const r = Math.min(PIPE_GAP, 90) * 0.28;
    const pulse = 1 + Math.sin(frame * 0.12 + p.pulse) * 0.08;

    ctx.save();
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#9be3ff';
    ctx.strokeStyle = 'rgba(170,235,255,0.85)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r * pulse, 0, Math.PI * 2);
    ctx.stroke();

    // Inner ring
    ctx.strokeStyle = 'rgba(200,160,255,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, r * pulse * 0.6, 0, Math.PI * 2);
    ctx.stroke();

    // Runic ticks
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 + frame * 0.02;
      const ix = cx + Math.cos(a) * r * pulse;
      const iy = cy + Math.sin(a) * r * pulse;
      ctx.fillStyle = 'rgba(200,240,255,0.9)';
      ctx.beginPath();
      ctx.arc(ix, iy, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawTrail() {
    ctx.save();
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#ffffff';
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life) * 0.9;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawBird() {
    // Ethereal Eye — circular with aura, rotating triangle wings
    ctx.save();
    ctx.translate(bird.x, bird.y);

    // Glow aura — boosted briefly on score (burst)
    const baseBlur = 20;
    const blur = burstFrames > 0 ? 40 : baseBlur;
    ctx.shadowBlur = blur;
    // Alternate hue between cyan and violet for magical shimmer
    ctx.shadowColor = (Math.floor(frame / 20) % 2 === 0) ? '#00e5ff' : '#b56bff';

    // Wings (translucent white triangles)
    const wingAngle = 0.35 + wingImpulse * 0.9 + Math.sin(frame * 0.15) * 0.08;
    drawWing(-1, wingAngle);
    drawWing(1, wingAngle);

    // Outer halo
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#b56bff';
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_R + 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Core white circle
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_R, 0, Math.PI * 2);
    ctx.fill();

    // Iris ring (soft gold)
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 220, 140, 0.35)';
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_R * 0.75, 0, Math.PI * 2);
    ctx.fill();

    // Gold pupil
    ctx.fillStyle = '#ffc94a';
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_R * 0.42, 0, Math.PI * 2);
    ctx.fill();

    // Dark pupil core
    ctx.fillStyle = '#2a1400';
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_R * 0.2, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(-BIRD_R * 0.35, -BIRD_R * 0.35, BIRD_R * 0.16, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawWing(side, angle) {
    // side = -1 (left) or +1 (right)
    ctx.save();
    ctx.translate(side * (BIRD_R + 2), 0);
    ctx.rotate(side * angle);
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(side * 20, -10);
    ctx.lineTo(side * 20, 10);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 0.9;
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  function drawScore() {
    if (state === STATE_OVER) return;
    const text = String(score);
    const size = Math.round(H * 0.08);
    ctx.font = '900 ' + size + 'px -apple-system, "SF Pro Display", Helvetica, sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 6;
    ctx.strokeStyle = '#000';
    ctx.fillStyle = '#fff';
    const y = Math.max(80, H * 0.14);
    ctx.strokeText(text, W / 2, y);
    ctx.fillText(text, W / 2, y);
  }

  function drawFlash() {
    if (flashAlpha > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha + ')';
      ctx.fillRect(0, 0, W, H);
    }
  }

  function render() {
    drawBackground();
    drawPipes();
    drawGround();
    drawTrail();
    drawBird();
    drawScore();
    drawFlash();
  }

  let last = 0;
  function loop(t) {
    // Fixed-ish step to smooth iOS variable rAF
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ---------- Overlay / DOM ----------
  const overlay = document.getElementById('overlay');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScore');
  const restartBtn = document.getElementById('restartBtn');

  function showStart() {
    overlay.classList.add('show');
    startScreen.classList.remove('hidden');
    gameOverScreen.classList.add('hidden');
  }
  function hideOverlay() {
    overlay.classList.remove('show');
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
  }
  function showGameOver() {
    finalScoreEl.textContent = String(score);
    bestScoreEl.textContent = String(best);
    overlay.classList.add('show');
    startScreen.classList.add('hidden');
    gameOverScreen.classList.remove('hidden');
  }

  function restart() {
    reset();
    state = STATE_READY;
    showStart();
  }

  function handleTouchStart(e) {
    if (e.cancelable) e.preventDefault();
    if (state === STATE_OVER) return;
    if (state === STATE_READY) hideOverlay();
    flap();
  }

  const stage = document.getElementById('stage');
  stage.addEventListener('touchstart', handleTouchStart, { passive: false });
  stage.addEventListener('touchmove', function(e){ if (e.cancelable) e.preventDefault(); }, { passive: false });
  stage.addEventListener('touchend', function(e){ if (e.cancelable) e.preventDefault(); }, { passive: false });
  // Click fallback for desktop Safari / testing
  stage.addEventListener('click', function(e) {
    if (e.target.closest('#restartBtn')) return;
    handleTouchStart(e);
  });

  restartBtn.addEventListener('touchend', function(e) {
    e.stopPropagation();
    e.preventDefault();
    restart();
  }, { passive: false });
  // Safari sometimes needs click fallback inside PWA
  restartBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    restart();
  });

  // Prevent iOS gestures that disrupt gameplay
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('dblclick', function(e){ e.preventDefault(); });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function() {
    setTimeout(resize, 150);
  });

  // Boot
  resize();
  reset();
  bestScoreEl.textContent = String(best);
  showStart();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
