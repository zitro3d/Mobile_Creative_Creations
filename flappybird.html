<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flappy">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>Flappy Bird — iOS</title>
<style>
  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    position: fixed;
    inset: 0;
    background: #000000;
  }
  #stage {
    position: absolute;
    inset: 0;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: -webkit-optimize-contrast;
    background: #000000;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    pointer-events: none;
    text-align: center;
  }
  #overlay * { pointer-events: none; }
  #overlay .panel, #overlay #restartBtn { pointer-events: auto; }
  #title {
    font-size: clamp(36px, 9vmin, 72px);
    font-weight: 900;
    letter-spacing: 4px;
    color: #ffffff;
    text-shadow: 0 0 18px #9f6cff, 0 0 32px #00d4ff, 2px 2px 0 #000;
    margin-bottom: 8px;
    font-family: "SF Pro Display", -apple-system, sans-serif;
  }
  #subtitle {
    font-size: clamp(14px, 3.2vmin, 22px);
    margin-bottom: 24px;
    color: #fff;
    font-weight: 600;
  }
  .tapHint {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 20px;
    background: rgba(0,0,0,0.35);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .panel {
    background: rgba(0,0,0,0.55);
    border: 4px solid #fff;
    border-radius: 16px;
    padding: 22px 32px;
    text-align: center;
    box-shadow: 0 0 0 4px #000, 0 10px 30px rgba(0,0,0,0.4);
    max-width: 86%;
  }
  #gameOverTitle {
    font-size: clamp(28px, 7vmin, 54px);
    color: #ff5252;
    margin-bottom: 12px;
    letter-spacing: 2px;
    font-weight: 900;
  }
  .row {
    font-size: clamp(16px, 4vmin, 26px);
    margin: 6px 0;
    font-weight: 700;
  }
  .label { color: #ffdd00; }
  #restartBtn {
    margin-top: 18px;
    padding: 14px 34px;
    font-size: clamp(16px, 4vmin, 22px);
    font-family: inherit;
    font-weight: 900;
    color: #000;
    background: #ffdd00;
    border: 4px solid #000;
    border-radius: 12px;
    cursor: pointer;
    text-shadow: none;
    box-shadow: 0 5px 0 #b8860b;
    transition: transform 0.05s, box-shadow 0.05s;
    letter-spacing: 1px;
    -webkit-appearance: none;
  }
  #restartBtn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #b8860b;
  }
  .hidden { display: none !important; }

  #gate {
    position: fixed;
    inset: 0;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    z-index: 100;
  }
  #gate h1 {
    font-size: 28px;
    margin: 0 0 12px;
    color: #ffdd00;
  }
  #gate p {
    font-size: 16px;
    line-height: 1.5;
    max-width: 420px;
    color: #ddd;
  }
  #gate .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }

  @media (orientation: landscape) and (max-height: 500px) {
    #rotate {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      z-index: 50;
      padding: 24px;
    }
  }
  #rotate { display: none; }
</style>
</head>
<body>
<div id="gate" class="hidden">
  <div class="icon">📱</div>
  <h1>iPhone / iPad Only</h1>
  <p>This game is designed exclusively for iOS devices. Please open it on an iPhone or iPad using Safari.</p>
</div>

<div id="stage">
  <canvas id="game"></canvas>
  <div id="overlay" class="show">
    <div id="startScreen">
      <div id="title">SHATTERED PLANET</div>
      <div id="subtitle">Navigate the debris field</div>
      <div class="tapHint">TAP TO LAUNCH</div>
    </div>
    <div id="gameOverScreen" class="hidden">
      <div class="panel">
        <div id="gameOverTitle">GAME OVER</div>
        <div class="row"><span class="label">SCORE</span> <span id="finalScore">0</span></div>
        <div class="row"><span class="label">BEST</span> <span id="bestScore">0</span></div>
        <button id="restartBtn">RESTART</button>
      </div>
    </div>
  </div>
</div>

<div id="rotate">Please rotate to portrait mode to play.</div>

<script>
(function() {
  // ---------- iOS gate ----------
  const ua = navigator.userAgent || '';
  const platform = navigator.platform || '';
  const isIPhone = /iPhone|iPod/.test(ua);
  // iPadOS 13+ reports as Mac; detect via touch points
  const isIPad = /iPad/.test(ua) || (platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isIOS = isIPhone || isIPad;

  if (!isIOS) {
    document.getElementById('gate').classList.remove('hidden');
    document.getElementById('stage').style.display = 'none';
    return;
  }

  // ---------- Canvas sizing (DPR-aware) ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Logical game world dimensions (iPhone-ish portrait)
  const BASE_W = 360;
  let W = BASE_W;
  let H = 640;
  let scale = 1;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cw = window.innerWidth;
    const ch = window.innerHeight;

    // Fit logical width to physical width
    scale = cw / BASE_W;
    W = BASE_W;
    H = Math.round(ch / scale);

    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';

    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;

    recalcLayout();
  }

  let GROUND_H, PLAY_H;
  function recalcLayout() {
    GROUND_H = Math.max(60, Math.round(H * 0.11));
    PLAY_H = H - GROUND_H;
    // Reposition stars to fit new dimensions
    if (stars.length) { initStars(); initDust(); initNebula(); }
  }

  // ---------- Physics / constants ----------
  const GRAVITY = 0.272; // 20% lower than original 0.34 — floating ether feel
  const FLAP = -5.6;
  const MAX_FALL = 9;

  const PIPE_W = 56;
  const PIPE_GAP = 160;
  const PIPE_SPACING = 200;
  const PIPE_SPEED = 2.0;
  const PIPE_MIN_TOP = 60;

  const BIRD_X_FRAC = 0.28;
  const BIRD_R = 14;          // Ethereal Eye radius
  const BIRD_W = BIRD_R * 2;
  const BIRD_H = BIRD_R * 2;

  const STATE_READY = 0;
  const STATE_PLAY = 1;
  const STATE_OVER = 2;
  let state = STATE_READY;

  let bird, pipes, sparks, exhaust, score, best, frame, flashAlpha, burstFrames, shakeFrames, scorePulse, thrusterFrames;
  let stars = [];
  let dust  = [];                  // fast white speed-dust specks
  let nebula;                       // static far-background cloud
  best = parseInt(localStorage.getItem('flappy_best_ios') || '0', 10);

  function reset() {
    bird = {
      x: Math.round(W * BIRD_X_FRAC),
      y: PLAY_H / 2,
      vy: 0,
    };
    pipes = [];
    sparks = [];
    exhaust = [];
    score = 0;
    frame = 0;
    flashAlpha = 0;
    burstFrames = 0;
    shakeFrames = 0;
    scorePulse = 0;
    thrusterFrames = 0;
    initStars();
    initDust();
    initNebula();
    for (let i = 0; i < 4; i++) addPipe(W + 120 + i * PIPE_SPACING);
  }

  // 3-layer parallax starfield — 80 stars with speedFactor 0.1 / 0.5 / 1.0
  const SPEED_FACTORS = [0.1, 0.5, 1.0];
  function initStars() {
    stars = [];
    for (let i = 0; i < 80; i++) {
      const sf = SPEED_FACTORS[Math.floor(Math.random() * 3)];
      stars.push(makeStar(Math.random() * W, sf));
    }
  }

  function makeStar(x, sf) {
    const big = sf === 1.0;
    const mid = sf === 0.5;
    return {
      x: x,
      y: Math.random() * PLAY_H,
      speedFactor: sf,
      size: big ? 1.6 + Math.random() * 1.4 : mid ? 1 + Math.random() * 0.6 : 1,
      a: big ? 0.7 + Math.random() * 0.3 : mid ? 0.35 + Math.random() * 0.3 : 0.1 + Math.random() * 0.2,
      tw: Math.random() * Math.PI * 2,
      flicker: 1,
      next: Math.floor(Math.random() * 8),
    };
  }

  function updateStars() {
    for (const s of stars) {
      s.x -= PIPE_SPEED * s.speedFactor;
      if (s.x < -2) {
        // Reset to right edge at random height
        s.x = W + Math.random() * 8;
        s.y = Math.random() * PLAY_H;
      }
      if (frame >= s.next) {
        s.flicker = 1 + (Math.random() - 0.5) * 0.2;
        s.next = frame + 3 + Math.floor(Math.random() * 5);
      }
    }
  }

  // Fast speed-dust specks that streak right-to-left constantly
  function initDust() {
    dust = [];
    for (let i = 0; i < 40; i++) {
      dust.push({
        x: Math.random() * W,
        y: Math.random() * PLAY_H,
        speed: 4 + Math.random() * 4,   // much faster than parallax stars
        len:   3 + Math.random() * 5,   // streak length
        a: 0.5 + Math.random() * 0.5,
      });
    }
  }

  function updateDust() {
    for (const d of dust) {
      d.x -= d.speed;
      if (d.x < -d.len - 2) {
        d.x = W + Math.random() * 8;
        d.y = Math.random() * PLAY_H;
      }
    }
  }

  // Static nebula cloud in the far background
  function initNebula() {
    nebula = {
      x: W * (0.55 + Math.random() * 0.2),
      y: PLAY_H * (0.35 + Math.random() * 0.2),
      r: Math.max(W, PLAY_H) * 0.6,
    };
  }

  function addPipe(x) {
    const top = PIPE_MIN_TOP + Math.random() * (PLAY_H - PIPE_GAP - PIPE_MIN_TOP * 2);
    pipes.push({
      x: x,
      top: top,
      passed: false,
      seed: Math.random() * 1000,
      pulse: Math.random() * Math.PI * 2,
      topShape: buildShardShape(PIPE_W, top, true),
      botShape: buildShardShape(PIPE_W, PLAY_H - (top + PIPE_GAP), false),
    });
  }

  // Build a static jagged obsidian-shard polygon. Generated once per pipe so
  // the shape does not wobble as the crystal moves across the screen.
  function buildShardShape(w, h, isTop) {
    const tipSign = isTop ? 1 : -1;
    const baseY   = isTop ? 0 : h;
    const tipY    = isTop ? h : 0;

    const basePad = 4;                 // base extends slightly outward
    const tipInsetL = w * 0.28;        // tip-narrow inset (left side)
    const tipInsetR = w * 0.72;        // tip-narrow inset (right side)

    const pts = [];

    // Base corners (wide)
    pts.push([-basePad, baseY]);
    pts.push([w + basePad, baseY]);

    const nNodes = 3 + Math.floor(Math.random() * 2); // 3 or 4

    // Right side — taper inward toward tip with per-node jitter
    for (let i = 1; i <= nNodes; i++) {
      const t = i / (nNodes + 1);
      const y = baseY + (tipY - baseY) * t;
      const sideX = (w + basePad) * (1 - t) + tipInsetR * t;
      const jitter = (Math.random() * 2 - 1) * 7;   // ±7 px
      pts.push([sideX + jitter, y]);
    }
    // Right tip corner
    pts.push([tipInsetR, tipY]);

    // Tip: 3 jagged triangular spear-peaks of varying depth
    const tipSegs = 3;
    const tipSpan = tipInsetR - tipInsetL;
    for (let i = 0; i < tipSegs; i++) {
      const peakX = tipInsetR - ((i + 0.5) / tipSegs) * tipSpan;
      const depth = 7 + Math.random() * 11;        // varies 7–18 px
      pts.push([peakX, tipY + depth * tipSign]);
      const troughX = tipInsetR - ((i + 1) / tipSegs) * tipSpan;
      pts.push([troughX, tipY]);
    }

    // Left side — taper back out to base
    for (let i = nNodes; i >= 1; i--) {
      const t = i / (nNodes + 1);
      const y = baseY + (tipY - baseY) * t;
      const sideX = (-basePad) * (1 - t) + tipInsetL * t;
      const jitter = (Math.random() * 2 - 1) * 7;
      pts.push([sideX + jitter, y]);
    }

    return pts;
  }

  function flap() {
    if (state === STATE_READY) {
      state = STATE_PLAY;
      bird.x = Math.round(W * BIRD_X_FRAC);
    }
    if (state === STATE_PLAY) {
      bird.vy = FLAP;
      thrusterFrames = 5;   // blue flame visible for 5 frames after a burn
      haptic();
    }
  }

  function haptic() {
    // Best-effort tactile feedback (Safari gates most; no-op if blocked)
    if (navigator.vibrate) { try { navigator.vibrate(8); } catch (e) {} }
  }

  function update() {
    frame++;

    updateStars();
    updateDust();

    if (thrusterFrames > 0) thrusterFrames--;
    if (burstFrames > 0) burstFrames--;
    if (scorePulse > 0) scorePulse = Math.max(0, scorePulse - 0.1);

    // Engine exhaust: emit expanding/fading grey smoke puff behind the ship
    if (state !== STATE_OVER && frame % 2 === 0) {
      exhaust.push({
        x: bird.x - BIRD_R * 0.8,
        y: bird.y + (Math.random() - 0.5) * 5,
        r: 2.5 + Math.random() * 1.5,
        a: 0.55,
      });
      if (exhaust.length > 60) exhaust.shift();
    }
    for (let i = exhaust.length - 1; i >= 0; i--) {
      const p = exhaust[i];
      p.r *= 1.06;                            // expand
      p.a -= 0.02;                            // fade
      p.x -= PIPE_SPEED * 0.45;               // drift backward
      if (p.a <= 0) exhaust.splice(i, 1);
    }

    if (state === STATE_READY) {
      // Float centered above the title text during the start screen
      bird.x = W / 2;
      bird.y = PLAY_H * 0.28 + Math.sin(frame * 0.06) * 10;
      updateSparks();
      return;
    }
    if (state === STATE_PLAY) {
      bird.vy = Math.min(bird.vy + GRAVITY, MAX_FALL);
      bird.y += bird.vy;
      bird.rot = Math.max(-0.5, Math.min(1.2, bird.vy * 0.09));

      for (const p of pipes) p.x -= PIPE_SPEED;
      while (pipes.length && pipes[0].x + PIPE_W < -10) pipes.shift();
      const last = pipes[pipes.length - 1];
      if (!last || last.x < W - PIPE_SPACING) {
        addPipe((last ? last.x : W) + PIPE_SPACING);
      }

      for (const p of pipes) {
        if (!p.passed && p.x + PIPE_W < bird.x) {
          p.passed = true;
          score++;
          burstFrames = 14;       // eye glow pulse
          scorePulse = 1;         // score text grows to 1.5x then shrinks over 10 frames
          emitScoreBurst(p.x + PIPE_W / 2, p.top + PIPE_GAP / 2);
          if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
        }
      }

      updateSparks();

      if (collide()) {
        state = STATE_OVER;
        flashAlpha = 0.85;
        shakeFrames = 12; // ~200ms at 60fps
        emitDeathShards(bird.x, bird.y);
        if (score > best) {
          best = score;
          localStorage.setItem('flappy_best_ios', String(best));
        }
        if (navigator.vibrate) { try { navigator.vibrate([30, 40, 30]); } catch (e) {} }
        setTimeout(showGameOver, 200);
      }
    } else if (state === STATE_OVER) {
      if (bird.y + BIRD_R < PLAY_H) {
        bird.vy = Math.min(bird.vy + GRAVITY, MAX_FALL);
        bird.y += bird.vy;
        bird.rot = Math.min(1.6, bird.rot + 0.05);
      } else {
        bird.y = PLAY_H - BIRD_R;
      }
      updateSparks();
      if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - 0.08);
    }
  }

  function updateSparks() {
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.life -= s.decay;
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= s.drag;
      s.vy = s.vy * s.drag + s.gravity;
      s.rot += s.vr;
      if (s.life <= 0 || s.y > H + 50) sparks.splice(i, 1);
    }
  }

  function emitScoreBurst(cx, cy) {
    const n = 12 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + Math.random() * 0.3;
      const sp = 1.8 + Math.random() * 2.4;
      sparks.push({
        x: cx,
        y: cy,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        size: 3 + Math.random() * 2,
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 0.3,
        life: 1,
        decay: 0.025 + Math.random() * 0.02,
        shape: 'square',
        color: '#ffd75a',
        glow: '#ffd066',
        drag: 0.93,
        gravity: 0.05,
      });
    }
  }

  function emitDeathShards(cx, cy) {
    for (let i = 0; i < 15; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 2.2 + Math.random() * 3;
      sparks.push({
        x: cx,
        y: cy,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1.5,
        size: 7 + Math.random() * 5,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.35,
        life: 1,
        decay: 0.012,
        shape: 'tri',
        color: '#cf9bff',
        glow: '#bc13fe',
        drag: 0.99,
        gravity: 0.28,
      });
    }
  }

  function collide() {
    const r = BIRD_R - 3;

    if (bird.y + r >= PLAY_H) return true;
    if (bird.y - r <= 0) { bird.y = r; bird.vy = 0; }

    for (const p of pipes) {
      if (bird.x + r > p.x && bird.x - r < p.x + PIPE_W) {
        if (bird.y - r < p.top || bird.y + r > p.top + PIPE_GAP) return true;
      }
    }
    return false;
  }

  // ---------- Rendering ----------
  function drawBackground() {
    // Deep space base
    ctx.fillStyle = '#02010a';
    ctx.fillRect(0, 0, W, H);

    // Static nebula — big blurred purple/pink cloud way in the back
    if (nebula) {
      ctx.save();
      const ng = ctx.createRadialGradient(nebula.x, nebula.y, 0, nebula.x, nebula.y, nebula.r);
      ng.addColorStop(0,    'rgba(200, 90, 180, 0.22)');
      ng.addColorStop(0.35, 'rgba(120, 60, 180, 0.16)');
      ng.addColorStop(0.7,  'rgba(60, 30, 110, 0.08)');
      ng.addColorStop(1,    'rgba(0, 0, 0, 0)');
      ctx.fillStyle = ng;
      ctx.fillRect(0, 0, W, H);

      // Secondary pink wisp offset for more organic cloud shape
      const ng2 = ctx.createRadialGradient(
        nebula.x - nebula.r * 0.3, nebula.y + nebula.r * 0.15, 0,
        nebula.x - nebula.r * 0.3, nebula.y + nebula.r * 0.15, nebula.r * 0.6
      );
      ng2.addColorStop(0, 'rgba(255, 150, 200, 0.14)');
      ng2.addColorStop(1, 'rgba(255, 150, 200, 0)');
      ctx.fillStyle = ng2;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    // Unified 3-layer parallax starfield
    for (const s of stars) {
      if (s.speedFactor === 0.1) {
        ctx.fillStyle = 'rgba(180,160,220,' + (s.a * s.flicker) + ')';
        ctx.fillRect(s.x, s.y, 1, 1);
      } else if (s.speedFactor === 0.5) {
        ctx.fillStyle = 'rgba(200,190,240,' + (s.a * s.flicker) + ')';
        ctx.fillRect(s.x, s.y, s.size, s.size);
      } else {
        const tw = 0.5 + 0.5 * Math.abs(Math.sin(frame * 0.08 + s.tw));
        const alpha = s.a * tw * s.flicker;
        ctx.save();
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(220,210,255,0.9)';
        ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Fast space-dust specks — short streaks for extreme-speed illusion
    ctx.strokeStyle = '#ffffff';
    ctx.lineCap = 'round';
    for (const d of dust) {
      ctx.globalAlpha = d.a;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + d.len, d.y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawGround() {
    // Dark rocky crust with a glowing orange magma seam as horizon
    const gr = ctx.createLinearGradient(0, PLAY_H, 0, H);
    gr.addColorStop(0, 'rgba(40, 20, 15, 0.9)');
    gr.addColorStop(1, '#000000');
    ctx.fillStyle = gr;
    ctx.fillRect(0, PLAY_H, W, GROUND_H);

    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff4500';
    ctx.strokeStyle = 'rgba(255, 90, 30, 0.7)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, PLAY_H + 0.5);
    ctx.lineTo(W, PLAY_H + 0.5);
    ctx.stroke();
    ctx.restore();
  }

  function drawPipes() {
    for (const p of pipes) drawPipe(p);
  }

  function drawPipe(p) {
    drawShard(p.x, 0, PIPE_W, p.top, true, p.topShape, p.seed);
    drawShard(p.x, p.top + PIPE_GAP, PIPE_W, PLAY_H - (p.top + PIPE_GAP), false, p.botShape, p.seed + 13);
  }

  // Deterministic pseudo-random from a seed
  function srand(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  function drawShard(x, y, w, h, isTop, pts, seed) {
    if (h <= 0 || !pts) return;
    const tipY = isTop ? h : 0;
    const baseY = isTop ? 0 : h;

    ctx.save();
    ctx.translate(x, y);

    // Craggy grey rock fill with subtle gradient for volume
    const g = ctx.createLinearGradient(0, 0, w, 0);
    g.addColorStop(0,   '#555555');
    g.addColorStop(0.5, '#444444');
    g.addColorStop(1,   '#333333');

    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();

    // Glowing orange magma edge — hot debris look
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff4500';
    ctx.strokeStyle = '#ff4500';
    ctx.lineWidth = 1.6;
    ctx.stroke();
    ctx.restore();

    // Inner dark rim for depth
    ctx.strokeStyle = 'rgba(20, 10, 10, 0.7)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Craters — 3-4 darker grey lines inside the rock
    const craterCount = 3 + Math.floor(srand(seed + 101) * 2);
    const coreCx = w / 2;
    const runeStart = isTop ? baseY + 12 : tipY + 12;
    const runeEnd   = isTop ? tipY - 12 : baseY - 12;
    const span = runeEnd - runeStart;
    if (span > 20) {
      ctx.lineCap = 'round';
      for (let i = 0; i < craterCount; i++) {
        const t = (i + 0.5) / craterCount;
        const cy = runeStart + span * t;
        const len = 8 + srand(seed + 200 + i * 3) * 10;
        const offset = (srand(seed + 300 + i) - 0.5) * 6;
        const tilt = (srand(seed + 400 + i) - 0.5) * 0.4; // slight tilt for irregularity
        ctx.save();
        ctx.translate(coreCx + offset, cy);
        ctx.rotate(tilt);
        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-len / 2, 0);
        ctx.lineTo(len / 2, 0);
        ctx.stroke();
        // small crater highlight
        ctx.strokeStyle = 'rgba(90, 90, 90, 0.4)';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(-len / 2, 1);
        ctx.lineTo(len / 2, 1);
        ctx.stroke();
        ctx.restore();
      }
    }
    ctx.restore();
  }

  // Trace an inner offset contour toward the centroid for "glowing core" lines
  function drawInnerContour(pts, cx, cy, inset, stroke, glow) {
    ctx.save();
    ctx.shadowBlur = 8;
    ctx.shadowColor = glow;
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < pts.length; i++) {
      const px = pts[i][0];
      const py = pts[i][1];
      const dx = cx - px;
      const dy = cy - py;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      const ipx = px + (dx / d) * inset;
      const ipy = py + (dy / d) * inset;
      if (i === 0) ctx.moveTo(ipx, ipy);
      else ctx.lineTo(ipx, ipy);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function drawExhaust() {
    if (exhaust.length === 0) return;
    ctx.save();
    for (const p of exhaust) {
      ctx.globalAlpha = Math.max(0, p.a);
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      g.addColorStop(0, 'rgba(200,200,200,0.7)');
      g.addColorStop(1, 'rgba(80,80,80,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSparks() {
    if (sparks.length === 0) return;
    for (const s of sparks) {
      ctx.save();
      ctx.shadowBlur = 12;
      ctx.shadowColor = s.glow;
      ctx.globalAlpha = Math.max(0, s.life);
      ctx.fillStyle = s.color;
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      const sz = s.size * (0.5 + s.life * 0.5);
      if (s.shape === 'tri') {
        ctx.beginPath();
        ctx.moveTo(0, -sz * 0.8);
        ctx.lineTo(sz * 0.7, sz * 0.6);
        ctx.lineTo(-sz * 0.7, sz * 0.6);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillRect(-sz / 2, -sz / 2, sz, sz);
      }
      ctx.restore();
    }
  }

  function drawBird() {
    // Metallic triangular spacecraft — nose pointing right (direction of travel)
    ctx.save();
    ctx.translate(bird.x, bird.y);

    // Rotational lean: -20° rising, +20° falling, smooth between
    const tilt = Math.max(-0.349, Math.min(0.349, bird.vy * 0.1));
    ctx.rotate(tilt);

    // Thruster flame: flickering blue plume out the back for 5 frames post-flap
    if (thrusterFrames > 0) drawThruster();

    // Ship body — triangle pointing in +x direction
    const nose = BIRD_R * 1.1;
    const tailX = -BIRD_R * 0.85;
    const wingY = BIRD_R * 0.75;

    // Drop shadow for lift
    ctx.save();
    ctx.shadowBlur = 8;
    ctx.shadowColor = 'rgba(0,0,0,0.6)';

    // Metallic body gradient (top bright → bottom dark)
    const bodyGrad = ctx.createLinearGradient(0, -wingY, 0, wingY);
    bodyGrad.addColorStop(0,   '#e8eaed');
    bodyGrad.addColorStop(0.4, '#9aa0a6');
    bodyGrad.addColorStop(1,   '#3c4043');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(nose, 0);
    ctx.lineTo(tailX, -wingY);
    ctx.lineTo(tailX + 4, 0);
    ctx.lineTo(tailX, wingY);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Hull outline
    ctx.strokeStyle = '#1a1d21';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Cockpit window — cyan glass
    ctx.save();
    ctx.shadowBlur = 6;
    ctx.shadowColor = '#00d4ff';
    ctx.fillStyle = '#0ff';
    ctx.beginPath();
    ctx.ellipse(BIRD_R * 0.2, 0, BIRD_R * 0.3, BIRD_R * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Cockpit highlight
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.beginPath();
    ctx.ellipse(BIRD_R * 0.12, -BIRD_R * 0.06, BIRD_R * 0.12, BIRD_R * 0.05, 0, 0, Math.PI * 2);
    ctx.fill();

    // Center spine line
    ctx.strokeStyle = 'rgba(20, 20, 25, 0.8)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(nose - 2, 0);
    ctx.lineTo(tailX + 4, 0);
    ctx.stroke();

    // Red wingtip marker lights
    ctx.fillStyle = '#ff3b30';
    ctx.beginPath();
    ctx.arc(tailX + 2, -wingY + 2, 1.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(tailX + 2, wingY - 2, 1.6, 0, Math.PI * 2);
    ctx.fill();

    // Score burst halo (kept as a general "powered up" glow when passing debris)
    if (burstFrames > 0) {
      const burstT = burstFrames / 14;
      ctx.save();
      ctx.globalAlpha = burstT * 0.5;
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#00ffff';
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, BIRD_R * (1.3 + (1 - burstT) * 0.4), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  function drawThruster() {
    // Flickering blue plume behind the ship
    const flick = 0.75 + Math.random() * 0.25;
    const len = (BIRD_R * 1.0 + Math.random() * 6) * flick;
    const tailX = -BIRD_R * 0.85;

    ctx.save();
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#00b0ff';

    // Outer flame
    const g = ctx.createLinearGradient(tailX, 0, tailX - len, 0);
    g.addColorStop(0,   'rgba(255,255,255,0.95)');
    g.addColorStop(0.3, 'rgba(80,200,255,0.85)');
    g.addColorStop(1,   'rgba(0,100,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(tailX, -BIRD_R * 0.35);
    ctx.lineTo(tailX - len, 0);
    ctx.lineTo(tailX, BIRD_R * 0.35);
    ctx.closePath();
    ctx.fill();

    // Inner white-hot core
    const g2 = ctx.createLinearGradient(tailX, 0, tailX - len * 0.6, 0);
    g2.addColorStop(0, 'rgba(255,255,255,1)');
    g2.addColorStop(1, 'rgba(180,230,255,0)');
    ctx.fillStyle = g2;
    ctx.beginPath();
    ctx.moveTo(tailX, -BIRD_R * 0.15);
    ctx.lineTo(tailX - len * 0.6, 0);
    ctx.lineTo(tailX, BIRD_R * 0.15);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawScore() {
    if (state === STATE_OVER) return;
    const text = String(score).padStart(3, '0');
    const size = Math.round(H * 0.075);
    const y = Math.max(80, H * 0.14);
    const pulseScale = 1 + scorePulse * 0.5;

    ctx.save();
    ctx.translate(W / 2, y);
    ctx.scale(pulseScale, pulseScale);
    ctx.font = 'bold ' + size + 'px "Courier New", "Lucida Console", monospace';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#00ff88';
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#003318';
    ctx.fillStyle = '#00ff88';
    ctx.strokeText(text, 0, 0);
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  function drawFlash() {
    if (flashAlpha > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha + ')';
      ctx.fillRect(0, 0, W, H);
    }
  }

  function render() {
    ctx.save();
    if (shakeFrames > 0) {
      // Offset by a random −5..+5 on each axis
      const ox = (Math.random() * 2 - 1) * 5;
      const oy = (Math.random() * 2 - 1) * 5;
      ctx.translate(ox, oy);
      shakeFrames--;
    }
    drawBackground();
    drawPipes();
    drawGround();
    drawExhaust();
    drawSparks();
    drawBird();
    drawScore();
    drawFlash();
    ctx.restore();
  }

  let last = 0;
  function loop(t) {
    // Fixed-ish step to smooth iOS variable rAF
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ---------- Overlay / DOM ----------
  const overlay = document.getElementById('overlay');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScore');
  const restartBtn = document.getElementById('restartBtn');

  function showStart() {
    overlay.classList.add('show');
    startScreen.classList.remove('hidden');
    gameOverScreen.classList.add('hidden');
  }
  function hideOverlay() {
    overlay.classList.remove('show');
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
  }
  function showGameOver() {
    finalScoreEl.textContent = String(score);
    bestScoreEl.textContent = String(best);
    overlay.classList.add('show');
    startScreen.classList.add('hidden');
    gameOverScreen.classList.remove('hidden');
  }

  function restart() {
    reset();
    state = STATE_READY;
    showStart();
  }

  function handleTouchStart(e) {
    if (e.cancelable) e.preventDefault();
    if (state === STATE_OVER) return;
    if (state === STATE_READY) hideOverlay();
    flap();
  }

  const stage = document.getElementById('stage');
  stage.addEventListener('touchstart', handleTouchStart, { passive: false });
  stage.addEventListener('touchmove', function(e){ if (e.cancelable) e.preventDefault(); }, { passive: false });
  stage.addEventListener('touchend', function(e){ if (e.cancelable) e.preventDefault(); }, { passive: false });
  // Click fallback for desktop Safari / testing
  stage.addEventListener('click', function(e) {
    if (e.target.closest('#restartBtn')) return;
    handleTouchStart(e);
  });

  restartBtn.addEventListener('touchend', function(e) {
    e.stopPropagation();
    e.preventDefault();
    restart();
  }, { passive: false });
  // Safari sometimes needs click fallback inside PWA
  restartBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    restart();
  });

  // Prevent iOS gestures that disrupt gameplay
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('dblclick', function(e){ e.preventDefault(); });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function() {
    setTimeout(resize, 150);
  });

  // Boot
  resize();
  reset();
  bestScoreEl.textContent = String(best);
  showStart();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
