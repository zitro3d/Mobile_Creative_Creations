<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flappy">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>Flappy Bird — iOS</title>
<style>
  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    position: fixed;
    inset: 0;
    background: #000000;
  }
  #stage {
    position: absolute;
    inset: 0;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: -webkit-optimize-contrast;
    background: #000000;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    pointer-events: none;
    text-align: center;
  }
  #overlay * { pointer-events: none; }
  #overlay .panel, #overlay #restartBtn { pointer-events: auto; }
  #title {
    font-size: clamp(36px, 9vmin, 72px);
    font-weight: 900;
    letter-spacing: 4px;
    color: #ffffff;
    text-shadow: 0 0 18px #9f6cff, 0 0 32px #00d4ff, 2px 2px 0 #000;
    margin-bottom: 8px;
    font-family: "SF Pro Display", -apple-system, sans-serif;
  }
  #subtitle {
    font-size: clamp(14px, 3.2vmin, 22px);
    margin-bottom: 24px;
    color: #fff;
    font-weight: 600;
  }
  .tapHint {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 20px;
    background: rgba(0,0,0,0.35);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .panel {
    background: rgba(0,0,0,0.55);
    border: 4px solid #fff;
    border-radius: 16px;
    padding: 22px 32px;
    text-align: center;
    box-shadow: 0 0 0 4px #000, 0 10px 30px rgba(0,0,0,0.4);
    max-width: 86%;
  }
  #gameOverTitle {
    font-size: clamp(28px, 7vmin, 54px);
    color: #ff5252;
    margin-bottom: 12px;
    letter-spacing: 2px;
    font-weight: 900;
  }
  .row {
    font-size: clamp(16px, 4vmin, 26px);
    margin: 6px 0;
    font-weight: 700;
  }
  .label { color: #ffdd00; }
  #restartBtn {
    margin-top: 18px;
    padding: 14px 34px;
    font-size: clamp(16px, 4vmin, 22px);
    font-family: inherit;
    font-weight: 900;
    color: #000;
    background: #ffdd00;
    border: 4px solid #000;
    border-radius: 12px;
    cursor: pointer;
    text-shadow: none;
    box-shadow: 0 5px 0 #b8860b;
    transition: transform 0.05s, box-shadow 0.05s;
    letter-spacing: 1px;
    -webkit-appearance: none;
  }
  #restartBtn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #b8860b;
  }
  .hidden { display: none !important; }

  #gate {
    position: fixed;
    inset: 0;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    z-index: 100;
  }
  #gate h1 {
    font-size: 28px;
    margin: 0 0 12px;
    color: #ffdd00;
  }
  #gate p {
    font-size: 16px;
    line-height: 1.5;
    max-width: 420px;
    color: #ddd;
  }
  #gate .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }

  @media (orientation: landscape) and (max-height: 500px) {
    #rotate {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      z-index: 50;
      padding: 24px;
    }
  }
  #rotate { display: none; }
</style>
</head>
<body>
<div id="gate" class="hidden">
  <div class="icon">📱</div>
  <h1>iPhone / iPad Only</h1>
  <p>This game is designed exclusively for iOS devices. Please open it on an iPhone or iPad using Safari.</p>
</div>

<div id="stage">
  <canvas id="game"></canvas>
  <div id="overlay" class="show">
    <div id="startScreen">
      <div id="title">GARBAGE HAULER</div>
      <div id="subtitle">Dodge the orbital junk</div>
      <div class="tapHint">TAP TO IGNITE</div>
    </div>
    <div id="gameOverScreen" class="hidden">
      <div class="panel">
        <div id="gameOverTitle">GAME OVER</div>
        <div class="row"><span class="label">SCORE</span> <span id="finalScore">0</span></div>
        <div class="row"><span class="label">BEST</span> <span id="bestScore">0</span></div>
        <button id="restartBtn">RESTART</button>
      </div>
    </div>
  </div>
</div>

<div id="rotate">Please rotate to portrait mode to play.</div>

<script>
(function() {
  // ---------- iOS gate ----------
  const ua = navigator.userAgent || '';
  const platform = navigator.platform || '';
  const isIPhone = /iPhone|iPod/.test(ua);
  // iPadOS 13+ reports as Mac; detect via touch points
  const isIPad = /iPad/.test(ua) || (platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isIOS = isIPhone || isIPad;

  if (!isIOS) {
    document.getElementById('gate').classList.remove('hidden');
    document.getElementById('stage').style.display = 'none';
    return;
  }

  // ---------- Canvas sizing (DPR-aware) ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Logical game world dimensions (iPhone-ish portrait)
  const BASE_W = 360;
  let W = BASE_W;
  let H = 640;
  let scale = 1;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cw = window.innerWidth;
    const ch = window.innerHeight;

    // Fit logical width to physical width
    scale = cw / BASE_W;
    W = BASE_W;
    H = Math.round(ch / scale);

    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';

    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;

    recalcLayout();
  }

  let GROUND_H, PLAY_H;
  function recalcLayout() {
    GROUND_H = Math.max(60, Math.round(H * 0.11));
    PLAY_H = H - GROUND_H;
    // Reposition stars to fit new dimensions
    if (stars.length) { initStars(); initDust(); initNebula(); initJunkSats(); }
  }

  // ---------- Physics / constants ----------
  // Heavy mechanical feel — +10% gravity, stronger jump impulse
  const GRAVITY = 0.3;
  const FLAP = -6.7;
  const MAX_FALL = 10.5;

  const PIPE_W = 56;
  const PIPE_GAP = 160;
  const PIPE_SPACING = 200;
  const PIPE_SPEED = 2.0;
  const PIPE_MIN_TOP = 60;

  const BIRD_X_FRAC = 0.28;
  const BIRD_R = 20;          // Hauler half-size (all ship parts scale off this)
  const BIRD_W = BIRD_R * 2;
  const BIRD_H = BIRD_R * 2;

  const STATE_READY = 0;
  const STATE_PLAY = 1;
  const STATE_OVER = 2;
  let state = STATE_READY;

  let bird, pipes, sparks, exhaust, score, best, frame, flashAlpha, burstFrames, shakeFrames, scorePulse, thrusterFrames, flapCount;
  let stars = [];
  let dust  = [];                  // fast white speed-dust specks
  let nebula;                       // static far-background cloud
  let junkSats = [];                // distant satellite silhouettes
  best = parseInt(localStorage.getItem('flappy_best_ios') || '0', 10);

  function reset() {
    bird = {
      x: Math.round(W * BIRD_X_FRAC),
      y: PLAY_H / 2,
      vy: 0,
    };
    pipes = [];
    sparks = [];
    exhaust = [];
    score = 0;
    frame = 0;
    flashAlpha = 0;
    burstFrames = 0;
    shakeFrames = 0;
    scorePulse = 0;
    thrusterFrames = 0;
    flapCount = 0;
    initStars();
    initDust();
    initNebula();
    initJunkSats();
    for (let i = 0; i < 4; i++) addPipe(W + 120 + i * PIPE_SPACING);
  }

  // 3-layer parallax starfield — 80 stars with speedFactor 0.1 / 0.5 / 1.0
  const SPEED_FACTORS = [0.1, 0.5, 1.0];
  function initStars() {
    stars = [];
    for (let i = 0; i < 80; i++) {
      const sf = SPEED_FACTORS[Math.floor(Math.random() * 3)];
      stars.push(makeStar(Math.random() * W, sf));
    }
  }

  function makeStar(x, sf) {
    const big = sf === 1.0;
    const mid = sf === 0.5;
    return {
      x: x,
      y: Math.random() * PLAY_H,
      speedFactor: sf,
      size: big ? 1.6 + Math.random() * 1.4 : mid ? 1 + Math.random() * 0.6 : 1,
      a: big ? 0.7 + Math.random() * 0.3 : mid ? 0.35 + Math.random() * 0.3 : 0.1 + Math.random() * 0.2,
      tw: Math.random() * Math.PI * 2,
      flicker: 1,
      next: Math.floor(Math.random() * 8),
    };
  }

  function updateStars() {
    for (const s of stars) {
      s.x -= PIPE_SPEED * s.speedFactor;
      if (s.x < -2) {
        // Reset to right edge at random height
        s.x = W + Math.random() * 8;
        s.y = Math.random() * PLAY_H;
      }
      if (frame >= s.next) {
        s.flicker = 1 + (Math.random() - 0.5) * 0.2;
        s.next = frame + 3 + Math.floor(Math.random() * 5);
      }
    }
  }

  // Fast speed-dust specks that streak right-to-left constantly
  function initDust() {
    dust = [];
    for (let i = 0; i < 40; i++) {
      dust.push({
        x: Math.random() * W,
        y: Math.random() * PLAY_H,
        speed: 4 + Math.random() * 4,   // much faster than parallax stars
        len:   3 + Math.random() * 5,   // streak length
        a: 0.5 + Math.random() * 0.5,
      });
    }
  }

  function updateDust() {
    for (const d of dust) {
      d.x -= d.speed;
      if (d.x < -d.len - 2) {
        d.x = W + Math.random() * 8;
        d.y = Math.random() * PLAY_H;
      }
    }
  }

  // Static nebula cloud in the far background
  function initNebula() {
    nebula = {
      x: W * (0.55 + Math.random() * 0.2),
      y: PLAY_H * (0.35 + Math.random() * 0.2),
      r: Math.max(W, PLAY_H) * 0.6,
    };
  }

  // Distant derelict satellite silhouettes drifting slowly through the nebula
  function initJunkSats() {
    junkSats = [];
    const n = 5;
    for (let i = 0; i < n; i++) {
      junkSats.push({
        x: (W / n) * i + Math.random() * 40,
        y: 40 + Math.random() * (PLAY_H * 0.55),
        scale: 0.55 + Math.random() * 0.55,
        speed: 0.15 + Math.random() * 0.2,
        type: Math.floor(Math.random() * 3),
        rot: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.003,
      });
    }
  }

  function updateJunkSats() {
    for (const s of junkSats) {
      s.x -= s.speed;
      s.rot += s.spin;
      if (s.x < -60) {
        s.x = W + 40;
        s.y = 40 + Math.random() * (PLAY_H * 0.55);
      }
    }
  }

  function addPipe(x) {
    const top = PIPE_MIN_TOP + Math.random() * (PLAY_H - PIPE_GAP - PIPE_MIN_TOP * 2);
    const type = Math.random() < 0.5 ? 'cargo' : 'junk';
    pipes.push({
      x: x,
      top: top,
      passed: false,
      seed: Math.random() * 1000,
      pulse: Math.random() * Math.PI * 2,
      type: type,
      topShape: buildShardShape(PIPE_W, top, true),
      botShape: buildShardShape(PIPE_W, PLAY_H - (top + PIPE_GAP), false),
      antennas: buildAntennas(),
      debris: makeDebris(),
    });
  }

  // Random assorted floating garbage item for the gap between obstacles
  function makeDebris() {
    return {
      kind: Math.floor(Math.random() * 9),           // 9 variants
      offY: (Math.random() - 0.5) * (PIPE_GAP * 0.35),
      scale: 0.85 + Math.random() * 0.35,
      spin: (Math.random() - 0.5) * 0.025,
      phase: Math.random() * Math.PI * 2,
    };
  }

  // Random antenna sticks for junk pipes, deterministic per-pipe
  function buildAntennas() {
    const arr = [];
    const n = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < n; i++) {
      arr.push({
        side: Math.random() < 0.5 ? -1 : 1,
        yFrac: 0.2 + Math.random() * 0.6,
        len: 8 + Math.random() * 12,
        angle: (Math.random() - 0.5) * 0.6,
        tipR: 1 + Math.random() * 1.5,
      });
    }
    return arr;
  }

  // Build a static jagged obsidian-shard polygon. Generated once per pipe so
  // the shape does not wobble as the crystal moves across the screen.
  function buildShardShape(w, h, isTop) {
    const tipSign = isTop ? 1 : -1;
    const baseY   = isTop ? 0 : h;
    const tipY    = isTop ? h : 0;

    const basePad = 4;                 // base extends slightly outward
    const tipInsetL = w * 0.28;        // tip-narrow inset (left side)
    const tipInsetR = w * 0.72;        // tip-narrow inset (right side)

    const pts = [];

    // Base corners (wide)
    pts.push([-basePad, baseY]);
    pts.push([w + basePad, baseY]);

    const nNodes = 3 + Math.floor(Math.random() * 2); // 3 or 4

    // Right side — taper inward toward tip with per-node jitter
    for (let i = 1; i <= nNodes; i++) {
      const t = i / (nNodes + 1);
      const y = baseY + (tipY - baseY) * t;
      const sideX = (w + basePad) * (1 - t) + tipInsetR * t;
      const jitter = (Math.random() * 2 - 1) * 7;   // ±7 px
      pts.push([sideX + jitter, y]);
    }
    // Right tip corner
    pts.push([tipInsetR, tipY]);

    // Tip: 3 jagged triangular spear-peaks of varying depth
    const tipSegs = 3;
    const tipSpan = tipInsetR - tipInsetL;
    for (let i = 0; i < tipSegs; i++) {
      const peakX = tipInsetR - ((i + 0.5) / tipSegs) * tipSpan;
      const depth = 7 + Math.random() * 11;        // varies 7–18 px
      pts.push([peakX, tipY + depth * tipSign]);
      const troughX = tipInsetR - ((i + 1) / tipSegs) * tipSpan;
      pts.push([troughX, tipY]);
    }

    // Left side — taper back out to base
    for (let i = nNodes; i >= 1; i--) {
      const t = i / (nNodes + 1);
      const y = baseY + (tipY - baseY) * t;
      const sideX = (-basePad) * (1 - t) + tipInsetL * t;
      const jitter = (Math.random() * 2 - 1) * 7;
      pts.push([sideX + jitter, y]);
    }

    return pts;
  }

  function flap() {
    if (state === STATE_READY) {
      state = STATE_PLAY;
      bird.x = Math.round(W * BIRD_X_FRAC);
    }
    if (state === STATE_PLAY) {
      bird.vy = FLAP;
      thrusterFrames = 5;
      flapCount++;
      // Every 5th or 6th tap the engine backfires: extra smoke puff
      const isBackfire = flapCount > 0 && (flapCount % 5 === 0 || flapCount % 6 === 0);
      emitExhaustBurst(isBackfire ? 12 : 5, isBackfire);
      haptic();
    }
  }

  function emitExhaustBurst(n, big) {
    for (let i = 0; i < n; i++) {
      const angle = Math.PI + (Math.random() - 0.5) * 0.9;
      const speed = 0.4 + Math.random() * (big ? 1.8 : 0.8);
      exhaust.push({
        x: bird.x - BIRD_R * 0.9,
        y: bird.y + (Math.random() - 0.5) * (big ? 10 : 5),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed + (Math.random() - 0.5) * 0.4,
        r: (big ? 4 : 2.5) + Math.random() * 2,
        a: big ? 0.75 : 0.55,
        dirty: big || Math.random() < 0.35,   // darker greasy puffs
      });
    }
  }

  function haptic() {
    // Best-effort tactile feedback (Safari gates most; no-op if blocked)
    if (navigator.vibrate) { try { navigator.vibrate(8); } catch (e) {} }
  }

  function update() {
    frame++;

    updateStars();
    updateDust();
    updateJunkSats();

    if (thrusterFrames > 0) thrusterFrames--;
    if (burstFrames > 0) burstFrames--;
    if (scorePulse > 0) scorePulse = Math.max(0, scorePulse - 0.1);

    // Idle sputter — constant trickle of dirty smoke from the back
    if (state !== STATE_OVER && frame % 3 === 0) {
      exhaust.push({
        x: bird.x - BIRD_R * 0.85,
        y: bird.y + (Math.random() - 0.5) * 5,
        vx: -0.3 - Math.random() * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: 2 + Math.random() * 1.5,
        a: 0.45,
        dirty: Math.random() < 0.4,
      });
      if (exhaust.length > 80) exhaust.shift();
    }
    for (let i = exhaust.length - 1; i >= 0; i--) {
      const p = exhaust[i];
      p.r *= 1.05;                             // expand
      p.a -= 0.018;                            // fade slowly
      p.x += (p.vx || 0) - PIPE_SPEED * 0.4;
      p.y += (p.vy || 0);
      if (p.a <= 0) exhaust.splice(i, 1);
    }

    if (state === STATE_READY) {
      // Float centered above the title text during the start screen
      bird.x = W / 2;
      bird.y = PLAY_H * 0.28 + Math.sin(frame * 0.06) * 10;
      updateSparks();
      return;
    }
    if (state === STATE_PLAY) {
      bird.vy = Math.min(bird.vy + GRAVITY, MAX_FALL);
      bird.y += bird.vy;
      bird.rot = Math.max(-0.5, Math.min(1.2, bird.vy * 0.09));

      for (const p of pipes) p.x -= PIPE_SPEED;
      while (pipes.length && pipes[0].x + PIPE_W < -10) pipes.shift();
      const last = pipes[pipes.length - 1];
      if (!last || last.x < W - PIPE_SPACING) {
        addPipe((last ? last.x : W) + PIPE_SPACING);
      }

      for (const p of pipes) {
        if (!p.passed && p.x + PIPE_W < bird.x) {
          p.passed = true;
          score++;
          burstFrames = 14;       // eye glow pulse
          scorePulse = 1;         // score text grows to 1.5x then shrinks over 10 frames
          emitScoreBurst(p.x + PIPE_W / 2, p.top + PIPE_GAP / 2);
          if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
        }
      }

      updateSparks();

      if (collide()) {
        state = STATE_OVER;
        flashAlpha = 0.85;
        shakeFrames = 12; // ~200ms at 60fps
        emitDeathShards(bird.x, bird.y);
        if (score > best) {
          best = score;
          localStorage.setItem('flappy_best_ios', String(best));
        }
        if (navigator.vibrate) { try { navigator.vibrate([30, 40, 30]); } catch (e) {} }
        setTimeout(showGameOver, 200);
      }
    } else if (state === STATE_OVER) {
      if (bird.y + BIRD_R < PLAY_H) {
        bird.vy = Math.min(bird.vy + GRAVITY, MAX_FALL);
        bird.y += bird.vy;
        bird.rot = Math.min(1.6, bird.rot + 0.05);
      } else {
        bird.y = PLAY_H - BIRD_R;
      }
      updateSparks();
      if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - 0.08);
    }
  }

  function updateSparks() {
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.life -= s.decay;
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= s.drag;
      s.vy = s.vy * s.drag + s.gravity;
      s.rot += s.vr;
      if (s.life <= 0 || s.y > H + 50) sparks.splice(i, 1);
    }
  }

  function emitScoreBurst(cx, cy) {
    const n = 12 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + Math.random() * 0.3;
      const sp = 1.8 + Math.random() * 2.4;
      sparks.push({
        x: cx,
        y: cy,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        size: 3 + Math.random() * 2,
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 0.3,
        life: 1,
        decay: 0.025 + Math.random() * 0.02,
        shape: 'square',
        color: '#ffd75a',
        glow: '#ffd066',
        drag: 0.93,
        gravity: 0.05,
      });
    }
  }

  function emitDeathShards(cx, cy) {
    for (let i = 0; i < 15; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 2.2 + Math.random() * 3;
      sparks.push({
        x: cx,
        y: cy,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1.5,
        size: 7 + Math.random() * 5,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.35,
        life: 1,
        decay: 0.012,
        shape: 'tri',
        color: '#cf9bff',
        glow: '#bc13fe',
        drag: 0.99,
        gravity: 0.28,
      });
    }
  }

  function collide() {
    const r = BIRD_R - 3;

    if (bird.y + r >= PLAY_H) return true;
    if (bird.y - r <= 0) { bird.y = r; bird.vy = 0; }

    for (const p of pipes) {
      if (bird.x + r > p.x && bird.x - r < p.x + PIPE_W) {
        if (bird.y - r < p.top || bird.y + r > p.top + PIPE_GAP) return true;
      }
    }
    return false;
  }

  // ---------- Rendering ----------
  function drawBackground() {
    // Apocalyptic sunset-desert gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0,    '#1a0512');   // smoky purple-black zenith
    g.addColorStop(0.28, '#4a1020');   // bruised red sky
    g.addColorStop(0.5,  '#923523');   // deep burnt orange
    g.addColorStop(0.72, '#d97028');   // sunset amber
    g.addColorStop(0.9,  '#e9a347');   // hazy gold horizon
    g.addColorStop(1,    '#2a150a');   // dust line at ground
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Swollen blood-red sun low on the horizon
    const sunX = W * 0.78;
    const sunY = PLAY_H * 0.72;
    const sunR = Math.min(W, PLAY_H) * 0.22;
    const sg = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR);
    sg.addColorStop(0,   'rgba(255, 210, 140, 0.95)');
    sg.addColorStop(0.4, 'rgba(240, 120, 50, 0.85)');
    sg.addColorStop(1,   'rgba(180, 40, 20, 0)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, W, H);

    // Dust/smoke nebula — a heavy brown haze instead of a pink space cloud
    if (nebula) {
      ctx.save();
      const ng = ctx.createRadialGradient(nebula.x, nebula.y, 0, nebula.x, nebula.y, nebula.r);
      ng.addColorStop(0,    'rgba(90, 50, 30, 0.32)');
      ng.addColorStop(0.45, 'rgba(60, 30, 20, 0.2)');
      ng.addColorStop(0.8,  'rgba(30, 15, 10, 0.1)');
      ng.addColorStop(1,    'rgba(0, 0, 0, 0)');
      ctx.fillStyle = ng;
      ctx.fillRect(0, 0, W, H);

      const ng2 = ctx.createRadialGradient(
        nebula.x - nebula.r * 0.35, nebula.y + nebula.r * 0.2, 0,
        nebula.x - nebula.r * 0.35, nebula.y + nebula.r * 0.2, nebula.r * 0.55
      );
      ng2.addColorStop(0, 'rgba(220, 120, 60, 0.18)');
      ng2.addColorStop(1, 'rgba(220, 120, 60, 0)');
      ctx.fillStyle = ng2;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    // Thin jagged mountain silhouette across the mid-horizon
    drawDesertRidge();

    // Warm atmospheric dust motes (re-purposed star layers)
    for (const s of stars) {
      if (s.speedFactor === 0.1) {
        ctx.fillStyle = 'rgba(120, 70, 40, ' + (s.a * s.flicker) + ')';
        ctx.fillRect(s.x, s.y, 1, 1);
      } else if (s.speedFactor === 0.5) {
        ctx.fillStyle = 'rgba(200, 130, 70, ' + (s.a * s.flicker * 0.8) + ')';
        ctx.fillRect(s.x, s.y, s.size, s.size);
      } else {
        const tw = 0.5 + 0.5 * Math.abs(Math.sin(frame * 0.08 + s.tw));
        const alpha = s.a * tw * s.flicker;
        ctx.save();
        ctx.shadowBlur = 5;
        ctx.shadowColor = 'rgba(255, 180, 110, 0.9)';
        ctx.fillStyle = 'rgba(255, 220, 170, ' + alpha + ')';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Distant derelict satellite silhouettes behind the debris field
    drawJunkSats();

    // Fast ember dust streaks — warm tint for the apocalyptic sky
    ctx.strokeStyle = 'rgba(255, 200, 140, 1)';
    ctx.lineCap = 'round';
    for (const d of dust) {
      ctx.globalAlpha = d.a * 0.8;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + d.len, d.y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Jagged distant mountain/ruin silhouette along the horizon
  function drawDesertRidge() {
    ctx.save();
    ctx.fillStyle = 'rgba(30, 15, 10, 0.85)';
    ctx.beginPath();
    const baseY = PLAY_H * 0.82;
    ctx.moveTo(0, PLAY_H);
    ctx.lineTo(0, baseY);
    const peaks = 14;
    for (let i = 0; i <= peaks; i++) {
      const x = (W / peaks) * i;
      // Deterministic jagged profile via sine hash
      const h = 12 + Math.abs(Math.sin(i * 1.7) * 28) + (i % 3) * 4;
      ctx.lineTo(x, baseY - h);
      if (i < peaks) {
        const xm = x + (W / peaks) * 0.5;
        const hm = 6 + Math.abs(Math.cos(i * 2.3) * 14);
        ctx.lineTo(xm, baseY - hm);
      }
    }
    ctx.lineTo(W, baseY);
    ctx.lineTo(W, PLAY_H);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawJunkSats() {
    ctx.save();
    for (const s of junkSats) {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      ctx.scale(s.scale, s.scale);
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = '#1a1d22';
      ctx.strokeStyle = 'rgba(40, 40, 45, 0.8)';
      ctx.lineWidth = 1;
      if (s.type === 0) {
        // Solar-panel satellite
        ctx.fillRect(-4, -3, 8, 6);                     // body
        ctx.fillRect(-18, -2, 12, 4);                   // left panel
        ctx.fillRect(6, -2, 12, 4);                     // right panel
        ctx.strokeRect(-4, -3, 8, 6);
        ctx.strokeRect(-18, -2, 12, 4);
        ctx.strokeRect(6, -2, 12, 4);
      } else if (s.type === 1) {
        // Dish satellite
        ctx.fillRect(-3, -2, 6, 4);
        ctx.beginPath();
        ctx.arc(0, -6, 5, Math.PI, 2 * Math.PI);
        ctx.fill();
        ctx.stroke();
        ctx.fillRect(-10, -1, 6, 2);
        ctx.fillRect(4, -1, 6, 2);
      } else {
        // Tumbling debris box
        ctx.fillRect(-6, -4, 12, 8);
        ctx.strokeRect(-6, -4, 12, 8);
        ctx.strokeStyle = 'rgba(60, 60, 70, 0.6)';
        ctx.beginPath();
        ctx.moveTo(-6, 0); ctx.lineTo(6, 0);
        ctx.moveTo(0, -4); ctx.lineTo(0, 4);
        ctx.stroke();
      }
      ctx.restore();
    }
    ctx.restore();
  }

  function drawGround() {
    // Burning dust wasteland — cracked dark earth with embers
    const gr = ctx.createLinearGradient(0, PLAY_H, 0, H);
    gr.addColorStop(0, '#3a1a0c');
    gr.addColorStop(0.5, '#1a0a05');
    gr.addColorStop(1, '#000000');
    ctx.fillStyle = gr;
    ctx.fillRect(0, PLAY_H, W, GROUND_H);

    // Glowing ember seam at the horizon
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff6a1a';
    ctx.strokeStyle = 'rgba(255, 120, 40, 0.85)';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(0, PLAY_H + 0.5);
    ctx.lineTo(W, PLAY_H + 0.5);
    ctx.stroke();
    ctx.restore();

    // Jagged crack pattern in the dirt
    ctx.strokeStyle = 'rgba(80, 30, 15, 0.6)';
    ctx.lineWidth = 1;
    for (let cx = 0; cx < W; cx += 18) {
      const off = Math.sin(cx * 0.7) * 3;
      ctx.beginPath();
      ctx.moveTo(cx + off, PLAY_H + 4);
      ctx.lineTo(cx + off + 4, PLAY_H + GROUND_H * 0.55);
      ctx.stroke();
    }
  }

  function drawPipes() {
    for (const p of pipes) drawPipe(p);
  }

  // Floating garbage items in each gap: burger, fries, headphones, toilet, etc.
  function drawAllDebris() {
    for (const p of pipes) {
      if (!p.debris) continue;
      const cx = p.x + PIPE_W / 2;
      const cy = p.top + PIPE_GAP / 2 + p.debris.offY;
      const rot = frame * p.debris.spin + p.debris.phase;
      const bob = Math.sin(frame * 0.04 + p.debris.phase) * 3;
      ctx.save();
      ctx.translate(cx, cy + bob);
      ctx.rotate(rot);
      ctx.scale(p.debris.scale, p.debris.scale);
      drawDebrisItem(p.debris.kind);
      ctx.restore();
    }
  }

  function drawDebrisItem(kind) {
    // Soft drop shadow helps each item pop against the sunset
    ctx.shadowBlur = 6;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    switch (kind) {
      case 0: drawBurger();     break;
      case 1: drawFries();      break;
      case 2: drawHeadphones(); break;
      case 3: drawToilet();     break;
      case 4: drawDuck();       break;
      case 5: drawTV();         break;
      case 6: drawPizza();      break;
      case 7: drawBottle();     break;
      case 8: drawShoe();       break;
    }
  }

  function drawBurger() {
    // Top bun
    ctx.fillStyle = '#e8a44a';
    ctx.beginPath();
    ctx.arc(0, -6, 11, Math.PI, 2 * Math.PI);
    ctx.fill();
    ctx.fillRect(-11, -6, 22, 2);
    // Sesame seeds
    ctx.fillStyle = '#fff4d0';
    ctx.beginPath(); ctx.arc(-5, -10, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 2, -12, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 7, -9,  1, 0, Math.PI * 2); ctx.fill();
    // Lettuce (green frill)
    ctx.fillStyle = '#7bc24e';
    ctx.beginPath();
    ctx.moveTo(-12, -4);
    for (let x = -11; x <= 11; x += 4) ctx.lineTo(x, -2 + (x % 8 === 0 ? -2 : 0));
    ctx.lineTo(12, -4); ctx.lineTo(12, -2); ctx.lineTo(-12, -2);
    ctx.closePath(); ctx.fill();
    // Patty
    ctx.fillStyle = '#6a3a1a';
    ctx.fillRect(-11, -2, 22, 5);
    // Bottom bun
    ctx.fillStyle = '#c08030';
    ctx.beginPath();
    ctx.moveTo(-11, 3);
    ctx.lineTo(11, 3);
    ctx.arc(0, 3, 11, 0, Math.PI);
    ctx.closePath();
    ctx.fill();
  }

  function drawFries() {
    // Red container
    ctx.fillStyle = '#c92a2a';
    ctx.beginPath();
    ctx.moveTo(-9, 4); ctx.lineTo(-11, 11); ctx.lineTo(11, 11); ctx.lineTo(9, 4);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#7a1414';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Golden M-style band
    ctx.fillStyle = '#ffd43b';
    ctx.fillRect(-9, 5, 18, 2);
    // Fries sticking out
    ctx.fillStyle = '#ffd86b';
    ctx.strokeStyle = '#a8761a';
    ctx.lineWidth = 0.5;
    for (let i = -4; i <= 4; i += 2) {
      const h = 9 + Math.abs(i);
      ctx.fillRect(i - 0.7, 3 - h, 1.4, h);
      ctx.strokeRect(i - 0.7, 3 - h, 1.4, h);
    }
  }

  function drawHeadphones() {
    // Headband arc
    ctx.strokeStyle = '#202020';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 2, 11, Math.PI + 0.25, 2 * Math.PI - 0.25);
    ctx.stroke();
    // Earcups
    ctx.fillStyle = '#282828';
    ctx.fillRect(-13, 0, 6, 10);
    ctx.fillRect(7, 0, 6, 10);
    // Cup foam
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(-12, 2, 4, 6);
    ctx.fillRect(8, 2, 4, 6);
    // Logo dots
    ctx.fillStyle = '#e04040';
    ctx.beginPath(); ctx.arc(-10, 5, 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(10, 5, 0.8, 0, Math.PI * 2); ctx.fill();
  }

  function drawToilet() {
    // Tank
    ctx.fillStyle = '#e6ecef';
    ctx.fillRect(-7, -10, 14, 8);
    ctx.strokeStyle = '#6a7278';
    ctx.lineWidth = 1;
    ctx.strokeRect(-7, -10, 14, 8);
    // Flush button
    ctx.fillStyle = '#9aa0a6';
    ctx.fillRect(-2, -9, 4, 2);
    // Bowl
    ctx.fillStyle = '#f0f4f6';
    ctx.beginPath();
    ctx.moveTo(-10, -2);
    ctx.lineTo(10, -2);
    ctx.lineTo(7, 10);
    ctx.lineTo(-7, 10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7a828a';
    ctx.stroke();
    // Water (grimy post-apocalypse green)
    ctx.fillStyle = '#4a6a3a';
    ctx.beginPath();
    ctx.ellipse(0, 2, 7, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawDuck() {
    // Body
    ctx.fillStyle = '#ffd633';
    ctx.beginPath();
    ctx.ellipse(0, 3, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.beginPath();
    ctx.arc(6, -3, 5, 0, Math.PI * 2);
    ctx.fill();
    // Beak
    ctx.fillStyle = '#ff8a1c';
    ctx.beginPath();
    ctx.moveTo(9, -2); ctx.lineTo(14, -1); ctx.lineTo(9, 0);
    ctx.closePath(); ctx.fill();
    // Eye
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(7, -4, 0.9, 0, Math.PI * 2); ctx.fill();
    // Wing line
    ctx.strokeStyle = '#c39a14';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-3, 3); ctx.quadraticCurveTo(0, 6, 4, 3);
    ctx.stroke();
  }

  function drawTV() {
    // Cabinet
    ctx.fillStyle = '#6a5a3e';
    ctx.fillRect(-12, -7, 24, 14);
    ctx.strokeStyle = '#2a1f0f';
    ctx.lineWidth = 1;
    ctx.strokeRect(-12, -7, 24, 14);
    // Screen (dead static)
    ctx.fillStyle = '#1a1d22';
    ctx.fillRect(-9, -5, 17, 10);
    // Static noise lines
    ctx.strokeStyle = 'rgba(200, 200, 200, 0.3)';
    for (let ly = -4; ly < 5; ly += 2) {
      ctx.beginPath();
      ctx.moveTo(-9, ly); ctx.lineTo(8, ly);
      ctx.stroke();
    }
    // Knobs
    ctx.fillStyle = '#d0a04a';
    ctx.beginPath(); ctx.arc(10, -3, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(10, 2, 1.2, 0, Math.PI * 2); ctx.fill();
    // Bent antenna
    ctx.strokeStyle = '#9a9a9a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-4, -7); ctx.lineTo(-8, -14);
    ctx.moveTo(4, -7); ctx.lineTo(9, -12);
    ctx.stroke();
  }

  function drawPizza() {
    // Slice crust
    ctx.fillStyle = '#d9a058';
    ctx.beginPath();
    ctx.moveTo(-11, 8); ctx.lineTo(11, 8); ctx.lineTo(0, -10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7a4a1a';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Cheese (inner)
    ctx.fillStyle = '#ffd56b';
    ctx.beginPath();
    ctx.moveTo(-9, 7); ctx.lineTo(9, 7); ctx.lineTo(0, -7);
    ctx.closePath(); ctx.fill();
    // Pepperoni
    ctx.fillStyle = '#c03020';
    ctx.beginPath(); ctx.arc(-3, 3, 1.6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, 1, 1.6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(-1, -3, 1.4, 0, Math.PI * 2); ctx.fill();
  }

  function drawBottle() {
    // Body
    ctx.fillStyle = 'rgba(60, 140, 90, 0.85)';
    ctx.fillRect(-5, -4, 10, 14);
    // Neck
    ctx.fillRect(-2, -10, 4, 6);
    // Cap
    ctx.fillStyle = '#8a1a1a';
    ctx.fillRect(-2.5, -12, 5, 2.5);
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(-4, -3, 1.5, 11);
    // Label
    ctx.fillStyle = '#f0e6b0';
    ctx.fillRect(-5, 1, 10, 4);
    ctx.strokeStyle = '#4a2a0a';
    ctx.lineWidth = 0.6;
    ctx.strokeRect(-5, 1, 10, 4);
  }

  function drawShoe() {
    // Sole
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.moveTo(-12, 6); ctx.lineTo(10, 6); ctx.lineTo(12, 3); ctx.lineTo(-12, 3);
    ctx.closePath(); ctx.fill();
    // Upper
    ctx.fillStyle = '#a02a2a';
    ctx.beginPath();
    ctx.moveTo(-12, 3); ctx.lineTo(2, 3); ctx.lineTo(4, -3); ctx.lineTo(10, -3); ctx.lineTo(12, 3);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#2a0a0a';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // Laces
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 0.8;
    for (let lx = -8; lx < 2; lx += 3) {
      ctx.beginPath();
      ctx.moveTo(lx, 3); ctx.lineTo(lx + 1, -1);
      ctx.stroke();
    }
  }

  function drawPipe(p) {
    if (p.type === 'cargo') {
      drawCargo(p.x, 0, PIPE_W, p.top, true, p.seed);
      drawCargo(p.x, p.top + PIPE_GAP, PIPE_W, PLAY_H - (p.top + PIPE_GAP), false, p.seed + 13);
    } else {
      drawJunk(p.x, 0, PIPE_W, p.top, true, p.topShape, p.seed, p.antennas);
      drawJunk(p.x, p.top + PIPE_GAP, PIPE_W, PLAY_H - (p.top + PIPE_GAP), false, p.botShape, p.seed + 13, p.antennas);
    }
  }

  // Rectangular cargo container with yellow/black hazard stripes
  function drawCargo(x, y, w, h, isTop, seed) {
    if (h <= 0) return;
    ctx.save();
    ctx.translate(x, y);
    const pad = 4;
    const containerW = w + pad * 2;
    const containerX = -pad;

    // Body with rust-tinted metallic gradient
    const grad = ctx.createLinearGradient(containerX, 0, containerX + containerW, 0);
    grad.addColorStop(0,   '#8a6a4a');
    grad.addColorStop(0.4, '#4a3e2d');
    grad.addColorStop(0.7, '#5c4a35');
    grad.addColorStop(1,   '#3a2e1f');
    ctx.fillStyle = grad;
    ctx.fillRect(containerX, 0, containerW, h);

    // Hazard stripe band at the gap-facing end
    const bandH = 18;
    const bandY = isTop ? h - bandH : 0;
    ctx.save();
    ctx.beginPath();
    ctx.rect(containerX, bandY, containerW, bandH);
    ctx.clip();
    const stripeW = 10;
    for (let sx = containerX - bandH; sx < containerX + containerW + bandH; sx += stripeW) {
      ctx.fillStyle = (Math.floor((sx - containerX) / stripeW) % 2 === 0) ? '#ffd60a' : '#1a1a1a';
      ctx.beginPath();
      ctx.moveTo(sx, bandY);
      ctx.lineTo(sx + stripeW, bandY);
      ctx.lineTo(sx + stripeW - bandH, bandY + bandH);
      ctx.lineTo(sx - bandH, bandY + bandH);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    // Band edge lines
    ctx.strokeStyle = '#2a2a2a';
    ctx.lineWidth = 1.2;
    ctx.strokeRect(containerX + 0.5, bandY + 0.5, containerW - 1, bandH - 1);

    // Rivets along both long edges
    ctx.fillStyle = '#2a2a2a';
    for (let ry = 4; ry < h - 4; ry += 10) {
      ctx.beginPath(); ctx.arc(containerX + 3, ry, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(containerX + containerW - 3, ry, 1.2, 0, Math.PI * 2); ctx.fill();
    }

    // Weathering — dark brown streaks
    ctx.strokeStyle = 'rgba(58, 30, 15, 0.7)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const wx = containerX + 6 + srand(seed + i * 9) * (containerW - 12);
      const wy0 = isTop ? 2 : h - 2;
      const wy1 = wy0 + (isTop ? 14 + srand(seed + i * 3) * 20 : -(14 + srand(seed + i * 3) * 20));
      ctx.beginPath();
      ctx.moveTo(wx, wy0);
      ctx.lineTo(wx + (srand(seed + i * 5) - 0.5) * 3, wy1);
      ctx.stroke();
    }
    // Rust spots
    for (let i = 0; i < 5; i++) {
      const rx = containerX + srand(seed + 100 + i) * containerW;
      const ry = srand(seed + 200 + i) * h;
      const rr = 1 + srand(seed + 300 + i) * 2;
      ctx.fillStyle = 'rgba(120, 55, 25, ' + (0.5 + srand(seed + 400 + i) * 0.3) + ')';
      ctx.beginPath();
      ctx.arc(rx, ry, rr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Outer edge shadow
    ctx.strokeStyle = 'rgba(10, 8, 5, 0.9)';
    ctx.lineWidth = 1.4;
    ctx.strokeRect(containerX + 0.5, 0.5, containerW - 1, h - 1);
    ctx.restore();
  }

  // Irregular junk pile — metallic polygon with antennas and weathering
  function drawJunk(x, y, w, h, isTop, pts, seed, antennas) {
    if (h <= 0 || !pts) return;
    const tipY = isTop ? h : 0;

    ctx.save();
    ctx.translate(x, y);

    // Dark metal fill with slight gradient
    const g = ctx.createLinearGradient(0, 0, w, 0);
    g.addColorStop(0,   '#5a5550');
    g.addColorStop(0.5, '#3a3632');
    g.addColorStop(1,   '#2a2725');
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();

    // Dark brown weathering outline
    ctx.strokeStyle = '#3a1e0f';
    ctx.lineWidth = 1.3;
    ctx.stroke();

    // Secondary inner rim for depth
    ctx.strokeStyle = 'rgba(15, 10, 8, 0.75)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Rust streaks and bolts inside the polygon
    ctx.save();
    ctx.clip();
    ctx.strokeStyle = 'rgba(90, 40, 15, 0.7)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const rx = srand(seed + 50 + i) * w;
      const ry0 = srand(seed + 60 + i) * h;
      const ry1 = ry0 + (isTop ? 10 + srand(seed + 70 + i) * 18 : -(10 + srand(seed + 70 + i) * 18));
      ctx.beginPath();
      ctx.moveTo(rx, ry0);
      ctx.lineTo(rx + (srand(seed + 80 + i) - 0.5) * 3, ry1);
      ctx.stroke();
    }
    ctx.fillStyle = '#2a2018';
    for (let i = 0; i < 4; i++) {
      const bx = 6 + srand(seed + 150 + i) * (w - 12);
      const by = 6 + srand(seed + 160 + i) * (h - 12);
      ctx.beginPath();
      ctx.arc(bx, by, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Antenna sticks protruding from the gap-facing edge
    if (antennas) {
      ctx.strokeStyle = '#88807a';
      ctx.fillStyle = '#d04840';
      ctx.lineWidth = 1.2;
      for (const a of antennas) {
        // Anchor point on the tip edge (gap-facing), offset slightly inward
        const ax = w * (0.2 + a.yFrac * 0.6);
        const ay = tipY;
        const dir = isTop ? 1 : -1;      // antennas point into the gap
        const endX = ax + Math.sin(a.angle) * a.len;
        const endY = ay + Math.cos(a.angle) * a.len * dir;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        // red LED tip
        ctx.beginPath();
        ctx.arc(endX, endY, a.tipR, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // Deterministic pseudo-random from a seed
  function srand(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  function drawExhaust() {
    if (exhaust.length === 0) return;
    ctx.save();
    for (const p of exhaust) {
      ctx.globalAlpha = Math.max(0, p.a);
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      if (p.dirty) {
        // Greasy black smoke
        g.addColorStop(0, 'rgba(60, 45, 35, 0.85)');
        g.addColorStop(0.7, 'rgba(30, 25, 20, 0.4)');
        g.addColorStop(1, 'rgba(0, 0, 0, 0)');
      } else {
        // Dirty orange flame/smoke
        g.addColorStop(0, 'rgba(255, 140, 50, 0.9)');
        g.addColorStop(0.5, 'rgba(200, 90, 40, 0.55)');
        g.addColorStop(1, 'rgba(50, 30, 20, 0)');
      }
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSparks() {
    if (sparks.length === 0) return;
    for (const s of sparks) {
      ctx.save();
      ctx.shadowBlur = 12;
      ctx.shadowColor = s.glow;
      ctx.globalAlpha = Math.max(0, s.life);
      ctx.fillStyle = s.color;
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      const sz = s.size * (0.5 + s.life * 0.5);
      if (s.shape === 'tri') {
        ctx.beginPath();
        ctx.moveTo(0, -sz * 0.8);
        ctx.lineTo(sz * 0.7, sz * 0.6);
        ctx.lineTo(-sz * 0.7, sz * 0.6);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillRect(-sz / 2, -sz / 2, sz, sz);
      }
      ctx.restore();
    }
  }

  function drawBird() {
    // Asymmetrical boxy Garbage Hauler — rust, patches, and a struggling engine
    ctx.save();

    // Constant engine-wobble vibration so the whole ship shakes slightly
    const wobbleX = (Math.random() - 0.5) * 1.4;
    const wobbleY = (Math.random() - 0.5) * 1.4;
    ctx.translate(bird.x + wobbleX, bird.y + wobbleY);

    // Base tilt from velocity, clamped to ±20°
    const tilt = Math.max(-0.349, Math.min(0.349, bird.vy * 0.1));

    // Front of the ship uses the base tilt
    ctx.save();
    ctx.rotate(tilt);
    drawHaulerFront();
    ctx.restore();

    // Back / engine pivots slightly further — mechanical hinge
    ctx.save();
    ctx.rotate(tilt * 1.45);
    drawHaulerBack();
    if (thrusterFrames > 0) drawDirtyFlame();
    ctx.restore();

    // Burst halo on score (kept as a sickly amber instead of cyan)
    if (burstFrames > 0) {
      const burstT = burstFrames / 14;
      ctx.save();
      ctx.rotate(tilt);
      ctx.globalAlpha = burstT * 0.55;
      ctx.shadowBlur = 16;
      ctx.shadowColor = '#ffb74d';
      ctx.strokeStyle = '#ffb74d';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, BIRD_R * (1.3 + (1 - burstT) * 0.4), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  function drawHaulerFront() {
    // Main front cabin block (rusty orange) + asymmetrical cargo bulge on top
    const nose = BIRD_R * 1.15;
    const cabinH = BIRD_R * 1.1;

    ctx.save();
    ctx.shadowBlur = 6;
    ctx.shadowColor = 'rgba(0,0,0,0.55)';

    // Rusty orange main body rectangle
    const bodyGrad = ctx.createLinearGradient(0, -cabinH / 2, 0, cabinH / 2);
    bodyGrad.addColorStop(0,   '#c0462e');
    bodyGrad.addColorStop(0.5, '#a52a2a');
    bodyGrad.addColorStop(1,   '#6a1e1a');
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-BIRD_R * 0.1, -cabinH / 2, nose + BIRD_R * 0.1, cabinH);

    // Dark grey top cargo block (asymmetric, sits proud on the roof)
    ctx.fillStyle = '#3a3a40';
    ctx.fillRect(BIRD_R * 0.2, -cabinH / 2 - BIRD_R * 0.45, BIRD_R * 0.7, BIRD_R * 0.5);
    ctx.restore();

    // Outlines
    ctx.strokeStyle = '#1a100a';
    ctx.lineWidth = 1.2;
    ctx.strokeRect(-BIRD_R * 0.1 + 0.5, -cabinH / 2 + 0.5, nose + BIRD_R * 0.1 - 1, cabinH - 1);
    ctx.strokeRect(BIRD_R * 0.2 + 0.5, -cabinH / 2 - BIRD_R * 0.45 + 0.5, BIRD_R * 0.7 - 1, BIRD_R * 0.5 - 1);

    // Diagonal hazard stripes on the cargo block
    ctx.save();
    ctx.beginPath();
    ctx.rect(BIRD_R * 0.2 + 1, -cabinH / 2 - BIRD_R * 0.45 + 1, BIRD_R * 0.7 - 2, BIRD_R * 0.5 - 2);
    ctx.clip();
    for (let sx = -BIRD_R; sx < BIRD_R * 2; sx += 6) {
      ctx.fillStyle = (Math.floor(sx / 6) % 2 === 0) ? '#ffd60a' : '#1a1a1a';
      ctx.beginPath();
      ctx.moveTo(sx, -cabinH / 2 - BIRD_R * 0.45);
      ctx.lineTo(sx + 3, -cabinH / 2 - BIRD_R * 0.45);
      ctx.lineTo(sx + 3 - BIRD_R * 0.5, -cabinH / 2 + BIRD_R * 0.05);
      ctx.lineTo(sx - BIRD_R * 0.5, -cabinH / 2 + BIRD_R * 0.05);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // Dim yellow cockpit window at the front
    ctx.save();
    ctx.shadowBlur = 6;
    ctx.shadowColor = '#f2c94c';
    ctx.fillStyle = '#e0a020';
    ctx.fillRect(nose - BIRD_R * 0.35, -BIRD_R * 0.18, BIRD_R * 0.3, BIRD_R * 0.28);
    ctx.strokeStyle = '#2a1a05';
    ctx.lineWidth = 1;
    ctx.strokeRect(nose - BIRD_R * 0.35 + 0.5, -BIRD_R * 0.18 + 0.5, BIRD_R * 0.3 - 1, BIRD_R * 0.28 - 1);
    // Crossbar
    ctx.beginPath();
    ctx.moveTo(nose - BIRD_R * 0.35, 0);
    ctx.lineTo(nose - BIRD_R * 0.05, 0);
    ctx.stroke();
    ctx.restore();

    // Rivets along the seams
    ctx.fillStyle = '#1a0a05';
    for (let rx = 0; rx < nose; rx += 5) {
      ctx.beginPath(); ctx.arc(rx, -cabinH / 2 + 2, 0.9, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(rx, cabinH / 2 - 2, 0.9, 0, Math.PI * 2); ctx.fill();
    }

    // Weathering streaks (dark brown)
    ctx.strokeStyle = 'rgba(58, 28, 14, 0.75)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(BIRD_R * 0.4, -cabinH / 2 + 3);
    ctx.lineTo(BIRD_R * 0.55, cabinH / 2 - 2);
    ctx.moveTo(BIRD_R * 0.85, -cabinH / 2 + 4);
    ctx.lineTo(BIRD_R * 0.95, cabinH / 2 - 3);
    ctx.stroke();

    // Small red warning light on the roof
    ctx.fillStyle = '#d04840';
    ctx.beginPath();
    ctx.arc(BIRD_R * 0.55, -cabinH / 2 - BIRD_R * 0.5, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawHaulerBack() {
    // Engine block + exhaust pipes
    const tailX = -BIRD_R * 0.1;
    const blockW = BIRD_R * 0.55;
    const blockH = BIRD_R * 1.4;

    ctx.save();
    ctx.shadowBlur = 5;
    ctx.shadowColor = 'rgba(0,0,0,0.55)';

    // Dark grey engine block extending behind the cabin
    ctx.fillStyle = '#2a2a30';
    ctx.fillRect(tailX - blockW, -blockH / 2, blockW, blockH);
    ctx.strokeStyle = '#0a0a0e';
    ctx.lineWidth = 1.2;
    ctx.strokeRect(tailX - blockW + 0.5, -blockH / 2 + 0.5, blockW - 1, blockH - 1);

    // Rust patches on the engine
    ctx.fillStyle = 'rgba(120, 50, 20, 0.7)';
    ctx.beginPath(); ctx.arc(tailX - blockW * 0.3, -blockH * 0.2, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(tailX - blockW * 0.7, blockH * 0.15, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(tailX - blockW * 0.45, blockH * 0.3, 1.4, 0, Math.PI * 2); ctx.fill();

    // Two stacked exhaust pipes poking out the back
    ctx.fillStyle = '#1a1a1e';
    ctx.fillRect(tailX - blockW - BIRD_R * 0.25, -blockH * 0.3, BIRD_R * 0.28, BIRD_R * 0.22);
    ctx.fillRect(tailX - blockW - BIRD_R * 0.25,  blockH * 0.08, BIRD_R * 0.28, BIRD_R * 0.22);
    ctx.strokeRect(tailX - blockW - BIRD_R * 0.25 + 0.5, -blockH * 0.3 + 0.5, BIRD_R * 0.28 - 1, BIRD_R * 0.22 - 1);
    ctx.strokeRect(tailX - blockW - BIRD_R * 0.25 + 0.5,  blockH * 0.08 + 0.5, BIRD_R * 0.28 - 1, BIRD_R * 0.22 - 1);
    ctx.restore();
  }

  function drawDirtyFlame() {
    // Short flickering orange plume out the main exhaust
    const tailX = -BIRD_R * 0.65 - BIRD_R * 0.25;
    const flick = 0.7 + Math.random() * 0.3;
    const len = (BIRD_R * 0.9 + Math.random() * 5) * flick;

    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff7a00';

    const g = ctx.createLinearGradient(tailX, 0, tailX - len, 0);
    g.addColorStop(0,   'rgba(255, 230, 140, 0.9)');
    g.addColorStop(0.4, 'rgba(255, 110, 20, 0.7)');
    g.addColorStop(1,   'rgba(40, 20, 10, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(tailX, -BIRD_R * 0.28);
    ctx.lineTo(tailX - len, 0);
    ctx.lineTo(tailX, BIRD_R * 0.28);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawScore() {
    if (state === STATE_OVER) return;
    const text = String(score).padStart(3, '0');
    const size = Math.round(H * 0.075);
    const y = Math.max(80, H * 0.14);
    const pulseScale = 1 + scorePulse * 0.5;

    ctx.save();
    ctx.translate(W / 2, y);
    ctx.scale(pulseScale, pulseScale);
    ctx.font = 'bold ' + size + 'px "Courier New", "Lucida Console", monospace';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ffb347';
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#3a1a05';
    ctx.fillStyle = '#ffd280';
    ctx.strokeText(text, 0, 0);
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  function drawFlash() {
    if (flashAlpha > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha + ')';
      ctx.fillRect(0, 0, W, H);
    }
  }

  function render() {
    ctx.save();
    if (shakeFrames > 0) {
      // Offset by a random −5..+5 on each axis
      const ox = (Math.random() * 2 - 1) * 5;
      const oy = (Math.random() * 2 - 1) * 5;
      ctx.translate(ox, oy);
      shakeFrames--;
    }
    drawBackground();
    drawAllDebris();   // floating trash in each gap, behind the ship/obstacles
    drawPipes();
    drawGround();
    drawExhaust();
    drawSparks();
    drawBird();
    drawScore();
    drawFlash();
    ctx.restore();
  }

  let last = 0;
  function loop(t) {
    // Fixed-ish step to smooth iOS variable rAF
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ---------- Overlay / DOM ----------
  const overlay = document.getElementById('overlay');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScore');
  const restartBtn = document.getElementById('restartBtn');

  function showStart() {
    overlay.classList.add('show');
    startScreen.classList.remove('hidden');
    gameOverScreen.classList.add('hidden');
  }
  function hideOverlay() {
    overlay.classList.remove('show');
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
  }
  function showGameOver() {
    finalScoreEl.textContent = String(score);
    bestScoreEl.textContent = String(best);
    overlay.classList.add('show');
    startScreen.classList.add('hidden');
    gameOverScreen.classList.remove('hidden');
  }

  function restart() {
    reset();
    state = STATE_READY;
    showStart();
  }

  function handleTouchStart(e) {
    if (e.cancelable) e.preventDefault();
    if (state === STATE_OVER) return;
    if (state === STATE_READY) hideOverlay();
    flap();
  }

  const stage = document.getElementById('stage');
  stage.addEventListener('touchstart', handleTouchStart, { passive: false });
  stage.addEventListener('touchmove', function(e){ if (e.cancelable) e.preventDefault(); }, { passive: false });
  stage.addEventListener('touchend', function(e){ if (e.cancelable) e.preventDefault(); }, { passive: false });
  // Click fallback for desktop Safari / testing
  stage.addEventListener('click', function(e) {
    if (e.target.closest('#restartBtn')) return;
    handleTouchStart(e);
  });

  restartBtn.addEventListener('touchend', function(e) {
    e.stopPropagation();
    e.preventDefault();
    restart();
  }, { passive: false });
  // Safari sometimes needs click fallback inside PWA
  restartBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    restart();
  });

  // Prevent iOS gestures that disrupt gameplay
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('dblclick', function(e){ e.preventDefault(); });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function() {
    setTimeout(resize, 150);
  });

  // Boot
  resize();
  reset();
  bestScoreEl.textContent = String(best);
  showStart();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
