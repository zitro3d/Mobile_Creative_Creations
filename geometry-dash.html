<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1f">
<title>Magno Drive — Level 1</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    width:100%;height:100%;background:#0a0f1f;overflow:hidden;
    touch-action:none;-webkit-user-select:none;user-select:none;
    font-family:ui-monospace,Menlo,Consolas,monospace;color:#eaf2ff;
  }
  #game{position:fixed;inset:0;width:100%;height:100%;display:block;background:#0a0f1f}

  .hud{
    position:fixed;left:0;right:0;top:env(safe-area-inset-top,0);
    padding:10px 14px;display:flex;align-items:center;gap:10px;
    pointer-events:none;z-index:5;
  }
  .bar{
    flex:1;height:14px;border-radius:8px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.18);
    overflow:hidden;box-shadow:inset 0 0 6px rgba(0,0,0,0.4);
  }
  .fill{
    height:100%;width:0%;
    background:linear-gradient(90deg,#00e7ff,#8a5cff,#ff3ea5);
    box-shadow:0 0 10px rgba(138,92,255,0.6);
    transition:width .08s linear;
  }
  .pct{font-size:12px;letter-spacing:.14em;opacity:.9;min-width:3.5em;text-align:right}
  .att{font-size:11px;letter-spacing:.22em;opacity:.65;min-width:6em}

  .overlay{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;z-index:10;
    background:radial-gradient(ellipse at center,rgba(10,15,31,.55),rgba(10,15,31,.9));
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    transition:opacity .25s ease;text-align:center;padding:20px;
  }
  .overlay.hide{opacity:0;pointer-events:none}
  .title{
    font-size:clamp(28px,7vw,56px);font-weight:900;letter-spacing:.08em;
    background:linear-gradient(90deg,#00e7ff,#8a5cff,#ff3ea5);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 24px rgba(138,92,255,.35);
  }
  .sub{font-size:13px;letter-spacing:.32em;text-transform:uppercase;opacity:.75}
  .cta{
    margin-top:8px;padding:14px 22px;border:1px solid rgba(255,255,255,0.3);
    border-radius:12px;background:rgba(255,255,255,0.06);
    font-size:12px;letter-spacing:.3em;text-transform:uppercase;
    pointer-events:auto;cursor:pointer;color:#eaf2ff;
    transition:transform .12s ease, background .12s ease;
  }
  .cta:hover{background:rgba(255,255,255,0.12);transform:translateY(-1px)}
  .hint{font-size:11px;letter-spacing:.28em;opacity:.55;margin-top:8px;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div class="att" id="att">ATT 0</div>
  <div class="att" id="mode" style="min-width:3.5em">CAR</div>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <div class="pct" id="pct">0%</div>
</div>

<div class="overlay" id="ovStart">
  <div class="sub">Level 1 — Hovercar</div>
  <div class="title">MAGNO DRIVE</div>
  <div class="hint">Hold to thrust · Release to fall · Crash → bike backup</div>
  <button class="cta" id="btnStart">Start</button>
</div>

<div class="overlay hide" id="ovDead">
  <div class="sub" id="deadSub">You Died</div>
  <div class="title" style="font-size:clamp(22px,5vw,40px)">Try Again</div>
  <div class="hint" id="deadHint">Best 0%</div>
  <button class="cta" id="btnRetry">Retry</button>
</div>

<div class="overlay hide" id="ovWin">
  <div class="sub">Level Complete</div>
  <div class="title">VICTORY</div>
  <div class="hint" id="winHint">Attempts 1</div>
  <button class="cta" id="btnAgain">Play Again</button>
</div>

<script>
'use strict';

// ── Canvas & DPR ─────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
addEventListener('resize', resize, {passive:true});

// ── Constants ────────────────────────────────────────────────────────
const TILE       = 36;
const PLAYER_SZ  = TILE;
const SCROLL_VEL = 360;
const PLAYER_X_FRAC = 0.28;
const GROUND_FRAC = 0.78;
const SPIKE_HIT_INSET = 0.30;
// Car (flying) physics — magnetic propulsion
const CAR_THRUST  = 2600;   // upward accel while holding
const CAR_GRAVITY = 1500;   // downward accel when released
const CAR_MAX_VY  = 720;    // clamp |vy|
const SKY_MIN_Y   = 40;     // invisible ceiling clamp
// Bike (ground) physics — classic cube jump
const BIKE_GRAVITY = 2800;
const BIKE_JUMP_VEL = -820;
const BIKE_TERM_VEL = 1600;
// Transitions
const EJECT_DURATION   = 0.55;
const RETRACT_DURATION = 0.55;
const TRANSITION_SCROLL_SCALE = 0.5;  // world slows during eject/retract

// ── Level 1 design ───────────────────────────────────────────────────
// Types:
//   spike  {x}           — floor spike (threatens car+bike)
//   block  {x, yTiles}   — floating airborne block; center yTiles above ground (car only)
//   orb    {x}           — summon beam; retracts bike back into car
const LEVEL_TILES = 115;
const OBSTACLES = [
  // 0-18 intro
  { type:'spike', x: 20 },
  { type:'block', x: 24, yTiles: 6 },
  { type:'spike', x: 28 },
  { type:'block', x: 32, yTiles: 5 },
  { type:'block', x: 34, yTiles: 7 },
  { type:'spike', x: 38 },
  { type:'block', x: 42, yTiles: 6 },
  { type:'block', x: 43, yTiles: 6 },
  { type:'orb',   x: 46 },
  { type:'spike', x: 50 },
  { type:'block', x: 54, yTiles: 7 },
  { type:'block', x: 56, yTiles: 5 },
  { type:'spike', x: 60 },
  { type:'orb',   x: 64 },
  { type:'block', x: 68, yTiles: 5 },
  { type:'spike', x: 70 },
  { type:'block', x: 74, yTiles: 6 },
  { type:'block', x: 76, yTiles: 6 },
  { type:'orb',   x: 80 },
  { type:'spike', x: 84 },
  { type:'block', x: 88, yTiles: 6 },
  { type:'spike', x: 92 },
  { type:'orb',   x: 96 },
  { type:'block', x: 100, yTiles: 5 },
  { type:'spike', x: 101 },
  // finish line at 115
];

// ── Game state ───────────────────────────────────────────────────────
// mode: menu | car | bike | eject | retract | dead | win
const state = {
  mode: 'menu',
  t: 0,
  attempts: 0,
  best: 0,
  player: { x:0, y:0, vy:0, rot:0, grounded:false },
  // Transition animation state
  trans: { t:0, fromX:0, fromY:0, toY:0, dur:0 },
  particles: [],
  trail: [],
  exhaust: [],
  usedOrbs: new Set(),
  shake: 0,
};

// ── Input ────────────────────────────────────────────────────────────
const input = { hold:false, pressEdge:false };
function pressDown(){
  input.hold = true;
  input.pressEdge = true;
  if (state.mode === 'menu' || state.mode === 'dead' || state.mode === 'win'){
    startRun();
  }
}
function pressUp(){ input.hold = false; }
addEventListener('pointerdown', pressDown, {passive:true});
addEventListener('pointerup',   pressUp,   {passive:true});
addEventListener('pointercancel', pressUp, {passive:true});
addEventListener('keydown', (e)=>{ if (e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){ e.preventDefault(); pressDown(); }});
addEventListener('keyup',   (e)=>{ if (e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){ e.preventDefault(); pressUp(); }});

// Button bindings (they also receive pointerdown, so startRun happens via pressDown above)
document.getElementById('btnStart').addEventListener('click', (e)=>{ e.stopPropagation(); startRun(); });
document.getElementById('btnRetry').addEventListener('click', (e)=>{ e.stopPropagation(); startRun(); });
document.getElementById('btnAgain').addEventListener('click', (e)=>{ e.stopPropagation(); startRun(); });

// ── UI refs ──────────────────────────────────────────────────────────
const ovStart = document.getElementById('ovStart');
const ovDead  = document.getElementById('ovDead');
const ovWin   = document.getElementById('ovWin');
const fillEl  = document.getElementById('fill');
const pctEl   = document.getElementById('pct');
const attEl   = document.getElementById('att');
const modeEl  = document.getElementById('mode');
const deadHint= document.getElementById('deadHint');
const winHint = document.getElementById('winHint');
function show(ov, yes){ ov.classList.toggle('hide', !yes); }
function setModeLabel(m){
  if (!modeEl) return;
  if (m === 'car' || m === 'retract') modeEl.textContent = 'CAR';
  else if (m === 'bike' || m === 'eject') modeEl.textContent = 'BIKE';
  else modeEl.textContent = '—';
}

// ── Helpers ──────────────────────────────────────────────────────────
function groundY(){ return Math.round(H * GROUND_FRAC); }
function worldToScreenX(wx, camX){ return wx - camX + W * PLAYER_X_FRAC; }
function pctDone(){
  const endX = LEVEL_TILES * TILE;
  return Math.max(0, Math.min(1, state.player.x / endX));
}

// ── Run control ──────────────────────────────────────────────────────
function carFlightY(){ return Math.round(H * 0.45); }  // default air cruise altitude

function startRun(){
  state.mode = 'car';
  state.t = 0;
  state.attempts += 1;
  state.player.x  = 0;
  state.player.y  = carFlightY();
  state.player.vy = 0;
  state.player.rot = 0;
  state.player.grounded = false;
  state.particles.length = 0;
  state.trail.length = 0;
  state.exhaust.length = 0;
  state.usedOrbs.clear();
  state.shake = 0;
  attEl.textContent = 'ATT ' + state.attempts;
  setModeLabel('car');
  show(ovStart,false); show(ovDead,false); show(ovWin,false);
}

function crashCar(){
  // Eject transition: player arcs up from car then falls onto bike
  const p = state.player;
  state.mode = 'eject';
  state.shake = 14;
  state.trans.t = 0;
  state.trans.dur = EJECT_DURATION;
  state.trans.fromX = p.x;
  state.trans.fromY = p.y;
  state.trans.toY = groundY() - PLAYER_SZ;
  // Eject spark burst
  for (let i=0;i<24;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 150 + Math.random()*260;
    state.particles.push({
      x: p.x, y: p.y + PLAYER_SZ/2,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 200,
      life: 0.6 + Math.random()*0.4, age: 0,
      col: ['#00e7ff','#6be9ff','#ffd166'][i%3],
      sz: 3 + Math.random()*3,
    });
  }
  setModeLabel('eject');
}

function hitOrb(orb){
  // Retract transition: bike is lifted up into a newly-spawned car
  if (state.usedOrbs.has(orb.x)) return;
  state.usedOrbs.add(orb.x);
  const p = state.player;
  state.mode = 'retract';
  state.trans.t = 0;
  state.trans.dur = RETRACT_DURATION;
  state.trans.fromX = p.x;
  state.trans.fromY = p.y;
  state.trans.toY = carFlightY();
  // Chevron spark upward
  for (let i=0;i<16;i++){
    state.particles.push({
      x: p.x + (Math.random()*2-1)*TILE*0.4,
      y: p.y + PLAYER_SZ/2 + Math.random()*40,
      vx: (Math.random()*2-1)*40, vy: -(200+Math.random()*200),
      life: 0.6, age: 0,
      col: '#ff3ea5',
      sz: 3 + Math.random()*3,
    });
  }
  setModeLabel('retract');
}

function die(){
  if (state.mode === 'dead' || state.mode === 'win') return;
  const p = Math.floor(pctDone()*100);
  if (p > state.best) state.best = p;
  state.mode = 'dead';
  state.shake = 20;
  for (let i=0;i<42;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 120 + Math.random()*360;
    state.particles.push({
      x: state.player.x, y: state.player.y + PLAYER_SZ/2,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 120,
      life: 0.7 + Math.random()*0.5, age:0,
      col: ['#00e7ff','#8a5cff','#ff3ea5','#ffd166'][i%4],
      sz: 3 + Math.random()*4,
    });
  }
  deadHint.textContent = `Reached ${p}% · Best ${state.best}%`;
  setTimeout(()=>show(ovDead,true), 480);
  setModeLabel('dead');
}
function win(){
  if (state.mode === 'win' || state.mode === 'dead') return;
  state.mode = 'win';
  state.best = 100;
  winHint.textContent = `Attempts ${state.attempts}`;
  show(ovWin,true);
  setModeLabel('win');
}

// ── Collision ────────────────────────────────────────────────────────
function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh){
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function obstacleRects(ob){
  const gy = groundY();
  if (ob.type === 'block'){
    // Airborne block: center at yTiles above ground (1 tile tall, 1 tile wide)
    const x = ob.x * TILE;
    const cy = gy - ob.yTiles * TILE;
    const y = cy - TILE/2;
    return { airBlock:{x, y, w:TILE, h:TILE} };
  }
  if (ob.type === 'spike'){
    const x = ob.x * TILE;
    const y = gy - TILE;
    const inset = SPIKE_HIT_INSET * TILE;
    return {
      spikeDraw:{x, y, w:TILE, h:TILE},
      spikeHit:{x:x+inset, y:y+inset*0.8, w:TILE-inset*2, h:TILE-inset*0.8},
    };
  }
  if (ob.type === 'orb'){
    // Tall narrow column centered at ob.x
    const beamW = TILE * 0.6;
    const x = ob.x * TILE + (TILE - beamW)/2;
    const h = TILE * 8;
    const y = gy - h;
    return { orbDraw:{x: ob.x*TILE, y, w:TILE, h},
             orbHit :{x, y, w:beamW, h} };
  }
  return {};
}

// ── Simulation ──────────────────────────────────────────────────────
function update(dt){
  const p = state.player;
  state.t += dt;
  state.shake *= Math.pow(0.001, dt);

  if (state.mode === 'menu' || state.mode === 'dead' || state.mode === 'win'){
    advanceParticles(dt);
    input.pressEdge = false;
    return;
  }

  if (state.mode === 'eject' || state.mode === 'retract'){
    updateTransition(dt);
    advanceParticles(dt);
    input.pressEdge = false;
    return;
  }

  // Forward scroll (both car and bike)
  p.x += SCROLL_VEL * dt;
  if (p.x >= LEVEL_TILES * TILE){
    p.x = LEVEL_TILES * TILE;
    win();
    return;
  }

  if (state.mode === 'car'){
    updateCar(dt);
  } else if (state.mode === 'bike'){
    updateBike(dt);
  }

  advanceParticles(dt);

  // HUD
  const pd = pctDone();
  fillEl.style.width = (pd*100).toFixed(1) + '%';
  pctEl.textContent = Math.floor(pd*100) + '%';
  input.pressEdge = false;
}

function updateCar(dt){
  const p = state.player;
  // Thrust vs gravity
  if (input.hold) p.vy -= CAR_THRUST * dt;
  else            p.vy += CAR_GRAVITY * dt;
  if (p.vy >  CAR_MAX_VY) p.vy =  CAR_MAX_VY;
  if (p.vy < -CAR_MAX_VY) p.vy = -CAR_MAX_VY;
  p.y += p.vy * dt;

  // Sky clamp
  if (p.y < SKY_MIN_Y){ p.y = SKY_MIN_Y; if (p.vy < 0) p.vy = 0; }
  // Ground clamp (driving on the ground still kills you if you hit a spike)
  const gy = groundY();
  if (p.y + PLAYER_SZ > gy){ p.y = gy - PLAYER_SZ; if (p.vy > 0) p.vy = 0; }

  // Tilt: lean forward when ascending, back when descending
  const targetRot = Math.max(-0.35, Math.min(0.35, -p.vy / 1400));
  p.rot += (targetRot - p.rot) * Math.min(1, dt * 8);

  // Exhaust trail
  state.exhaust.push({
    x: p.x, y: p.y + PLAYER_SZ*0.5, age:0, life:0.35,
    sz: 4 + Math.random()*3,
  });
  if (state.exhaust.length > 80) state.exhaust.splice(0, state.exhaust.length - 80);

  // Collisions
  const pxTile = p.x / TILE;
  for (const ob of OBSTACLES){
    if (Math.abs(ob.x - pxTile) > 3) continue;
    const r = obstacleRects(ob);
    if (r.airBlock){
      const b = r.airBlock;
      if (rectOverlap(p.x,p.y,PLAYER_SZ,PLAYER_SZ, b.x,b.y,b.w,b.h)){
        crashCar(); return;
      }
    }
    if (r.spikeHit){
      const s = r.spikeHit;
      if (rectOverlap(p.x,p.y,PLAYER_SZ,PLAYER_SZ, s.x,s.y,s.w,s.h)){
        crashCar(); return;
      }
    }
    // orbs inert in car mode
  }
}

function updateBike(dt){
  const p = state.player;
  // Jump input (hold chains: jump whenever grounded while held)
  if (input.hold && p.grounded){
    p.vy = BIKE_JUMP_VEL;
    p.grounded = false;
  }
  p.vy += BIKE_GRAVITY * dt;
  if (p.vy > BIKE_TERM_VEL) p.vy = BIKE_TERM_VEL;
  p.y += p.vy * dt;

  const gy = groundY();
  p.grounded = false;
  if (p.y + PLAYER_SZ >= gy){
    p.y = gy - PLAYER_SZ;
    if (p.vy > 0) p.vy = 0;
    p.grounded = true;
  }

  // Rotation: spoke-spin feel — faster when grounded (rolling), slower in air
  if (p.grounded){
    p.rot += (SCROLL_VEL / (TILE*0.5)) * dt;
  } else {
    p.rot += (Math.PI * 2 / 0.8) * dt;
  }

  // Bike trail (dust)
  if (p.grounded){
    state.trail.push({
      x: p.x + PLAYER_SZ*0.2, y: p.y + PLAYER_SZ,
      life: 0.35, age: 0, sz: 6 + Math.random()*4,
      col: '#eaf2ff',
    });
  }
  if (state.trail.length > 140) state.trail.splice(0, state.trail.length - 140);

  // Collisions
  const pxTile = p.x / TILE;
  for (const ob of OBSTACLES){
    if (Math.abs(ob.x - pxTile) > 3) continue;
    const r = obstacleRects(ob);
    // Airborne blocks ignored — placed too high for bike jump
    if (r.spikeHit){
      const s = r.spikeHit;
      if (rectOverlap(p.x,p.y,PLAYER_SZ,PLAYER_SZ, s.x,s.y,s.w,s.h)){
        die(); return;
      }
    }
    if (r.orbHit){
      const o = r.orbHit;
      if (rectOverlap(p.x,p.y,PLAYER_SZ,PLAYER_SZ, o.x,o.y,o.w,o.h)){
        hitOrb(ob); return;
      }
    }
  }
}

function updateTransition(dt){
  const p = state.player;
  const tr = state.trans;
  tr.t += dt;
  const k = Math.min(1, tr.t / tr.dur);
  // World continues advancing (slowed)
  p.x += SCROLL_VEL * TRANSITION_SCROLL_SCALE * dt;

  if (state.mode === 'eject'){
    // Arc: up-and-over parabola from fromY to toY
    const peak = tr.fromY - 60;
    // Parabola: y(k) = (1-k)^2 * fromY + 2(1-k)k * peak + k^2 * toY
    const ek = k*k;
    p.y = (1-k)*(1-k) * tr.fromY + 2*(1-k)*k * peak + ek * tr.toY;
    p.rot += 10 * dt;
    if (k >= 1){
      state.mode = 'bike';
      p.y = tr.toY;
      p.vy = 0;
      p.grounded = true;
      p.rot = 0;
      setModeLabel('bike');
    }
    return;
  }

  if (state.mode === 'retract'){
    // Smooth rise from bike ground up to car flight altitude
    const ease = 1 - Math.pow(1 - k, 3);
    p.y = tr.fromY + (tr.toY - tr.fromY) * ease;
    p.rot = (1 - k) * 0.3;  // settle to level
    if (k >= 1){
      state.mode = 'car';
      p.y = tr.toY;
      p.vy = 0;
      p.rot = 0;
      setModeLabel('car');
    }
    return;
  }
}

function advanceParticles(dt){
  for (const pa of state.particles){
    pa.age += dt;
    pa.vy += 1200 * dt;
    pa.x += pa.vx * dt;
    pa.y += pa.vy * dt;
  }
  for (let i=state.particles.length-1;i>=0;i--){
    if (state.particles[i].age >= state.particles[i].life) state.particles.splice(i,1);
  }
  for (const tr of state.trail){ tr.age += dt; }
  for (let i=state.trail.length-1;i>=0;i--){
    if (state.trail[i].age >= state.trail[i].life) state.trail.splice(i,1);
  }
  for (const ex of state.exhaust){ ex.age += dt; }
  for (let i=state.exhaust.length-1;i>=0;i--){
    if (state.exhaust[i].age >= state.exhaust[i].life) state.exhaust.splice(i,1);
  }
}

// ── Rendering ────────────────────────────────────────────────────────
function render(){
  const gy = groundY();
  const camX = state.player.x - W * PLAYER_X_FRAC;

  // Shake
  const sx = (Math.random()*2-1) * state.shake;
  const sy = (Math.random()*2-1) * state.shake;

  ctx.save();
  ctx.translate(sx, sy);

  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,gy);
  sky.addColorStop(0, '#0a0f1f');
  sky.addColorStop(0.5, '#121b3a');
  sky.addColorStop(1, '#1b2658');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,gy);

  // Parallax grid (background)
  drawParallaxGrid(camX);

  // Ground gradient
  const gnd = ctx.createLinearGradient(0,gy,0,H);
  gnd.addColorStop(0, '#1a2246');
  gnd.addColorStop(0.4, '#0b112a');
  gnd.addColorStop(1, '#05081a');
  ctx.fillStyle = gnd;
  ctx.fillRect(0, gy, W, H-gy);

  // Ground top neon line
  ctx.save();
  ctx.shadowColor = '#00e7ff'; ctx.shadowBlur = 16;
  ctx.strokeStyle = '#00e7ff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,gy+0.5); ctx.lineTo(W,gy+0.5); ctx.stroke();
  ctx.restore();

  // Ground moving pattern (scrolls with world)
  drawGroundPattern(camX, gy);

  // Obstacles
  for (const ob of OBSTACLES){
    const obWorldX = ob.x * TILE;
    const screenX = obWorldX - camX;
    if (screenX < -TILE*2 || screenX > W + TILE*2) continue;
    const r = obstacleRects(ob);
    if (r.airBlock)  drawAirBlock(screenX, r.airBlock.y, TILE, TILE);
    if (r.spikeDraw) drawSpike(screenX, r.spikeDraw.y, TILE, TILE);
    if (r.orbDraw){
      const used = state.usedOrbs.has(ob.x);
      drawOrb(screenX, r.orbDraw.y, TILE, r.orbDraw.h, state.t, used);
    }
  }

  // Finish line
  {
    const fx = LEVEL_TILES * TILE - camX;
    if (fx > -40 && fx < W + 40){
      ctx.save();
      ctx.fillStyle = '#eaf2ff'; ctx.globalAlpha = 0.15;
      ctx.fillRect(fx-8, 0, 16, gy);
      ctx.globalAlpha = 1;
      // checker flag bar
      for (let y=0; y<gy; y+=12){
        ctx.fillStyle = ((y/12)|0) % 2 ? '#eaf2ff' : '#0a0f1f';
        ctx.fillRect(fx-6, y, 12, 12);
      }
      ctx.restore();
    }
  }

  // Exhaust (car)
  for (const ex of state.exhaust){
    const a = 1 - ex.age / ex.life;
    ctx.save();
    ctx.globalAlpha = a * 0.8;
    ctx.fillStyle = '#ffd166';
    ctx.shadowColor = '#ff9a55'; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(ex.x - camX - 10, ex.y, ex.sz*a, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Trail (bike dust)
  for (const tr of state.trail){
    const a = 1 - tr.age / tr.life;
    const x = tr.x - camX;
    ctx.save();
    ctx.globalAlpha = a * 0.5;
    ctx.fillStyle = tr.col || '#8a5cff';
    ctx.shadowColor = tr.col || '#8a5cff'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(x, tr.y, tr.sz*a, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Player — draw correct vehicle based on mode
  const px = state.player.x - camX;
  const py = state.player.y;
  const pr = state.player.rot;
  if (state.mode === 'car' || state.mode === 'retract' || state.mode === 'win'){
    drawCar(px, py, pr);
  } else if (state.mode === 'bike'){
    drawBike(px, py, pr);
  } else if (state.mode === 'eject'){
    // Pilot sprite (just a small glowing square) + falling car behind
    drawEjectedRider(px, py, pr);
  }

  // Death particles
  for (const pa of state.particles){
    const a = 1 - pa.age / pa.life;
    ctx.save();
    ctx.globalAlpha = Math.max(0,a);
    ctx.fillStyle = pa.col;
    ctx.shadowColor = pa.col; ctx.shadowBlur = 14;
    ctx.fillRect(pa.x - camX - pa.sz/2, pa.y - pa.sz/2, pa.sz, pa.sz);
    ctx.restore();
  }

  ctx.restore();
}

function drawParallaxGrid(camX){
  const gy = groundY();
  const step = 80;
  const offset = -((camX * 0.25) % step);
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.strokeStyle = '#2a3566';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = offset; x < W; x += step){
    ctx.moveTo(x, 0); ctx.lineTo(x, gy);
  }
  for (let y = 0; y < gy; y += step){
    ctx.moveTo(0, y); ctx.lineTo(W, y);
  }
  ctx.stroke();
  ctx.restore();

  // Far parallax mountains
  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#131b3c';
  const mOff = -((camX * 0.12) % 360);
  ctx.beginPath();
  ctx.moveTo(0, gy);
  for (let x=mOff; x<W+360; x+=360){
    ctx.lineTo(x,       gy - 80);
    ctx.lineTo(x + 180, gy - 160);
    ctx.lineTo(x + 360, gy - 90);
  }
  ctx.lineTo(W, gy); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawGroundPattern(camX, gy){
  const step = TILE;
  const offset = -((camX) % step);
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = '#2a3a7a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = offset; x < W; x += step){
    ctx.moveTo(x, gy); ctx.lineTo(x, H);
  }
  for (let y = gy; y < H; y += step){
    ctx.moveTo(0, y); ctx.lineTo(W, y);
  }
  ctx.stroke();
  ctx.restore();
}

function drawAirBlock(x, y, w, h){
  ctx.save();
  ctx.shadowColor = '#8a5cff'; ctx.shadowBlur = 22;
  const grad = ctx.createLinearGradient(x,y,x,y+h);
  grad.addColorStop(0, '#3a46a5');
  grad.addColorStop(1, '#14193f');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#b59cff'; ctx.lineWidth = 2;
  ctx.strokeRect(x+1, y+1, w-2, h-2);
  ctx.fillStyle = 'rgba(181,156,255,0.25)';
  ctx.fillRect(x+4, y+4, w-8, 4);
  // Tethered look — thin vertical lines hinting at magnetic suspension
  ctx.strokeStyle = 'rgba(138,92,255,0.35)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + w*0.3, y); ctx.lineTo(x + w*0.3, y - 10);
  ctx.moveTo(x + w*0.7, y); ctx.lineTo(x + w*0.7, y - 10);
  ctx.stroke();
  ctx.restore();
}

function drawSpike(x, y, w, h){
  ctx.save();
  // glow
  ctx.shadowColor = '#ff3ea5'; ctx.shadowBlur = 16;
  const grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, '#ff3ea5');
  grad.addColorStop(1, '#7b1a55');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(x + w/2, y);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#ffb6e0'; ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function drawOrb(x, y, w, h, t, used){
  // Tall magenta beam with rising chevrons
  ctx.save();
  const cx = x + w/2;
  const alpha = used ? 0.25 : 1;
  // soft outer glow column
  const beamW = w * 0.6;
  const bx = cx - beamW/2;
  ctx.globalAlpha = 0.35 * alpha;
  ctx.shadowColor = '#ff3ea5'; ctx.shadowBlur = 40;
  ctx.fillStyle = '#ff3ea5';
  ctx.fillRect(bx - 6, y, beamW + 12, h);
  // core
  ctx.globalAlpha = 0.85 * alpha;
  ctx.shadowBlur = 20;
  const grad = ctx.createLinearGradient(0, y, 0, y + h);
  grad.addColorStop(0, 'rgba(255,255,255,0.9)');
  grad.addColorStop(0.3, '#ff6dd2');
  grad.addColorStop(1, '#8a1b66');
  ctx.fillStyle = grad;
  ctx.fillRect(bx, y, beamW, h);
  ctx.shadowBlur = 0;
  // rising chevrons
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
  const speed = 40;
  const step = 28;
  const phase = (t * speed) % step;
  for (let yy = y + h - phase; yy > y; yy -= step){
    ctx.beginPath();
    ctx.moveTo(cx - 8, yy + 6);
    ctx.lineTo(cx,     yy - 4);
    ctx.lineTo(cx + 8, yy + 6);
    ctx.stroke();
  }
  // base pad on ground
  const gy = groundY();
  ctx.fillStyle = '#ff3ea5';
  ctx.shadowColor = '#ff3ea5'; ctx.shadowBlur = 18;
  ctx.fillRect(bx - 4, gy - 3, beamW + 8, 3);
  ctx.restore();
}

function drawCar(x, y, rot){
  const s = PLAYER_SZ;
  ctx.save();
  ctx.translate(x + s/2, y + s/2);
  ctx.rotate(rot);
  // Magnetic pad glow underneath (pulse)
  const pulse = 0.7 + 0.3 * Math.sin(state.t * 10);
  ctx.save();
  ctx.shadowColor = '#00e7ff'; ctx.shadowBlur = 28 * pulse;
  ctx.fillStyle = `rgba(0,231,255,${0.55 * pulse})`;
  ctx.beginPath(); ctx.ellipse(-s*0.35, s*0.42, s*0.22, s*0.08, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( s*0.35, s*0.42, s*0.22, s*0.08, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // Body
  ctx.shadowColor = '#6be9ff'; ctx.shadowBlur = 18;
  const body = ctx.createLinearGradient(0, -s*0.55, 0, s*0.3);
  body.addColorStop(0, '#8be9ff');
  body.addColorStop(0.5, '#3da0ff');
  body.addColorStop(1, '#174d88');
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(-s*0.75, s*0.15);
  ctx.quadraticCurveTo(-s*0.85, -s*0.05, -s*0.55, -s*0.15);
  ctx.lineTo(-s*0.2, -s*0.4);
  ctx.lineTo( s*0.25, -s*0.4);
  ctx.lineTo( s*0.7, -s*0.15);
  ctx.quadraticCurveTo( s*0.85, 0, s*0.8, s*0.2);
  ctx.lineTo(-s*0.75, s*0.2);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  // Canopy window
  ctx.fillStyle = 'rgba(10,20,50,0.85)';
  ctx.beginPath();
  ctx.moveTo(-s*0.15, -s*0.36);
  ctx.lineTo( s*0.22, -s*0.36);
  ctx.lineTo( s*0.42, -s*0.12);
  ctx.lineTo(-s*0.35, -s*0.12);
  ctx.closePath();
  ctx.fill();
  // Canopy highlight
  ctx.fillStyle = 'rgba(140,220,255,0.4)';
  ctx.beginPath();
  ctx.moveTo(-s*0.1, -s*0.32);
  ctx.lineTo( s*0.05, -s*0.32);
  ctx.lineTo( s*0.1, -s*0.2);
  ctx.lineTo(-s*0.2, -s*0.2);
  ctx.closePath();
  ctx.fill();
  // Chrome stripe
  ctx.strokeStyle = '#eaf2ff'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-s*0.7, s*0.02); ctx.lineTo(s*0.75, s*0.02);
  ctx.stroke();
  // Tailfin
  ctx.fillStyle = '#2f6ea8';
  ctx.beginPath();
  ctx.moveTo(-s*0.75, s*0.15);
  ctx.lineTo(-s*0.92, -s*0.05);
  ctx.lineTo(-s*0.7, -s*0.12);
  ctx.closePath();
  ctx.fill();
  // Magnetic pucks (metal)
  ctx.fillStyle = '#2b3550';
  ctx.fillRect(-s*0.45, s*0.32, s*0.2, s*0.08);
  ctx.fillRect( s*0.25, s*0.32, s*0.2, s*0.08);
  ctx.restore();
}

function drawBike(x, y, rot){
  const s = PLAYER_SZ;
  ctx.save();
  ctx.translate(x + s/2, y + s/2);
  ctx.shadowColor = '#ffd166'; ctx.shadowBlur = 12;

  const wr = s * 0.32;                    // wheel radius
  const lw = -s * 0.45, rw = s * 0.45;    // left/right wheel x
  const wy = s * 0.28;                    // wheel y (bottom of bike)

  // Wheels (spokes spin with rot)
  for (const wx of [lw, rw]){
    ctx.save();
    ctx.translate(wx, wy);
    ctx.rotate(rot);
    // tire
    ctx.strokeStyle = '#111621'; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.arc(0,0,wr,0,Math.PI*2); ctx.stroke();
    // rim
    ctx.strokeStyle = '#eaf2ff'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(0,0,wr-2,0,Math.PI*2); ctx.stroke();
    // spokes
    ctx.strokeStyle = '#eaf2ff'; ctx.lineWidth = 0.8;
    for (let i=0;i<6;i++){
      const a = i * Math.PI/3;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(a)*(wr-2), Math.sin(a)*(wr-2));
      ctx.stroke();
    }
    // hub
    ctx.fillStyle = '#e03030';
    ctx.beginPath(); ctx.arc(0,0,2.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Frame — classic ten-speed diamond
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#d43b3b'; ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  // Chainstay
  ctx.beginPath();
  ctx.moveTo(lw, wy);
  ctx.lineTo(0, wy - 2);
  ctx.stroke();
  // Seat tube
  ctx.beginPath();
  ctx.moveTo(0, wy - 2);
  ctx.lineTo(-s*0.08, -s*0.12);
  ctx.stroke();
  // Top tube
  ctx.beginPath();
  ctx.moveTo(-s*0.08, -s*0.12);
  ctx.lineTo( s*0.26, -s*0.12);
  ctx.stroke();
  // Down tube
  ctx.beginPath();
  ctx.moveTo(0, wy - 2);
  ctx.lineTo(s*0.26, -s*0.12);
  ctx.stroke();
  // Fork to front wheel
  ctx.beginPath();
  ctx.moveTo(s*0.26, -s*0.12);
  ctx.lineTo(rw, wy);
  ctx.stroke();
  // Drop handlebar
  ctx.strokeStyle = '#111621'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(s*0.26, -s*0.12);
  ctx.quadraticCurveTo(s*0.42, -s*0.2, s*0.48, -s*0.08);
  ctx.stroke();
  // Seat
  ctx.fillStyle = '#111621';
  ctx.fillRect(-s*0.18, -s*0.18, s*0.18, s*0.05);

  // Rider (simple silhouette) — sits on seat, hunched forward
  ctx.fillStyle = '#1a2446';
  ctx.shadowColor = '#00e7ff'; ctx.shadowBlur = 10;
  // torso
  ctx.beginPath();
  ctx.moveTo(-s*0.05, -s*0.18);
  ctx.quadraticCurveTo(s*0.08, -s*0.42, s*0.2, -s*0.2);
  ctx.lineTo(s*0.08, -s*0.14);
  ctx.closePath();
  ctx.fill();
  // head
  ctx.beginPath(); ctx.arc(s*0.18, -s*0.45, s*0.09, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawEjectedRider(x, y, rot){
  const s = PLAYER_SZ;
  ctx.save();
  ctx.translate(x + s/2, y + s/2);
  ctx.rotate(rot);
  ctx.shadowColor = '#00e7ff'; ctx.shadowBlur = 22;
  const g = ctx.createLinearGradient(-s/2,-s/2, s/2, s/2);
  g.addColorStop(0, '#6be9ff');
  g.addColorStop(1, '#1e6bff');
  ctx.fillStyle = g;
  ctx.fillRect(-s*0.3,-s*0.3, s*0.6, s*0.6);
  ctx.restore();
}

// ── Main loop ────────────────────────────────────────────────────────
let last = performance.now();
function frame(now){
  const dt = Math.min((now - last)/1000, 1/30);
  last = now;
  update(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame((t)=>{ last = t; frame(t); });

// Initial idle render so the menu has a backdrop
(function idlePrime(){
  state.player.x = 0;
  state.player.y = carFlightY();
})();
</script>
</body>
