<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Hand Strings — Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    /* Live camera feed — mirrored for natural selfie view */
    #cam {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 0;
    }
    /* Transparent canvas drawn on top of video */
    #overlay {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    /* Hint text at bottom */
    #hint {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.60);
      font: 500 13px/1 'Courier New', monospace;
      letter-spacing: 3px;
      text-align: center;
      z-index: 2;
      pointer-events: none;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
<div id="hint">RAISE YOUR HANDS</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────────
// Canvas & resize
// ─────────────────────────────────────────────────────────────────
const canvas  = document.getElementById('overlay');
const ctx     = canvas.getContext('2d');
const camEl   = document.getElementById('cam');
const hintEl  = document.getElementById('hint');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────────────────────────
const TIP_IDX = [4, 8, 12, 16, 20];

const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],[0,17]
];

// Higher = more responsive to fast movement, less smoothing of jitter
const EMA = 0.42;

const STRING_COLS = ['#FF6EB4', '#4FC3F7', '#CE93D8', '#FFF176', '#80DEEA'];

const PLUCK_RADIUS = 18; // px

// ─────────────────────────────────────────────────────────────────
// Audio
// ─────────────────────────────────────────────────────────────────
let aCtx = null;

function ensureAudio() {
  if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (aCtx.state === 'suspended') aCtx.resume();
}

function mkDistortion(amount = 80) {
  const ws = aCtx.createWaveShaper();
  const n = 256, curve = new Float32Array(n), k = amount;
  for (let i = 0; i < n; i++) {
    const x = i * 2 / n - 1;
    curve[i] = (3 + k) * x * 20 * Math.PI / 180 / (Math.PI + k * Math.abs(x));
  }
  ws.curve = curve; ws.oversample = '4x'; return ws;
}

function playTwang(idx) {
  if (!aCtx) return;
  const t = aCtx.currentTime;
  const notes = [110, 131, 147, 175, 220]; // A2 C3 D3 F3 A3
  const f = notes[idx % notes.length];
  const o = aCtx.createOscillator(), dist = mkDistortion(55), g = aCtx.createGain();
  o.connect(dist); dist.connect(g); g.connect(aCtx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(f, t);
  o.frequency.setValueAtTime(f * 1.05, t + 0.015);
  o.frequency.exponentialRampToValueAtTime(f * 0.94, t + 0.5);
  g.gain.setValueAtTime(0.09, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
  o.start(t); o.stop(t + 0.55);
}

// ─────────────────────────────────────────────────────────────────
// Pluck particles — expanding ring flash at contact point
// ─────────────────────────────────────────────────────────────────
const pluckParticles = [];

function spawnPluck(x, y, color) {
  pluckParticles.push({ x, y, color, r: 0, life: 1.0 });
}

function updateDrawParticles(dt) {
  for (let i = pluckParticles.length - 1; i >= 0; i--) {
    const p = pluckParticles[i];
    p.life -= dt * 3.5;
    if (p.life <= 0) { pluckParticles.splice(i, 1); continue; }
    p.r = (1 - p.life) * 55;
    ctx.save();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.strokeStyle  = p.color;
    ctx.globalAlpha  = p.life * 0.75;
    ctx.lineWidth    = 2.5 * p.life;
    ctx.shadowColor  = p.color;
    ctx.shadowBlur   = 14;
    ctx.stroke();
    // Small inner dot flash
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI * 2);
    ctx.fillStyle   = '#ffffff';
    ctx.globalAlpha = p.life * 0.9;
    ctx.shadowBlur  = 8;
    ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────────
// ElasticString
// ─────────────────────────────────────────────────────────────────
class ElasticString {
  constructor(idx) {
    this.idx   = idx;
    this.color = STRING_COLS[idx];
    this.cx = 0; this.cy = 0;
    this.cvx = 0; this.cvy = 0;
    this.vAmp  = 0;
    this.vFreq = 1.8 + Math.random() * 1.4;
    this.vTime = 0;
    this.lastPluckMs = 0;
  }

  // cx/cy = canvas contact point for particle spawn
  pluck(cx, cy) {
    const now = performance.now();
    if (now - this.lastPluckMs < 150) return false;
    this.lastPluckMs = now;
    const mag = 11 + Math.random() * 11;
    const ang = (Math.random() - 0.5) * Math.PI * 2;
    this.cvx += Math.cos(ang) * mag;
    this.cvy += Math.sin(ang) * mag;
    // Bigger, more satisfying vibration burst
    this.vAmp = Math.max(this.vAmp, 20 + Math.random() * 14);
    spawnPluck(cx, cy, this.color);
    return true;
  }

  update(a, b, dt) {
    // Snappier spring (0.18 vs 0.16)
    this.cvx += -0.18 * this.cx;
    this.cvy += -0.18 * this.cy;
    this.cvx *= 0.86;
    this.cvy *= 0.86;
    this.cx  += this.cvx;
    this.cy  += this.cvy;
    // Slower amplitude decay — rings out longer
    this.vAmp  *= 0.91;
    this.vTime += dt;
    // Gravity sag
    if (a && b) {
      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      this.cvy += Math.min(dist * 0.07, 25) * 0.035;
    }
  }

  draw(a, b) {
    if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 8) return;

    const px = -dy / dist, py = dx / dist;
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;

    const vib = this.vAmp * Math.sin(this.vTime * this.vFreq * Math.PI * 2);
    const cpx = mx + this.cx + px * vib;
    const cpy = my + this.cy + py * vib;

    const tension = Math.min(1, Math.max(0, (dist - 60) / 280));
    const vibNorm = Math.min(1, this.vAmp / 22);

    const alpha = 0.60 + tension * 0.40;
    const lineW = 2.0  + tension * 2.0 + vibNorm * 1.2;
    // Glow intensifies with both stretch and active vibration
    const glow  = 8    + tension * 20  + vibNorm * 18;

    ctx.save();
    ctx.lineCap = 'round';

    ctx.shadowColor = this.color;
    ctx.shadowBlur  = glow;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(cpx, cpy, b.x, b.y);
    ctx.strokeStyle = this.color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth   = lineW;
    ctx.stroke();

    // Specular highlight
    ctx.shadowBlur  = 0;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(cpx, cpy, b.x, b.y);
    ctx.strokeStyle = '#ffffff';
    ctx.globalAlpha = (0.14 + tension * 0.20 + vibNorm * 0.12) * alpha;
    ctx.lineWidth   = lineW * 0.28;
    ctx.stroke();

    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────────
// Hand state
// ─────────────────────────────────────────────────────────────────
function makeHand() {
  return { visible: false, tips: Array(5).fill(null), lm: null, _smooth: Array(5).fill(null) };
}
const leftHand  = makeHand();
const rightHand = makeHand();

function processLandmarks(hand, lm) {
  hand.visible = true;
  hand.lm = lm.map(p => ({ x: (1 - p.x) * canvas.width, y: p.y * canvas.height }));
  for (let i = 0; i < 5; i++) {
    const p   = lm[TIP_IDX[i]];
    const raw = { x: (1 - p.x) * canvas.width, y: p.y * canvas.height };
    const prev = hand._smooth[i];
    if (!prev) {
      hand._smooth[i] = raw;
    } else {
      // Lower threshold (4px) catches finer movements
      if (Math.hypot(raw.x - prev.x, raw.y - prev.y) > 4) {
        hand._smooth[i] = {
          x: prev.x + EMA * (raw.x - prev.x),
          y: prev.y + EMA * (raw.y - prev.y)
        };
      }
    }
    hand.tips[i] = hand._smooth[i];
  }
}

function resetHand(hand) {
  hand.visible = false; hand.lm = null;
  hand.tips = Array(5).fill(null); hand._smooth = Array(5).fill(null);
}

// ─────────────────────────────────────────────────────────────────
// Elastic strings
// ─────────────────────────────────────────────────────────────────
const strings = Array.from({ length: 5 }, (_, i) => new ElasticString(i));

// ─────────────────────────────────────────────────────────────────
// Pluck detection
// ─────────────────────────────────────────────────────────────────
function ptSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - ax, py - ay);
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

// Closest point on segment — returned as {x, y} for particle spawn
function closestPtOnSeg(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return { x: ax, y: ay };
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
  return { x: ax + t * dx, y: ay + t * dy };
}

function checkPlucks() {
  const allTips = [...leftHand.tips, ...rightHand.tips].filter(Boolean);
  for (let si = 0; si < 5; si++) {
    const a = leftHand.tips[si], b = rightHand.tips[si];
    if (!a || !b) continue;
    const str = strings[si];
    for (const tip of allTips) {
      if (tip === a || tip === b) continue;
      if (ptSegDist(tip.x, tip.y, a.x, a.y, b.x, b.y) < PLUCK_RADIUS) {
        const contact = closestPtOnSeg(tip.x, tip.y, a.x, a.y, b.x, b.y);
        if (str.pluck(contact.x, contact.y)) {
          ensureAudio();
          playTwang(si);
        }
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────
// Bottom vignette — darkens lower half so strings glow against skin
// ─────────────────────────────────────────────────────────────────
function drawVignette() {
  const grad = ctx.createLinearGradient(0, canvas.height * 0.50, 0, canvas.height);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.50)');
  ctx.fillStyle   = grad;
  ctx.globalAlpha = 1;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ─────────────────────────────────────────────────────────────────
// Skeleton renderer
// ─────────────────────────────────────────────────────────────────
function drawSkeleton(hand) {
  if (!hand.visible || !hand.lm) return;
  const lm = hand.lm;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth   = 1;
  ctx.shadowBlur  = 0;
  for (const [a, b] of HAND_CONNECTIONS) {
    if (!lm[a] || !lm[b]) continue;
    ctx.beginPath();
    ctx.moveTo(lm[a].x, lm[a].y);
    ctx.lineTo(lm[b].x, lm[b].y);
    ctx.stroke();
  }
  for (let i = 0; i < 5; i++) {
    const tip = hand.tips[i];
    if (!tip) continue;
    ctx.beginPath();
    ctx.arc(tip.x, tip.y, 5.5, 0, Math.PI * 2);
    ctx.fillStyle   = STRING_COLS[i];
    ctx.globalAlpha = 0.95;
    ctx.shadowColor = STRING_COLS[i];
    ctx.shadowBlur  = 16;
    ctx.fill();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────
// MediaPipe — 2 hands, ~8fps cap
// ─────────────────────────────────────────────────────────────────
let _lastHandTs = 0;

function initTracking() {
  const mpHands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  mpHands.setOptions({
    maxNumHands            : 2,
    modelComplexity        : 0,
    minDetectionConfidence : 0.55,
    minTrackingConfidence  : 0.50
  });
  mpHands.onResults(res => {
    try {
      _lastHandTs = performance.now();
      resetHand(leftHand); resetHand(rightHand);
      if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        res.multiHandLandmarks.forEach((lm, i) => {
          const mpLabel = res.multiHandedness[i].label;
          const hand    = mpLabel === 'Left' ? rightHand : leftHand;
          processLandmarks(hand, lm);
        });
      }
    } catch (e) { console.warn('MP result error', e); }
  });

  let _sendPending = false;
  const cam = new Camera(camEl, {
    onFrame: async () => {
      if (_sendPending) return;
      const now = performance.now();
      if (now - _lastHandTs < 120) return;
      _sendPending = true;
      try   { await mpHands.send({ image: camEl }); }
      catch (e) { console.warn('send err', e); }
      finally { _sendPending = false; }
    },
    width: 640, height: 480, facingMode: 'user'
  });
  cam.start().catch(e => {
    hintEl.textContent = 'CAMERA ACCESS REQUIRED';
    console.error(e);
  });
}

// ─────────────────────────────────────────────────────────────────
// Render loop
// ─────────────────────────────────────────────────────────────────
let lastTs = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Stale hand timeout
  if (_lastHandTs > 0 && ts - _lastHandTs > 1000) {
    resetHand(leftHand); resetHand(rightHand);
  }

  const lv = leftHand.visible, rv = rightHand.visible;

  if (lv && rv)       hintEl.textContent = '';
  else if (lv || rv)  hintEl.textContent = 'SHOW BOTH HANDS';
  else                hintEl.textContent = 'RAISE YOUR HANDS';

  // Subtle vignette to separate strings from camera background
  drawVignette();

  if (lv && rv) {
    checkPlucks();
    for (let i = 0; i < 5; i++) strings[i].update(leftHand.tips[i], rightHand.tips[i], dt);
    for (let i = 0; i < 5; i++) strings[i].draw(leftHand.tips[i], rightHand.tips[i]);
  } else {
    for (const s of strings) {
      s.cx *= 0.9; s.cy *= 0.9;
      s.cvx *= 0.8; s.cvy *= 0.8;
      s.vAmp *= 0.9;
    }
  }

  updateDrawParticles(dt);
  drawSkeleton(leftHand);
  drawSkeleton(rightHand);
}

// ─────────────────────────────────────────────────────────────────
// Bootstrap
// ─────────────────────────────────────────────────────────────────
document.addEventListener('click',      ensureAudio, { once: true });
document.addEventListener('touchstart', ensureAudio, { once: true, passive: true });

initTracking();
requestAnimationFrame(loop);
</script>
</body>
</html>
