<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Anti-Gravity Hand Strings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
//  HandStrings — embeddable anti-gravity hand-tracking module
//
//  Usage (standalone):
//    new HandStrings().start();
//
//  Usage (embedded in a container):
//    const hs = new HandStrings({
//      container : document.getElementById('my-div'),
//      onPluck   : (fingerIndex, x, y) => console.log('plucked', fingerIndex),
//    });
//    hs.start();
//    // later: hs.stop() / hs.destroy()
// ═══════════════════════════════════════════════════════════════════
class HandStrings {

  // ── Config defaults ──────────────────────────────────────────────
  static DEFAULTS = {
    container : null,           // DOM element — null = document.body
    onPluck   : null,           // fn(fingerIndex, x, y)
    colors    : ['#FF6EB4', '#4FC3F7', '#CE93D8', '#FFF176', '#80DEEA'],
    gravity   : -0.028,         // negative = anti-gravity (strings float UP)
    springK   : 0.18,           // spring stiffness
    damping   : 0.86,           // velocity damping per frame
    ampDecay  : 0.91,           // vibration ring-out rate
    pluckRadius: 18,            // px — finger proximity to trigger pluck
    mpFps     : 120,            // ms between MediaPipe sends (~8fps)
  };

  // ── MediaPipe landmark indices ───────────────────────────────────
  static TIP_IDX = [4, 8, 12, 16, 20];
  static CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],
    [5,9],[9,13],[13,17],[0,17]
  ];

  constructor(opts = {}) {
    this.cfg = { ...HandStrings.DEFAULTS, ...opts };
    this._running   = false;
    this._rafId     = null;
    this._lastTs    = 0;
    this._lastHandTs = 0;
    this._sendPending = false;

    // Audio
    this._aCtx = null;

    // Hands
    this._left  = this._makeHand();
    this._right = this._makeHand();

    // Physics objects
    this._strings = Array.from({ length: 5 }, (_, i) => this._makeString(i));
    this._particles = [];

    // Build DOM
    this._buildDOM();
  }

  // ── Public API ───────────────────────────────────────────────────

  start() {
    if (this._running) return this;
    this._running = true;
    this._initTracking();
    this._rafId = requestAnimationFrame(ts => this._loop(ts));
    // Unlock audio on first touch/click
    const unlock = () => this._ensureAudio();
    document.addEventListener('click',      unlock, { once: true });
    document.addEventListener('touchstart', unlock, { once: true, passive: true });
    return this;
  }

  stop() {
    this._running = false;
    if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
    return this;
  }

  destroy() {
    this.stop();
    this._video.remove();
    this._canvas.remove();
    this._hint.remove();
    if (this._aCtx) { this._aCtx.close(); this._aCtx = null; }
  }

  // ── DOM construction ─────────────────────────────────────────────

  _buildDOM() {
    const root = this.cfg.container || document.body;
    // Use fixed positioning when anchoring to body, absolute for custom containers
    const pos = (root === document.body) ? 'fixed' : 'absolute';

    // Camera video — iOS requires these as HTML attributes, not just JS properties
    this._video = document.createElement('video');
    this._video.setAttribute('autoplay', '');
    this._video.setAttribute('playsinline', '');        // iOS 10+
    this._video.setAttribute('webkit-playsinline', ''); // iOS 9 and older
    this._video.setAttribute('muted', '');
    this._video.muted = true; // also set property for browsers that need it
    // Avoid inset shorthand — not supported on iOS 14 and earlier
    Object.assign(this._video.style, {
      position: pos, top: '0', left: '0', right: '0', bottom: '0',
      width: '100%', height: '100%',
      objectFit: 'cover',
      transform: 'scaleX(-1)',
      zIndex: '0',
    });

    // Canvas overlay
    this._canvas = document.createElement('canvas');
    Object.assign(this._canvas.style, {
      position: pos, top: '0', left: '0', right: '0', bottom: '0',
      width: '100%', height: '100%',
      zIndex: '1',
      pointerEvents: 'none',
    });
    this._ctx = this._canvas.getContext('2d');

    // Hint text
    this._hint = document.createElement('div');
    Object.assign(this._hint.style, {
      position: pos,
      bottom: '28px', left: '50%',
      transform: 'translateX(-50%)',
      color: 'rgba(255,255,255,0.55)',
      font: "500 13px/1 'Courier New', monospace",
      letterSpacing: '3px',
      textAlign: 'center',
      zIndex: '2',
      pointerEvents: 'none',
      textTransform: 'uppercase',
    });
    this._hint.textContent = 'RAISE YOUR HANDS';

    // Container needs relative/absolute positioning to anchor children
    if (getComputedStyle(root).position === 'static') root.style.position = 'relative';
    root.append(this._video, this._canvas, this._hint);

    // Resize handler
    this._onResize = () => {
      this._canvas.width  = this._canvas.offsetWidth;
      this._canvas.height = this._canvas.offsetHeight;
    };
    new ResizeObserver(this._onResize).observe(root);
    this._onResize();
  }

  // ── Audio ────────────────────────────────────────────────────────

  _ensureAudio() {
    if (!this._aCtx) this._aCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (this._aCtx.state === 'suspended') this._aCtx.resume();
  }

  _mkDistortion(amount = 55) {
    const ws = this._aCtx.createWaveShaper();
    const n = 256, curve = new Float32Array(n), k = amount;
    for (let i = 0; i < n; i++) {
      const x = i * 2 / n - 1;
      curve[i] = (3 + k) * x * 20 * Math.PI / 180 / (Math.PI + k * Math.abs(x));
    }
    ws.curve = curve; ws.oversample = '4x'; return ws;
  }

  _playTwang(idx) {
    if (!this._aCtx) return;
    const t = this._aCtx.currentTime;
    const notes = [110, 131, 147, 175, 220]; // A2 C3 D3 F3 A3
    const f = notes[idx % notes.length];
    const o = this._aCtx.createOscillator();
    const dist = this._mkDistortion();
    const g = this._aCtx.createGain();
    o.connect(dist); dist.connect(g); g.connect(this._aCtx.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(f, t);
    o.frequency.setValueAtTime(f * 1.05, t + 0.015);
    o.frequency.exponentialRampToValueAtTime(f * 0.94, t + 0.5);
    g.gain.setValueAtTime(0.09, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
    o.start(t); o.stop(t + 0.55);
  }

  // ── String physics object ────────────────────────────────────────

  _makeString(idx) {
    return {
      idx,
      color     : this.cfg.colors[idx],
      cx: 0, cy: 0, cvx: 0, cvy: 0,
      vAmp  : 0,
      // Unique oscillation frequency per string for natural variation
      vFreq : 1.8 + Math.random() * 1.4,
      vTime : Math.random() * 10,    // stagger start phases
      lastPluckMs: 0,
    };
  }

  _pluckString(s, cx, cy) {
    const now = performance.now();
    if (now - s.lastPluckMs < 150) return false;
    s.lastPluckMs = now;
    const mag = 11 + Math.random() * 11;
    const ang = (Math.random() - 0.5) * Math.PI * 2;
    s.cvx += Math.cos(ang) * mag;
    s.cvy += Math.sin(ang) * mag;
    s.vAmp = Math.max(s.vAmp, 20 + Math.random() * 14);
    this._spawnParticle(cx, cy, s.color);
    if (this.cfg.onPluck) this.cfg.onPluck(s.idx, cx, cy);
    return true;
  }

  _updateString(s, a, b, dt) {
    // Spring: pull control-point offset back toward zero
    s.cvx += -this.cfg.springK * s.cx;
    s.cvy += -this.cfg.springK * s.cy;
    s.cvx *= this.cfg.damping;
    s.cvy *= this.cfg.damping;
    s.cx  += s.cvx;
    s.cy  += s.cvy;
    // Vibration decay
    s.vAmp  *= this.cfg.ampDecay;
    s.vTime += dt;
    // Anti-gravity: strings float upward proportional to stretch
    if (a && b) {
      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      // Negative = upward drift (anti-gravity buoyancy)
      s.cvy += Math.min(dist * 0.07, 25) * this.cfg.gravity;
    }
  }

  _drawString(s, a, b) {
    if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 8) return;

    const ctx = this._ctx;
    const px = -dy / dist, py = dx / dist;
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;

    // Base idle oscillation — strings are always subtly alive
    const idle = 2.8 * Math.sin(s.vTime * s.vFreq * 0.5 * Math.PI * 2);
    const vib  = idle + s.vAmp * Math.sin(s.vTime * s.vFreq * Math.PI * 2);

    const cpx = mx + s.cx + px * vib;
    const cpy = my + s.cy + py * vib;

    const tension  = Math.min(1, Math.max(0, (dist - 60) / 280));
    const vibNorm  = Math.min(1, s.vAmp / 22);
    const alpha    = 0.60 + tension * 0.40;
    const lineW    = 2.0  + tension * 2.0  + vibNorm * 1.2;
    const glow     = 8    + tension * 20   + vibNorm * 20;

    ctx.save();
    ctx.lineCap = 'round';

    // Outer glow pass
    ctx.shadowColor = s.color;
    ctx.shadowBlur  = glow;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(cpx, cpy, b.x, b.y);
    ctx.strokeStyle = s.color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth   = lineW;
    ctx.stroke();

    // White specular
    ctx.shadowBlur  = 0;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(cpx, cpy, b.x, b.y);
    ctx.strokeStyle = '#ffffff';
    ctx.globalAlpha = (0.14 + tension * 0.20 + vibNorm * 0.12) * alpha;
    ctx.lineWidth   = lineW * 0.28;
    ctx.stroke();

    ctx.restore();
  }

  // ── Pluck particles ──────────────────────────────────────────────

  _spawnParticle(x, y, color) {
    this._particles.push({ x, y, color, r: 0, life: 1.0 });
  }

  _updateDrawParticles(dt) {
    const ctx = this._ctx;
    for (let i = this._particles.length - 1; i >= 0; i--) {
      const p = this._particles[i];
      p.life -= dt * 3.5;
      if (p.life <= 0) { this._particles.splice(i, 1); continue; }
      p.r = (1 - p.life) * 55;
      ctx.save();
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.strokeStyle = p.color;
      ctx.globalAlpha = p.life * 0.75;
      ctx.lineWidth   = 2.5 * p.life;
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = 14;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI * 2);
      ctx.fillStyle   = '#ffffff';
      ctx.globalAlpha = p.life * 0.9;
      ctx.shadowBlur  = 8;
      ctx.fill();
      ctx.restore();
    }
  }

  // ── Hand state ───────────────────────────────────────────────────

  _makeHand() {
    return { visible: false, tips: Array(5).fill(null), lm: null, _smooth: Array(5).fill(null) };
  }

  _processLandmarks(hand, lm) {
    const W = this._canvas.width, H = this._canvas.height;
    hand.visible = true;
    hand.lm = lm.map(p => ({ x: (1 - p.x) * W, y: p.y * H }));
    for (let i = 0; i < 5; i++) {
      const p   = lm[HandStrings.TIP_IDX[i]];
      const raw = { x: (1 - p.x) * W, y: p.y * H };
      const prev = hand._smooth[i];
      if (!prev) { hand._smooth[i] = raw; }
      else if (Math.hypot(raw.x - prev.x, raw.y - prev.y) > 4) {
        hand._smooth[i] = {
          x: prev.x + 0.42 * (raw.x - prev.x),
          y: prev.y + 0.42 * (raw.y - prev.y),
        };
      }
      hand.tips[i] = hand._smooth[i];
    }
  }

  _resetHand(hand) {
    hand.visible = false; hand.lm = null;
    hand.tips = Array(5).fill(null); hand._smooth = Array(5).fill(null);
  }

  // ── Pluck detection ──────────────────────────────────────────────

  _ptSegDist(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return Math.hypot(px - ax, py - ay);
    const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
    return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
  }

  _closestPt(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return { x: ax, y: ay };
    const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
    return { x: ax + t * dx, y: ay + t * dy };
  }

  _checkPlucks() {
    const allTips = [...this._left.tips, ...this._right.tips].filter(Boolean);
    for (let si = 0; si < 5; si++) {
      const a = this._left.tips[si], b = this._right.tips[si];
      if (!a || !b) continue;
      const s = this._strings[si];
      for (const tip of allTips) {
        if (tip === a || tip === b) continue;
        if (this._ptSegDist(tip.x, tip.y, a.x, a.y, b.x, b.y) < this.cfg.pluckRadius) {
          const cp = this._closestPt(tip.x, tip.y, a.x, a.y, b.x, b.y);
          if (this._pluckString(s, cp.x, cp.y)) {
            this._ensureAudio();
            this._playTwang(si);
          }
        }
      }
    }
  }

  // ── Skeleton renderer ────────────────────────────────────────────

  _drawSkeleton(hand) {
    if (!hand.visible || !hand.lm) return;
    const ctx = this._ctx, lm = hand.lm;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.20)';
    ctx.lineWidth   = 1;
    ctx.shadowBlur  = 0;
    for (const [a, b] of HandStrings.CONNECTIONS) {
      if (!lm[a] || !lm[b]) continue;
      ctx.beginPath();
      ctx.moveTo(lm[a].x, lm[a].y);
      ctx.lineTo(lm[b].x, lm[b].y);
      ctx.stroke();
    }
    for (let i = 0; i < 5; i++) {
      const tip = hand.tips[i];
      if (!tip) continue;
      ctx.beginPath();
      ctx.arc(tip.x, tip.y, 5.5, 0, Math.PI * 2);
      ctx.fillStyle   = this.cfg.colors[i];
      ctx.globalAlpha = 0.95;
      ctx.shadowColor = this.cfg.colors[i];
      ctx.shadowBlur  = 16;
      ctx.fill();
    }
    ctx.restore();
  }

  // ── Vignette ─────────────────────────────────────────────────────

  _drawVignette() {
    const ctx = this._ctx, W = this._canvas.width, H = this._canvas.height;
    // Darker lower zone — hands are here, strings need contrast
    const bot = ctx.createLinearGradient(0, H * 0.45, 0, H);
    bot.addColorStop(0, 'rgba(0,0,0,0)');
    bot.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = bot; ctx.globalAlpha = 1;
    ctx.fillRect(0, 0, W, H);
    // Subtle edge vignette — draws focus to center
    const edge = ctx.createRadialGradient(W/2, H/2, H * 0.35, W/2, H/2, H * 0.85);
    edge.addColorStop(0, 'rgba(0,0,0,0)');
    edge.addColorStop(1, 'rgba(0,0,0,0.35)');
    ctx.fillStyle = edge;
    ctx.fillRect(0, 0, W, H);
  }

  // ── MediaPipe init ───────────────────────────────────────────────

  _initTracking() {
    const mpHands = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    mpHands.setOptions({
      maxNumHands            : 2,
      modelComplexity        : 0,
      minDetectionConfidence : 0.55,
      minTrackingConfidence  : 0.50,
    });
    mpHands.onResults(res => {
      try {
        this._lastHandTs = performance.now();
        this._resetHand(this._left);
        this._resetHand(this._right);
        if (res.multiHandLandmarks?.length > 0) {
          res.multiHandLandmarks.forEach((lm, i) => {
            // MP 'Left' (camera POV) = user's right hand after mirror flip
            const hand = res.multiHandedness[i].label === 'Left'
              ? this._right : this._left;
            this._processLandmarks(hand, lm);
          });
        }
      } catch (e) { console.warn('MP result error', e); }
    });

    const cam = new Camera(this._video, {
      onFrame: async () => {
        if (!this._running || this._sendPending) return;
        const now = performance.now();
        if (now - this._lastHandTs < this.cfg.mpFps) return;
        this._sendPending = true;
        try   { await mpHands.send({ image: this._video }); }
        catch (e) { console.warn('send err', e); }
        finally { this._sendPending = false; }
      },
      width: 640, height: 480, facingMode: 'user',
    });
    cam.start().catch(e => {
      this._hint.textContent = 'CAMERA ACCESS REQUIRED';
      console.error(e);
    });
  }

  // ── Render loop ──────────────────────────────────────────────────

  _loop(ts) {
    if (!this._running) return;
    this._rafId = requestAnimationFrame(t => this._loop(t));

    const dt = Math.min((ts - this._lastTs) / 1000, 0.05);
    this._lastTs = ts;

    const ctx = this._ctx;
    ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);

    // Stale hand timeout (1 second silence from MediaPipe)
    if (this._lastHandTs > 0 && ts - this._lastHandTs > 1000) {
      this._resetHand(this._left);
      this._resetHand(this._right);
    }

    const lv = this._left.visible, rv = this._right.visible;

    this._hint.textContent = (lv && rv) ? '' : (lv || rv) ? 'SHOW BOTH HANDS' : 'RAISE YOUR HANDS';

    this._drawVignette();

    if (lv && rv) {
      this._checkPlucks();
      for (let i = 0; i < 5; i++) this._updateString(this._strings[i], this._left.tips[i], this._right.tips[i], dt);
      for (let i = 0; i < 5; i++) this._drawString(this._strings[i], this._left.tips[i], this._right.tips[i]);
    } else {
      // Gently decay physics when hands out of frame
      for (const s of this._strings) {
        s.cx *= 0.9; s.cy *= 0.9;
        s.cvx *= 0.8; s.cvy *= 0.8;
        s.vAmp *= 0.9;
        s.vTime += dt; // keep time ticking so idle oscillation continues
      }
    }

    this._updateDrawParticles(dt);
    this._drawSkeleton(this._left);
    this._drawSkeleton(this._right);
  }
}

// ─────────────────────────────────────────────────────────────────
// Auto-start when used as a standalone page
// ─────────────────────────────────────────────────────────────────
window.HandStrings = HandStrings;
new HandStrings().start();
</script>
</body>
</html>
