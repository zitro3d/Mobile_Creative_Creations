<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Vector Rocket Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; touch-action: none; }
    canvas { display: block; touch-action: none; }

    /* ── Mission Start overlay ─────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: rgba(0, 0, 12, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 100;
    }
    #overlay h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      letter-spacing: 0.18em;
      color: #00f2ff;
      text-shadow: 0 0 24px rgba(0,242,255,0.6);
    }
    #overlay p {
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.38);
      margin-bottom: 2rem;
    }
    #start-btn {
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      color: #00f2ff;
      background: rgba(0,242,255,0.08);
      border: 1px solid rgba(0,242,255,0.45);
      border-radius: 3px;
      padding: 0.9rem 2.8rem;
      cursor: pointer;
      box-shadow: 0 0 22px rgba(0,242,255,0.18), inset 0 0 12px rgba(0,242,255,0.06);
      transition: background 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #start-btn:active {
      background: rgba(0,242,255,0.22);
      box-shadow: 0 0 40px rgba(0,242,255,0.45), inset 0 0 18px rgba(0,242,255,0.15);
    }

    /* ── Loading bar ───────────────────────────────────────────── */
    #loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    #loading-bar-track {
      width: 220px;
      height: 2px;
      background: rgba(0,242,255,0.12);
      border-radius: 1px;
      overflow: hidden;
    }
    #loading-bar {
      height: 100%;
      width: 0%;
      background: #00f2ff;
      box-shadow: 0 0 10px rgba(0,242,255,0.9);
      transition: width 0.12s linear;
    }
    #loading-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.60rem;
      letter-spacing: 0.22em;
      color: rgba(0,242,255,0.40);
    }

    /* ── Gesture hint ───────────────────────────────────────────── */
    #gesture-hint {
      position: fixed;
      bottom: 14%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: rgba(0,242,255,0.70);
      text-shadow: 0 0 10px rgba(0,242,255,0.5);
      z-index: 20;
      pointer-events: none;
      display: none;
      transition: opacity 1.2s ease;
    }

    /* ── Hand tracking status indicator ────────────────────────── */
    #hand-status {
      position: fixed;
      bottom: 22px; right: 22px;
      width: 14px; height: 14px;
      border-radius: 50%;
      z-index: 20;
      pointer-events: none;
      display: none;
      transition: background 0.08s, box-shadow 0.08s;
    }
    #hand-status[data-state="none"]  {
      background: rgba(255,255,255,0.08);
      box-shadow: none;
    }
    #hand-status[data-state="open"]  {
      background: rgba(0,242,255,0.55);
      box-shadow: 0 0 8px rgba(0,242,255,0.7);
    }
    #hand-status[data-state="pinch"] {
      background: #ff0066;
      box-shadow: 0 0 18px rgba(255,0,102,0.95);
    }

    /* ── Score display ──────────────────────────────────────────── */
    #score {
      position: fixed;
      top: 18px; right: 20px;
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      letter-spacing: 0.18em;
      color: #00f2ff;
      text-shadow: 0 0 14px rgba(0,242,255,0.8);
      z-index: 20;
      pointer-events: none;
      display: none;
    }

    /* ── Sensor debug overlay ───────────────────────────────────── */
    #debug {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 200;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.7;
      color: #00f2ff;
      background: rgba(0, 0, 16, 0.72);
      border: 1px solid rgba(0, 242, 255, 0.25);
      border-radius: 4px;
      padding: 8px 12px;
      pointer-events: none;
      white-space: pre;
    }

    /* ── Cockpit HUD overlay ─────────────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      overflow: hidden;
    }
    #cockpit-border {
      position: absolute;
      inset: 3%;
      border: 1.5px solid rgba(0,220,255,0.20);
      clip-path: polygon(8% 0%,92% 0%,100% 8%,100% 92%,92% 100%,8% 100%,0% 92%,0% 8%);
      box-shadow: inset 0 0 28px rgba(0,220,255,0.07);
    }
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 44px; height: 44px;
    }
    #crosshair::before,#crosshair::after {
      content: '';
      position: absolute;
      background: rgba(0,255,200,0.75);
    }
    #crosshair::before { width: 100%; height: 1px; top: 50%; left: 0; transform: translateY(-50%); }
    #crosshair::after  { width: 1px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
    #crosshair-ring {
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(0,255,200,0.55);
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <!-- Mission Start overlay — shown until user taps; required for iOS
       sensor permissions which must be requested inside a user gesture. -->
  <div id="overlay">
    <h1>VECTOR ROCKET PRO</h1>
    <p>TILT TO NAVIGATE</p>
    <div id="loading-wrap">
      <div id="loading-bar-track"><div id="loading-bar"></div></div>
      <div id="loading-label">LOADING ASSETS…</div>
    </div>
    <button id="start-btn" style="display:none">MISSION START</button>
  </div>

  <!-- Sensor debug panel — visible after MISSION START -->
  <div id="debug">SENSOR DEBUG
────────────────
GLB    : WAITING
Status : WAITING
Events : 0
Interval: --

rotationRate (°/s)
  alpha : --
  beta  : --
  gamma : --

Integrated (°)
  pitch : --
  yaw   : --</div>

  <!-- Score counter -->
  <div id="score">0</div>

  <!-- Gesture hint — fades out 4s after game start -->
  <div id="gesture-hint">PINCH TO FIRE</div>

  <!-- Hand tracking status pill -->
  <div id="hand-status" data-state="none"></div>

  <!-- Cockpit HUD — pointer-events: none so it never blocks input -->
  <div id="hud">
    <div id="cockpit-border"></div>
    <div id="crosshair"><div id="crosshair-ring"></div></div>
  </div>

  <!-- MediaPipe Hands — hand tracking via front camera.
       Must load as classic scripts (not ES modules) before the importmap. -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { GLTFLoader }      from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
  import { EffectComposer }  from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
  import { RenderPass }      from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';

  // ─────────────────────────────────────────────────────────────────
  //  TUNABLE CONSTANTS
  // ─────────────────────────────────────────────────────────────────
  const STAR_COUNT         = 1500;  // reduced for mobile CPU budget
  const STAR_SPREAD_X      = 500;
  const STAR_SPREAD_Y      = 350;
  const STAR_DEPTH         = 2000;
  const STAR_FADE_FAR      = 1600;
  const STAR_FADE_NEAR     = 400;

  const NEBULA_COUNT       = 10;    // reduced for mobile GPU budget
  const NEBULA_DEPTH       = 3000;  // pushed way back so ships never fly through them
  const NEBULA_MAX_OP      = 1.0;   // texture is very dim, so allow full opacity multiplier
  const NEBULA_SPREAD_X    = 700;   // wide horizontal spread for full-screen coverage
  const NEBULA_SPREAD_Y    = 420;   // tall vertical spread

  const SPEED              = 80;    // star speed, units / second
  const NEBULA_SPEED_FACTOR = 0.28; // nebulas at 28% → parallax depth

  const BASE_FOV           = 50;   // cinematic compressed cockpit lens
  const BASE_PITCH_DEG     = 0;    // first-person: look straight ahead

  // ── Enemy combat sphere ────────────────────────────────────────────
  const ENEMY_COUNT        = 5;    // active slots in pool

  // ─────────────────────────────────────────────────────────────────
  //  RENDERER
  // ─────────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({
    antialias: false,
    powerPreference: 'high-performance',
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x00000a, 1);
  document.body.appendChild(renderer.domElement);
  // Critical for mobile: tell browser this canvas handles its own touches
  // so it never swallows pointerdown/pointerup for scroll or pinch-zoom.
  renderer.domElement.style.touchAction = 'none';

  // ─────────────────────────────────────────────────────────────────
  //  SCENE & CAMERA  (must come before anything that references them)
  // ─────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  // Exponential fog — ships emerge from darkness, no hard pop-in at spawn depth
  // Reduced density so ships at z=-600 are still visible
  scene.fog = new THREE.FogExp2(0x000000, 0.0010);

  const camera = new THREE.PerspectiveCamera(
    BASE_FOV,
    window.innerWidth / window.innerHeight,
    0.5,
    1800   // reduced far plane — less overdraw and depth-buffer work
  );
  // First-person cockpit: camera sits at origin, looks straight ahead
  camera.position.set(0, 0, 0);
  camera.rotation.order = 'YXZ';
  camera.rotation.x = THREE.MathUtils.degToRad(BASE_PITCH_DEG);

  // ─────────────────────────────────────────────────────────────────
  //  POST-PROCESSING — bloom only (DoF removed: aperture was ~0, invisible)
  //  Bloom runs at half resolution to save GPU bandwidth on mobile.
  // ─────────────────────────────────────────────────────────────────
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));

  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth / 2, window.innerHeight / 2),
    1.2,   // strength
    0.45,  // radius
    0.55   // threshold
  );
  bloomPass.renderToScreen = true;
  composer.addPass(bloomPass);

  // ─────────────────────────────────────────────────────────────────
  //  SCENE LIGHTING  (required for MeshStandardMaterial to show colour)
  // ─────────────────────────────────────────────────────────────────
  // White ambient + directional so the GLB model's textures and colours
  // read accurately. Intensity values match the user's spec exactly.
  // ── HemisphereLight: cool space sky, dark void below ─────────────
  scene.add(new THREE.HemisphereLight(0x4488dd, 0x000022, 2.5));

  // Key directional — front-above, bright enough to drive specular highlights
  const sunLight = new THREE.DirectionalLight(0xffffff, 3.5);
  sunLight.position.set(1, 3, 2);
  scene.add(sunLight);

  // Rim from behind — adds edge definition
  const rimLight = new THREE.DirectionalLight(0x88aaff, 1.6);
  rimLight.position.set(0, 1, -2);
  scene.add(rimLight);

  // Fill from below-left — softens harsh shadows
  const fillLight = new THREE.DirectionalLight(0x224488, 1.2);
  fillLight.position.set(-1, -1, 1);
  scene.add(fillLight);

  // Cockpit point lights — warm + cool bounce off hulls as ships pass
  const ptLeft  = new THREE.PointLight(0x00ddff, 6.0, 120);
  ptLeft.position.set(-15, 5, -10);
  scene.add(ptLeft);
  const ptRight = new THREE.PointLight(0xff8833, 6.0, 120);
  ptRight.position.set( 15, 5, -10);
  scene.add(ptRight);


  // ─────────────────────────────────────────────────────────────────
  //  FIGHTER JET GLB MODEL — LoadingManager drives the loading bar
  //  and reveals MISSION START only when the asset is ready.
  //  Note: file on disk is 'figherjet.glb' (legacy typo kept).
  // ─────────────────────────────────────────────────────────────────
  const loadBar    = document.getElementById('loading-bar');
  const loadLabel  = document.getElementById('loading-label');
  const loadWrap   = document.getElementById('loading-wrap');
  const startBtn   = document.getElementById('start-btn');

  const loadManager = new THREE.LoadingManager(
    // ── onLoad (all queued items done) ────────────────────────────
    () => {
      loadBar.style.width = '100%';
      loadLabel.textContent = 'READY';
      setTimeout(() => {
        loadWrap.style.display  = 'none';
        startBtn.style.display  = '';
      }, 400);
    },
    // ── onProgress ────────────────────────────────────────────────
    (_url, loaded, total) => {
      const pct = total > 0 ? Math.round(loaded / total * 100) : 0;
      loadBar.style.width   = pct + '%';
      loadLabel.textContent = `LOADING… ${pct}%`;
    },
    // ── onError ───────────────────────────────────────────────────
    (url) => {
      loadLabel.textContent = 'ERROR — check console';
      console.error('LoadingManager error:', url);
    }
  );

  // Helper — update the GLB line of the debug overlay
  function dbgGlb(msg) {
    const el = document.getElementById('debug');
    el.textContent = el.textContent.replace(/^GLB\s*:.*$/m, `GLB    : ${msg}`);
  }
  dbgGlb('WAITING');

  const gltfLoader = new GLTFLoader(loadManager);
  gltfLoader.load(
    './assets/figherjet.glb',

    // ── onLoad ────────────────────────────────────────────────────
    (gltf) => {
      const template = gltf.scene;

      // ── Material fix — preserve GLB textures, correct lighting only ─
      // GLB metals with no env-map render near-black. Cap metalness/roughness
      // so the three-point lighting rig reads off the original textures.
      template.traverse((child) => {
        if (!child.isMesh) return;
        if (!(child.material instanceof THREE.MeshStandardMaterial)) {
          child.material = new THREE.MeshStandardMaterial({
            color: child.material.color ?? new THREE.Color(0xcccccc),
            map:   child.material.map   ?? null,
          });
        }
        const mat = child.material;
        mat.metalness  = Math.min(mat.metalness ?? 1, 0.45);
        mat.roughness  = Math.max(mat.roughness ?? 0, 0.35);
        mat.needsUpdate = true;
      });

      // ── Auto-scale to a fixed world size ────────────────────────
      const TARGET_LENGTH = 52;
      const rawBox  = new THREE.Box3().setFromObject(template);
      const rawSize = new THREE.Vector3();
      rawBox.getSize(rawSize);
      const maxDim    = Math.max(rawSize.x, rawSize.y, rawSize.z);
      const autoScale = TARGET_LENGTH / (maxDim || 1);
      template.scale.setScalar(autoScale);

      // ── Orient — nose toward travel direction ────────────────────
      template.rotation.y = Math.PI / 2;

      // Recompute bbox after scale + rotation
      template.updateWorldMatrix(true, true);
      const bbox = new THREE.Box3().setFromObject(template);
      const sz   = new THREE.Vector3();
      bbox.getSize(sz);
      const tailZ = bbox.min.z - sz.z * 0.05;

      const dbgMsg =
        `LOADED scale=${autoScale.toFixed(3)} ` +
        `size=(${sz.x.toFixed(1)},${sz.y.toFixed(1)},${sz.z.toFixed(1)}) ` +
        `tailZ=${tailZ.toFixed(1)}`;
      dbgGlb(dbgMsg);
      console.log('figherjet.glb —', dbgMsg);

      // ── Build object pool ────────────────────────────────────────
      for (let i = 0; i < ENEMY_COUNT; i++) {
        const clone = template.clone();

        // Clone materials independently (per-instance opacity)
        const meshes = [];
        clone.traverse((child) => {
          if (!child.isMesh) return;
          child.material             = child.material.clone();
          child.material.transparent = true;
          child.material.opacity     = 1;
          meshes.push(child);
        });

        // ── Engine glow — warm exhaust PointLight ────────────────
        // Soft orange halo at ship centre — doesn't overwhelm textures.
        const engineGlow = new THREE.PointLight(0xff6600, 2.2, 45);
        engineGlow.position.set(0, 0, 0);
        clone.add(engineGlow);

        clone.visible = false;
        scene.add(clone);
        enemies.push({ group: clone, meshes, engineGlow });
        enemyState.push({
          // Pilot style (set by activateEnemy)
          styleName: 'SMOOTH', maxSpeed: 110, accel: 60, turnRate: 1.0,
          wobbleAmp: 8, wobbleFreq: 0.2, wobblePhase: 0,
          // Kinematic state
          velX: 0, velY: 0, velZ: -110, curSpeed: 0,
          baseX: 0, baseY: 0, baseZ: -300,
          // Navigation
          targetX: 0, targetY: 0, targetZ: 100,
          passCount: 0, maxPasses: 3,
          spawnType: 'FRONT',
          shaken: false,
          fadeIn: 1,
        });
      }
    },

    // ── onProgress (LoadingManager handles bar — this is optional) ─
    undefined,

    // ── onError ───────────────────────────────────────────────────
    (error) => {
      dbgGlb('ERROR — see console');
      console.error('figherjet.glb failed to load:', error);
    }
  );

  // ─────────────────────────────────────────────────────────────────
  //  UNIVERSE GROUP — all objects live here; group stays at origin
  // ─────────────────────────────────────────────────────────────────
  const universe = new THREE.Group();
  scene.add(universe);

  // ─────────────────────────────────────────────────────────────────
  //  STAR TEXTURE — circular soft gradient, no square corners
  // ─────────────────────────────────────────────────────────────────
  function makeStarTexture() {
    const SZ  = 64;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = SZ;
    const ctx = cvs.getContext('2d');
    const grd = ctx.createRadialGradient(SZ/2, SZ/2, 0, SZ/2, SZ/2, SZ/2);
    grd.addColorStop(0.0, 'rgba(255,255,255,1.0)');
    grd.addColorStop(0.4, 'rgba(255,255,255,0.8)');
    grd.addColorStop(0.8, 'rgba(255,255,255,0.2)');
    grd.addColorStop(1.0, 'rgba(255,255,255,0.0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, SZ, SZ);
    return new THREE.CanvasTexture(cvs);
  }

  // ─────────────────────────────────────────────────────────────────
  //  STAR FIELD
  // ─────────────────────────────────────────────────────────────────
  const starPos        = new Float32Array(STAR_COUNT * 3);
  const starCol        = new Float32Array(STAR_COUNT * 3);
  const starBrightness = new Float32Array(STAR_COUNT);

  for (let i = 0; i < STAR_COUNT; i++) {
    starPos[i * 3]     = (Math.random() - 0.5) * STAR_SPREAD_X * 2;
    starPos[i * 3 + 1] = (Math.random() - 0.5) * STAR_SPREAD_Y * 2;
    starPos[i * 3 + 2] = -(Math.random() * STAR_DEPTH);
    starBrightness[i]  = 0.2 + Math.random() * 0.8;
    starCol[i * 3] = starCol[i * 3 + 1] = starCol[i * 3 + 2] = 0;
  }

  const starGeo     = new THREE.BufferGeometry();
  const starAttr    = new THREE.BufferAttribute(starPos, 3);
  const starColAttr = new THREE.BufferAttribute(starCol, 3);
  starGeo.setAttribute('position', starAttr);
  starGeo.setAttribute('color',    starColAttr);

  const starMat = new THREE.PointsMaterial({
    map:             makeStarTexture(),
    size:            0.7,
    sizeAttenuation: true,
    vertexColors:    true,
    transparent:     true,
    alphaTest:       0.01,
    depthWrite:      false,
  });

  universe.add(new THREE.Points(starGeo, starMat));

  // ─────────────────────────────────────────────────────────────────
  //  NEBULA SPRITES
  //
  //  Each texture is deliberately non-circular:
  //    sx/sy  — canvas scale applied before drawing → elliptical lobe
  //  Core alpha is kept very low (≤ 0.14) so no visible bright ball forms.
  //  A secondary offset lobe breaks the symmetry further.
  //  Individual sprites then get random material.rotation + non-uniform
  //  scale, so every cloud looks unique even if it shares a base texture.
  // ─────────────────────────────────────────────────────────────────
  // Subtle ellipse + scattered micro-wisps.
  // sx/sy kept close to 1 so the shape is gently non-circular, not a streak.
  // 6 tiny wisps at random positions break symmetry without drawing lines.
  function makeNebulaTexture(r, g, b, sx = 1.0, sy = 1.0) {
    const SZ  = 512;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = SZ;
    const ctx = cvs.getContext('2d');

    // ── Main body — gently elliptical, very soft core ─────────────
    ctx.save();
    ctx.translate(SZ / 2, SZ / 2);
    ctx.scale(sx, sy);
    const gMain = ctx.createRadialGradient(0, 0, 0, 0, 0, SZ / 2);
    gMain.addColorStop(0.00, `rgba(${r},${g},${b},0.11)`);
    gMain.addColorStop(0.12, `rgba(${r},${g},${b},0.08)`);
    gMain.addColorStop(0.28, `rgba(${r},${g},${b},0.04)`);
    gMain.addColorStop(0.48, `rgba(${r},${g},${b},0.014)`);
    gMain.addColorStop(0.68, `rgba(${r},${g},${b},0.003)`);
    gMain.addColorStop(0.85, `rgba(${r},${g},${b},0.001)`);
    gMain.addColorStop(1.00, `rgba(${r},${g},${b},0.000)`);
    ctx.fillStyle = gMain;
    ctx.fillRect(-SZ, -SZ, SZ * 2, SZ * 2);
    ctx.restore();

    // ── Micro-wisps — tiny dim blobs scattered across canvas ──────
    // Each is a small circular gradient so individually none looks like
    // a line. Together they give the cloud an organic, irregular silhouette.
    for (let w = 0; w < 6; w++) {
      const wx = SZ * (0.15 + Math.random() * 0.70);
      const wy = SZ * (0.15 + Math.random() * 0.70);
      const wr = SZ * (0.06 + Math.random() * 0.11); // small radius
      const wa = 0.015 + Math.random() * 0.030;       // very dim

      const gw = ctx.createRadialGradient(wx, wy, 0, wx, wy, wr);
      gw.addColorStop(0.0, `rgba(${r},${g},${b},${wa.toFixed(3)})`);
      gw.addColorStop(0.5, `rgba(${r},${g},${b},${(wa * 0.25).toFixed(3)})`);
      gw.addColorStop(1.0, `rgba(${r},${g},${b},0.000)`);
      ctx.fillStyle = gw;
      ctx.fillRect(wx - wr, wy - wr, wr * 2, wr * 2);
    }

    return new THREE.CanvasTexture(cvs);
  }

  // Subtle ratios — max 1.35× in either direction, never a visible streak
  const nebTextures = [
    makeNebulaTexture(  0, 242, 255, 1.30, 0.78), // electric blue
    makeNebulaTexture(255,   0, 255, 0.78, 1.30), // deep magenta
    makeNebulaTexture(  0, 200, 255, 1.20, 0.85), // lighter blue
    makeNebulaTexture(220,   0, 255, 0.85, 1.20), // magenta-violet
    makeNebulaTexture(  0, 242, 200, 1.35, 0.74), // electric teal
  ];

  // Helper — random non-uniform scale so sprites aren't all the same shape
  function randNebulaScale() {
    const base   = 350 + Math.random() * 550;
    const aspect = 0.35 + Math.random() * 1.3; // width/height ratio 0.35–1.65
    return [base, base * aspect];
  }

  const nebulas = [];

  for (let i = 0; i < NEBULA_COUNT; i++) {
    const mat = new THREE.SpriteMaterial({
      map:         nebTextures[Math.floor(Math.random() * nebTextures.length)],
      transparent: true,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
      opacity:     0,
      rotation:    Math.random() * Math.PI * 2, // random orientation per sprite
    });

    const sprite = new THREE.Sprite(mat);
    const [sw, sh] = randNebulaScale();
    sprite.scale.set(sw, sh, 1);
    sprite.position.set(
      (Math.random() - 0.5) * NEBULA_SPREAD_X,
      (Math.random() - 0.5) * NEBULA_SPREAD_Y,
      -(700 + Math.random() * NEBULA_DEPTH)   // min -700 so ships never overlap nebulas
    );

    universe.add(sprite);
    nebulas.push(sprite);
  }

  // ─────────────────────────────────────────────────────────────────
  //  HELPERS
  // ─────────────────────────────────────────────────────────────────
  function smoothstep(edge0, edge1, x) {
    const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
    return t * t * (3 - 2 * t);
  }

  // ─────────────────────────────────────────────────────────────────
  //  ENEMY POOL — populated in the GLTFLoader onLoad callback above.
  //  Arrays start empty; the animate loop guards with enemies.length.
  // ─────────────────────────────────────────────────────────────────

  const enemies    = [];
  const enemyState = [];

  function deactivateEnemy(i) {
    enemies[i].group.visible = false;
    enemyState[i].shaken     = false;
  }

  // ─────────────────────────────────────────────────────────────────
  //  PILOT STYLES — flight envelope per personality
  // ─────────────────────────────────────────────────────────────────
  const PILOT_STYLES = {
    // Noticeably distinct speeds + turn radii so each pilot FEELS different
    AGGRESSIVE: { maxSpeed: 210, accel: 140, turnRate: 3.4, wobbleAmp:  2, wobbleFreq: 0.40 },
    SMOOTH:     { maxSpeed:  80, accel:  40, turnRate: 0.6, wobbleAmp: 10, wobbleFreq: 0.16 },
    ERRATIC:    { maxSpeed: 155, accel:  90, turnRate: 2.2, wobbleAmp: 22, wobbleFreq: 0.75 },
  };

  // True when another visible ship is within MIN units of (x,y,z)
  function tooClose(x, y, z, skipIdx) {
    const MIN_SQ = 130 * 130;
    for (let j = 0; j < enemies.length; j++) {
      if (j === skipIdx || !enemies[j].group.visible) continue;
      const p  = enemies[j].group.position;
      const dx = p.x - x, dy = p.y - y, dz = p.z - z;
      if (dx*dx + dy*dy + dz*dz < MIN_SQ) return true;
    }
    return false;
  }

  // Pick the next 3-D waypoint.
  // ALWAYS arcs ≈90° from the ship's current heading — never assigns a
  // target that would require a U-turn (180°) or sharp pivot (>120°).
  function nextWaypoint(es) {
    es.passCount++;
    if (es.passCount > es.maxPasses) return null;

    const ty = 5 + Math.random() * 35;   // 5..40 — ships stay in sky
    const px = es.baseX, pz = es.baseZ;

    // Horizontal heading unit vector — fallback to -Z if nearly stopped
    const hspd = Math.sqrt(es.velX * es.velX + es.velZ * es.velZ);
    const hdgX = hspd > 1 ? es.velX / hspd : 0;
    const hdgZ = hspd > 1 ? es.velZ / hspd : -1;

    // Rotate heading 90° left or right in the XZ plane
    const pSign = Math.random() < 0.5 ? 1 : -1;
    const perpX = -hdgZ * pSign;   // perpendicular direction X
    const perpZ =  hdgX * pSign;   // perpendicular direction Z

    // Arc radius scales with pilot agility: SMOOTH = wide sweeping arcs,
    // AGGRESSIVE = tight rapid turns, ERRATIC = anything in between.
    const agility  = Math.min(1, es.turnRate / 3.4);        // 0 (slowest) → 1 (fastest)
    const sideDist = THREE.MathUtils.lerp(240, 90, agility) + Math.random() * 60;
    const fwdDist  =  40 + Math.random() * 90;

    let tx = px + perpX * sideDist + hdgX * fwdDist;
    let tz = pz + perpZ * sideDist + hdgZ * fwdDist;

    // Clamp to arena so ships can't wander off into infinity
    tx = Math.max(-270, Math.min(270, tx));
    tz = Math.max(-500, Math.min(160, tz));

    return { x: tx, y: ty, z: tz };
  }

  function activateEnemy(i) {
    const e  = enemies[i];
    const es = enemyState[i];

    // ── Pilot style ───────────────────────────────────────────────
    const names  = ['AGGRESSIVE', 'SMOOTH', 'ERRATIC'];
    const sName  = names[Math.floor(Math.random() * 3)];
    const style  = PILOT_STYLES[sName];
    es.styleName  = sName;
    es.maxSpeed   = style.maxSpeed  + Math.random() * 25;
    es.accel      = style.accel;
    es.turnRate   = style.turnRate  + (Math.random() - 0.5) * 0.3;
    es.wobbleAmp  = style.wobbleAmp;
    es.wobbleFreq = style.wobbleFreq + Math.random() * 0.15;
    es.wobblePhase = Math.random() * Math.PI * 2;
    es.maxPasses  = 4 + Math.floor(Math.random() * 3);  // 4–6 passes — more time in arena

    // ── Spawn position ─────────────────────────────────────────────
    // Y kept well above ground (ground=−30) so ships appear in the sky,
    // not near the grid at the bottom of the screen.
    const spawnY  = 10 + Math.random() * 30;  // 10..40 — center-to-upper screen
    let spawnX, spawnZ;
    const typeRoll = Math.random();
    es.spawnType   = typeRoll < 0.5 ? 'FRONT' : typeRoll < 0.75 ? 'REAR' : 'SIDE';

    if (es.spawnType === 'FRONT') {
      spawnX = (Math.random() - 0.5) * 160;   // full −80..+80 range, through center
      spawnZ = -360;                           // close enough to be visible immediately
    } else if (es.spawnType === 'REAR') {
      spawnX = (Math.random() < 0.5 ? -1 : 1) * (50 + Math.random() * 60);
      spawnZ = 180;
    } else {
      spawnX = (Math.random() < 0.5 ? -1 : 1) * 160;
      spawnZ = -80 - Math.random() * 120;
    }

    if (tooClose(spawnX, spawnY, spawnZ, i)) return;

    es.baseX = spawnX; es.baseY = spawnY; es.baseZ = spawnZ;
    es.passCount = 0;

    // ── First waypoint ─────────────────────────────────────────────
    // FRONT ships must fly TOWARD the camera, not sideways.
    // nextWaypoint() uses the perpendicular-arc branch for pz < -200,
    // which would send a fresh FRONT ship off-screen immediately.
    // Instead, give FRONT ships a direct aim-point near z=0.
    let wp;
    if (es.spawnType === 'FRONT') {
      wp = {
        x: (Math.random() - 0.5) * 80,   // aim through center ±40 units
        y: 8 + Math.random() * 22,        // 8–30 units up: center-screen height
        z: -20 + Math.random() * 60,      // z: −20..+40 — passes through the player
      };
      // passCount stays 0 — the animate loop calls nextWaypoint when ship
      // reaches this point, picking up normal arc logic at that stage.
    } else {
      wp = nextWaypoint(es);
    }
    if (!wp) return;
    es.targetX = wp.x; es.targetY = wp.y; es.targetZ = wp.z;

    // ── Initial velocity — 30% speed toward first waypoint ────────
    const dx = wp.x - spawnX, dy = wp.y - spawnY, dz = wp.z - spawnZ;
    const d  = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
    const v0 = es.maxSpeed * 0.3;
    es.velX = (dx/d) * v0; es.velY = (dy/d) * v0; es.velZ = (dz/d) * v0;
    es.curSpeed = v0;

    e.group.position.set(spawnX, spawnY, spawnZ);
    e.group.rotation.set(0, Math.atan2(dz, -dx), 0);

    for (const mesh of e.meshes) mesh.material.opacity = 0;  // fade in
    e.group.visible = true;
    es.shaken       = false;
    es.fadeIn       = 0;
  }

  // ─────────────────────────────────────────────────────────────────
  //  DEVICE MOTION — rotationRate integration (no absolute-north snap)
  //
  //  DeviceOrientationEvent gives absolute angles referenced to magnetic
  //  North. The sensor periodically recalibrates, causing the camera to
  //  snap back. DeviceMotionEvent.rotationRate gives angular velocity
  //  (°/sec) which we integrate manually — motion is 100% relative,
  //  the camera never snaps to any external reference frame.
  //
  //  Pipeline per 'devicemotion' event:
  //    1. Read rotationRate.beta / .gamma (°/sec)
  //    2. Remap axes via window.orientation (portrait vs landscape)
  //    3. Integrate: angle += rate × dt × INPUT_SCALE
  //    4. Clamp integrated angles to ±MAX_LOOK_DEG
  //    5. Exponential smooth: smooth = smooth × 0.9 + angle × 0.1
  //    6. Build targetQuat from smoothed angles (YXZ — no gimbal lock)
  //
  //  Animate loop: velocity-based quaternion slerp
  //    dist  = camera.quaternion.angleTo(targetQuat)     (radians)
  //    alpha = BASE_ALPHA + dist × VEL_SCALE             (higher gap → faster)
  //    t     = 1 − (1 − alpha)^(dt × 60)                (dt-corrected)
  // ─────────────────────────────────────────────────────────────────
  const MAX_LOOK_DEG = 60;    // ±60° — wider range so fast ships don't escape view
  const INPUT_SCALE  = 0.60;  // rotation rate multiplier
  const EXP_SMOOTH   = 0.55;  // higher = faster tracking, less lag (was 0.10 — too sluggish)
  const BASE_ALPHA   = 0.20;  // slerp base — snappier camera follow
  const VEL_SCALE    = 0.60;  // velocity boost for large angular gaps

  // Integrated camera angles in degrees (purely relative — no North reference)
  let integratedPitch = 0;
  let integratedYaw   = 0;

  // Exponentially smoothed values — fed to targetQuat each event
  let smoothedPitch = 0;
  let smoothedYaw   = 0;

  // Quaternion the camera slerps toward each frame
  // Initialise with base pitch so neutral hold already looks downward
  const targetEuler = new THREE.Euler(THREE.MathUtils.degToRad(BASE_PITCH_DEG), 0, 0, 'YXZ');
  const targetQuat  = new THREE.Quaternion().setFromEuler(targetEuler);

  let motionReady   = false;
  let motionEvents  = 0;                              // total events received
  const dbgEl       = document.getElementById('debug');

  function handleMotion(evt) {
    const rate = evt.rotationRate;
    motionEvents++;

    // ── Debug overlay — throttled to every 4th event (~15 fps) ───
    if (motionEvents % 4 === 0) {
      const a  = rate?.alpha  ?? null;
      const b  = rate?.beta   ?? null;
      const g  = rate?.gamma  ?? null;
      const fmt = v => v === null ? '  null' : v.toFixed(2).padStart(8);
      dbgEl.textContent =
        `SENSOR DEBUG\n` +
        `────────────────\n` +
        `Status : ${motionReady ? 'ACTIVE ✓' : 'WAITING…'}\n` +
        `Events : ${motionEvents}\n` +
        `Interval: ${(evt.interval ?? 0).toFixed(1)} ms\n` +
        `\n` +
        `rotationRate (°/s)\n` +
        `  alpha :${fmt(a)}\n` +
        `  beta  :${fmt(b)}\n` +
        `  gamma :${fmt(g)}\n` +
        `\n` +
        `Integrated (°)\n` +
        `  pitch :${integratedPitch.toFixed(2).padStart(8)}\n` +
        `  yaw   :${integratedYaw.toFixed(2).padStart(8)}`;
    }

    if (!rate) return;

    // evt.interval is ms between events — use it as dt so integration is exact
    const dt = Math.min((evt.interval || 16) / 1000, 0.05);

    // ── 1. Remap rotationRate axes to camera pitch / yaw ──────────
    //
    //  Device axes (right-hand rule):
    //    rate.beta  — rotation around X (left→right edge), °/sec
    //                 positive = top of phone tilts toward viewer
    //    rate.gamma — rotation around Y (bottom→top edge), °/sec
    //                 positive = right edge tilts toward viewer
    //
    //  Portrait   (ori=0):   beta→pitch, gamma→yaw  (standard mapping)
    //  Landscape-L (ori=90): axes swap — beta→yaw, gamma→pitch
    //    "tilting like a steering wheel" maps correctly in landscape
    //  Landscape-R (ori=-90): axes swap with opposing signs
    let deltaPitch, deltaYaw;
    const ori = window.orientation ?? 0;

    if (ori === 90) {                      // landscape-left (home on left)
      deltaPitch = -(rate.gamma ?? 0) * dt * INPUT_SCALE;
      deltaYaw   =  (rate.beta  ?? 0) * dt * INPUT_SCALE;
    } else if (ori === -90) {              // landscape-right (home on right)
      deltaPitch =  (rate.gamma ?? 0) * dt * INPUT_SCALE;
      deltaYaw   = -(rate.beta  ?? 0) * dt * INPUT_SCALE;
    } else {                               // portrait (0) or inverted (180)
      deltaPitch = -(rate.beta  ?? 0) * dt * INPUT_SCALE;
      deltaYaw   = -(rate.gamma ?? 0) * dt * INPUT_SCALE;
    }

    // ── 2. Integrate and clamp ────────────────────────────────────
    integratedPitch = THREE.MathUtils.clamp(
      integratedPitch + deltaPitch, -MAX_LOOK_DEG, MAX_LOOK_DEG
    );
    integratedYaw = THREE.MathUtils.clamp(
      integratedYaw + deltaYaw, -MAX_LOOK_DEG, MAX_LOOK_DEG
    );

    // ── 3. Exponential smoothing — kills high-frequency spikes ────
    // Formula: currentValue = (lastValue × 0.9) + (newValue × 0.1)
    // Low EXP_SMOOTH weight means fast shakes contribute little per frame;
    // sustained tilts accumulate naturally through the integration above.
    smoothedPitch = smoothedPitch * (1 - EXP_SMOOTH) + integratedPitch * EXP_SMOOTH;
    smoothedYaw   = smoothedYaw   * (1 - EXP_SMOOTH) + integratedYaw   * EXP_SMOOTH;

    // ── 4. Build target quaternion — BASE_PITCH_DEG is the neutral rest angle
    targetEuler.x = THREE.MathUtils.degToRad(smoothedPitch + BASE_PITCH_DEG);
    targetEuler.y = THREE.MathUtils.degToRad(smoothedYaw);
    targetQuat.setFromEuler(targetEuler);
    motionReady = true;
  }

  // On device rotation: reset integrated angles so the camera re-centres
  // in the new orientation rather than jumping to a stale integrated value.
  window.addEventListener('orientationchange', () => {
    integratedPitch = 0;
    integratedYaw   = 0;
    smoothedPitch   = 0;
    smoothedYaw     = 0;
    motionReady     = false;
  });

  // ─────────────────────────────────────────────────────────────────
  //  CROSSHAIR AIM STATE — finger drag or hand-index tracking moves it
  //
  //  setCrosshair(x, y)        — immediate jump (finger drag)
  //  setCrosshair(x, y, true)  — smooth CSS transition (return-to-center)
  // ─────────────────────────────────────────────────────────────────
  const crosshairEl  = document.getElementById('crosshair');
  let   aimX         = window.innerWidth  / 2;
  let   aimY         = window.innerHeight / 2;
  let   aimReturnTimer = null;

  function setCrosshair(x, y, smooth = false) {
    aimX = x;
    aimY = y;
    crosshairEl.style.transition = smooth
      ? 'left 0.45s ease-out, top 0.45s ease-out'
      : 'none';
    crosshairEl.style.left = x + 'px';
    crosshairEl.style.top  = y + 'px';
  }
  // Set initial pixel position (overrides the CSS 50%/50%)
  setCrosshair(aimX, aimY);

  // ─────────────────────────────────────────────────────────────────
  //  COMBAT — shared state, effects, and triggerShoot()
  //  Two input sources call triggerShoot():
  //    1. MediaPipe hand tracking  — pinch gesture on right hand
  //    2. Touch fallback           — screen tap while hand tracking unavailable
  // ─────────────────────────────────────────────────────────────────
  const raycaster    = new THREE.Raycaster();
  let   lastFireMs   = 0;
  let   score        = 0;
  const scoreEl      = document.getElementById('score');
  const handStatusEl = document.getElementById('hand-status');
  const FIRE_COOL_MS = 250;   // ms between shots

  // ── Pooled explosion fragments — pre-allocated, never create/dispose ──
  //  Shared box geometry; per-fragment scale gives size variety.
  const FRAG_COUNT  = 16;
  const _fragGeo    = new THREE.BoxGeometry(2, 2, 2);
  const _fragMats   = Array.from({ length: FRAG_COUNT }, (_, k) =>
    new THREE.MeshStandardMaterial({
      color: k % 2 === 0 ? 0xff7722 : 0xffcc44,
      emissive: k % 2 === 0 ? 0xff4400 : 0xff9900,
      emissiveIntensity: 3, transparent: true, opacity: 0, depthWrite: false,
    })
  );
  const _fragMeshes = _fragMats.map(mat => {
    const m = new THREE.Mesh(_fragGeo, mat);
    m.frustumCulled = true;
    m.visible = false;
    scene.add(m);
    return m;
  });
  // Reused velocity/rotation vectors — no per-explosion allocation
  const _fragVels = Array.from({ length: FRAG_COUNT }, () => new THREE.Vector3());
  const _fragRots = Array.from({ length: FRAG_COUNT }, () => new THREE.Vector3());
  const _fragOrigin = new THREE.Vector3();

  function spawnExplosion(pos) {
    _fragOrigin.copy(pos);
    for (let k = 0; k < FRAG_COUNT; k++) {
      _fragVels[k].set((Math.random()-.5)*200, (Math.random()-.5)*200, (Math.random()-.5)*200);
      _fragRots[k].set((Math.random()-.5)*10,  (Math.random()-.5)*10,  (Math.random()-.5)*10);
      _fragMeshes[k].position.copy(pos);
      _fragMeshes[k].scale.setScalar(0.6 + Math.random() * 1.0);
      _fragMeshes[k].visible = true;
      _fragMats[k].opacity = 1;
      _fragMats[k].emissiveIntensity = 3;
    }
    const t0 = performance.now();
    (function tick() {
      const elapsed = (performance.now() - t0) / 1000;
      if (elapsed >= 1.0) {
        for (let k = 0; k < FRAG_COUNT; k++) _fragMeshes[k].visible = false;
        return;
      }
      for (let k = 0; k < FRAG_COUNT; k++) {
        _fragMeshes[k].position.copy(_fragOrigin).addScaledVector(_fragVels[k], elapsed);
        _fragMeshes[k].rotation.set(
          _fragRots[k].x * elapsed, _fragRots[k].y * elapsed, _fragRots[k].z * elapsed
        );
        _fragMats[k].opacity = 1 - elapsed * elapsed;
        _fragMats[k].emissiveIntensity = 3 * (1 - elapsed);
      }
      requestAnimationFrame(tick);
    })();
  }

  // ── Pooled lasers — pre-allocated Line objects, reused every shot ──
  const LASER_POOL_SIZE = 8;
  const _laserSlots = Array.from({ length: LASER_POOL_SIZE }, () => {
    const posArr = new Float32Array(6);
    const geo    = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    const mat  = new THREE.LineBasicMaterial({
      color: 0xcc00ff, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const line = new THREE.Line(geo, mat);
    line.frustumCulled = false;
    line.visible = false;
    scene.add(line);
    return { line, geo, posArr, mat, free: true };
  });

  function spawnLaser(endPos) {
    const slot = _laserSlots.find(s => s.free);
    if (!slot) return;
    slot.free = false;
    const cam = camera.position;
    slot.posArr[0] = cam.x;     slot.posArr[1] = cam.y - 3; slot.posArr[2] = cam.z - 2;
    slot.posArr[3] = endPos.x;  slot.posArr[4] = endPos.y;  slot.posArr[5] = endPos.z;
    slot.geo.attributes.position.needsUpdate = true;
    slot.mat.opacity = 1;
    slot.line.visible = true;
    const t0 = performance.now();
    (function fade() {
      const e = (performance.now() - t0) / 1000;
      if (e > 0.30) { slot.mat.opacity = 0; slot.line.visible = false; slot.free = true; return; }
      slot.mat.opacity = 1 - e / 0.30;
      requestAnimationFrame(fade);
    })();
  }

  // ── Shared fire logic — called by hand-pinch OR touch fallback ───
  //  ndcVec: optional THREE.Vector2 in NDC; omit to shoot at crosshair (0,0)
  function triggerShoot(ndcVec) {
    const nowMs = performance.now();
    if (nowMs - lastFireMs < FIRE_COOL_MS) return;
    lastFireMs = nowMs;

    const ndc = ndcVec || new THREE.Vector2(
      (aimX / window.innerWidth ) *  2 - 1,
      (aimY / window.innerHeight) * -2 + 1
    );
    raycaster.setFromCamera(ndc, camera);

    const hits = [];
    for (const en of enemies) {
      if (!en.group.visible) continue;
      const res = raycaster.intersectObject(en.group, true);
      if (res.length) hits.push({ dist: res[0].distance, point: res[0].point, en });
    }

    if (hits.length > 0) {
      hits.sort((a, b) => a.dist - b.dist);
      const { point, en } = hits[0];
      const idx = enemies.indexOf(en);
      if (idx !== -1) deactivateEnemy(idx);
      spawnExplosion(point);
      spawnLaser(point);
      shakeTimer = 0.10;
      score += 100;
      scoreEl.textContent = score;
    } else {
      const missPos = new THREE.Vector3();
      raycaster.ray.at(400, missPos);
      spawnLaser(missPos);
    }
  }

  // ─────────────────────────────────────────────────────────────────
  //  HAND TRACKING — MediaPipe Hands via front camera
  //
  //  Right-hand pinch gesture (thumb tip + index tip close together)
  //  fires triggerShoot().  The hand status dot bottom-right shows:
  //    dim   = no hand in frame
  //    cyan  = hand detected, open
  //    red   = pinching (fires on leading edge)
  //
  //  Front camera mirrors left↔right, so MediaPipe's "Left" label
  //  corresponds to the user's physical RIGHT hand.
  // ─────────────────────────────────────────────────────────────────
  const PINCH_CLOSE = 0.07;   // normalised distance — pinch threshold
  const PINCH_OPEN  = 0.10;   // hysteresis: must open past this to reset
  let   wasPinching = false;

  function initHandTracking() {
    // Hidden video element feeds frames to MediaPipe
    const videoEl = document.createElement('video');
    videoEl.setAttribute('playsinline', '');
    videoEl.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;';
    document.body.appendChild(videoEl);

    // Verify MediaPipe loaded (script tag may have failed on some networks)
    if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
      console.warn('MediaPipe not loaded — hand tracking unavailable');
      handStatusEl.style.display = 'none';
      return;
    }

    const handsDetector = new Hands({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`,
    });
    handsDetector.setOptions({
      maxNumHands:            1,
      modelComplexity:        0,    // 0 = lite model — faster on mobile
      minDetectionConfidence: 0.6,
      minTrackingConfidence:  0.5,
    });

    handsDetector.onResults((results) => {
      // No hand detected — return crosshair to center after brief delay
      if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        wasPinching = false;
        handStatusEl.dataset.state = 'none';
        clearTimeout(aimReturnTimer);
        aimReturnTimer = setTimeout(() => {
          setCrosshair(window.innerWidth / 2, window.innerHeight / 2, true);
        }, 400);
        return;
      }

      // MediaPipe "Left" label = user's physical right hand (front cam mirrors)
      let lmIdx = -1;
      for (let h = 0; h < results.multiHandedness.length; h++) {
        if (results.multiHandedness[h].label === 'Left') { lmIdx = h; break; }
      }
      // If right hand not found, take whatever hand is visible
      if (lmIdx === -1) lmIdx = 0;

      const lm       = results.multiHandLandmarks[lmIdx];
      const thumbTip = lm[4];   // thumb tip
      const idxTip   = lm[8];   // index finger tip

      // Move crosshair to index finger position.
      // Front camera is mirrored so MediaPipe x=0 is the right edge on screen — flip X.
      clearTimeout(aimReturnTimer);
      setCrosshair(
        (1 - idxTip.x) * window.innerWidth,
        idxTip.y * window.innerHeight
      );

      const pinchDist = Math.sqrt(
        (thumbTip.x - idxTip.x) ** 2 +
        (thumbTip.y - idxTip.y) ** 2
      );

      const isPinching = wasPinching
        ? pinchDist < PINCH_OPEN    // hysteresis: stay pinching until clearly open
        : pinchDist < PINCH_CLOSE;  // enter pinch: must close firmly

      handStatusEl.dataset.state = isPinching ? 'pinch' : 'open';

      if (isPinching && !wasPinching) {
        triggerShoot();   // fires at current aimX/aimY (where index finger points)
      }
      wasPinching = isPinching;
    });

    // MediaPipe Camera utility drives getUserMedia + frame loop
    const mpCam = new Camera(videoEl, {
      onFrame: async () => { await handsDetector.send({ image: videoEl }); },
      width: 320, height: 240,
    });
    mpCam.start()
      .then(() => {
        handStatusEl.style.display = 'block';
        handStatusEl.dataset.state = 'none';
        console.log('Hand tracking active');
      })
      .catch(err => {
        console.warn('Hand tracking unavailable:', err);
        handStatusEl.style.display = 'none';
      });
  }

  // ── Touch / pointer aim — drag finger to move crosshair, release fires ─
  //  pointerdown → snap crosshair to touch position
  //  pointermove → crosshair follows finger in real-time
  //  pointerup   → fire at current crosshair, then drift back to center
  let touchPointerId = -1;

  renderer.domElement.addEventListener('pointerdown', (ev) => {
    if (touchPointerId !== -1) return;
    ev.preventDefault();
    touchPointerId = ev.pointerId;
    clearTimeout(aimReturnTimer);
    setCrosshair(ev.clientX, ev.clientY);
  }, { passive: false });

  renderer.domElement.addEventListener('pointermove', (ev) => {
    if (ev.pointerId !== touchPointerId) return;
    ev.preventDefault();
    setCrosshair(ev.clientX, ev.clientY);
  }, { passive: false });

  renderer.domElement.addEventListener('pointerup', (ev) => {
    if (ev.pointerId !== touchPointerId) return;
    touchPointerId = -1;
    triggerShoot();   // fires at wherever the finger lifted
    aimReturnTimer = setTimeout(() => {
      setCrosshair(window.innerWidth / 2, window.innerHeight / 2, true);
    }, 450);
  }, { passive: false });

  renderer.domElement.addEventListener('pointercancel', (ev) => {
    if (ev.pointerId === touchPointerId) touchPointerId = -1;
  });

  document.getElementById('start-btn').addEventListener('click', async () => {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('debug').style.display   = 'block';
    scoreEl.style.display = 'block';
    // Show gesture hint then fade out
    const hint = document.getElementById('gesture-hint');
    hint.style.display = 'block'; hint.style.opacity = '1';
    setTimeout(() => { hint.style.opacity = '0'; }, 4500);
    setTimeout(() => { hint.style.display = 'none'; }, 5700);
    // Start hand tracking (requests camera permission)
    initHandTracking();

    // Attach listener FIRST — in place before permission dialog resolves (iOS)
    window.addEventListener('devicemotion', handleMotion, true);

    // iOS 13+ requires explicit permission inside a user gesture.
    // DeviceMotionEvent and DeviceOrientationEvent share the same dialog;
    // try Motion first, fall back to Orientation if the API differs.
    try {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        await DeviceMotionEvent.requestPermission();
      } else if (typeof DeviceOrientationEvent !== 'undefined' &&
                 typeof DeviceOrientationEvent.requestPermission === 'function') {
        await DeviceOrientationEvent.requestPermission();
      }
    } catch (err) {
      console.warn('Motion permission:', err);
    }
  });

  // ─────────────────────────────────────────────────────────────────
  //  RESIZE
  // ─────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });

  // ─────────────────────────────────────────────────────────────────
  //  ANIMATION LOOP
  //  Each object moves independently in local space — no group offset,
  //  no precision reset, no group pop. Truly infinite.
  // ─────────────────────────────────────────────────────────────────
  // ── Spawn timer — fires every 1–2.5 s to stagger jet arrivals ───
  let spawnCountdown = 1.2;

  // ── Chase-cam base position — position lerps back here each frame ─
  const CAM_BASE_POS = new THREE.Vector3(0, 0, 0);

  // ── Cockpit shake state ───────────────────────────────────────────
  let shakeTimer = 0;
  const SHAKE_DURATION = 0.20;
  const SHAKE_MAG      = 0.014;

  let prevTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now  = performance.now();
    const dt   = Math.min((now - prevTime) / 1000, 0.05);
    prevTime   = now;

    const starTravel   = SPEED * dt;
    const nebulaTravel = SPEED * NEBULA_SPEED_FACTOR * dt;

    // ── Stars: raw TypedArray access — avoids getter/setter overhead ──
    for (let i = 0; i < STAR_COUNT; i++) {
      const b3 = i * 3;
      let lz = starPos[b3 + 2] + starTravel;

      if (lz > 50) {
        lz = -STAR_DEPTH;
        starPos[b3]     = (Math.random() - 0.5) * STAR_SPREAD_X * 2;
        starPos[b3 + 1] = (Math.random() - 0.5) * STAR_SPREAD_Y * 2;
        starBrightness[i] = 0.2 + Math.random() * 0.8;
        starCol[b3] = starCol[b3 + 1] = starCol[b3 + 2] = 0;
      } else {
        const fade = smoothstep(STAR_FADE_FAR, STAR_FADE_NEAR, -lz);
        const b    = fade * starBrightness[i];
        starCol[b3] = starCol[b3 + 1] = starCol[b3 + 2] = b;
      }
      starPos[b3 + 2] = lz;
    }
    starAttr.needsUpdate    = true;
    starColAttr.needsUpdate = true;

    // ── Nebulas: individual Z-wrap, parallax speed ────────────────
    //  closeFade = Math.min(1, |z| / 200)  — fades to 0 at camera
    //  farFade   = smoothstep from horizon  — fades in from deep space
    for (const neb of nebulas) {
      neb.position.z += nebulaTravel;

      if (neb.position.z > 50) {
        // Immediately reposition to farthest point — count stays at NEBULA_COUNT
        neb.position.x = (Math.random() - 0.5) * NEBULA_SPREAD_X;
        neb.position.y = (Math.random() - 0.5) * NEBULA_SPREAD_Y;
        neb.position.z = -(700 + Math.random() * NEBULA_DEPTH);  // back behind ships
        const [sw, sh] = randNebulaScale();
        neb.scale.set(sw, sh, 1);
        neb.material.rotation = Math.random() * Math.PI * 2;
        neb.material.opacity  = 0;
        continue;
      }

      const closeFade = Math.min(1, Math.abs(neb.position.z) / 200);
      const farFade   = smoothstep(NEBULA_DEPTH, NEBULA_DEPTH * 0.65, -neb.position.z);
      neb.material.opacity = NEBULA_MAX_OP * closeFade * farFade;
    }

    // ── Spawn timer ──────────────────────────────────────────────────
    if (enemies.length > 0) {
      spawnCountdown -= dt;
      if (spawnCountdown <= 0) {
        const idx = enemies.findIndex(e => !e.group.visible);
        if (idx !== -1) activateEnemy(idx);
        spawnCountdown = 0.8 + Math.random() * 1.4;
      }
    }

    // ── Enemy jets: steering behaviors ──────────────────────────────
    const tSec = now / 1000;
    for (let i = 0; i < enemies.length; i++) {
      const e  = enemies[i];
      if (!e.group.visible) continue;
      const es = enemyState[i];

      const px = es.baseX, py = es.baseY, pz = es.baseZ;

      // ── Hard-boundary safety valve ────────────────────────────────
      if (pz > 260 || pz < -580 || Math.abs(px) > 360) {
        deactivateEnemy(i); continue;
      }

      // ── Near waypoint → assign next ───────────────────────────────
      const toPx = es.targetX - px, toPy = es.targetY - py, toPz = es.targetZ - pz;
      let   toDist = Math.sqrt(toPx*toPx + toPy*toPy + toPz*toPz);

      if (toDist < 55) {
        const wp = nextWaypoint(es);
        if (!wp) { deactivateEnemy(i); continue; }
        es.targetX = wp.x; es.targetY = wp.y; es.targetZ = wp.z;
        // Recompute to-target after reassignment
        toDist = Math.sqrt(
          (wp.x-px)*(wp.x-px) + (wp.y-py)*(wp.y-py) + (wp.z-pz)*(wp.z-pz)
        ) || 1;
      }

      // ── Steering ──────────────────────────────────────────────────
      const speed = Math.sqrt(es.velX*es.velX + es.velY*es.velY + es.velZ*es.velZ);
      // Current heading (unit vector)
      const cdX = speed > 0.01 ? es.velX/speed : 0;
      const cdY = speed > 0.01 ? es.velY/speed : 0;
      const cdZ = speed > 0.01 ? es.velZ/speed : -1;
      // Target heading (unit vector)
      const tdX = (es.targetX-px)/toDist;
      const tdY = (es.targetY-py)/toDist;
      const tdZ = (es.targetZ-pz)/toDist;

      // Alignment: +1 = on target, −1 = pointing away
      const align = cdX*tdX + cdY*tdY + cdZ*tdZ;

      // Gradually steer current heading toward target heading
      const steer = Math.min(1, es.turnRate * dt);
      const nDX = cdX + (tdX - cdX) * steer;
      const nDY = cdY + (tdY - cdY) * steer;
      const nDZ = cdZ + (tdZ - cdZ) * steer;
      const nDL = Math.sqrt(nDX*nDX + nDY*nDY + nDZ*nDZ) || 1;

      // Brake in sharp turns; minimum 45% so ships never pivot in place
      const brakeFactor = 0.45 + 0.55 * Math.max(0, align);  // 0.45..1.0
      const tgtSpd = es.maxSpeed * brakeFactor;
      es.curSpeed += (tgtSpd - es.curSpeed) * Math.min(1, (es.accel / es.maxSpeed) * 4 * dt);

      es.velX = (nDX/nDL) * es.curSpeed;
      es.velY = (nDY/nDL) * es.curSpeed;
      es.velZ = (nDZ/nDL) * es.curSpeed;

      // ── Wobble — organic micro-oscillation per pilot style ────────
      // Cap wobble magnitude so it never causes spinning (max ±12 units)
      const wobAmp = Math.min(es.wobbleAmp, 12);
      const wobX = wobAmp * Math.sin(tSec * es.wobbleFreq        + es.wobblePhase);
      const wobY = wobAmp * Math.cos(tSec * es.wobbleFreq * 0.73 + es.wobblePhase * 1.3);

      // ── Integrate base position ───────────────────────────────────
      es.baseX += es.velX * dt;
      es.baseY += es.velY * dt;
      es.baseZ += es.velZ * dt;
      // Y floor: keep above grid
      if (es.baseY < 3) { es.baseY = 3; if (es.velY < 0) es.velY = 0; }

      e.group.position.x = es.baseX + wobX;
      e.group.position.y = es.baseY + wobY;
      e.group.position.z = es.baseZ;

      // ── Rotation: yaw+pitch follow velocity; roll banks into turns ─
      const vspd = Math.sqrt(es.velX*es.velX + es.velY*es.velY + es.velZ*es.velZ);
      const vdX  = vspd > 0.01 ? es.velX/vspd : cdX;
      const vdY  = vspd > 0.01 ? es.velY/vspd : cdY;
      const vdZ  = vspd > 0.01 ? es.velZ/vspd : cdZ;

      const yawTgt   = Math.atan2(vdZ, -vdX);
      const rollTgt  = -vdX * 1.3;                                          // ±75° bank — dramatic tilt
      const pitchTgt = -Math.asin(Math.max(-0.55, Math.min(0.55, vdY)));   // follow vertical vel

      e.group.rotation.y += (yawTgt   - e.group.rotation.y) * Math.min(1, es.turnRate * 3 * dt);
      e.group.rotation.z += (rollTgt  - e.group.rotation.z) * Math.min(1, 7.0 * dt);
      e.group.rotation.x += (pitchTgt - e.group.rotation.x) * Math.min(1, 4.5 * dt);

      // ── Fade in on spawn ──────────────────────────────────────────
      if (es.fadeIn < 1) {
        es.fadeIn = Math.min(1, es.fadeIn + dt * 1.8);  // ~0.55 s to full
        for (const mesh of e.meshes) mesh.material.opacity = es.fadeIn;
      }

      // ── Fade out + deactivate ships closing from the front ────────
      const comingIn = es.velZ > 15 && pz > -120 && pz < 0;
      if (comingIn && es.fadeIn >= 1) {
        if (pz > -65) { deactivateEnemy(i); continue; }
        const t = (pz + 120) / 55;
        for (const mesh of e.meshes) mesh.material.opacity = Math.max(0, 1 - t*t);
      }

      // ── Cockpit shake on near approach ────────────────────────────
      if (!es.shaken && es.velZ > 15 && pz > -95 && pz < 0) {
        shakeTimer = SHAKE_DURATION;
        es.shaken  = true;
      }
    }

    // ── Cockpit shake + heavy position drift ─────────────────────────
    if (shakeTimer > 0) {
      shakeTimer -= dt;
      const mag = SHAKE_MAG * (shakeTimer / SHAKE_DURATION);
      camera.position.set(
        CAM_BASE_POS.x + (Math.random() - 0.5) * mag * 2,
        CAM_BASE_POS.y + (Math.random() - 0.5) * mag * 2,
        CAM_BASE_POS.z
      );
    } else {
      // Lerp back to base — camera drifts like a heavy vessel, never snaps
      camera.position.lerp(CAM_BASE_POS, Math.min(1, 8 * dt));
    }

    // ── Camera slerp — velocity-based alpha + quaternion interpolation ─
    //
    //  Why quaternions?  Euler lerp jitters during fast motion because
    //  each axis is interpolated independently and can "fight" each other.
    //  Quaternion slerp always takes the shortest arc between two orientations.
    //
    //  Why velocity-based alpha?
    //    dist = angular gap between current quaternion and target (radians)
    //    alpha = BASE_ALPHA + dist * VEL_SCALE   (capped at 0.92)
    //    → near target: alpha ≈ BASE (slow, heavy)
    //    → far from target (fast tilt): alpha rises → camera catches up quickly
    //    → result: no jitter on fast swings, no snap on slow ones
    //
    //  DeltaTime correction keeps feel identical at 30/60/120 fps:
    //    slerpT = 1 - (1 - alpha)^(dt * 60)
    if (motionReady) {
      const dist   = camera.quaternion.angleTo(targetQuat);
      const alpha  = Math.min(0.92, BASE_ALPHA + dist * VEL_SCALE);
      const slerpT = 1 - Math.pow(1 - alpha, dt * 60);
      camera.quaternion.slerp(targetQuat, slerpT);
    }

    composer.render();
  }

  animate();
  </script>

</body>
