<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Vector Rocket Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
  </style>
</head>
<body>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';

  // ─────────────────────────────────────────────────────────────────
  //  TUNABLE CONSTANTS
  // ─────────────────────────────────────────────────────────────────
  const STAR_COUNT         = 5000;
  const STAR_SPREAD_X      = 220;
  const STAR_SPREAD_Y      = 130;
  const STAR_DEPTH         = 2000;
  const STAR_FADE_FAR      = 1600;
  const STAR_FADE_NEAR     = 400;

  const NEBULA_COUNT       = 20;
  const NEBULA_DEPTH       = 1800;
  const NEBULA_MAX_OP      = 0.55;  // higher ceiling — gradient itself is very dim at edges

  const SPEED              = 80;    // star speed, units / second
  const NEBULA_SPEED_FACTOR = 0.28; // nebulas at 28% → parallax depth

  const BASE_FOV           = 72;

  // ─────────────────────────────────────────────────────────────────
  //  RENDERER
  // ─────────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({
    antialias: false,
    powerPreference: 'high-performance',
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x00000a, 1);
  document.body.appendChild(renderer.domElement);

  // ─────────────────────────────────────────────────────────────────
  //  SCENE & CAMERA  (must come before anything that references them)
  // ─────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    BASE_FOV,
    window.innerWidth / window.innerHeight,
    0.5,
    4000
  );
  camera.position.set(0, 0, 0);

  // ─────────────────────────────────────────────────────────────────
  //  UNIVERSE GROUP — all objects live here; group stays at origin
  // ─────────────────────────────────────────────────────────────────
  const universe = new THREE.Group();
  scene.add(universe);

  // ─────────────────────────────────────────────────────────────────
  //  STAR TEXTURE — circular soft gradient, no square corners
  // ─────────────────────────────────────────────────────────────────
  function makeStarTexture() {
    const SZ  = 64;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = SZ;
    const ctx = cvs.getContext('2d');
    const grd = ctx.createRadialGradient(SZ/2, SZ/2, 0, SZ/2, SZ/2, SZ/2);
    grd.addColorStop(0.0, 'rgba(255,255,255,1.0)');
    grd.addColorStop(0.4, 'rgba(255,255,255,0.8)');
    grd.addColorStop(0.8, 'rgba(255,255,255,0.2)');
    grd.addColorStop(1.0, 'rgba(255,255,255,0.0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, SZ, SZ);
    return new THREE.CanvasTexture(cvs);
  }

  // ─────────────────────────────────────────────────────────────────
  //  STAR FIELD
  // ─────────────────────────────────────────────────────────────────
  const starPos        = new Float32Array(STAR_COUNT * 3);
  const starCol        = new Float32Array(STAR_COUNT * 3);
  const starBrightness = new Float32Array(STAR_COUNT);

  for (let i = 0; i < STAR_COUNT; i++) {
    starPos[i * 3]     = (Math.random() - 0.5) * STAR_SPREAD_X * 2;
    starPos[i * 3 + 1] = (Math.random() - 0.5) * STAR_SPREAD_Y * 2;
    starPos[i * 3 + 2] = -(Math.random() * STAR_DEPTH);
    starBrightness[i]  = 0.2 + Math.random() * 0.8;
    starCol[i * 3] = starCol[i * 3 + 1] = starCol[i * 3 + 2] = 0;
  }

  const starGeo     = new THREE.BufferGeometry();
  const starAttr    = new THREE.BufferAttribute(starPos, 3);
  const starColAttr = new THREE.BufferAttribute(starCol, 3);
  starGeo.setAttribute('position', starAttr);
  starGeo.setAttribute('color',    starColAttr);

  const starMat = new THREE.PointsMaterial({
    map:             makeStarTexture(),
    size:            1.8,
    sizeAttenuation: true,
    vertexColors:    true,
    transparent:     true,
    alphaTest:       0.01,
    depthWrite:      false,
  });

  universe.add(new THREE.Points(starGeo, starMat));

  // ─────────────────────────────────────────────────────────────────
  //  NEBULA SPRITES
  // ─────────────────────────────────────────────────────────────────
  // Larger canvas + Gaussian-style falloff: many stops that curve steeply
  // near the core then thin to near-zero long before the canvas edge.
  // This gives a wide, airy halo with no visible boundary circle.
  function makeNebulaTexture(r, g, b) {
    const SZ  = 512;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = SZ;
    const ctx = cvs.getContext('2d');
    const grd = ctx.createRadialGradient(SZ/2, SZ/2, 0, SZ/2, SZ/2, SZ/2);
    grd.addColorStop(0.00, `rgba(${r},${g},${b},0.65)`); // soft core — not hard white
    grd.addColorStop(0.08, `rgba(${r},${g},${b},0.50)`);
    grd.addColorStop(0.18, `rgba(${r},${g},${b},0.32)`);
    grd.addColorStop(0.32, `rgba(${r},${g},${b},0.16)`);
    grd.addColorStop(0.48, `rgba(${r},${g},${b},0.07)`);
    grd.addColorStop(0.64, `rgba(${r},${g},${b},0.025)`);
    grd.addColorStop(0.80, `rgba(${r},${g},${b},0.006)`);
    grd.addColorStop(1.00, `rgba(${r},${g},${b},0.0)`);  // fully transparent edge
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, SZ, SZ);
    return new THREE.CanvasTexture(cvs);
  }

  // Palette — Electric Blue (#00f2ff) and Deep Magenta (#ff00ff)
  const nebTextures = [
    makeNebulaTexture(  0, 242, 255), // electric blue
    makeNebulaTexture(255,   0, 255), // deep magenta
    makeNebulaTexture(  0, 200, 255), // lighter electric blue
    makeNebulaTexture(220,   0, 255), // magenta-violet
    makeNebulaTexture(  0, 242, 200), // electric teal
  ];

  const nebulas = [];

  for (let i = 0; i < NEBULA_COUNT; i++) {
    const mat = new THREE.SpriteMaterial({
      map:         nebTextures[Math.floor(Math.random() * nebTextures.length)],
      transparent: true,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
      opacity:     0,
    });

    const sprite = new THREE.Sprite(mat);
    const scale  = 200 + Math.random() * 400; // larger sprites → wide soft halo
    sprite.scale.set(scale, scale, 1);
    sprite.position.set(
      (Math.random() - 0.5) * 320,
      (Math.random() - 0.5) * 200,
      -(200 + Math.random() * NEBULA_DEPTH)
    );

    universe.add(sprite);
    nebulas.push(sprite);
  }

  // ─────────────────────────────────────────────────────────────────
  //  HELPERS
  // ─────────────────────────────────────────────────────────────────
  function smoothstep(edge0, edge1, x) {
    const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
    return t * t * (3 - 2 * t);
  }

  // ─────────────────────────────────────────────────────────────────
  //  RESIZE
  // ─────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ─────────────────────────────────────────────────────────────────
  //  ANIMATION LOOP
  //  Each object moves independently in local space — no group offset,
  //  no precision reset, no group pop. Truly infinite.
  // ─────────────────────────────────────────────────────────────────
  let prevTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now  = performance.now();
    const dt   = Math.min((now - prevTime) / 1000, 0.05);
    prevTime   = now;

    const starTravel   = SPEED * dt;
    const nebulaTravel = SPEED * NEBULA_SPEED_FACTOR * dt;

    // ── Stars: individual Z-wrap ──────────────────────────────────
    for (let i = 0; i < STAR_COUNT; i++) {
      let lz = starAttr.getZ(i) + starTravel;

      if (lz > 50) {
        lz = -STAR_DEPTH;
        starAttr.setX(i, (Math.random() - 0.5) * STAR_SPREAD_X * 2);
        starAttr.setY(i, (Math.random() - 0.5) * STAR_SPREAD_Y * 2);
        starBrightness[i] = 0.2 + Math.random() * 0.8;
        starCol[i * 3] = starCol[i * 3 + 1] = starCol[i * 3 + 2] = 0;
      } else {
        const distAhead = -lz;
        const fade = smoothstep(STAR_FADE_FAR, STAR_FADE_NEAR, distAhead);
        const b    = fade * starBrightness[i];
        starCol[i * 3] = starCol[i * 3 + 1] = starCol[i * 3 + 2] = b;
      }

      starAttr.setZ(i, lz);
    }
    starAttr.needsUpdate    = true;
    starColAttr.needsUpdate = true;

    // ── Nebulas: individual Z-wrap, parallax speed ────────────────
    //  closeFade = Math.min(1, |z| / 200)  — fades to 0 at camera
    //  farFade   = smoothstep from horizon  — fades in from deep space
    for (const neb of nebulas) {
      neb.position.z += nebulaTravel;

      if (neb.position.z > 50) {
        // Immediately reposition to farthest point — count stays at 20
        neb.position.x = (Math.random() - 0.5) * 320;
        neb.position.y = (Math.random() - 0.5) * 200;
        neb.position.z = -NEBULA_DEPTH;
        const s = 200 + Math.random() * 400;
        neb.scale.set(s, s, 1);
        neb.material.opacity = 0;
        continue;
      }

      const closeFade = Math.min(1, Math.abs(neb.position.z) / 200);
      const farFade   = smoothstep(NEBULA_DEPTH, NEBULA_DEPTH * 0.65, -neb.position.z);
      neb.material.opacity = NEBULA_MAX_OP * closeFade * farFade;
    }

    renderer.render(scene, camera);
  }

  animate();
  </script>

</body>
</html>
