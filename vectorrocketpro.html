<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vector Rocket Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
  </style>
</head>
<body>

  <!-- Three.js via ES module import map — no build step needed -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';

  // ── Renderer ────────────────────────────────────────────────────
  // antialias off — not needed for points, saves GPU on mobile
  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 1); // pure black background
  document.body.appendChild(renderer.domElement);

  // ── Scene ────────────────────────────────────────────────────────
  const scene = new THREE.Scene();

  // ── Camera — first-person perspective at origin ──────────────────
  // FOV 75° gives a wide, immersive view
  const camera = new THREE.PerspectiveCamera(
    75,                                      // field of view (degrees)
    window.innerWidth / window.innerHeight,  // aspect ratio
    0.1,                                     // near clip
    2000                                     // far clip
  );
  camera.position.set(0, 0, 0); // player is at origin, looking down -Z

  // ── Starfield — THREE.Points ─────────────────────────────────────
  // Stars are placed at random X/Y offsets and deep -Z positions.
  // Each frame they advance toward the camera (+Z). When a star
  // passes Z > 5 it is recycled to the far end, creating an infinite
  // warp-speed tunnel effect.
  //
  // Three layers at different speeds produce a parallax depth feel:
  //   Layer 1 — distant, slow, many small stars
  //   Layer 2 — mid-range, medium speed
  //   Layer 3 — near, fast, few large stars (the "warp streaks")

  const LAYERS = [
    { count: 2000, spread: 120, size: 0.5, speed: 80,  depth: 1200 },
    { count:  800, spread:  90, size: 0.9, speed: 200, depth: 1000 },
    { count:  200, spread:  60, size: 2.0, speed: 500, depth:  800 },
  ];

  // Build a Points object for each layer
  const starLayers = LAYERS.map(cfg => {
    const positions = new Float32Array(cfg.count * 3);

    // Scatter stars along the full depth tunnel on init
    for (let i = 0; i < cfg.count; i++) {
      scatter(positions, i, cfg.spread, cfg.depth, true);
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const mat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: cfg.size,
      sizeAttenuation: true, // stars grow as they get closer — key warp effect
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);

    // Store config on the object for easy access in the loop
    points.userData = { ...cfg };
    return points;
  });

  // Place one star at index i inside the Float32Array.
  // randomZ = true  → scatter along full tunnel (used at init)
  // randomZ = false → reset to far end (used when recycling)
  function scatter(arr, i, spread, depth, randomZ) {
    arr[i * 3]     = (Math.random() - 0.5) * spread; // X
    arr[i * 3 + 1] = (Math.random() - 0.5) * spread; // Y
    arr[i * 3 + 2] = randomZ
      ? -(Math.random() * depth)  // anywhere along the tunnel
      : -depth;                   // back at the far end
  }

  // ── Resize ───────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Animation loop — targets 60 fps via requestAnimationFrame ────
  let prevTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const dt  = Math.min((now - prevTime) / 1000, 0.05); // delta-time in seconds
    prevTime  = now;

    // Advance every star in every layer toward the camera
    for (const layer of starLayers) {
      const { speed, spread, depth } = layer.userData;
      const attr = layer.geometry.attributes.position;

      for (let i = 0; i < attr.count; i++) {
        // Move star forward along Z
        const z = attr.getZ(i) + speed * dt;

        if (z > 5) {
          // Star has passed the camera — recycle it at the far end
          const arr = attr.array;
          scatter(arr, i, spread, depth, false);
          attr.needsUpdate = true; // flag for this recycle
        } else {
          attr.setZ(i, z);
        }
      }

      attr.needsUpdate = true; // mark buffer dirty for GPU upload
    }

    renderer.render(scene, camera);
  }

  animate();
  </script>

</body>
</html>
