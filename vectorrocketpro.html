<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Vector Rocket Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    /* ── Mission Start overlay ─────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: rgba(0, 0, 12, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 100;
    }
    #overlay h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      letter-spacing: 0.18em;
      color: #00f2ff;
      text-shadow: 0 0 24px rgba(0,242,255,0.6);
    }
    #overlay p {
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.38);
      margin-bottom: 2rem;
    }
    #start-btn {
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      color: #00f2ff;
      background: rgba(0,242,255,0.08);
      border: 1px solid rgba(0,242,255,0.45);
      border-radius: 3px;
      padding: 0.9rem 2.8rem;
      cursor: pointer;
      box-shadow: 0 0 22px rgba(0,242,255,0.18), inset 0 0 12px rgba(0,242,255,0.06);
      transition: background 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #start-btn:active {
      background: rgba(0,242,255,0.22);
      box-shadow: 0 0 40px rgba(0,242,255,0.45), inset 0 0 18px rgba(0,242,255,0.15);
    }

    /* ── Sensor debug overlay ───────────────────────────────────── */
    #debug {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 200;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.7;
      color: #00f2ff;
      background: rgba(0, 0, 16, 0.72);
      border: 1px solid rgba(0, 242, 255, 0.25);
      border-radius: 4px;
      padding: 8px 12px;
      pointer-events: none;
      white-space: pre;
    }
  </style>
</head>
<body>

  <!-- Mission Start overlay — shown until user taps; required for iOS
       sensor permissions which must be requested inside a user gesture. -->
  <div id="overlay">
    <h1>VECTOR ROCKET PRO</h1>
    <p>TILT TO NAVIGATE</p>
    <button id="start-btn">MISSION START</button>
  </div>

  <!-- Sensor debug panel — visible after MISSION START -->
  <div id="debug">SENSOR DEBUG
────────────────
GLB    : WAITING
Status : WAITING
Events : 0
Interval: --

rotationRate (°/s)
  alpha : --
  beta  : --
  gamma : --

Integrated (°)
  pitch : --
  yaw   : --</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

  // ─────────────────────────────────────────────────────────────────
  //  TUNABLE CONSTANTS
  // ─────────────────────────────────────────────────────────────────
  const STAR_COUNT         = 5000;
  const STAR_SPREAD_X      = 500;   // wide enough for ±45° camera look-around
  const STAR_SPREAD_Y      = 350;
  const STAR_DEPTH         = 2000;
  const STAR_FADE_FAR      = 1600;
  const STAR_FADE_NEAR     = 400;

  const NEBULA_COUNT       = 28;    // more sprites → denser colour mixing
  const NEBULA_DEPTH       = 1800;
  const NEBULA_MAX_OP      = 1.0;   // texture is very dim, so allow full opacity multiplier
  const NEBULA_SPREAD_X    = 700;   // wide horizontal spread for full-screen coverage
  const NEBULA_SPREAD_Y    = 420;   // tall vertical spread

  const SPEED              = 80;    // star speed, units / second
  const NEBULA_SPEED_FACTOR = 0.28; // nebulas at 28% → parallax depth

  const BASE_FOV           = 72;

  // ── Enemy rocket pool ──────────────────────────────────────────────
  const ENEMY_COUNT        = 3;    // working set — tuning scale before adding more
  const ENEMY_SPAWN_Z      = -600; // spawn deeper — more time to read the approach
  const ENEMY_SPREAD_X     = 260;
  const ENEMY_SPREAD_Y     = 180;
  const ENEMY_MIN_SPEED    = 60;   // slow end — feels piloted, not missile-like
  const ENEMY_MAX_SPEED    = 130;  // fast end — still readable

  // ─────────────────────────────────────────────────────────────────
  //  RENDERER
  // ─────────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({
    antialias: false,
    powerPreference: 'high-performance',
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x00000a, 1);
  document.body.appendChild(renderer.domElement);

  // ─────────────────────────────────────────────────────────────────
  //  SCENE & CAMERA  (must come before anything that references them)
  // ─────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  // Exponential fog — ships emerge from darkness, no hard pop-in at spawn depth
  scene.fog = new THREE.FogExp2(0x000000, 0.0022);

  const camera = new THREE.PerspectiveCamera(
    BASE_FOV,
    window.innerWidth / window.innerHeight,
    0.1,   // near clip reduced — avoids model penetration at close range
    4000
  );
  camera.position.set(0, 0, 0);
  // YXZ order: yaw is applied first, then pitch on the already-yawed axis.
  // This is the standard first-person Euler order — no gimbal lock at ±90°.
  camera.rotation.order = 'YXZ';

  // ─────────────────────────────────────────────────────────────────
  //  SCENE LIGHTING  (required for MeshStandardMaterial to show colour)
  // ─────────────────────────────────────────────────────────────────
  // White ambient + directional so the GLB model's textures and colours
  // read accurately. Intensity values match the user's spec exactly.
  // Three-point lighting rig — makes PBR materials readable in a dark space scene
  scene.add(new THREE.AmbientLight(0xffffff, 1.8));          // strong base fill
  const sunLight = new THREE.DirectionalLight(0xffffff, 2.0); // key: top-right-front
  sunLight.position.set(1, 2, 2);
  scene.add(sunLight);
  const fillLight = new THREE.DirectionalLight(0x88aaff, 1.2); // fill: left-below (cool)
  fillLight.position.set(-2, -1, 1);
  scene.add(fillLight);
  const rimLight = new THREE.DirectionalLight(0xffffff, 0.8);  // rim: from behind
  rimLight.position.set(0, 0, -1);
  scene.add(rimLight);

  // ─────────────────────────────────────────────────────────────────
  //  FIGHTER JET GLB MODEL
  //
  //  Loaded asynchronously — the rest of the scene initialises and
  //  animates normally while the file is fetching.
  //  Adjust model.scale / model.rotation after seeing the result in-browser.
  // ─────────────────────────────────────────────────────────────────
  // Helper — update the GLB line of the debug overlay
  function dbgGlb(msg) {
    const el = document.getElementById('debug');
    el.textContent = el.textContent.replace(/^GLB\s*:.*$/m, `GLB    : ${msg}`);
  }
  dbgGlb('WAITING');

  const gltfLoader = new GLTFLoader();
  gltfLoader.load(
    './assets/figherjet.glb',

    // ── onLoad ────────────────────────────────────────────────────
    (gltf) => {
      const template = gltf.scene;

      // ── Material normalisation ───────────────────────────────────
      // GLB metals with no environment map render almost black.
      // Cap metalness at 0.3 and roughness at 0.55 so the three-point
      // lighting rig reflects clearly off every surface.
      template.traverse((child) => {
        if (!child.isMesh) return;
        if (!(child.material instanceof THREE.MeshStandardMaterial)) {
          child.material = new THREE.MeshStandardMaterial({
            color:     child.material.color ?? new THREE.Color(0xcccccc),
            map:       child.material.map   ?? null,
          });
        }
        const mat = child.material;
        mat.metalness  = Math.min(mat.metalness ?? 1, 0.30);
        mat.roughness  = Math.max(mat.roughness ?? 0, 0.55);
        mat.needsUpdate = true;
      });

      // ── Auto-scale to a fixed world size ────────────────────────
      // Models exported in mm, cm, or arbitrary units arrive at wildly
      // different scales. Normalise to TARGET_LENGTH units along the
      // longest axis so the jet is always clearly visible.
      const TARGET_LENGTH = 80;   // world units — tweak for bigger/smaller
      const rawBox  = new THREE.Box3().setFromObject(template);
      const rawSize = new THREE.Vector3();
      rawBox.getSize(rawSize);
      const maxDim    = Math.max(rawSize.x, rawSize.y, rawSize.z);
      const autoScale = TARGET_LENGTH / (maxDim || 1);
      template.scale.setScalar(autoScale);

      // ── Orient — nose toward camera (+Z) ────────────────────────
      // Model's native nose is along +X, so rotate -90° around Y to point +Z.
      // If still showing side/back, try: Math.PI / 2  or  0  or  -Math.PI
      template.rotation.y = Math.PI / 2;

      // Recompute bbox after scale + rotation for accurate tail position
      template.updateWorldMatrix(true, true);
      const bbox  = new THREE.Box3().setFromObject(template);
      const sz    = new THREE.Vector3();
      bbox.getSize(sz);
      const tailZ = bbox.min.z - sz.z * 0.05;  // just behind the rearmost face

      const dbgMsg =
        `LOADED scale=${autoScale.toFixed(3)} ` +
        `size=(${sz.x.toFixed(1)},${sz.y.toFixed(1)},${sz.z.toFixed(1)}) ` +
        `tailZ=${tailZ.toFixed(1)}`;
      dbgGlb(dbgMsg);
      console.log('figherjet.glb —', dbgMsg);

      // ── Build object pool — clone template ENEMY_COUNT times ────
      for (let i = 0; i < ENEMY_COUNT; i++) {
        const clone = template.clone();

        // Clone each mesh's material independently so opacity can be
        // set per-instance without affecting other jets in the pool
        const meshes = [];
        clone.traverse((child) => {
          if (!child.isMesh) return;
          child.material             = child.material.clone();
          child.material.transparent = true;
          child.material.opacity     = 1;
          meshes.push(child);
        });

        clone.visible = false;   // inactive until spawn timer fires
        scene.add(clone);
        enemies.push({ group: clone, meshes });
        enemyState.push({ speed: 0, lane: 'A',
                          targetX: 0, targetY: 0,
                          baseX: 0,   baseY: 0,
                          waveAmp: 0, waveFreq: 0, wavePhase: 0,
                          shaken: false });
      }
    },

    // ── onProgress ────────────────────────────────────────────────
    (xhr) => {
      const pct = xhr.lengthComputable
        ? Math.round(xhr.loaded / xhr.total * 100)
        : Math.round(xhr.loaded / 1024) + 'KB';
      dbgGlb(`LOADING ${pct}${xhr.lengthComputable ? '%' : ''}`);
    },

    // ── onError ───────────────────────────────────────────────────
    (error) => {
      dbgGlb('ERROR — see console');
      console.error('figherjet.glb failed to load:', error);
    }
  );

  // ─────────────────────────────────────────────────────────────────
  //  UNIVERSE GROUP — all objects live here; group stays at origin
  // ─────────────────────────────────────────────────────────────────
  const universe = new THREE.Group();
  scene.add(universe);

  // ─────────────────────────────────────────────────────────────────
  //  STAR TEXTURE — circular soft gradient, no square corners
  // ─────────────────────────────────────────────────────────────────
  function makeStarTexture() {
    const SZ  = 64;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = SZ;
    const ctx = cvs.getContext('2d');
    const grd = ctx.createRadialGradient(SZ/2, SZ/2, 0, SZ/2, SZ/2, SZ/2);
    grd.addColorStop(0.0, 'rgba(255,255,255,1.0)');
    grd.addColorStop(0.4, 'rgba(255,255,255,0.8)');
    grd.addColorStop(0.8, 'rgba(255,255,255,0.2)');
    grd.addColorStop(1.0, 'rgba(255,255,255,0.0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, SZ, SZ);
    return new THREE.CanvasTexture(cvs);
  }

  // ─────────────────────────────────────────────────────────────────
  //  STAR FIELD
  // ─────────────────────────────────────────────────────────────────
  const starPos        = new Float32Array(STAR_COUNT * 3);
  const starCol        = new Float32Array(STAR_COUNT * 3);
  const starBrightness = new Float32Array(STAR_COUNT);

  for (let i = 0; i < STAR_COUNT; i++) {
    starPos[i * 3]     = (Math.random() - 0.5) * STAR_SPREAD_X * 2;
    starPos[i * 3 + 1] = (Math.random() - 0.5) * STAR_SPREAD_Y * 2;
    starPos[i * 3 + 2] = -(Math.random() * STAR_DEPTH);
    starBrightness[i]  = 0.2 + Math.random() * 0.8;
    starCol[i * 3] = starCol[i * 3 + 1] = starCol[i * 3 + 2] = 0;
  }

  const starGeo     = new THREE.BufferGeometry();
  const starAttr    = new THREE.BufferAttribute(starPos, 3);
  const starColAttr = new THREE.BufferAttribute(starCol, 3);
  starGeo.setAttribute('position', starAttr);
  starGeo.setAttribute('color',    starColAttr);

  const starMat = new THREE.PointsMaterial({
    map:             makeStarTexture(),
    size:            1.8,
    sizeAttenuation: true,
    vertexColors:    true,
    transparent:     true,
    alphaTest:       0.01,
    depthWrite:      false,
  });

  universe.add(new THREE.Points(starGeo, starMat));

  // ─────────────────────────────────────────────────────────────────
  //  NEBULA SPRITES
  //
  //  Each texture is deliberately non-circular:
  //    sx/sy  — canvas scale applied before drawing → elliptical lobe
  //  Core alpha is kept very low (≤ 0.14) so no visible bright ball forms.
  //  A secondary offset lobe breaks the symmetry further.
  //  Individual sprites then get random material.rotation + non-uniform
  //  scale, so every cloud looks unique even if it shares a base texture.
  // ─────────────────────────────────────────────────────────────────
  // Subtle ellipse + scattered micro-wisps.
  // sx/sy kept close to 1 so the shape is gently non-circular, not a streak.
  // 6 tiny wisps at random positions break symmetry without drawing lines.
  function makeNebulaTexture(r, g, b, sx = 1.0, sy = 1.0) {
    const SZ  = 512;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = SZ;
    const ctx = cvs.getContext('2d');

    // ── Main body — gently elliptical, very soft core ─────────────
    ctx.save();
    ctx.translate(SZ / 2, SZ / 2);
    ctx.scale(sx, sy);
    const gMain = ctx.createRadialGradient(0, 0, 0, 0, 0, SZ / 2);
    gMain.addColorStop(0.00, `rgba(${r},${g},${b},0.11)`);
    gMain.addColorStop(0.12, `rgba(${r},${g},${b},0.08)`);
    gMain.addColorStop(0.28, `rgba(${r},${g},${b},0.04)`);
    gMain.addColorStop(0.48, `rgba(${r},${g},${b},0.014)`);
    gMain.addColorStop(0.68, `rgba(${r},${g},${b},0.003)`);
    gMain.addColorStop(0.85, `rgba(${r},${g},${b},0.001)`);
    gMain.addColorStop(1.00, `rgba(${r},${g},${b},0.000)`);
    ctx.fillStyle = gMain;
    ctx.fillRect(-SZ, -SZ, SZ * 2, SZ * 2);
    ctx.restore();

    // ── Micro-wisps — tiny dim blobs scattered across canvas ──────
    // Each is a small circular gradient so individually none looks like
    // a line. Together they give the cloud an organic, irregular silhouette.
    for (let w = 0; w < 6; w++) {
      const wx = SZ * (0.15 + Math.random() * 0.70);
      const wy = SZ * (0.15 + Math.random() * 0.70);
      const wr = SZ * (0.06 + Math.random() * 0.11); // small radius
      const wa = 0.015 + Math.random() * 0.030;       // very dim

      const gw = ctx.createRadialGradient(wx, wy, 0, wx, wy, wr);
      gw.addColorStop(0.0, `rgba(${r},${g},${b},${wa.toFixed(3)})`);
      gw.addColorStop(0.5, `rgba(${r},${g},${b},${(wa * 0.25).toFixed(3)})`);
      gw.addColorStop(1.0, `rgba(${r},${g},${b},0.000)`);
      ctx.fillStyle = gw;
      ctx.fillRect(wx - wr, wy - wr, wr * 2, wr * 2);
    }

    return new THREE.CanvasTexture(cvs);
  }

  // Subtle ratios — max 1.35× in either direction, never a visible streak
  const nebTextures = [
    makeNebulaTexture(  0, 242, 255, 1.30, 0.78), // electric blue
    makeNebulaTexture(255,   0, 255, 0.78, 1.30), // deep magenta
    makeNebulaTexture(  0, 200, 255, 1.20, 0.85), // lighter blue
    makeNebulaTexture(220,   0, 255, 0.85, 1.20), // magenta-violet
    makeNebulaTexture(  0, 242, 200, 1.35, 0.74), // electric teal
  ];

  // Helper — random non-uniform scale so sprites aren't all the same shape
  function randNebulaScale() {
    const base   = 350 + Math.random() * 550;
    const aspect = 0.35 + Math.random() * 1.3; // width/height ratio 0.35–1.65
    return [base, base * aspect];
  }

  const nebulas = [];

  for (let i = 0; i < NEBULA_COUNT; i++) {
    const mat = new THREE.SpriteMaterial({
      map:         nebTextures[Math.floor(Math.random() * nebTextures.length)],
      transparent: true,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
      opacity:     0,
      rotation:    Math.random() * Math.PI * 2, // random orientation per sprite
    });

    const sprite = new THREE.Sprite(mat);
    const [sw, sh] = randNebulaScale();
    sprite.scale.set(sw, sh, 1);
    sprite.position.set(
      (Math.random() - 0.5) * NEBULA_SPREAD_X,
      (Math.random() - 0.5) * NEBULA_SPREAD_Y,
      -(200 + Math.random() * NEBULA_DEPTH)
    );

    universe.add(sprite);
    nebulas.push(sprite);
  }

  // ─────────────────────────────────────────────────────────────────
  //  HELPERS
  // ─────────────────────────────────────────────────────────────────
  function smoothstep(edge0, edge1, x) {
    const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
    return t * t * (3 - 2 * t);
  }

  // ─────────────────────────────────────────────────────────────────
  //  ENEMY POOL — populated in the GLTFLoader onLoad callback above.
  //  Arrays start empty; the animate loop guards with enemies.length.
  // ─────────────────────────────────────────────────────────────────

  const enemies    = [];
  const enemyState = [];

  function deactivateEnemy(i) {
    enemies[i].group.visible = false;
    enemyState[i].shaken     = false;
  }

  function activateEnemy(i) {
    const e  = enemies[i];
    const es = enemyState[i];

    // ── Spawn position — 70% central column, 30% wide flanks ───────
    const central = Math.random() < 0.70;
    const spawnX  = (Math.random() - 0.5) * ENEMY_SPREAD_X * (central ? 0.45 : 1.8);
    const spawnY  = (Math.random() - 0.5) * ENEMY_SPREAD_Y * (central ? 0.45 : 1.8);
    e.group.position.set(spawnX, spawnY, ENEMY_SPAWN_Z);
    es.baseX = spawnX;
    es.baseY = spawnY;

    // ── Lane assignment — three distinct flight patterns ─────────────
    //   A: head-on (dangerous — flies straight at player)
    //   B: hard bank left (near-miss — sweeps past left side)
    //   C: hard bank right (near-miss — sweeps past right side)
    const roll = Math.random();
    if (roll < 0.34) {
      es.lane    = 'A';
      es.targetX = (Math.random() - 0.5) * 45;   // near center
      es.targetY = (Math.random() - 0.5) * 30;
    } else if (roll < 0.67) {
      es.lane    = 'B';
      es.targetX = -(110 + Math.random() * 90);  // hard left
      es.targetY = (Math.random() - 0.5) * 40;
    } else {
      es.lane    = 'C';
      es.targetX = 110 + Math.random() * 90;     // hard right
      es.targetY = (Math.random() - 0.5) * 40;
    }

    // ── Speed class — interceptors, bombers, patrol ──────────────────
    const cls = Math.random();
    if (cls < 0.35) {
      es.speed = 100 + Math.random() * 40;   // interceptor: 100–140
    } else if (cls < 0.65) {
      es.speed = 45  + Math.random() * 30;   // bomber:      45–75
    } else {
      es.speed = 72  + Math.random() * 30;   // patrol:      72–102
    }

    // ── Weave — 55% of jets oscillate for evasive feel ───────────────
    const weaves = Math.random() < 0.55;
    es.waveAmp   = weaves ? 10 + Math.random() * 20 : 0;
    es.waveFreq  = 0.30 + Math.random() * 0.50;
    es.wavePhase = Math.random() * Math.PI * 2;

    // ── Initial orientation — lean toward turn direction ─────────────
    e.group.rotation.set(-0.09, Math.PI / 2, spawnX * 0.003);

    // Reset per-instance mesh opacity to fully visible
    for (const mesh of e.meshes) mesh.material.opacity = 1;

    e.group.visible = true;
    es.shaken       = false;
  }

  // ─────────────────────────────────────────────────────────────────
  //  DEVICE MOTION — rotationRate integration (no absolute-north snap)
  //
  //  DeviceOrientationEvent gives absolute angles referenced to magnetic
  //  North. The sensor periodically recalibrates, causing the camera to
  //  snap back. DeviceMotionEvent.rotationRate gives angular velocity
  //  (°/sec) which we integrate manually — motion is 100% relative,
  //  the camera never snaps to any external reference frame.
  //
  //  Pipeline per 'devicemotion' event:
  //    1. Read rotationRate.beta / .gamma (°/sec)
  //    2. Remap axes via window.orientation (portrait vs landscape)
  //    3. Integrate: angle += rate × dt × INPUT_SCALE
  //    4. Clamp integrated angles to ±MAX_LOOK_DEG
  //    5. Exponential smooth: smooth = smooth × 0.9 + angle × 0.1
  //    6. Build targetQuat from smoothed angles (YXZ — no gimbal lock)
  //
  //  Animate loop: velocity-based quaternion slerp
  //    dist  = camera.quaternion.angleTo(targetQuat)     (radians)
  //    alpha = BASE_ALPHA + dist × VEL_SCALE             (higher gap → faster)
  //    t     = 1 − (1 − alpha)^(dt × 60)                (dt-corrected)
  // ─────────────────────────────────────────────────────────────────
  const MAX_LOOK_DEG = 45;    // ±45° integrated angle hard clamp
  const INPUT_SCALE  = 0.35;  // rotationRate multiplier — tune movement feel
  const EXP_SMOOTH   = 0.10;  // exponential filter weight (lower = heavier)
  const BASE_ALPHA   = 0.10;  // slerp base fraction at 60fps (near-target)
  const VEL_SCALE    = 0.65;  // extra alpha per radian of angular distance

  // Integrated camera angles in degrees (purely relative — no North reference)
  let integratedPitch = 0;
  let integratedYaw   = 0;

  // Exponentially smoothed values — fed to targetQuat each event
  let smoothedPitch = 0;
  let smoothedYaw   = 0;

  // Quaternion the camera slerps toward each frame
  const targetQuat  = new THREE.Quaternion();
  const targetEuler = new THREE.Euler(0, 0, 0, 'YXZ');  // YXZ = FPS order, no gimbal

  let motionReady   = false;
  let motionEvents  = 0;                              // total events received
  const dbgEl       = document.getElementById('debug');

  function handleMotion(evt) {
    const rate = evt.rotationRate;
    motionEvents++;

    // ── Debug overlay — throttled to every 4th event (~15 fps) ───
    if (motionEvents % 4 === 0) {
      const a  = rate?.alpha  ?? null;
      const b  = rate?.beta   ?? null;
      const g  = rate?.gamma  ?? null;
      const fmt = v => v === null ? '  null' : v.toFixed(2).padStart(8);
      dbgEl.textContent =
        `SENSOR DEBUG\n` +
        `────────────────\n` +
        `Status : ${motionReady ? 'ACTIVE ✓' : 'WAITING…'}\n` +
        `Events : ${motionEvents}\n` +
        `Interval: ${(evt.interval ?? 0).toFixed(1)} ms\n` +
        `\n` +
        `rotationRate (°/s)\n` +
        `  alpha :${fmt(a)}\n` +
        `  beta  :${fmt(b)}\n` +
        `  gamma :${fmt(g)}\n` +
        `\n` +
        `Integrated (°)\n` +
        `  pitch :${integratedPitch.toFixed(2).padStart(8)}\n` +
        `  yaw   :${integratedYaw.toFixed(2).padStart(8)}`;
    }

    if (!rate) return;

    // evt.interval is ms between events — use it as dt so integration is exact
    const dt = Math.min((evt.interval || 16) / 1000, 0.05);

    // ── 1. Remap rotationRate axes to camera pitch / yaw ──────────
    //
    //  Device axes (right-hand rule):
    //    rate.beta  — rotation around X (left→right edge), °/sec
    //                 positive = top of phone tilts toward viewer
    //    rate.gamma — rotation around Y (bottom→top edge), °/sec
    //                 positive = right edge tilts toward viewer
    //
    //  Portrait   (ori=0):   beta→pitch, gamma→yaw  (standard mapping)
    //  Landscape-L (ori=90): axes swap — beta→yaw, gamma→pitch
    //    "tilting like a steering wheel" maps correctly in landscape
    //  Landscape-R (ori=-90): axes swap with opposing signs
    let deltaPitch, deltaYaw;
    const ori = window.orientation ?? 0;

    if (ori === 90) {                      // landscape-left (home on left)
      deltaPitch = -(rate.gamma ?? 0) * dt * INPUT_SCALE;
      deltaYaw   =  (rate.beta  ?? 0) * dt * INPUT_SCALE;
    } else if (ori === -90) {              // landscape-right (home on right)
      deltaPitch =  (rate.gamma ?? 0) * dt * INPUT_SCALE;
      deltaYaw   = -(rate.beta  ?? 0) * dt * INPUT_SCALE;
    } else {                               // portrait (0) or inverted (180)
      deltaPitch = -(rate.beta  ?? 0) * dt * INPUT_SCALE;
      deltaYaw   = -(rate.gamma ?? 0) * dt * INPUT_SCALE;
    }

    // ── 2. Integrate and clamp ────────────────────────────────────
    integratedPitch = THREE.MathUtils.clamp(
      integratedPitch + deltaPitch, -MAX_LOOK_DEG, MAX_LOOK_DEG
    );
    integratedYaw = THREE.MathUtils.clamp(
      integratedYaw + deltaYaw, -MAX_LOOK_DEG, MAX_LOOK_DEG
    );

    // ── 3. Exponential smoothing — kills high-frequency spikes ────
    // Formula: currentValue = (lastValue × 0.9) + (newValue × 0.1)
    // Low EXP_SMOOTH weight means fast shakes contribute little per frame;
    // sustained tilts accumulate naturally through the integration above.
    smoothedPitch = smoothedPitch * (1 - EXP_SMOOTH) + integratedPitch * EXP_SMOOTH;
    smoothedYaw   = smoothedYaw   * (1 - EXP_SMOOTH) + integratedYaw   * EXP_SMOOTH;

    // ── 4. Build target quaternion (YXZ — no gimbal lock) ─────────
    targetEuler.x = THREE.MathUtils.degToRad(smoothedPitch);
    targetEuler.y = THREE.MathUtils.degToRad(smoothedYaw);
    targetQuat.setFromEuler(targetEuler);
    motionReady = true;
  }

  // On device rotation: reset integrated angles so the camera re-centres
  // in the new orientation rather than jumping to a stale integrated value.
  window.addEventListener('orientationchange', () => {
    integratedPitch = 0;
    integratedYaw   = 0;
    smoothedPitch   = 0;
    smoothedYaw     = 0;
    motionReady     = false;
  });

  document.getElementById('start-btn').addEventListener('click', async () => {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('debug').style.display   = 'block';

    // Attach listener FIRST — in place before permission dialog resolves (iOS)
    window.addEventListener('devicemotion', handleMotion, true);

    // iOS 13+ requires explicit permission inside a user gesture.
    // DeviceMotionEvent and DeviceOrientationEvent share the same dialog;
    // try Motion first, fall back to Orientation if the API differs.
    try {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        await DeviceMotionEvent.requestPermission();
      } else if (typeof DeviceOrientationEvent !== 'undefined' &&
                 typeof DeviceOrientationEvent.requestPermission === 'function') {
        await DeviceOrientationEvent.requestPermission();
      }
    } catch (err) {
      console.warn('Motion permission:', err);
    }
  });

  // ─────────────────────────────────────────────────────────────────
  //  RESIZE
  // ─────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ─────────────────────────────────────────────────────────────────
  //  ANIMATION LOOP
  //  Each object moves independently in local space — no group offset,
  //  no precision reset, no group pop. Truly infinite.
  // ─────────────────────────────────────────────────────────────────
  // ── Spawn timer — fires every 1–2.5 s to stagger jet arrivals ───
  let spawnCountdown = 1.2;   // first jet appears after ~1.2 s

  // ── Cockpit shake state ───────────────────────────────────────────
  let shakeTimer = 0;
  const SHAKE_DURATION = 0.20;  // seconds
  const SHAKE_MAG      = 0.014; // peak magnitude (world units)

  let prevTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now  = performance.now();
    const dt   = Math.min((now - prevTime) / 1000, 0.05);
    prevTime   = now;

    const starTravel   = SPEED * dt;
    const nebulaTravel = SPEED * NEBULA_SPEED_FACTOR * dt;

    // ── Stars: individual Z-wrap ──────────────────────────────────
    for (let i = 0; i < STAR_COUNT; i++) {
      let lz = starAttr.getZ(i) + starTravel;

      if (lz > 50) {
        lz = -STAR_DEPTH;
        starAttr.setX(i, (Math.random() - 0.5) * STAR_SPREAD_X * 2);
        starAttr.setY(i, (Math.random() - 0.5) * STAR_SPREAD_Y * 2);
        starBrightness[i] = 0.2 + Math.random() * 0.8;
        starCol[i * 3] = starCol[i * 3 + 1] = starCol[i * 3 + 2] = 0;
      } else {
        const distAhead = -lz;
        const fade = smoothstep(STAR_FADE_FAR, STAR_FADE_NEAR, distAhead);
        const b    = fade * starBrightness[i];
        starCol[i * 3] = starCol[i * 3 + 1] = starCol[i * 3 + 2] = b;
      }

      starAttr.setZ(i, lz);
    }
    starAttr.needsUpdate    = true;
    starColAttr.needsUpdate = true;

    // ── Nebulas: individual Z-wrap, parallax speed ────────────────
    //  closeFade = Math.min(1, |z| / 200)  — fades to 0 at camera
    //  farFade   = smoothstep from horizon  — fades in from deep space
    for (const neb of nebulas) {
      neb.position.z += nebulaTravel;

      if (neb.position.z > 50) {
        // Immediately reposition to farthest point — count stays at NEBULA_COUNT
        neb.position.x = (Math.random() - 0.5) * NEBULA_SPREAD_X;
        neb.position.y = (Math.random() - 0.5) * NEBULA_SPREAD_Y;
        neb.position.z = -NEBULA_DEPTH;
        const [sw, sh] = randNebulaScale();
        neb.scale.set(sw, sh, 1);
        neb.material.rotation = Math.random() * Math.PI * 2;
        neb.material.opacity  = 0;
        continue;
      }

      const closeFade = Math.min(1, Math.abs(neb.position.z) / 200);
      const farFade   = smoothstep(NEBULA_DEPTH, NEBULA_DEPTH * 0.65, -neb.position.z);
      neb.material.opacity = NEBULA_MAX_OP * closeFade * farFade;
    }

    // ── Spawn timer — activate one jet at a time on interval ────────
    if (enemies.length > 0) {
      spawnCountdown -= dt;
      if (spawnCountdown <= 0) {
        const idx = enemies.findIndex(e => !e.group.visible);
        if (idx !== -1) activateEnemy(idx);
        spawnCountdown = 1.0 + Math.random() * 1.5;  // next jet in 1–2.5 s
      }
    }

    // ── Enemy jets: movement + LookAt ────────────────────────────────
    const tSec = now / 1000;
    for (let i = 0; i < enemies.length; i++) {
      const e  = enemies[i];
      if (!e.group.visible) continue;
      const es = enemyState[i];

      // Forward thrust
      e.group.position.z += es.speed * dt;

      // Lateral convergence + weave
      es.baseX += (es.targetX - es.baseX) * 0.42 * dt;
      es.baseY += (es.targetY - es.baseY) * 0.42 * dt;
      const waveX = es.waveAmp * Math.sin(tSec * es.waveFreq + es.wavePhase);
      const prevX = e.group.position.x;
      e.group.position.x = es.baseX + waveX;
      e.group.position.y = es.baseY;

      // ── LookAt: orient nose toward actual velocity vector ────────
      // lateralVel (units/s) drives both yaw and roll
      const lateralVel = (e.group.position.x - prevX) / Math.max(dt, 0.001);
      const vertVel    = (es.targetY - e.group.position.y) * 0.42;

      // Yaw: atan2(vz, -vx) aligns nose (local -X → world +Z) with travel
      const yawTarget   = Math.atan2(es.speed, -lateralVel);
      // Pitch: slight constant nose-down plus tilt toward Y velocity
      const pitchTarget = -0.09 + THREE.MathUtils.clamp(vertVel / es.speed, -0.25, 0.15) * 0.5;
      // Roll: bank into lateral motion — feels like a real banked turn
      const rollTarget  = -lateralVel * 0.0065;

      e.group.rotation.y += (yawTarget   - e.group.rotation.y) * Math.min(1, 3.5 * dt);
      e.group.rotation.x += (pitchTarget - e.group.rotation.x) * Math.min(1, 3.5 * dt);
      e.group.rotation.z += (rollTarget  - e.group.rotation.z) * Math.min(1, 5.0 * dt);

      // ── Opacity fade — jet dissolves before reaching camera ──────
      // Full opacity beyond -55, fades to zero by -8
      if (e.group.position.z > -8) {
        deactivateEnemy(i);
        continue;
      } else if (e.group.position.z > -55) {
        const t = (e.group.position.z + 55) / 47;  // 0 at -55, 1 at -8
        const opacity = 1 - (t * t);                // quadratic ease-out
        for (const mesh of e.meshes) mesh.material.opacity = opacity;
      }

      // ── Cockpit shake — as jet screams past close range ──────────
      if (!es.shaken && e.group.position.z > -20) {
        shakeTimer = SHAKE_DURATION;
        es.shaken  = true;
      }
    }

    // ── Cockpit shake ─────────────────────────────────────────────
    if (shakeTimer > 0) {
      shakeTimer -= dt;
      const mag = SHAKE_MAG * (shakeTimer / SHAKE_DURATION); // fade to zero
      camera.position.set(
        (Math.random() - 0.5) * mag * 2,
        (Math.random() - 0.5) * mag * 2,
        0
      );
    } else {
      camera.position.set(0, 0, 0);
    }

    // ── Camera slerp — velocity-based alpha + quaternion interpolation ─
    //
    //  Why quaternions?  Euler lerp jitters during fast motion because
    //  each axis is interpolated independently and can "fight" each other.
    //  Quaternion slerp always takes the shortest arc between two orientations.
    //
    //  Why velocity-based alpha?
    //    dist = angular gap between current quaternion and target (radians)
    //    alpha = BASE_ALPHA + dist * VEL_SCALE   (capped at 0.92)
    //    → near target: alpha ≈ BASE (slow, heavy)
    //    → far from target (fast tilt): alpha rises → camera catches up quickly
    //    → result: no jitter on fast swings, no snap on slow ones
    //
    //  DeltaTime correction keeps feel identical at 30/60/120 fps:
    //    slerpT = 1 - (1 - alpha)^(dt * 60)
    if (motionReady) {
      const dist   = camera.quaternion.angleTo(targetQuat);
      const alpha  = Math.min(0.92, BASE_ALPHA + dist * VEL_SCALE);
      const slerpT = 1 - Math.pow(1 - alpha, dt * 60);
      camera.quaternion.slerp(targetQuat, slerpT);
    }

    renderer.render(scene, camera);
  }

  animate();
  </script>

</body>
</html>
