<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Vector Rocket Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
  </style>
</head>
<body>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';

  // ─────────────────────────────────────────────────────────────────
  //  TUNABLE CONSTANTS — adjust these to change look & feel
  // ─────────────────────────────────────────────────────────────────
  const STAR_COUNT    = 5000;   // total star points
  const STAR_SPREAD_X = 220;    // horizontal spread of the star field
  const STAR_SPREAD_Y = 130;    // vertical spread
  const STAR_DEPTH    = 2000;   // how deep the tunnel extends behind the camera
  const STAR_FADE_FAR = 1600;   // distance at which stars are invisible (fade start)
  const STAR_FADE_NEAR= 400;    // distance at which stars reach full brightness

  const NEBULA_COUNT  = 20;     // number of volumetric cloud sprites
  const NEBULA_DEPTH  = 1800;   // max depth at which nebulas spawn
  const NEBULA_MAX_OP = 0.12;   // peak opacity — keep low for subtle atmosphere

  const BASE_SPEED    = 80;     // cruising speed — halved from original 160
  const WARP_SPEED    = 260;    // max warp speed — halved from original 520
  const WARP_PERIOD   = 6.0;    // seconds for one full warp oscillation

  const BASE_FOV      = 72;     // normal field of view (degrees)
  const WARP_FOV      = 96;     // FOV at max warp — "tunnel vision" effect
  const FOV_SMOOTH    = 4.5;    // how fast FOV lerps (higher = snappier)

  // ─────────────────────────────────────────────────────────────────
  //  RENDERER
  // ─────────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({
    antialias: false,          // off — not needed for points/sprites, saves GPU
    powerPreference: 'high-performance',
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // cap for mobile
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x00000a, 1); // near-black with the faintest blue tint
  document.body.appendChild(renderer.domElement);

  // ─────────────────────────────────────────────────────────────────
  //  SCENE & CAMERA
  // ─────────────────────────────────────────────────────────────────
  const scene  = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    BASE_FOV,
    window.innerWidth / window.innerHeight,
    0.5,    // near
    3500    // far — must exceed STAR_DEPTH + NEBULA_DEPTH
  );
  camera.position.set(0, 0, 0);

  // ─────────────────────────────────────────────────────────────────
  //  UNIVERSE GROUP
  //  Every object lives inside this single Group.
  //  Moving universe.position.z forward each frame is equivalent to
  //  flying the camera through space — one transform, zero overhead.
  // ─────────────────────────────────────────────────────────────────
  const universe = new THREE.Group();
  scene.add(universe);

  // ─────────────────────────────────────────────────────────────────
  //  STAR TEXTURE — soft circular gradient so points render as
  //  round discs instead of WebGL's default square sprites.
  //  alphaTest on the material clips the square corners entirely.
  // ─────────────────────────────────────────────────────────────────
  function makeStarTexture() {
    const SZ  = 64;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = SZ;
    const ctx = cvs.getContext('2d');
    const grd = ctx.createRadialGradient(SZ/2, SZ/2, 0, SZ/2, SZ/2, SZ/2);
    grd.addColorStop(0.0, 'rgba(255,255,255,1.0)'); // bright centre
    grd.addColorStop(0.4, 'rgba(255,255,255,0.8)');
    grd.addColorStop(0.8, 'rgba(255,255,255,0.2)');
    grd.addColorStop(1.0, 'rgba(255,255,255,0.0)'); // transparent edge
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, SZ, SZ);
    return new THREE.CanvasTexture(cvs);
  }

  // ─────────────────────────────────────────────────────────────────
  //  STAR FIELD — BufferGeometry + THREE.Points (5 000 stars)
  // ─────────────────────────────────────────────────────────────────
  const starPos = new Float32Array(STAR_COUNT * 3);
  // Per-vertex RGB colour — brightness encodes distance fade.
  // Stars far away start black (invisible); brighten as they approach.
  const starCol = new Float32Array(STAR_COUNT * 3);

  for (let i = 0; i < STAR_COUNT; i++) {
    starPos[i * 3]     = (Math.random() - 0.5) * STAR_SPREAD_X * 2;
    starPos[i * 3 + 1] = (Math.random() - 0.5) * STAR_SPREAD_Y * 2;
    starPos[i * 3 + 2] = -(Math.random() * STAR_DEPTH);
    // Colour starts at 0 (black); updated each frame by distance
    starCol[i * 3] = starCol[i * 3 + 1] = starCol[i * 3 + 2] = 0;
  }

  const starGeo  = new THREE.BufferGeometry();
  const starAttr = new THREE.BufferAttribute(starPos, 3);
  const starColAttr = new THREE.BufferAttribute(starCol, 3);
  starGeo.setAttribute('position', starAttr);
  starGeo.setAttribute('color',    starColAttr); // drives per-star brightness

  const starMat = new THREE.PointsMaterial({
    map:          makeStarTexture(), // circular soft disc — no more squares
    size:         1.8,
    sizeAttenuation: true,  // larger when close → sells the depth rush
    vertexColors: true,     // use starColAttr for per-star brightness/fade
    transparent:  true,
    alphaTest:    0.01,     // clips the transparent square corners cleanly
    depthWrite:   false,    // avoids sorting artifacts with nebulas
  });

  universe.add(new THREE.Points(starGeo, starMat));

  // ─────────────────────────────────────────────────────────────────
  //  NEBULA SPRITES — volumetric clouds via THREE.Sprite
  //
  //  Each sprite uses a canvas-generated radial gradient texture.
  //  AdditiveBlending means colours add to whatever is behind them,
  //  giving the naturally glowing look without any lighting setup.
  // ─────────────────────────────────────────────────────────────────

  // Build a soft radial gradient texture on a canvas.
  // r/g/b = inner core colour. Edge always fades to transparent.
  function makeNebulaTexture(r, g, b) {
    const SZ  = 256;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = SZ;
    const ctx = cvs.getContext('2d');
    const grd = ctx.createRadialGradient(SZ/2, SZ/2, 0, SZ/2, SZ/2, SZ/2);
    grd.addColorStop(0.00, `rgba(${r},${g},${b},1.0)`); // bright core
    grd.addColorStop(0.25, `rgba(${r},${g},${b},0.6)`);
    grd.addColorStop(0.60, `rgba(${r},${g},${b},0.2)`);
    grd.addColorStop(1.00, `rgba(${r},${g},${b},0.0)`); // transparent edge
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, SZ, SZ);
    return new THREE.CanvasTexture(cvs);
  }

  // Palette — deep purple, teal, indigo, midnight blue
  const nebTextures = [
    makeNebulaTexture( 85,   0, 160), // deep purple
    makeNebulaTexture(  0, 140, 140), // teal
    makeNebulaTexture( 20,   0, 180), // indigo-blue
    makeNebulaTexture(110,   0, 110), // magenta-purple
    makeNebulaTexture(  0,  90, 140), // dark teal-blue
  ];

  // Spawn all nebula sprites
  const nebulas = [];

  for (let i = 0; i < NEBULA_COUNT; i++) {
    const mat = new THREE.SpriteMaterial({
      map:       nebTextures[i % nebTextures.length],
      transparent: true,
      depthWrite:  false,                   // don't block stars behind them
      blending:    THREE.AdditiveBlending,  // colours glow, add to scene
      opacity:     0,                       // start invisible; fades in
    });

    const sprite = new THREE.Sprite(mat);

    // Place randomly along the tunnel depth
    const scale = 100 + Math.random() * 250; // large — they're distant clouds
    sprite.scale.set(scale, scale, 1);
    sprite.position.set(
      (Math.random() - 0.5) * 320,
      (Math.random() - 0.5) * 200,
      -(200 + Math.random() * NEBULA_DEPTH)
    );

    universe.add(sprite);
    nebulas.push(sprite);
  }

  // ─────────────────────────────────────────────────────────────────
  //  HELPERS
  // ─────────────────────────────────────────────────────────────────

  // GLSL-style smoothstep: smooth 0→1 curve from edge0 to edge1.
  // Works with reversed edges (edge0 > edge1) for inverse mapping.
  function smoothstep(edge0, edge1, x) {
    const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
    return t * t * (3 - 2 * t);
  }

  // Recycle a single nebula to a new random deep position.
  function recycleNebula(neb) {
    neb.position.x = (Math.random() - 0.5) * 320;
    neb.position.y = (Math.random() - 0.5) * 200;
    // Reset to world Z = -NEBULA_DEPTH (convert to local space)
    neb.position.z = -NEBULA_DEPTH - universe.position.z;
    const s = 100 + Math.random() * 250;
    neb.scale.set(s, s, 1);
    neb.material.opacity = 0; // start invisible until fade-in
  }

  // ─────────────────────────────────────────────────────────────────
  //  RESIZE
  // ─────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ─────────────────────────────────────────────────────────────────
  //  ANIMATION LOOP
  // ─────────────────────────────────────────────────────────────────
  let prevTime  = performance.now();
  let warpClock = 0;        // drives the FOV sine wave
  let currentFOV = BASE_FOV;

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const dt  = Math.min((now - prevTime) / 1000, 0.05); // cap at 50 ms
    prevTime  = now;

    // ── 1. FOV warp pulse ─────────────────────────────────────────
    // A slow sine wave oscillates between 0 and 1, representing
    // ship speed. Higher speed → wider FOV → "tunnel vision" warp.
    // In the full game this value will come from ship throttle input.
    warpClock += dt;
    const warpT = (Math.sin((warpClock / WARP_PERIOD) * Math.PI * 2) + 1) * 0.5;

    const speed     = BASE_SPEED + (WARP_SPEED - BASE_SPEED) * warpT;
    const targetFOV = BASE_FOV   + (WARP_FOV   - BASE_FOV)   * warpT;

    // Lerp toward target FOV — smooth, no jarring snaps
    currentFOV += (targetFOV - currentFOV) * Math.min(1.0, FOV_SMOOTH * dt);
    if (Math.abs(camera.fov - currentFOV) > 0.05) {
      camera.fov = currentFOV;
      camera.updateProjectionMatrix(); // only called when FOV actually changes
    }

    // ── 2. Fly the universe forward ───────────────────────────────
    // Advancing universe.position.z is the same as the camera moving
    // forward — the single group transform moves everything at once.
    universe.position.z += speed * dt;

    // ── 3. Precision safety reset ─────────────────────────────────
    // After flying ~3 000 units the floats get large. We reset the
    // group back to zero and shift all children to compensate, keeping
    // numbers small and precision crisp indefinitely.
    if (universe.position.z > 3000) {
      const offset = universe.position.z;
      universe.position.z = 0;

      // Shift every star backwards by offset (in local space)
      for (let i = 0; i < STAR_COUNT; i++) {
        starAttr.setZ(i, starAttr.getZ(i) - offset);
      }
      starAttr.needsUpdate = true;

      // Shift every nebula
      for (const neb of nebulas) {
        neb.position.z -= offset;
      }
    }

    // ── 4. Recycle stars + update per-star brightness fade ────────
    // world-Z = universe.position.z + local-Z
    // Stars past the camera (worldZ > 5) recycle to the far end.
    // Brightness is a smoothstep from 0 (far) to 1 (near), so distant
    // stars are pitch-black — completely invisible until they close in.
    for (let i = 0; i < STAR_COUNT; i++) {
      const worldZ    = universe.position.z + starAttr.getZ(i);
      const distAhead = -worldZ; // positive = in front of camera

      if (worldZ > 5) {
        // Recycle: random new X/Y, push back to world -STAR_DEPTH
        starAttr.setX(i, (Math.random() - 0.5) * STAR_SPREAD_X * 2);
        starAttr.setY(i, (Math.random() - 0.5) * STAR_SPREAD_Y * 2);
        starAttr.setZ(i, -STAR_DEPTH - universe.position.z);
        // Start invisible so it fades in naturally
        starCol[i * 3] = starCol[i * 3 + 1] = starCol[i * 3 + 2] = 0;
      } else {
        // Brightness: 0 at STAR_FADE_FAR, 1 at STAR_FADE_NEAR
        const b = smoothstep(STAR_FADE_FAR, STAR_FADE_NEAR, distAhead);
        starCol[i * 3] = starCol[i * 3 + 1] = starCol[i * 3 + 2] = b;
      }
    }
    starAttr.needsUpdate    = true;
    starColAttr.needsUpdate = true;

    // ── 5. Nebula fade in / out ───────────────────────────────────
    // distAhead = how far the nebula is in front of the camera.
    //   > NEBULA_DEPTH  → invisible (too far)
    //   1200 → 1800     → fade in  (approaching from the deep)
    //   200  → 1200     → full opacity
    //   0    → 200      → fade out (so close it would fill the screen)
    //   < 0             → recycle (passed the camera)
    for (const neb of nebulas) {
      const worldZ    = universe.position.z + neb.position.z;
      const distAhead = -worldZ; // positive = in front

      if (distAhead < 0) {
        recycleNebula(neb);
        continue;
      }

      // Far fade: invisible at 1800+, fully visible at 1200
      const farFade   = smoothstep(1800, 1200, distAhead);
      // Close fade: invisible at 0, fully visible at 200
      const closeFade = smoothstep(0, 200, distAhead);

      neb.material.opacity = NEBULA_MAX_OP * farFade * closeFade;
    }

    renderer.render(scene, camera);
  }

  animate();
  </script>

</body>
</html>
