<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a1208"/>
      <stop offset="0.6" stop-color="#1a0604"/>
      <stop offset="1" stop-color="#080202"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f06030"/>
      <stop offset="0.55" stop-color="#d8421a"/>
      <stop offset="1" stop-color="#982612"/>
    </linearGradient>
  </defs>

  <!-- Dark wasteland base; OS rounds the corners further on iOS -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle starfield in the corners (stays inside maskable safe zone) -->
  <g fill="#ffd280" opacity="0.45">
    <circle cx="92"  cy="96"  r="2.4"/>
    <circle cx="430" cy="84"  r="3.2"/>
    <circle cx="120" cy="416" r="2"/>
    <circle cx="446" cy="408" r="2.8"/>
    <circle cx="60"  cy="246" r="2"/>
    <circle cx="60"  cy="354" r="2"/>
  </g>

  <!-- Soft amber sun-glow behind the plate so the badge looks lit -->
  <circle cx="256" cy="256" r="220" fill="#ff8a3a" opacity="0.18"/>

  <!-- Big DLX plate centered in the maskable safe zone -->
  <rect x="56" y="120" width="400" height="272" rx="38"
        fill="url(#plate)" stroke="#1a0a06" stroke-width="10"/>

  <!-- Inner accent ring (matches the GDD page-header DLX corner mark) -->
  <rect x="80" y="144" width="352" height="224" rx="22"
        fill="none" stroke="#ffb84d" stroke-width="4" opacity="0.55"/>

  <!-- DLX wordmark — yellow Impact-family with black outline -->
  <text x="256" y="304"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
        font-weight="900" font-size="180" letter-spacing="10"
        text-anchor="middle" fill="#ffd83d"
        stroke="#1a0a06" stroke-width="6" paint-order="stroke">DLX</text>

  <!-- HAULER tagline below the plate — small enough to survive
       most maskable crops; on a fully square mask it sits just
       inside the safe zone -->
  <text x="256" y="450"
        font-family="Impact, 'Arial Black', sans-serif"
        font-weight="900" font-size="46" letter-spacing="8"
        text-anchor="middle" fill="#ffd83d"
        stroke="#1a0a06" stroke-width="2" paint-order="stroke">HAULER</text>
</svg>
