<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0512"/>
      <stop offset="0.3" stop-color="#4a1020"/>
      <stop offset="0.65" stop-color="#923523"/>
      <stop offset="1" stop-color="#d97028"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.78" cy="0.72" r="0.5">
      <stop offset="0" stop-color="#ffd28c" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#f07832" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#b42814" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>
  <rect width="512" height="512" rx="96" fill="url(#sun)"/>
  <!-- Ship -->
  <g transform="translate(230 230)">
    <!-- Engine block -->
    <rect x="-130" y="-40" width="48" height="80" fill="#2a2a30" stroke="#060608" stroke-width="4"/>
    <!-- Main hull -->
    <rect x="-82" y="-55" width="150" height="110" fill="#a52a2a" stroke="#1a0a05" stroke-width="4"/>
    <!-- Rooftop cargo block -->
    <rect x="-20" y="-90" width="60" height="35" fill="#3a3a40" stroke="#1a0a05" stroke-width="4"/>
    <!-- Cockpit -->
    <rect x="40" y="-28" width="30" height="34" fill="#e0a020" stroke="#3a1a05" stroke-width="3"/>
    <rect x="40" y="-12" width="30" height="2" fill="#3a1a05"/>
    <!-- Exhaust plume -->
    <polygon points="-130,-20 -176,0 -130,20" fill="#ffb347" opacity="0.9"/>
    <polygon points="-130,-10 -160,0 -130,10" fill="#fff4d0" opacity="0.9"/>
    <!-- Warning light -->
    <circle cx="-5" cy="-100" r="5" fill="#ff4040"/>
  </g>
  <!-- DLX logo -->
  <text x="256" y="440" font-family="Courier New, monospace" font-weight="900" font-size="96"
        text-anchor="middle" fill="#ffd280" stroke="#000" stroke-width="5" paint-order="stroke">DLX</text>
</svg>
